<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6770"/>
    </marker>
    <marker id="garrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b46c1"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="520" fill="#ffffff"/>

  <!-- Title + differentiation subtitle -->
  <text x="540" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#1a2733">OpenClaw Model Bridge &#8212; Agent Runtime Control Plane</text>
  <text x="540" y="60" text-anchor="middle" font-size="16" fill="#5b6770">Not another LLM wrapper &#8212; a <tspan font-weight="700" fill="#6b46c1">self-governing control plane</tspan>.</text>
  <text x="540" y="82" text-anchor="middle" font-size="13.5" fill="#9aa5ad">zero deps (Python stdlib) &#183; safe fallback &#183; reproducible evidence (SLO + 17-scenario bench + 16/16 chaos) &#183; Sunset Law north star</text>

  <!-- ===== Left: core request pipeline ===== -->
  <text x="160" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#9aa5ad" letter-spacing="1">REQUEST PATH</text>

  <rect x="36" y="116" width="248" height="40" rx="9" fill="#f4f6f8" stroke="#5b6770" stroke-width="2"/>
  <text x="160" y="141" text-anchor="middle" font-size="16" font-weight="600" fill="#1a2733">WhatsApp + Discord</text>
  <line x1="160" y1="156" x2="160" y2="172" stroke="#5b6770" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="36" y="174" width="248" height="40" rx="9" fill="#f4f6f8" stroke="#5b6770" stroke-width="2"/>
  <text x="160" y="199" text-anchor="middle" font-size="16" font-weight="600" fill="#1a2733">Gateway  :18789</text>
  <line x1="160" y1="214" x2="160" y2="230" stroke="#5b6770" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="36" y="232" width="248" height="50" rx="9" fill="#e3f0fd" stroke="#2b6cb0" stroke-width="2.5"/>
  <text x="160" y="253" text-anchor="middle" font-size="16" font-weight="700" fill="#1a3a5c">Tool Proxy  :5002</text>
  <text x="160" y="271" text-anchor="middle" font-size="11.5" fill="#2b6cb0">tool governance &#183; custom tools &#183; SLO</text>
  <line x1="160" y1="282" x2="160" y2="298" stroke="#5b6770" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="36" y="300" width="248" height="50" rx="9" fill="#e3f0fd" stroke="#2b6cb0" stroke-width="2.5"/>
  <text x="160" y="321" text-anchor="middle" font-size="16" font-weight="700" fill="#1a3a5c">Adapter  :5001</text>
  <text x="160" y="339" text-anchor="middle" font-size="11.5" fill="#2b6cb0">8-provider routing &#183; fallback &#183; VL</text>
  <line x1="160" y1="350" x2="160" y2="366" stroke="#5b6770" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="36" y="368" width="248" height="40" rx="9" fill="#eaf7ee" stroke="#2f855a" stroke-width="2.5"/>
  <text x="160" y="393" text-anchor="middle" font-size="16" font-weight="700" fill="#1c4532">LLM &#8212; Qwen3-235B + 7 more</text>

  <!-- governs connector: ontology -> proxy/adapter -->
  <path d="M 312 291 C 300 291, 296 291, 286 291" fill="none" stroke="#6b46c1" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#garrow)"/>
  <text x="299" y="283" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6b46c1">governs</text>

  <!-- ===== Center/right: Ontology / Governance Plane (the star) ===== -->
  <rect x="312" y="100" width="732" height="306" rx="12" fill="#f7f5fd" stroke="#6b46c1" stroke-width="2.5"/>
  <text x="334" y="130" font-size="19" font-weight="700" fill="#44337a">Ontology / Governance Plane &#8212; self-governing</text>
  <text x="334" y="151" font-size="13.5" font-style="italic" fill="#7c6aa8">a declarative engine that governs the control plane &#8212; and audits itself, even the auditor</text>

  <circle cx="340" cy="178" r="3.5" fill="#6b46c1"/>
  <text x="354" y="183" font-size="14.5"><tspan font-weight="700" fill="#1a2733">4 YAML ontologies</tspan><tspan fill="#5b6770"> &#8212; tool &#183; domain &#183; policy &#183; governance (declarative, ONTOLOGY_MODE=on)</tspan></text>

  <circle cx="340" cy="206" r="3.5" fill="#6b46c1"/>
  <text x="354" y="211" font-size="14.5"><tspan font-weight="700" fill="#1a2733">90 invariants &#183; 828 checks &#183; 23 meta-rules &#183; 14 MRD scanners</tspan><tspan fill="#5b6770"> (v3.56, daily audit)</tspan></text>

  <circle cx="340" cy="234" r="3.5" fill="#6b46c1"/>
  <text x="354" y="239" font-size="14.5"><tspan font-weight="700" fill="#1a2733">Audits the control plane itself</tspan><tspan fill="#5b6770"> &#8212; MR-7 governance-execution-is-self-observable</tspan></text>

  <circle cx="340" cy="262" r="3.5" fill="#6b46c1"/>
  <text x="354" y="267" font-size="14.5"><tspan font-weight="700" fill="#1a2733">Three-gate</tspan><tspan fill="#5b6770"> &#8212; pre-check / runtime-gate / post-verify wired into the request path (shadow)</tspan></text>

  <circle cx="340" cy="290" r="3.5" fill="#6b46c1"/>
  <text x="354" y="295" font-size="14.5"><tspan font-weight="700" fill="#1a2733">Convergence</tspan><tspan fill="#5b6770"> &#8212; declared state &#8596; runtime, machine-synced (not by memory) &#183; 5 specs</tspan></text>

  <circle cx="340" cy="318" r="3.5" fill="#6b46c1"/>
  <text x="354" y="323" font-size="14.5"><tspan font-weight="700" fill="#1a2733">Blood-lesson driven</tspan><tspan fill="#5b6770"> &#8212; 28 silent failures &#8594; invariants &#183; 25 case studies (learn once, prevent forever)</tspan></text>

  <circle cx="340" cy="346" r="3.5" fill="#2f855a"/>
  <text x="354" y="351" font-size="14.5"><tspan font-weight="700" fill="#1c4532">pip install openclaw-ontology-engine</tspan><tspan fill="#5b6770"> &#8212; reusable in any agent project, bring your own YAML</tspan></text>

  <text x="334" y="386" font-size="13" fill="#9aa5ad">What makes it a <tspan font-weight="700" fill="#6b46c1">control plane</tspan>, not a wrapper: governance is declarative, self-auditing, detachable.</text>

  <!-- ===== Bottom: supporting planes ===== -->
  <rect x="36" y="426" width="328" height="62" rx="10" fill="#fafafa" stroke="#9aa5ad" stroke-width="1.5"/>
  <text x="200" y="452" text-anchor="middle" font-size="16" font-weight="600" fill="#1a2733">Memory plane</text>
  <text x="200" y="473" text-anchor="middle" font-size="13.5" fill="#5b6770">KB + local embedding (0 API call) + RAG</text>

  <rect x="376" y="426" width="328" height="62" rx="10" fill="#fafafa" stroke="#9aa5ad" stroke-width="1.5"/>
  <text x="540" y="452" text-anchor="middle" font-size="16" font-weight="600" fill="#1a2733">40 cron jobs</text>
  <text x="540" y="473" text-anchor="middle" font-size="13.5" fill="#5b6770">paper radars &#183; digests &#8594; WhatsApp + Discord</text>

  <rect x="716" y="426" width="328" height="62" rx="10" fill="#fafafa" stroke="#9aa5ad" stroke-width="1.5"/>
  <text x="880" y="452" text-anchor="middle" font-size="16" font-weight="600" fill="#1a2733">Shared state</text>
  <text x="880" y="473" text-anchor="middle" font-size="13.5" fill="#5b6770">status.json: user &#8596; PA &#8596; Claude Code &#8596; cron</text>
</svg>
