  - id: movespeed_noowners_uid_mismatch
    file: ontology/docs/cases/movespeed_noowners_uid_mismatch_case.md
    title: "APFS noowners 掩盖 UID 不匹配 → daemon 并发访问触发 30% EPERM, chown 静默无效"
