# jobs_registry.yaml — V27 统一任务注册表
# 所有定时任务（system crontab + openclaw cron）在此登记。
# 校验脚本：python3 check_registry.py
version: 1

jobs:
  # ---- system crontab 任务（不经过 LLM 链路） ----

  - id: health_check
    scheduler: system
    entry: health_check.sh
    interval: "0 9 * * 1"           # 每周一 09:00
    log: ~/health_check.log
    needs_api_key: true
    enabled: true
    description: 每周健康周报，推送到 WhatsApp

  - id: kb_save_arxiv
    scheduler: system
    entry: kb_save_arxiv.sh
    interval: "30 8 * * *"          # 每天 08:30
    log: ~/kb_save_arxiv.log
    needs_api_key: false
    enabled: false                   # V28: 功能已合并到 arxiv_monitor
    description: ArXiv 监控结果写入 KB + rsync 备份（已废弃）

  - id: arxiv_monitor
    scheduler: system
    entry: jobs/arxiv_monitor/run_arxiv.sh
    interval: "0 4,10,16,22 * * *"  # 每天4次（避免ArXiv API 429限速）
    log: ~/.openclaw/logs/jobs/arxiv_monitor.log
    needs_api_key: true
    enabled: true
    description: ArXiv AI论文监控（脚本控制格式，替代 --announce 模式）

  - id: kb_evening
    scheduler: system
    entry: kb_evening.sh
    interval: "0 22 * * *"          # 每天 22:00
    log: ~/kb_evening.log
    needs_api_key: false
    enabled: true
    description: 晚间 KB 整理

  - id: kb_inject
    scheduler: system
    entry: kb_inject.sh
    interval: "0 7 * * *"           # 每天 07:00（LLM对话前生成当日摘要）
    log: ~/kb_inject.log
    needs_api_key: false
    enabled: true
    description: 每日 KB 摘要生成 + WhatsApp 推送精华摘要，供 LLM 对话时 read 查阅

  # ---- openclaw cron 任务（经过 LLM 链路） ----

  - id: freight_watcher
    scheduler: system
    entry: jobs/freight_watcher/run_freight.sh
    interval: "0 8,14,20 * * *"     # 每天 08:00/14:00/20:00
    log: ~/.openclaw/logs/jobs/freight_watcher.log
    needs_api_key: true
    enabled: true
    description: 货代 Watcher，抓取航运动态（系统crontab触发，脚本内直接curl LLM）

  - id: openclaw_run
    scheduler: system
    entry: jobs/openclaw_official/run.sh
    interval: "0 8 * * *"           # 每天 08:00 HKT
    log: ~/.openclaw/logs/jobs/openclaw_official.log
    needs_api_key: true
    enabled: true
    description: OpenClaw Releases Watcher（版本更新+LLM中文摘要）

  # openclaw_discussions 已删除 — 与 run_discussions (id: run_discussions) 完全重复

  - id: kb_review
    scheduler: system
    entry: kb_review.sh
    interval: "0 21 * * 5"          # 每周五 21:00
    log: ~/kb_review.log
    needs_api_key: true
    enabled: true
    description: "KB 跨笔记回顾（V29: LLM深度分析+WhatsApp推送）"

  # ---- HN 讨论抓取（独立脚本） ----

  - id: run_hn_fixed
    scheduler: system
    entry: run_hn_fixed.sh
    interval: "45 */3 * * *"        # 每3小时:45分（与 ArXiv 错开45分钟）
    log: ~/.openclaw/logs/jobs/hn_watcher.log
    needs_api_key: false
    enabled: true
    description: HackerNews 热帖抓取

  - id: job_watchdog
    scheduler: system
    entry: job_watchdog.sh
    interval: "30 * * * *"           # 每小时:30分
    log: ~/job_watchdog.log
    needs_api_key: false
    enabled: true
    description: 元监控 — 检查所有定时任务是否按时执行，超时则 WhatsApp 告警

  - id: gateway_watchdog
    scheduler: system
    entry: restart.sh
    interval: "*/30 * * * *"
    log: ~/.openclaw/logs/gateway_watchdog.log
    needs_api_key: false
    enabled: false                   # #95: 与 launchd KeepAlive 双主控冲突，已从 crontab 移除（2026-03-09）
    description: Gateway 自愈 watchdog（已废弃 — Gateway 由 launchd 单一管理）

  - id: auto_deploy
    scheduler: system
    entry: auto_deploy.sh
    interval: "*/2 * * * *"          # 每 2 分钟轮询 GitHub
    log: ~/.openclaw/logs/auto_deploy.log
    needs_api_key: false
    enabled: true
    description: 自动部署 — git pull + 文件同步 + 按需 restart

  - id: run_discussions
    scheduler: system
    entry: jobs/openclaw_official/run_discussions.sh
    interval: "15 * * * *"          # 每小时第15分钟
    log: ~/.openclaw/logs/jobs/openclaw_discussions.log
    needs_api_key: false
    enabled: true
    description: 社区 Issues 监控（GitHub REST API + ETag 缓存，支持 GITHUB_TOKEN 认证提升限额）

  - id: wa_keepalive
    scheduler: system
    entry: wa_keepalive.sh
    interval: "*/30 * * * *"        # 每30分钟
    log: ~/wa_keepalive.log
    needs_api_key: false
    enabled: true
    description: WhatsApp session 保活（Gateway HTTP 探测，不发送消息）

  - id: openclaw_backup
    scheduler: system
    entry: openclaw_backup.sh
    interval: "0 3 * * *"           # 每天 03:00（低峰时段）
    log: ~/openclaw_backup.log
    needs_api_key: false
    enabled: true
    description: 每日备份 OpenClaw state（config/sessions/memory）到外挂 SSD，保留7天

  - id: mm_index
    scheduler: system
    entry: mm_index_cron.sh
    interval: "0 */2 * * *"         # 每2小时增量索引
    log: ~/.openclaw/logs/jobs/mm_index.log
    needs_api_key: true              # GEMINI_API_KEY
    enabled: true
    description: Multimodal Memory 索引 — 扫描媒体文件 → Gemini Embedding 2 → 本地向量索引

  - id: conv_quality
    scheduler: system
    entry: conv_quality.py
    interval: "15 8 * * *"          # 每天 08:15（报告前一天数据）
    log: ~/conv_quality.log
    needs_api_key: false
    enabled: true
    description: 对话质量日报 — 解析 proxy/adapter 日志，生成响应时间/成功率/工具分布/Token用量报告

  - id: token_report
    scheduler: system
    entry: token_report.py
    interval: "20 8 * * *"          # 每天 08:20（conv_quality 之后5分钟）
    log: ~/token_report.log
    needs_api_key: false
    enabled: true
    description: Token 用量日报 — 每日消耗总量/逐小时分布/上下文压力/多日趋势

  - id: kb_dedup
    scheduler: system
    entry: kb_dedup.py
    interval: "0 23 * * *"          # 每天 23:00（晚间整理后）
    log: ~/kb_dedup.log
    needs_api_key: false
    enabled: true
    description: KB 智能去重 — Notes 精确/模糊去重 + Sources 行去重（dry-run 模式，仅报告）

  - id: kb_embed
    scheduler: system
    entry: kb_embed.py
    interval: "30 */4 * * *"        # 每4小时:30分（kb_inject 之后，错开其他 job）
    log: ~/kb_embed.log
    needs_api_key: false
    enabled: true
    description: KB 文本向量索引 — 本地 embedding（sentence-transformers），增量分块索引 notes+sources，供 RAG 语义搜索

  - id: kb_trend
    scheduler: system
    entry: kb_trend.py
    interval: "0 9 * * 6"           # 每周六 09:00
    log: ~/kb_trend.log
    needs_api_key: false             # 通过 proxy:5002 调 LLM，不需要独立 key
    enabled: true
    description: KB 周趋势报告 — 本周 vs 上周关键词频率变化 + LLM 趋势分析 + WhatsApp 推送

  - id: cron_canary
    scheduler: system
    entry: cron_canary.sh
    interval: "*/10 * * * *"        # 每10分钟心跳
    log: ~/.cron_canary_log
    needs_api_key: false
    enabled: true
    description: Cron 心跳金丝雀 — 写 epoch 到 ~/.cron_canary，供 watchdog/doctor 验证 cron daemon 存活

  - id: kb_status_refresh
    scheduler: system
    entry: kb_status_refresh.sh
    interval: "0 * * * *"           # 每小时整点
    log: ~/kb_status_refresh.log
    needs_api_key: false
    enabled: true
    description: 每小时刷新 status.json 系统健康字段（三层服务/模型ID/KB统计/过期job），补齐三方宪法实时同步需求

  - id: preference_learner
    scheduler: system
    entry: preference_learner.py
    interval: "30 7 * * *"          # 每天 07:30
    log: ~/preference_learner.log
    needs_api_key: false
    enabled: true
    description: 每天从行为数据自动推断用户偏好（活跃时段/工具使用/关注领域），写入 status.json → SOUL.md
