convergence_specs:

  # ── jobs_to_crontab (V37.9.19 first spec) ──────────────────────────────
  - id: jobs_to_crontab
    enabled: true
    description: |
      jobs_registry.yaml enabled+system jobs must each have a corresponding
      entry in macOS crontab. Closes V37.9.18 blood lesson where kb_deep_dive
      was declared enabled=true but never registered, silently missing two
      scheduled triggers before user noticed.

    declaration:
      source: jobs_registry.yaml
      extractor: registry_enabled_system_jobs
      identifier_field: entry          # script basename (e.g. "kb_deep_dive.sh")
      identifier_meaning: |
        The shell script filename that crontab lines must contain (cron lines
        like `30 22 * * * bash -lc 'bash ~/kb_deep_dive.sh >> ...'` are
        considered observed if they contain "kb_deep_dive.sh" anywhere).

    runtime_observable:
      method: shell_command
      command: "crontab -l"
      parser: line_contains_identifier
      # V37.9.98 审计决策 (2026-06-02): 不切换到 V37.9.66 cron_lines_set_diff 全行比较 parser.
      # Mac Mini 真 crontab 审计 declared=37 observed=38 missing=17 extra=18 —— 17 missing
      # 逐一配对 18 extra 全是功能等价格式变体 (单/双引号 7 / 缺 redirect 2 / ~vs$HOME 1 /
      # mkdir 前缀 3 / cd 前缀 2 / repo路径 1) + 2 真差异 (preference_learner --apply --days 7
      # registry 未记 / 30 23 手动 rsync), 0 条"脚本真缺失". 切换会 false-drift 风暴 +
      # machine_sync 搞坏 crontab. 根因: registry entry 字段是简化, _format_cron_line 无法
      # 逐字重建手工演化的异构 crontab. identifier 匹配免疫格式变体 + 精确抓脚本缺失 (V37.9.18
      # 血案类) = 务实最优解. 详见 ontology/docs/cases/cron_line_full_comparison_audit_2026_06_02.md
      # V37.9.66 primitives 保留作未来 fuzzy-match parser (需先做 registry↔crontab 命令对账) 的基础.
      notes: |
        crontab -l exits non-zero when no crontab is installed on this user;
        observer treats that as "empty observed" rather than hard error
        (FAIL-OPEN). dev environments without crontab installed will see all
        declared jobs as missing — expected, callers must filter accordingly.

    drift_action: machine_sync
    drift_action_rationale: |
      V37.9.19 起步 alert_only (高 blast-radius 谨慎策略); V37.9.23 (5/3 决策
      窗口, baseline 4/26 + 7d) 升级 machine_sync, 满足 yaml meta planned
      escalation 路径. 一周观察期内 declared=36 observed=36 零漂移零误报,
      framework FAIL-OPEN + crontab_safe.sh add 幂等 + V37.9.18 fail-loud
      契约 (严格 exit 1 + 30 天滚动备份) 共同保证 "transient registry parse
      error could erase the user's crontab" 风险已结构性消除.

      升级模式 (Plan B 渐进 dry-run, V37.9.23):
        - drift_action: machine_sync (本字段)
        - 默认 dry-run via CONVERGENCE_DRY_RUN env (任何非 "0" 值都 dry-run)
        - V37.9.24+ 一周观察后切关 dry-run 默认让真激活
        - "would apply: 30 22 * * * bash -lc 'bash ~/X >> Y 2>&1'" 字面量
          可观测让 operator 验证 cron line 拼接正确

    convergence_method:
      implemented: machine_sync_via_helper  # V37.9.23 落地, 替代 V37.9.19 planned
      apply_function: jobs_to_crontab_per_entry  # V37.9.24 named-dispatch
      helper: "bash $HOME/crontab_safe.sh add '<line>'"
      cron_line_format: |
        <interval> bash -lc 'bash ~/<entry> >> <log> 2>&1'
        (V37.9.23 _format_cron_line 实现, 匹配 V37.9.18 INV-CRON-003 模式)
      apply_path: convergence._apply_jobs_to_crontab_per_entry
      dry_run_env_var: CONVERGENCE_DRY_RUN
      dry_run_default: false                 # V37.9.58 切关 escalation 兑现 (5/3-5/11 一周观察期零漂移, 5/12 切关)
      v37_9_19_blocker_resolution: |
        V37.9.19 planned_blocker 是 "需要从 registry 字段模板化 cron line".
        V37.9.23 _format_cron_line 实现已闭环此 blocker, 输入 jobs_registry
        job dict (interval/entry/log) 输出 cron line 字符串, 已经实证与
        kb_deep_dive.sh 等 36 entries 拼接结果一致.

    governance_invariant: INV-CONVERGENCE-CRON-001
    blood_lesson_link: ontology/docs/cases/kb_deep_dive_cron_unregistered_case.md

  # ── providers_to_adapter (V37.9.20 second spec) ────────────────────────
  - id: providers_to_adapter
    enabled: true
    description: |
      providers.py ProviderRegistry.list_names() (built-in + auto-discovered
      providers.d/ YAML/Python plugins) declares the provider set. adapter
      :5001 /health endpoint exposes the runtime active provider + fallback
      chain. This spec verifies declared providers are visible at runtime.

      Drift signals (alert_only, both informational):
        (a) Provider declared but no API key in env → not in fallback_chain
            (legitimate config gap — operator decides whether to provision key)
        (b) Registry construction failed silently → smaller fallback_chain
            than expected (real bug — convergence catches it)

      Closes V37.8.10 blood case observability gap: operator was surprised
      that fallback_chain only had ['gemini'] while 7 providers were
      registered. Convergence framework surfaces this as actionable signal.

    declaration:
      source: providers.py
      extractor: providers_from_registry
      identifier_field: name
      identifier_meaning: |
        Provider name string returned by ProviderRegistry.list_names() —
        union of built-in providers (qwen/openai/gemini/claude/kimi/minimax/glm)
        and auto-discovered YAML/Python plugins from providers.d/.

    runtime_observable:
      method: http_endpoint
      url: "http://localhost:5001/health"
      timeout_sec: 5
      parser: json_set_union
      json_paths:
        - provider           # primary provider (str)
        - fallback           # backward-compat first fallback (str)
        - fallback_chain[]   # full fallback list (list of str)
      notes: |
        adapter /health is local + fast. 5s timeout protects governance audit
        cron from hanging if adapter wedged. http_endpoint observer FAIL-OPEN:
        connection refused / timeout / non-2xx → observer_failed (declared all
        reported as missing for ops visibility, no exception bubbles to caller).

    drift_action: alert_only
    drift_action_rationale: |
      machine_sync NOT applicable for providers — convergence framework cannot
      magically obtain API keys. Drift is operator-actionable (provision key
      or remove provider declaration), not auto-fixable. alert_only is the
      structurally correct drift_action for this spec class (config-gap
      surfacing, not state-sync).

    convergence_method:
      planned: alert_only_permanent
      planned_rationale: |
        Unlike jobs_to_crontab where machine_sync is achievable (template cron
        line from registry), providers_to_adapter has no automated fix path.
        The value of this spec is observability + operator decision support,
        not automatic remediation.

    governance_invariant: INV-CONVERGENCE-PROVIDERS-001
    blood_lesson_link: ontology/docs/cases/kb_evening_fallback_quota_chain_case.md

  # ── openclaw_config_to_runtime (V37.9.22 third spec) ───────────────────
  - id: openclaw_config_to_runtime
    enabled: true
    description: |
      ~/.openclaw/openclaw.json declared agent set vs Gateway :18789 /health
      runtime active agent set. Closes #48703-class blood lesson where
      declared-state vs runtime-state drift could go undetected (V37.9.16
      taught us "上游已修复 ≠ 我们已修复"; V37.9.22 generalizes to "声明值 ≠
      runtime 值" structural detection).

      Initial path config is conservative — defaults to `agents.list[].name`
      since that's a stable nested-list shape. Mac Mini admins can adjust
      json_paths in this spec to track other fields (channels, providers,
      tool allowlists) as the OpenClaw schema evolves.

      Drift signals (alert_only):
        (a) Agent declared in openclaw.json but not in /health agents — config
            edit not yet picked up by runtime (Gateway needs restart) or
            runtime crashed silently.
        (b) /health unreachable — Gateway down, masked by other layers
            (wa_keepalive, etc.) but here we surface declaration-vs-runtime
            asymmetry directly.

    declaration:
      source: "$HOME/.openclaw/openclaw.json"
      extractor: json_file_paths
      json_paths:
        - "version"
      identifier_field: version
      identifier_meaning: |
        OpenClaw runtime version field from openclaw.json (top-level scalar).
        V37.9.22 path syntax supports only top-level fields (`field` scalar
        and `field[]` list of scalars) — same syntax as V37.9.20 parser.
        Nested traversal like "agents.list[].name" requires V37.9.23+
        extension. The version field is the most stable cross-OpenClaw-version
        path; admins can switch to other top-level fields (e.g. flat
        "primary_agent", "default_channel") that match their openclaw.json
        shape. Multi-path observation works: list multiple top-level fields
        in json_paths to track several simultaneously.
      notes: |
        FAIL-OPEN behavior: if ~/.openclaw/openclaw.json doesn't exist (dev
        environments / fresh install before OpenClaw setup), extractor returns
        empty set rather than raising. Mac Mini admin is expected to notice
        if openclaw.json deleted (Gateway breaks immediately, not a convergence
        problem). File present but unreadable / invalid JSON DOES raise via
        extractor_failed for ops visibility.

    runtime_observable:
      method: http_endpoint
      url: "http://localhost:18789/health"
      timeout_sec: 5
      parser: json_set_union
      json_paths:
        - "version"
      notes: |
        Gateway /health response shape is OpenClaw-version-dependent. Spec
        starts with "version" as the most reliable cross-version field;
        json_set_union intersects observed with declared upstream. dev
        environments without Gateway → connection refused → observer_failed
        → declared-all-missing for ops visibility (mirrors V37.9.20 providers
        spec FAIL-OPEN behavior). Mac Mini admin extends paths in lockstep
        with declaration.json_paths as needed.

    drift_action: alert_only
    drift_action_rationale: |
      machine_sync is structurally inappropriate for this spec — convergence
      framework cannot magically restart the Gateway or edit openclaw.json
      to match runtime. Drift indicates either:
        (a) openclaw.json edited but Gateway not yet reloaded → operator
            decision to restart vs revert
        (b) Gateway crashed silently → operator must investigate root cause
      Both require human judgment. alert_only is the structurally correct
      choice (config-gap surfacing, not state-sync).

    convergence_method:
      planned: alert_only_permanent
      planned_rationale: |
        Like providers_to_adapter (V37.9.20), no automated fix path exists.
        OpenClaw config changes are intentional operator actions, not values
        a machine should auto-sync. The value is observability + drift
        detection at audit time, not automatic remediation.

    governance_invariant: INV-CONVERGENCE-OPENCLAW-001
    blood_lesson_link: docs/gateway_upgrade_eval_v2026.4.md

  # ── kb_sources_to_index (V37.9.22 fourth spec) ─────────────────────────
  - id: kb_sources_to_index
    enabled: true
    description: |
      jobs_registry.yaml enabled jobs declaring kb_source_file 字段必须 each
      在 ~/.kb/text_index/meta.json 的 chunks[].file 中至少出现一次
      （kb_embed.py successfully indexed the source）。

      Sibling 关系 vs V37.9.5 INV-KB-COVERAGE-001 (workspace-md-indexed-by-
      kb-embed):
        - V37.9.5 INV: 守 kb_embed.py 源码逻辑 — "代码会扫 workspace .md"
          (declaration layer — source-level grep guards)
        - V37.9.22 spec: 守运行时事实 — "代码扫了 + chunks 看见了"
          (convergence layer — declared-vs-runtime drift detection)
      两者互补不替代，前者防代码改坏，后者防 mtime/cron 漂移让正确代码静默失效。

      Drift signals (alert_only):
        (a) Job declared kb_source_file 但 chunks 里没看见 → kb_embed cron
            没跑 / source 文件 mtime 没变 / 代码逻辑过滤掉 / 文件被删
        (b) /text_index/meta.json 不存在 → KB index 完全没建（首次部署
            或 cron 长期失败）

    declaration:
      source: jobs_registry.yaml
      extractor: registry_kb_source_files
      identifier_field: kb_source_file
      identifier_meaning: |
        kb_source_file basename (e.g. "arxiv_daily.md"). 每个 enabled job
        声明的 kb_source_file 应该在 ~/.kb/text_index/meta.json 的
        chunks[].file 字段中至少出现一次（substring match — chunks
        里的 file 通常是绝对路径如 /Users/.../arxiv_daily.md）。
        V37.9.22 hotfix: 字段名是 `file` 不是 `source_file` (V37.9.22 第一次
        部署时假设错字段名, Mac Mini 实测发现 chunks 字段是 ['file',
        'file_hash', 'source_type', 'chunk_idx', 'text', 'preview',
        'char_len', 'indexed_at'] — 修复 spec yaml 的 python oneliner).

    runtime_observable:
      method: shell_command
      command: |
        python3 -c "
        import json, os
        f = os.path.expanduser('~/.kb/text_index/meta.json')
        if not os.path.exists(f):
            raise SystemExit(0)
        with open(f) as fp:
            d = json.load(fp)
        for c in d.get('chunks', []):
            sf = c.get('file', '')
            if sf:
                print(os.path.basename(sf))
        "
      parser: line_contains_identifier
      notes: |
        Python oneliner reads meta.json + emits chunk `file` field basenames
        one-per-line (V37.9.22 hotfix: 字段名是 `file` 不是 `source_file`).
        line_contains_identifier parser does substring match per declared
        identifier in the output text. dev environments without
        ~/.kb/text_index/meta.json: command exits 0 with empty stdout
        → observer treats as "empty observed" (FAIL-OPEN, mirrors V37.9.19
        crontab -l no-crontab behavior). meta.json present but unreadable
        will raise SystemExit / decoding error → observer_failed for ops
        visibility.

    drift_action: machine_sync
    drift_action_rationale: |
      V37.9.22 起步 alert_only (一周观察期收集 false-positive 数据). V37.9.24
      升级 machine_sync, Plan B 渐进 dry-run (与 V37.9.23 jobs_to_crontab
      同款安全路径). kb_embed.py 默认是增量模式 (mtime diff + 只重 embed
      变化文件), 调用一次覆盖所有 missing sources, 与 jobs_to_crontab 的
      per-entry helper call 模式不同 — kb_sources_to_index 用 single
      kb_embed.py incremental call 模式.

      升级模式 (Plan B 渐进 dry-run, V37.9.24):
        - drift_action: machine_sync (本字段)
        - 默认 dry-run via CONVERGENCE_DRY_RUN env (V37.9.23 同款安全默认)
        - V37.9.25+ 一周观察后切关 dry-run 默认让真激活
        - "DRY-RUN would run: python3 ~/openclaw-model-bridge/kb_embed.py
           (incremental, 11 missing sources: arxiv_daily.md, freight_daily.md,
           ...)" 字面量可观测 (V37.9.24 preflight 实测 11 待索引正是 spec 预期场景)

    convergence_method:
      implemented: machine_sync_via_helper  # V37.9.24 落地, 替代 V37.9.22 planned
      apply_function: kb_embed_incremental  # V37.9.24 named-dispatch
      helper: "python3 $HOME/openclaw-model-bridge/kb_embed.py"
      apply_path: convergence._apply_kb_embed_incremental
      dry_run_env_var: CONVERGENCE_DRY_RUN
      dry_run_default: false                 # V37.9.58 切关 escalation 兑现 (V37.9.24 上线 → 一周观察期 → 5/12 切关)
      v37_9_22_blocker_resolution: |
        V37.9.22 planned_blocker 是 "应该只对真正 drift 的 source 增量重建,
        不是全量". V37.9.24 实证: kb_embed.py 默认模式 (无 --reindex 参数)
        本身就是增量 (mtime diff + 只重 embed 变化文件), V37.9.22 误以为是
        全量重建. V37.9.24 _apply_kb_embed_incremental 调 `python3 kb_embed.py`
        无参数 = 增量, 直接闭环 V37.9.22 blocker 不需要新增 CLI args.
      one_shot_vs_per_entry: |
        与 V37.9.23 jobs_to_crontab (per-entry crontab_safe.sh add) 不同, 本
        spec 用 single kb_embed.py call 覆盖所有 missing sources:
        (a) kb_embed.py 加载 embedding 模型有 ~3s 启动开销, per-entry 调用
            会 amortize poorly
        (b) kb_embed.py 内部 mtime-diff 已是 batch 处理逻辑
        (c) idempotent — V37.8 引入内部锁, 重复调用安全
        这是 V37.9.20 named-dispatch 的多种 apply 路径设计的实证.

    governance_invariant: INV-CONVERGENCE-KB-001
    blood_lesson_link: ontology/docs/cases/kb_content_and_sources_dedup_case.md

  # ── services_to_launchd (V37.9.25 fifth spec) ──────────────────────────
  - id: services_to_launchd
    enabled: true
    description: |
      services_registry.yaml 中所有 service 的 launchd label 必须在
      macOS `launchctl list` 输出中至少出现一次（即 launchd 已 load 该
      service 并在 supervise 它）。convergence framework 第 5 次扩展, 验证
      添加新 spec 类型零 framework 改动 (V37.9.20 named-dispatch 设计承诺
      第 5 次实证).

      Closes V37.9.13 candidate "launchd plist 持久化": Mac Mini 重装或
      plist 误删后, V37.9.12.1 给 proxy plist 加的 ONTOLOGY_MODE=on env
      会丢失. 本 spec 不直接守 plist 文件存在性 (那是 deploy/recovery
      问题), 而是守 "声明的 service 是否真在 launchd 注册" 这一更上游事实.

      Drift signals (V37.9.97 machine_sync, dry-run first):
        (a) services_registry 声明 label 但 launchctl list 没看到 →
            plist 误删 / launchctl bootout 后未 bootstrap / macOS 重启后
            launchd cache 异常 → machine_sync auto-bootstrap (dry-run 观察期内仅 would-bootstrap)
        (b) launchctl list 不可用 (dev 环境无 launchctl) → observer_failed
            FAIL-OPEN 不阻塞 audit

    declaration:
      source: services_registry.yaml
      extractor: services_from_registry
      identifier_field: label
      identifier_meaning: |
        launchd label string (e.g. "com.openclaw.adapter") that should appear
        in `launchctl list` stdout column 3 (label column). substring match
        is sufficient because launchd labels are dot-separated identifiers
        with no overlap risk between OpenClaw services.

    runtime_observable:
      method: shell_command
      command: "launchctl list"
      parser: line_contains_identifier
      notes: |
        `launchctl list` outputs PID + last_exit + label per line. dev
        environments without launchctl (Linux / no LaunchAgents loaded)
        will see "command not found" → observer_failed → declared all
        reported as missing (mirrors V37.9.19 crontab -l no-crontab FAIL-OPEN
        behavior). Mac Mini production sees full list of bootstrapped
        services; OpenClaw labels appear if their plist is loaded.

    drift_action: machine_sync
    drift_action_rationale: |
      V37.9.25 起步 alert_only (5/4 baseline) → 4 周观察期 (5/4-6/1) zero drift
      (Mac Mini 6/1 实测 declared=3 observed=3 no drift) → V37.9.97 升级 machine_sync.
      与 V37.9.58 jobs_to_crontab + kb_sources_to_index 同款 Plan B 渐进路径, 但
      因 launchctl bootstrap blast-radius 高于 crontab/kb_embed, V37.9.97 起步
      dry_run_default: true 先在 dry-run 模式观察 "would bootstrap" 动作 — 6/1-6/11
      十天观察期零异常动作 (3 服务全程健康, dry-run 零 would-bootstrap 输出) →
      V37.9.133 flip dry_run_default: false 真激活 (过期门控项 #6 闭环, 原窗口 ~6/8).
      注意 V37.9.116 后 07:00 governance audit cron 带 CONVERGENCE_DRY_RUN=1 (env
      显式优先), 故真 bootstrap 仅在 operator 手动跑 governance (无 env) 时发生 —
      与 jobs/kb 两 spec 语义一致: machine_sync 自愈是显式刻意动作非审计副作用.
      apply 仅在真实漂移 (declared service 不在 launchctl list) 时触发 — 即服务真宕
      / plist 未 bootstrap, 此时 auto-bootstrap 是期望的恢复行为 (镜像 restart.sh
      V37.9.13 bootstrap fallback). 已加载 service 不会被 apply (convergence 只传
      missing labels), 自动满足 V37.9.25 "先检查是否已 list 中" 设计要求.

    convergence_method:
      implemented: machine_sync_via_helper        # V37.9.97 落地, 替代 V37.9.25 planned
      apply_function: services_launchctl_bootstrap  # V37.9.97 named-dispatch (V37.9.24 模式)
      dry_run_default: false                       # V37.9.133 flip 真激活 (V37.9.97 6/1 起步 dry-run → 6/1-6/11 十天观察零异常 → 切关, 镜像 V37.9.58 jobs/kb)
      apply_path: convergence._apply_services_launchctl_bootstrap
      apply_detail: |
        per-service: launchctl bootstrap "gui/$(id -u)" "~/Library/LaunchAgents/<plist>"
        plist 从 services_registry 的 plist 字段解析 (已在 schema). 只 bootstrap
        missing labels (不在 launchctl list 的), 已加载 service 不碰 — missing_entries
        即 not-in-list 集合, 自动满足 V37.9.25 "先检查" 要求. 不做 bootout (移除运行
        service 是 operator 决策, 非安全 auto-sync, 与 bootstrap 不对称).

    governance_invariant: INV-CONVERGENCE-SERVICES-001
    blood_lesson_link: docs/config.md  # V37.9.13 candidate 登记于 docs/config.md "launchd plist 持久化"
