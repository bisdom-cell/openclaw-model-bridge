          not full re-build" — kb_embed.py default mode IS incremental, V37.9.22
          mistakenly assumed it was full re-index.
        - Spec yaml: drift_action machine_sync + apply_function kb_embed_incremental
        - dry-run default True (CONVERGENCE_DRY_RUN env), V37.9.25+ flip to
          activate after one-week observation period

    (3) openclaw_config_to_runtime mock-based runtime hardening:
        - V37.9.22 4/29 hotfix lesson horizontally extended to third spec
