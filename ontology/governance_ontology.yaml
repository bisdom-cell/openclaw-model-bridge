              assert "RSS desc for article 1" in out, "RSS description 1 应作为 fallback"
              # 反模式守卫: 严禁占位符回归
              assert "技术深度文章" not in out, "输出严禁占位符"
              assert "价值：⭐⭐⭐\n" not in out, "输出严禁裸 ⭐⭐⭐ fallback"
