          assert proc.returncode == 0, (
              f"test_movespeed_incident_monitor 单测失败:\n"
              f"STDOUT={proc.stdout[-500:]}\nSTDERR={proc.stderr[-1500:]}"
          )

  - id: INV-KB-COVERAGE-001
    name: workspace-md-indexed-by-kb-embed
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      PA 在 ~/.openclaw/workspace/ 自主写入的 .md 文档（PA 行为契约 + 自主洞察 + 摘要）
      必须被 kb_embed.py 索引到 text_index，否则 PA 自己搜不到这些金矿。
      MR-4 silent-failure 在 V37.9.5 第 15 次演出（数月业务数据接缝盲区）的预防层。
    lesson: |
      2026-04-21 V37.9.5 数据全景审计发现：~/.openclaw/workspace/ 顶层 ~50KB 的高密度
      PA 文档（AGENTS.md / IDENTITY.md / SOUL.md / OPENCLAW_*_SUMMARY 等）
      数月以来一直没接入 KB 索引，PA 检索时看不见自己写过的内容。MEMORY.md 单文件
      已索引但其他兄弟文件被遗漏。本不变式守卫 kb_embed.py scan_kb_files() 必须扫
      整个 workspace/*.md 而非单 MEMORY.md，且必须排除 HEARTBEAT.md（V37.8.16
      INV-HB-001 OpenClaw 控制文件不得作为业务知识）。
    design_decision: |
      为什么不索引整个 ~/.openclaw/?
        - workspace/venv 53M + venv_pptx 56M = Python 包不是业务数据
        - logs/ 105M 大部分是 gateway.err.log 噪声，已被 kb_harvest_chat.py 提炼到 KB
        - media/ 41M 由 mm_index 单独管
      为什么排除 HEARTBEAT.md?
        - V37.8.16 血案：HEARTBEAT.md 是 OpenClaw runtime 控制文件（非业务数据）
        - 索引会让 PA 把控制信号当用户内容，制造下一个血案
      为什么排除 *.bak / *~?
        - 备份/编辑器临时文件，重复内容污染检索结果
    checks:
      - name: "kb_embed.py scan_kb_files 含 workspace 顶层 .md 扫描"
        check_type: file_contains
        file: kb_embed.py
        pattern: 'workspace_dir.*\.openclaw/workspace'
      - name: "kb_embed.py 显式排除 HEARTBEAT.md (V37.8.16 INV-HB-001)"
        check_type: file_contains
        file: kb_embed.py
        pattern: 'HEARTBEAT\.md'
      - name: "kb_embed.py 显式排除 .bak 文件"
        check_type: file_contains
        file: kb_embed.py
        pattern: '\.bak'
      - name: "V37.9.5 runtime: 外部单测 test_kb_embed_workspace 全过"
        check_type: python_assert
        code: |
          # Runtime: subprocess 调外部 unittest 文件，避开 V37.3 exec scope trap
          # （YAML python_assert 内嵌的复杂 mock 闭包变量在 exec() 局部作用域不可见）
          # 外部单测覆盖 10 个场景：
          #   - AGENTS.md/IDENTITY.md 被索引
          #   - HEARTBEAT.md 被排除 (V37.8.16 INV-HB-001)
          #   - .bak 文件被排除
          #   - MEMORY.md source_type 保持 'memory' 向后兼容
          #   - 其他 .md 用新 source_type='workspace'
          #   - workspace 目录不存在不崩溃
          #   - WORKSPACE_EXCLUDE_BASENAMES 常量声明 + V37.8.16 注释引用
          import subprocess, sys, os
          proc = subprocess.run(
              [sys.executable, "-m", "unittest", "test_kb_embed_workspace", "-v"],
              capture_output=True, text=True, timeout=60, cwd=os.getcwd(),
          )
          assert proc.returncode == 0, (
              f"test_kb_embed_workspace 单测失败:\n"
              f"STDOUT={proc.stdout[-500:]}\nSTDERR={proc.stderr[-1500:]}"
          )

  - id: INV-GATE-001
    name: three-gate-wiring-observability
    meta_rule: MR-7
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      V37.9.15 Phase 4 P3: tool_proxy.py 必须在请求管线三个阶段调用
      ontology/three_gate.py 的 pre_check / runtime_gate / post_verify，
      并保证 fail-open（gate 异常绝不杀请求）+ 默认 shadow 模式（观察而非阻塞）。
      MR-7 (governance-execution-is-self-observable) 兑现：policy 引擎从
      "可查询"升级为"在请求路径上被调用并产出可观测 log"。
    lesson: |
      2026-04-22 V37.9.12 Phase 4 P1 + V37.9.13 P2 wiring 只在启动期解析
      静态 policy 阈值；contextual/temporal policy 有 6 个 context evaluator
      已注册，但生产环境**零调用** — 只有单测覆盖。P3 把 evaluate_policy 接到
      真实请求路径是 Phase 4 → Phase 5 (pip install ontology-engine) 的关键一跳。
    design_decision: |
      为什么 shadow-first 而非直接 on?
        - V37.9.12/13 已经用 5 档 safe-fallback 验证过 shadow → on 的节奏
        - shadow 模式产生 [gate:*] 日志行供运维 grep，先观察一周确认
          无假阳性/性能退化再考虑切 on
        - enforcement 路径尚未实现（on 模式目前只改 enforced=True 标记，
          不改变流程）— 为未来 P4 四耦合点铺路
      为什么用独立 ONTOLOGY_GATES_MODE env 而非复用 ONTOLOGY_MODE?
        - 解耦观察性和数据替换两件事
        - 允许 ONTOLOGY_MODE=on（生产 tool 数据走 ontology）但
          ONTOLOGY_GATES_MODE=off（暂停 gate 观察）的组合灰度
      为什么 _run_gate 在 tool_proxy 不在 proxy_filters?
        - proxy_filters 是纯函数层不含 HTTP/log
        - _run_gate 依赖 log() 函数做可观测性输出
        - three_gate.py 本身是纯函数，复用两层
    checks:
      - name: "ontology/three_gate.py 存在且带 V37.9.15 P3 头注释"
        check_type: file_contains
        file: ontology/three_gate.py
        pattern: 'Phase 4 P3'
      - name: "three_gate 导出 pre_check 函数"
        check_type: file_contains
        file: ontology/three_gate.py
        pattern: 'def pre_check\(context\)'
      - name: "three_gate 导出 runtime_gate 函数"
        check_type: file_contains
        file: ontology/three_gate.py
        pattern: 'def runtime_gate\(context\)'
      - name: "three_gate 导出 post_verify 函数"
        check_type: file_contains
        file: ontology/three_gate.py
        pattern: 'def post_verify\(context, response=None\)'
      - name: "three_gate 默认 shadow 模式"
        check_type: file_contains
        file: ontology/three_gate.py
        pattern: '_DEFAULT_GATE_MODE = "shadow"'
      - name: "three_gate 支持 ONTOLOGY_GATES_MODE env 三档"
        check_type: file_contains
        file: ontology/three_gate.py
        pattern: '_VALID_GATE_MODES = \("off", "shadow", "on"\)'
      - name: "three_gate FAIL-OPEN: _safe_evaluate_policy 捕获所有异常"
        check_type: file_contains
        file: ontology/three_gate.py
        pattern: 'def _safe_evaluate_policy'
      - name: "V37.9.15.1 HOTFIX: _load_engine_module 三策略 import (file-path fallback)"
        check_type: file_contains
        file: ontology/three_gate.py
        pattern: 'def _load_engine_module'
      - name: "V37.9.15.1 HOTFIX: __file__ 邻近 engine.py 加载路径存在"
        check_type: file_contains
        file: ontology/three_gate.py
        pattern: 'spec_from_file_location\(\s*\n?\s*"_three_gate_engine_lazy"'
      - name: "tool_proxy.py lazy-load three_gate（ontology/ 缺失不崩）"
        check_type: file_contains
        file: tool_proxy.py
        pattern: 'spec_from_file_location\("_three_gate"'
      - name: "tool_proxy.py 定义 _run_gate 帮助函数"
        check_type: file_contains
        file: tool_proxy.py
        pattern: 'def _run_gate\('
      - name: "tool_proxy.py do_POST 调用 pre_check"
        check_type: file_contains
        file: tool_proxy.py
        pattern: '_run_gate\("pre_check"'
      - name: "tool_proxy.py do_POST 调用 runtime_gate"
        check_type: file_contains
        file: tool_proxy.py
        pattern: '_run_gate\("runtime_gate"'
      - name: "tool_proxy.py 调用 post_verify（传 response=rj）"
        check_type: file_contains
        file: tool_proxy.py
        pattern: 'response=rj'
      - name: "policy_ontology.yaml meta 声明 P3 状态"
        check_type: file_contains
        file: ontology/policy_ontology.yaml
        pattern: 'version: "0\.3-p3'
      - name: "V37.9.15 runtime: test_three_gate + TestThreeGateWiring 全过"
        check_type: python_assert
        code: |
          # Runtime subprocess 调外部单测验证两侧契约端到端有效（避开 V37.3
          # exec scope trap + 避开 tool_proxy.py import 时 bind :5002 的冲突）。
          # 覆盖 57 + 9 = 66 场景：
          #   - three_gate 纯函数 57 tests: mode 解析 / GateFinding 形状 /
          #     off/shadow/on 模式 / pre_check/runtime_gate/post_verify 各 evaluator
          #     / FAIL-OPEN / 信号提取 / 日志格式化
          #   - tool_proxy 源码级契约 9 tests: lazy-load / _run_gate 定义
          #     / 三处调用点 / post_verify 顺序锁 / Phase 4 P3 日志标记
          import subprocess, sys, os
          proc = subprocess.run(
              [sys.executable, "-m", "unittest",
               "ontology.tests.test_three_gate",
               "test_tool_proxy.TestThreeGateWiring",
               "-v"],
              capture_output=True, text=True, timeout=90, cwd=os.getcwd(),
          )
          assert proc.returncode == 0, (
              f"three_gate wiring 单测失败:\n"
              f"STDOUT={proc.stdout[-800:]}\nSTDERR={proc.stderr[-1500:]}"
          )

  - id: INV-CONVERGENCE-CRON-001
    name: jobs-registry-converges-to-crontab
    meta_rule: MR-17
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      V37.9.19 Phase 4 Layer 5 (convergence framework first spec):
      jobs_registry.yaml 中所有 enabled=true + scheduler=system 的 job
      其 entry 脚本名必须出现在 macOS crontab 的某一行。convergence framework
      把"声明 → 运行时事实"同步从"靠记忆"升级为"机器可检测"。

      V37.9.19 起步 drift_action=alert_only（保守起步）。V37.9.23 (5/3 决策
      窗口, baseline 4/26 + 7d 一周观察期到达) 升级到 drift_action=machine_sync,
      Plan B 渐进 dry-run 模式 (CONVERGENCE_DRY_RUN env var 控制, 默认 dry-run
      安全). framework 内部新增 _format_cron_line + _apply_machine_sync +
      _is_dry_run, 通过 crontab_safe.sh add helper 真正同步 cron line.
    lesson: |
      2026-04-26 V37.9.18 kb_deep_dive cron 未注册血案：V37.9.16 (4/24)
      上线时 jobs_registry 声明 enabled=true 但**没人手动 crontab_safe.sh add**，
      4/24 + 4/25 两次预期 22:30 触发完全静默，2026-04-26 用户察觉浮现。
      MR-17 (declared-state-must-converge-to-runtime-via-machine-not-memory)
      立案 + INV-CONVERGENCE-CRON-001 是其首个具体不变式。

      V37.9.23 升级到 machine_sync 兑现 MR-17 真正承诺 — 从"机器可检测"
      升级到"机器可同步"。Plan B 渐进路径 (V37.9.19 alert_only 起步 →
      V37.9.23 machine_sync + 默认 dry-run → V37.9.24+ 切关 dry-run 真激活)
      把"高 blast-radius 操作"分两阶段降低风险:
        - 阶段 1 (V37.9.19~22): 验证 declared_set vs runtime_set 比对正确
        - 阶段 2 (V37.9.23): 验证 cron line 拼接结果与生产 crontab 行字面一致
                             (默认 dry-run 让 operator 看到 "would apply: ..."
                              字面量再决定切关 dry-run)
        - 阶段 3 (V37.9.24+): 切关 dry-run 让 governance audit cron 真激活
                              machine_sync.
    design_decision: |
      为什么 V37.9.19 先 alert_only 而非直接 machine_sync？
        - 自动写入用户 crontab 是高 blast-radius 操作（误触可清空所有 cron）
        - 一周生产观察确认零假阳性后再升级 machine_sync (V37.9.23 兑现)
        - 框架本身 V37.9.19 必须先稳定，spec 数据驱动才能可靠扩展
      为什么 V37.9.23 选 Plan B (渐进 dry-run) 而非 Plan A (保守 manual --apply)
      或 Plan C (激进直切)?
        - Plan A: framework wiring 完整但默认行为不变 — 没真正 escalation
        - Plan C: drift_action machine_sync 直接生效 — 第一次 audit cron 跑
          就可能误触，没安全网
        - Plan B: drift_action 升级 + 默认 dry-run env var 控制 — 真值落地
          但安全默认；operator 可在 Mac Mini 看 dry-run log 字面量验证
          cron line 拼接正确，确信后切关 env 真激活。这是 V37.9.13 P2
          context evaluator 同款 "shadow → on" 模式在 convergence 层的
          兑现。
      为什么 framework 设计为 named extractor + observer + parser dispatch?
        - 镜像 V37.9.13 _CONTEXT_EVALUATORS / V37.9.15 _STATIC_SIGNAL_KEYS 模式
        - 添加新 spec 类型只需 yaml 声明 + 注册新 extractor/observer/parser
        - 避免每加一个 declared resource 就改一遍 framework 代码（MR-8 兑现）
      为什么 _format_cron_line 拒绝 shell metacharacter (defense-in-depth)?
        - registry typo 不可命令注入 — 即便有人误把 entry 写成 "foo.sh; rm -rf /"
          也不会执行恶意命令 (拒绝 ' / ` / $( / ; / & / | 等 metachar)
        - 即便所有上层校验失败 (registry 语法错 / yaml load 漏过), 这层
          字面量守卫是最后防线
    checks:
      - name: "ontology/convergence.py 存在且带 V37.9.19 头注释"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: 'V37.9.19'
      - name: "convergence.py 导出 verify_convergence"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: 'def verify_convergence'
      - name: "convergence.py 提供 ConvergenceResult namedtuple"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: 'ConvergenceResult = namedtuple'
      - name: "convergence.py FAIL-OPEN: _empty_result helper"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: 'def _empty_result'
      - name: "convergence.py 注册 shell_command observer"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: '"shell_command": _observe_shell_command'
      - name: "convergence.py 注册 registry_enabled_system_jobs extractor"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: '"registry_enabled_system_jobs": _extract_registry_enabled_system_jobs'
      - name: "convergence.py 注册 line_contains_identifier parser"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: '"line_contains_identifier": _parse_line_contains_identifier'
      - name: "convergence.py drift_action 三档常量"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: '_VALID_DRIFT_ACTIONS = \("alert_only", "machine_sync", "block_until_human"\)'
      - name: "convergence_ontology.yaml 存在且声明 jobs_to_crontab spec"
        check_type: file_contains
        file: ontology/convergence_ontology.yaml
        pattern: 'id: jobs_to_crontab'
      # V37.9.23: 移除 V37.9.19 的 'drift_action: alert_only' 字面量守卫
      # (yaml 全文仍含其他 spec 的 alert_only 条目, file_contains 无法限定到
      # jobs_to_crontab 块. 块级守卫已迁移到 test_convergence.py 的
      # TestVerifyConvergenceMachineSyncIntegration::test_jobs_to_crontab_real_yaml_says_machine_sync
      # 通过 cv.get_spec(...).get('drift_action') 精准比对. 见 RUNTIME check.)
      - name: "jobs_to_crontab 引用本 INV 作为 governance_invariant"
        check_type: file_contains
        file: ontology/convergence_ontology.yaml
        pattern: 'governance_invariant: INV-CONVERGENCE-CRON-001'
      # ── V37.9.23 升级: machine_sync + dry-run 路径声明守卫 ─────────────
      # 注: file_contains pattern 是 regex (re.search), 括号需 escape
      - name: "V37.9.23: convergence.py _format_cron_line 函数定义"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: 'def _format_cron_line\(job\)'
      - name: "V37.9.23: convergence.py _apply_machine_sync orchestrator 定义"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: 'def _apply_machine_sync\(spec, missing_entries'
      - name: "V37.9.23: convergence.py _is_dry_run env reader 定义"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: 'def _is_dry_run\(\)'
      - name: "V37.9.23: convergence.py CONVERGENCE_DRY_RUN env var 常量"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: '_DRY_RUN_ENV_VAR = "CONVERGENCE_DRY_RUN"'
      - name: "V37.9.23: convergence.py _MACHINE_SYNC_TIMEOUT_SEC = 15 常量"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: '_MACHINE_SYNC_TIMEOUT_SEC = 15'
      - name: "V37.9.23: verify_convergence wires drift_action machine_sync 分支"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: 'drift_action == "machine_sync"'
      - name: "V37.9.23: convergence_ontology.yaml jobs_to_crontab 升级 machine_sync"
        check_type: file_contains
        file: ontology/convergence_ontology.yaml
        pattern: 'implemented: machine_sync_via_helper'
      - name: "V37.9.58: convergence_ontology.yaml dry_run_default 切关 escalation 兑现"
        check_type: file_contains
        file: ontology/convergence_ontology.yaml
        pattern: 'dry_run_default: false'
      - name: "V37.9.58: convergence.py _is_dry_run() 默认值反转 (literal 1 才 dry-run)"
        check_type: file_contains
        file: ontology/convergence.py
        pattern: 'os.environ.get\(_DRY_RUN_ENV_VAR, "0"\) == "1"'
      - name: "V37.9.58: convergence_ontology.yaml v37_9_58_changelog 段记录切关"
        check_type: file_contains
        file: ontology/convergence_ontology.yaml
        pattern: 'v37_9_58_changelog'
      - name: "V37.9.58: convergence_ontology.yaml meta version 升级到 0.8-machine-sync-activated"
        check_type: file_contains
        file: ontology/convergence_ontology.yaml
        pattern: '0.8-machine-sync-activated'
      - name: "V37.9.23: convergence_ontology.yaml v37_9_23_changelog 段记录升级"
        check_type: file_contains
        file: ontology/convergence_ontology.yaml
        pattern: 'v37_9_23_changelog'
      - name: "convergence_ontology meta 引用 MR-17"
        check_type: file_contains
        file: ontology/convergence_ontology.yaml
        pattern: 'meta_rule: MR-17'
      - name: "MR-17 立案在 meta_rules 段"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: 'id: MR-17'
