# governance_ontology.yaml — 系统治理不变式本体 v3（验证深度分层）
#
# 核心问题："什么东西坏了我们会发现不了？"
#
# v1 → v2: 从"描述性三元组"升级为"可执行三元组"
# v2 → v3: 从"平面检查"升级为"验证深度三层模型"
#   - 2026-04-07 教训：22 个声明-实际断裂，全在声明层
#   - 2026-04-08 教训：声明层 12/12 全过，WhatsApp 推送却静默失败 3 天
#     根因：只查"代码写了什么"(声明层)，不查"运行时环境对不对"(运行时层)
#
# 验证深度三层模型（Verification Depth Model）：
#   Layer 1 — Declaration（声明层）："代码/配置说了 X 吗？"
#     file_contains, file_not_contains, python_assert(静态)
#     能查：代码级不一致
#     盲区：代码正确但从未被执行
#
#   Layer 2 — Runtime（运行时层）："X 在执行时真的发生了吗？"
#     env_var_exists, command_succeeds, python_assert(subprocess)
#     能查：环境和执行时不一致
#     盲区：执行正确但结果错误
#
#   Layer 3 — Effect（效果层）："X 达到了预期目的吗？"
#     E2E验证：消息真的到达？数据不只新鲜还正确？
#     能查：端到端失败（组件各自正常但整体不工作）
#     盲区：未来的探索方向
#
# 每个不变式标注 verification_layer，让 governance 自我意识盲区深度。
# MR-6 要求关键不变式覆盖 ≥2 层。
# MRD-LAYER-001 自动发现只有单层覆盖的不变式。
#
# 检查类型（check_type）：
#   python_assert  — 执行 Python 代码，assert 不抛异常 = pass
#   file_contains  — 检查文件是否包含指定 pattern（正则）
#   file_not_contains — 检查文件不包含指定 pattern
#   env_var_exists — 检查环境变量非空（需 --full 模式，bash -lc）
#   command_succeeds — 执行 shell 命令，exit code 0 = pass
#
# 使用方式：
#   python3 ontology/governance_checker.py              # dev 模式
#   python3 ontology/governance_checker.py --full        # Mac Mini（含 env/crontab）
#   python3 ontology/governance_checker.py --json        # JSON 输出
#
# 教训来源：
#   2026-04-07 对抗审计 — 22 个声明-实际断裂点
#   2026-04-08 运行时层发现 — 声明全过但推送失败 3 天

# ═══════════════════════════════════════════════════════════════════════
# 1. 元概念（Meta-Concepts）
# ═══════════════════════════════════════════════════════════════════════
meta_concepts:
  Declaration:
    description: "系统中任何可验证的断言"
    sources: [CLAUDE.md, jobs_registry.yaml, config.yaml, status.json]

  Enforcement:
    description: "让声明在运行时真正生效的代码"

  Verification:
    description: "证明声明和执行一致的可执行检查"

  # v3 新增：验证深度分层
  VerificationDepth:
    description: "检查在哪个深度层工作 — 越深越接近真实"
    layers:
      declaration:
        depth: 1
        question: "代码/配置说了 X 吗？"
        check_types: [file_contains, file_not_contains, python_assert]
        catches: "代码级不一致（pattern 缺失、字段缺失、导入缺失）"
        blind_spot: "代码正确但从未被执行（cron 环境不同、PATH 不同）"
        lesson: "2026-04-07: 12/12 声明检查全过"

      runtime:
        depth: 2
        question: "X 在执行环境中真的发生了吗？"
        check_types: [env_var_exists, command_succeeds]
        catches: "执行环境不一致（env vars 缺失、python3 损坏、crontab 漂移）"
        blind_spot: "执行正确但结果错误（发送成功但目标号码是占位号）"
        lesson: "2026-04-08: bash -lc 缺失导致 OPENCLAW_PHONE 为占位号，推送 3 天失败"

      effect:
        depth: 3
        question: "X 达到了预期目的吗？"
        check_types: [log_activity_check]  # MRD-NOTIFY-002 首个效果层检查
        catches: "端到端失败（各组件正常但整体不工作）"
        blind_spot: "需要外部反馈（用户确认收到消息）"
        lesson: "2026-04-09: ontology 频道声明+运行时全 OK 但从未收到消息——驱动首个 effect 检查"

# ═══════════════════════════════════════════════════════════════════════
# 2. 元规则（Meta-Rules）
# ═══════════════════════════════════════════════════════════════════════
meta_rules:
  - id: MR-1
    name: every-declaration-has-enforcement
    description: "每个声明必须有对应的运行时执行代码"
    lesson: "2026-04-07: MAX_TOOLS 在 config_loader 定义但从未被 import"

  - id: MR-2
    name: every-enforcement-has-verification
    description: "每个执行代码必须有测试/审计验证其正确性"

  - id: MR-3
    name: every-declaration-change-propagates
    description: "声明变更必须传播到所有执行层"
    lesson: "2026-04-07: ArXiv registry 0 8,20 但 crontab 仍是 0 */3"

  - id: MR-4
    name: silent-failure-is-a-bug
    description: "任何操作失败必须有可观测信号"
    lesson: "2026-04-07: 6 个 DISCORD_CH_* 为空时推送静默消失"

  - id: MR-5
    name: health-fields-have-freshness-guarantee
    description: "每个健康状态字段必须有刷新机制和陈旧度检测"
    lesson: "2026-04-07: security_score 无时间戳，从不自动刷新"

  - id: MR-6
    name: critical-invariants-need-depth
    description: "severity=critical 的不变式必须有 ≥2 层验证深度（声明层+运行时层）"
    lesson: "2026-04-08: 声明层 12/12 全过但 DBLP/Dream WhatsApp 推送连续失败 3 天。单层检查给出虚假的安全感。"

  - id: MR-7
    name: governance-execution-is-self-observable
    description: |
      治理系统自身是一等运行时代码，必须遵守它强制执行的所有规则，包括 MR-4。
      任何 check 层可能出现的状态（pass/fail/skip/error）都必须在汇总层有明确的
      观察路径——不允许在聚合时被"透明化"。治理的汇总行必须不会说谎。
    lesson: |
      2026-04-11: governance_checker.print_results() 仅统计 status=="fail"，
      status=="error" 被 ✅ 汇总行完全吞掉。INV-CRON-003/004 连续数次 NameError
      崩溃，汇总行持续显示"所有不变式成立"。这是"观察者的自我盲区"：治理系统
      没有把自己当被治理对象。详见 ontology/docs/cases/governance_silent_error_case.md

  - id: MR-8
    name: copy-paste-is-a-bug-class
    description: |
      跨 job/模块复制相似逻辑 = 引入 bug 类。修复一处其他地方仍然带病运行，
      新增字段需要 N 处同步更新，任何一处忘记同步就成为静默漂移源。正确做法是
      把公共原语提取为可 import 的模块，只允许通过"差异注入"（函数参数、
      配置传参、依赖注入）扩展行为，禁止 fork-then-modify。
      对这条规则的正向兑现 = 新 job 直接 `import X as rc` 而不是复制 500 行。
    lesson: |
      2026-04-11: V37.5 kb_review_collect.py 被 V37.6 kb_evening_collect.py
      直接 import 复用（load_sources_from_registry/extract_recent_sections/
      collect_notes/collect_sources/call_llm 零重复），只覆写 evening-specific
      的 prompt 结构 + 1-day 窗口 + WA header。这是 kb_evening 三年来第一次
      不靠"文件名前 80 字"伪摘要——靠的是拒绝 copy-paste。同场演出 V37.6 P0-2:
      14 个 RSS/cron job 各自独立 `>> sources/*.md`，每次架构升级都要改 14 处，
      V37.6 统一到 kb_append_source.sh helper。MR-8 是 MR-9 的上位法则。

  - id: MR-9
    name: state-writes-go-through-helper-not-raw-redirect
    description: |
      shell `>>` 直写持久化状态文件（~/.kb/sources/*.md、index.json、seen.txt
      等任何跨进程/跨 cron 共享的 state 文件）必须走一个强制 dedup / 并发锁 /
      契约的 helper（kb_append_source.sh、kb_write.sh 等），禁止 job 里出现
      裸的 `echo ... >> "$KB_SRC"`、`cat >> "$INDEX"`、`printf >> "$STATE"`。
      理由：state 文件的写入语义（append / upsert / idempotent-section /
      atomic-replace）不能交给每个 caller 自己理解，否则：
        (a) 同一 cron 一天跑多次 → 重复 section 污染（如 ontology_sources 10:00/20:00）
        (b) 并发写 → 内容交错损坏（没有 flock）
        (c) 架构升级时 14 个 caller 要改 14 次（14 个 H2-dedup 补丁都要复制粘贴）
        (d) 单个 caller 遗漏迁移 → 静默退回旧行为（V37.6 run_discussions.sh 第 16 处漏网）
      helper 的契约必须声明（且自测）：幂等性 / 并发安全 / section 标记 /
      SLOT_TAG 支持（同日多 run） / 失败时 exit ≠ 0 让 caller fail-fast。
    enforcement:
      - "INV-SRC-001 声明层：扫 jobs/*/run*.sh 不得出现 `>> \"$KB_SRC\"` 或 `>> .*sources/.*\\.md`"
      - "INV-SRC-001 运行时层：扫 15 个 enabled source-producing jobs 必须调用 kb_append_source.sh"
      - "新增 source-producing job 必须在 jobs_registry.yaml 声明 kb_source_file 且 grep 确认 helper 调用存在"
    derivative_invariants: [INV-SRC-001, INV-DEDUP-001, INV-DEDUP-002]
    blood_lessons: |
      2026-04-11 V37.6: 438 行 sources 污染（多个 cron 在 `## $DAY` 下重复追加同一条目，
      滚动窗口内一条论文出现 N 次），根因是 14 个 cron job 各自独立 `>> sources/*.md`，
      没有统一 helper。修复引入 kb_append_source.sh + SLOT_TAG，但 run_discussions.sh
      第 16 处漏网（MR-4 第 5 次演出），直到 V37.7 双跑审计才发现。
      结论：这不是"14 个 caller 每个都要记得调 helper"的纪律问题，而是 ontology
      必须禁止裸 `>>` 直写 state 文件的架构问题——让 CI/governance 自动拦截，
      不靠程序员记忆。MR-9 是 MR-4 "silent-failure-is-a-bug" 的上游预防层。

  - id: MR-10
    name: understand-before-fix
    description: |
      看到报错/失败时，禁止直接开始"修"。必须先回答三个问题：
        (1) 这个问题之前存在吗？如果之前不存在，那是我的改动引入的，不是系统的 bug。
        (2) 是我的哪个改动引入的？精确定位因果链，不猜测。
        (3) 最小修复方案是什么？不引入新概念、新模式、新复杂度。
      三个问题答不上来 = 还没理解问题，禁止动手。
      每次"修复"都可能制造下一个 bug——连锁修复（fix → new bug → fix → new bug）
      是最危险的系统破坏模式，因为：
        (a) 每层修复增加系统复杂度
        (b) 新复杂度创造新的故障面
        (c) 用户被迫反复手动测试
        (d) 最终修复的总成本远超最初问题
      MR-10 是 MR-4 (silent-failure) 和 MR-6 (depth) 的上位原则——在写代码之前
      截断"不理解就动手"的冲动。与原则 #26 (异常分析宪法) 互为表里：#26 说"画图先于修复"，
      MR-10 说"理解先于画图"。
    enforcement:
      - "CLAUDE.md 原则 #28 声明三问检查"
      - "异常分析宪法（原则 #26）要求因果链架构图在修复之前输出"
    blood_lessons: |
      2026-04-13 V37.8.3: preflight 一个部署同步问题（~/auto_deploy.sh 未跟上仓库更新）
      被误诊为"缺少 FILE_MAP 配置条目"，触发 5 轮连锁修复：
        Round 1: 加 preflight/job_smoke_test 到 FILE_MAP → 引入 HOME 部署拓扑
        Round 2: 加 auto_deploy.sh 双目标部署 → 引入从未有过的一源两目标模式
        Round 3: 加 SCRIPT_DIR HOME 检测 → Round 1 的"修复"制造了此 bug
        Round 4: 改 FILE_MAP parser dict→list → Round 2 的"修复"制造了此 bug
        Round 5: 给 job_smoke_test.sh 加同样的 SCRIPT_DIR 检测
      原始问题只需 `cp ~/openclaw-model-bridge/auto_deploy.sh ~/auto_deploy.sh`。
      4 层新复杂度 × 用户 5 次 Mac Mini 手动测试 = 最贵的一次 `cp` 命令。
      951 个单测全部通过但无一能暴露部署拓扑问题——dev 环境 (Linux/root) 没有
      HOME 部署拓扑，SCRIPT_DIR 永远指向仓库目录。这不是"测试不够"的问题，
      而是"不理解就动手"的问题——如果 Round 1 时先问"之前为什么能通过"，
      就不会走上 5 轮连锁修复的歧路。

  - id: MR-11
    name: shell-function-output-must-go-to-stderr-if-not-returned-value
    description: |
      shell 函数内的诊断/日志/状态输出 (log / debug / status / warn) 必须写到 stderr
      （`>&2`），**不得写 stdout**。原因：调用方经常用命令替换 `RESULT=$(func ...)`
      捕获函数的 stdout 作为"返回值"。如果 log 也写 stdout，它会污染 RESULT，
      然后被当作业务数据向下游传递。
      只有函数的"真正返回值"（被调用方需要捕获的字符串）才应该写 stdout。
      所有其他输出一律 `>&2`。
    violation_patterns:
      - '^\s*(log|debug|status|warn|info)\(\)\s*\{\s*echo\s+.*[^&]2?\s*[^>&]\s*\}$'  # log 函数 echo 不带 >&2
      - 'echo\s+"\[.*\]"\s*$'  # 时间戳日志行结尾无重定向（heuristic）
    enforcement:
      - "CLAUDE.md 原则待立项（V37.8.8 候选）"
      - "governance runtime python_assert 扫所有 shell 函数定义"
    blood_lessons: |
      2026-04-15 V37.8.6 Dream 血案：kb_dream.sh:109 `log() { echo "[$TS] dream: $1"; }`
      写 stdout。Map 循环用 `signals=$(llm_call ...)` 命令替换捕获 stdout。llm_call
      失败时 log() 发出的 "LLM raw response: <HTML>Error code: 400 Bad JSON..."
      错误日志被捕获进 `$signals` 变量 → 写入 cache → Reduce LLM 读 cache →
      基于错误字样编造"Hugging Face 平台危机"推送给用户。
      **一个 `>&2` 就阻断了整条幻觉链。** 这证明 MR-11 不是纪律问题，而是架构硬规则。

  - id: MR-12
    name: llm-output-parser-must-be-key-based-not-positional
    description: |
      解析 LLM 文本输出的代码**不得用严格位置索引**（`lines[i]` / `lines[i+1]` /
      `lines[i+2]` / `i += N` / `content.split()[0/1/2]`）。LLM 输出永远不能假设
      格式严格遵守——模型偶尔会：
        - 漏一行（如漏"要点："）
        - 多一行空白
        - 保留 prompt 序号（"文章1：..."）
        - 把分隔符 (---) 放错位置
        - 用变体前缀（"标题:"/"中文标题："）
      任何位置依赖的解析器都会因这些偏差**级联错位**，污染所有后续条目。

      **允许的模式**（按推荐度排序）：
        1. **JSON/YAML schema 校验**：让 LLM 返回结构化 JSON，validate schema
        2. **key-based prefix dict**：`line.startswith('字段名：')` 识别字段
        3. **语义 state-machine**：用特征字符（⭐/---/:) 界定块边界 + pending_*
           状态机 + 完整块触发后 reset
        4. **正则直接提取**：`re.search(r'字段:\s*(.+)', content)`

      **强制要求**（所有模式都必须满足）：
        - 每个字段缺失时必须有 sentinel 默认值（`pending_title or ''`）
        - 输出层必须有兜底（`cn_title = paper['title']` 用原始数据作 fallback）
        - 每块相互独立，单块缺字段不影响其他块（无级联）

    violation_patterns:
      - 'lines\[i\s*[+]\s*[0-9]+\]'           # lines[i+N] 位置索引
      - '^\s*i\s*\+=\s*[0-9]+\s*$'             # i += N 固定步进（arxiv 的 state-machine 不会出现这个）
      - 'content\.split\([^)]*\)\[[0-9]+\]'   # split()[0/1/2] 固定索引
    enforcement:
      - "CLAUDE.md 原则待立项（V37.8.8 候选）"
      - "governance runtime python_assert 扫所有 LLM 输出解析 heredoc"
    blood_lessons: |
      2026-04-15 V37.8.7 ontology_sources 格式错位血案：
      `run_ontology_sources.sh:300-313` 用严格位置 `lines[i], lines[i+1], lines[i+2]`
      + `i += 3` 步进。LLM 第 2 篇漏一行"要点"就让所有后续条目的 (cn_title,
      highlight, stars) 全部右移一格——用户 WhatsApp 看到 cn_title 显示为
      `*---*` 和 `*价值：⭐⭐⭐⭐*`。修复：抽到独立模块 ontology_parser.py
      按 separator 切块 + 块内 key-based prefix 解析，单块缺行不影响其他块。

      V37.8.7 同日扫描所有 15 个 LLM 输出解析器，发现 **7 个论文类 job**
      (arxiv/semantic_scholar/hf_papers/dblp/pwc/acl_anthology/github_trending
       + rss_blogs) 已用 state-machine key-based + fallback 模式，是 MR-12
      合规的参考实现。ai_leaders_x 用 pure dict key-based。run_hn_fixed 用
      JSON + 正则 fallback。其余脚本 LLM 输出作为 markdown 整段用（不抽字段）。

      **MR-12 与 MR-4 (silent-failure) 的关系**：MR-4 是"问题分类"（输出看起来
      正常但语义错乱就是 bug），MR-12 是"防御机制"（不用严格位置解析就能从
      架构层规避这类 silent-failure）。

  - id: MR-13
    name: error-chain-must-preserve-upstream-cause-across-layers
    description: |
      跨组件错误传播链中，每一跳必须保留上游的真实错误原因（至少包含 HTTP 状态码 +
      error body 的 key 字段），不得只传递本层的泛化状态码或异常类型名。

      典型违反：
        - adapter 返回 `{"error": "ALL FALLBACKS FAILED: gemini 429"}`
          → proxy `except Exception as e: str(e)` 只拿 "HTTP Error 502: Bad Gateway"
          → client `e.reason` 再次丢弃 body
          → 用户告警只看到 "HTTP 502" 无法判断根因

      合规做法：
        - HTTPError 捕获时调 `e.read()` 读 body + 解析 JSON error 字段
        - 构造错误消息时拼接 `"HTTP {code}: {reason} | upstream: {body_summary}"`
        - body 超长时截断到 MAX_UPSTREAM_BODY_CHARS（不是丢弃）
        - `e.read()` 本身抛异常时 fail-open 返回基础信息（不炸）

      MR-13 与 MR-4 (silent-failure) 的关系：MR-4 检测"错误被完全吞没"，
      MR-13 检测"错误被报出但原因被稀释到信息密度为零"——用户看到告警但
      无从判断根因，误以为可观测性工作正常。这是 MR-4 的更隐蔽变种。
    enforcement:
      - "INV-OBSERVABILITY-001 声明+运行时层：proxy compose_backend_error_str 读 body + 截断 + fail-open"
      - "INV-OBSERVABILITY-001 client 侧：kb_review_collect._compose_http_reason 镜像语义"
      - "新增跨组件错误路径时必须验证：下游能否从告警消息中定位上游真实原因"
    derivative_invariants: [INV-OBSERVABILITY-001]
    blood_lessons: |
      2026-04-14/15 V37.8.10: kb_evening 连续 2 天 22:00 告警 "HTTP 502: Bad Gateway"，
      用户看到告警但无法判断根因。Mac Mini 证据显示真实原因是 primary Qwen3 breaker OPEN
      + gemini HTTP 429 quota 耗尽，但 adapter→proxy→client 三跳每跳丢弃 upstream body：
        跳 1: adapter _send_json(502, {"error": "ALL 1 FALLBACKS FAILED: gemini 429"})
        跳 2: proxy str(HTTPError) → "HTTP Error 502: Bad Gateway"（从未调 e.read()）
        跳 3: client e.reason → "Bad Gateway"（body 再次丢弃）
      三层稀释让 "gemini 429 quota 耗尽" 变成 "502"——信息密度从完整原因变为零。
      MR-4 第 9 次演出新形态："错误被发现但原因不可见"。

  - id: MR-14
    name: alert-path-must-not-depend-on-failing-subject
    description: |
      告警路径不得依赖被监控的对象本身。如果对象 X 宕机，用于告警 X 宕机的
      通道必须独立于 X。否则告警和被监控对象同生共死 = 死循环。

      典型违反：
        - Gateway 宕 → WhatsApp 不通 → 用 WhatsApp 告警 Gateway 宕 = 死循环
        - 数据库宕 → 告警写数据库 → 告警也丢
        - 网络断 → 用同一网络推送告警 → 告警发不出

      合规做法：
        - 监控 Gateway → 用 Discord（独立于 Gateway）告警
        - 监控单通道 → 用其他通道告警
        - 关键基础设施 → 至少两条独立告警路径

      MR-14 与 MR-4 (silent-failure) 的关系：MR-4 是"发现静默故障的元分类"，
      MR-14 是"阻止告警本身成为静默故障的架构规则"。当告警路径依赖失效主体时，
      故障不仅静默，而且连"本该发现故障"的机制也一起死了。
    enforcement:
      - "INV-WA-001 声明层：wa_keepalive 告警路径强制走 Discord（不经 Gateway/WhatsApp）"
      - "INV-QUIET-001 声明层：quiet_alert 静默期仅跳过 WhatsApp，Discord 始终推送"
      - "新增监控/告警机制的设计评审必须回答：告警路径是否独立于被监控对象？"
    derivative_invariants: [INV-WA-001, INV-QUIET-001]
    blood_lessons: |
      2026-04-16 V37.8.13: Gateway 宕 9 小时完全静默。wa_keepalive 每 30 分钟
      检测到 Gateway 不可达（18 次 WARN），但告警路径只写日志不推送。auto_deploy
      preflight 三次检测到 Gateway CRITICAL 失败，但凌晨静默期同时跳过了 WhatsApp
      和 Discord。job_watchdog 的告警虽然走 notify.sh 双通道（WhatsApp 失败但
      Discord 成功），但 watchdog 自身 08:30 运行时竟然没检出 Gateway 不可达。
      最终用户靠人工对比 WhatsApp(空) vs Discord(满) 才发现 — 9 小时的系统级
      观察力黑洞，核心原因就是"告警链依赖了失效主体"。

  - id: MR-15
    name: reserved-files-must-not-be-writable-by-llm
    description: |
      任何被底层 runtime（OpenClaw / Gateway / Proxy / Adapter）赋予特殊语义的
      文件路径，不得暴露给 LLM 的 write/edit 工具作为无约束写入目标。LLM 不知道
      这些文件的 runtime 语义，随手写入会触发静默故障链路。

      典型违反：
        - LLM 把"任务完成"写进 HEARTBEAT.md → OpenClaw heartbeat 激活 → 所有用户
          消息被 LLM 按 HEARTBEAT_OK 指令覆盖 → Gateway stripTokenAtEdges 剥离 →
          用户完全静默（V37.8.16 血案）
        - LLM 把日志写进 AGENTS.md / CLAUDE.md 等 workspace 保留文件 → 改变下次
          session 加载上下文 → 行为漂移

      合规做法（四层联合防御）：
        1. 声明层：维护 RESERVED_FILES 明细表（路径 + 语义 + 违规后果）
        2. 行为层：SOUL.md 等 LLM system prompt 明确列出"禁止写"+血案注释
        3. Proxy 拦截层：检测到写入保留文件时改写 args.content 为安全占位 +
           [SYSTEM_ALERT] 日志，让 LLM 的写入成为 no-op
        4. 测试层：单测覆盖每条保留文件路径 + 每种 path alias（file/file_path/filepath）

      MR-15 与 MR-4 (silent-failure) 的关系：MR-4 是"问题分类"（静默故障是 bug），
      MR-15 是"上游预防层"（别让 LLM 碰能制造静默故障的 runtime 文件）。MR-4 问
      "发生了什么静默"，MR-15 问"凭什么 LLM 能够触发静默"。

      MR-15 与 MR-8 (copy-paste-is-a-bug-class) / MR-9 (state-writes-go-through-helper)
      的关系：MR-8/MR-9 约束源码层；MR-15 约束 LLM 调用层。三者共同覆盖"人/机/源码"
      三个边界。
    enforcement:
      - "INV-HB-001 声明层：proxy_filters.RESERVED_FILE_BASENAMES 含 HEARTBEAT.md + fix_tool_args 集成 detect_reserved_file_write()"
      - "INV-HB-001 运行时层：真实调用 fix_tool_args 构造 HEARTBEAT.md 写入场景，断言 content 被改写为安全占位"
      - "新增 OpenClaw 保留文件时必须同时更新 RESERVED_FILE_BASENAMES + SOUL.md + 测试"
    derivative_invariants: [INV-HB-001]
    blood_lessons: |
      2026-04-19 V37.8.16: PA (Wei) 处理 HN 告警对话时，调用 write 工具把
      "[SYSTEM_ALERT] HN热帖抓取已恢复" / "任务完成" / "下一步监控" 写进
      ~/.openclaw/workspace/HEARTBEAT.md（PA 当 TODO 笔记文件名用）。13 小时后
      用户开始发 WhatsApp 消息时，OpenClaw heartbeat 机制（auth-profiles.js:48796）
      检测到 HEARTBEAT.md 非空非注释（isHeartbeatContentEffectivelyEmpty=false），
      runKind=heartbeat 激活，system prompt 变成默认的 "Read HEARTBEAT.md ...
      If nothing needs attention, reply HEARTBEAT_OK"。Qwen3 严格执行指令 + 看到
      HEARTBEAT.md 里"任务完成/下一步监控"判定"无需关注"，对每条用户消息都回
      "HEARTBEAT_OK"（12 字符）。Gateway stripTokenAtEdges 剥离 12 字符 → outbound
      空 → 用户完全看不到 PA 回复。proxy 日志 22:09-23:04 每次 TEXT=12 稳定印证。
      MR-4 silent-failure 第 12 次演出——这次不是错误被吞，是 LLM 正确响应系统
      prompt 却误读了其适用范围。详见 heartbeat_md_pa_self_silencing_case.md。

  - id: MR-16
    name: security-dimensions-governed-by-invariants
    description: |
      security_score.py 的 7 个维度（密钥管理 / 测试门禁 / 数据完整性 /
      部署安全 / 传输安全 / 审计追踪 / 可用性）必须被 governance invariants
      覆盖。security_score 和 governance 是当前两套独立的审计系统，分叉
      风险长期存在。MR-16 把两者统一到 governance ontology 下。

      渐进策略：
        Step 1 (V37.9): INV-SEC-001 "security-score-meets-threshold"
                        守卫当前总分 ≥ 90，作为粗粒度安全防线
        Step 2 (future): 每维度 1 个 INV-SEC-*（7 个）细粒度覆盖
                         未来每次血案触发相关维度时顺便补齐
        Step 3 (终态): security_score.py 从独立打分工具变成 governance
                       audit 的一个 view（数据源统一到 ontology）

      与 MR-4 (silent-failure) 的关系：MR-4 是"问题发现"，MR-16 是"统一
      审计入口"——避免"A 系统说健康，B 系统说有问题"这种观察分叉。
    enforcement:
      - "INV-SEC-001 声明层：security_score.py 存在且 threshold=90"
      - "INV-SEC-001 运行时层：subprocess 调 security_score.py 确认分数 ≥ threshold"
      - "新增 security dimension 必须同步建立对应 INV-SEC-* 不变式"
    derivative_invariants: [INV-SEC-001]
    blood_lessons: |
      当前无具体血案触发，但"双轨审计分叉"是结构性风险：security_score
      和 governance 由不同代码路径计算，各有盲区。未来任一方发现的问题
      如果没同步到另一方，就会产生观察不一致。MR-16 是预防性元规则。

  - id: MR-17
    name: declared-state-must-converge-to-runtime-via-machine-not-memory
    description: |
      任何"声明态资源"（registry/yaml/config 中的声明）必须有"运行时同步路径"
      由机器执行，不允许靠"下次 Claude Code session 记得手动执行某条命令"
      作为同步机制。

      声明态 vs 运行时态举例：
        - jobs_registry.yaml enabled=true   vs  macOS crontab -l 实际行
        - openclaw.json agents/models       vs  OpenClaw runtime 加载状态
        - providers.d/*.yaml provider 列表  vs  adapter /health fallback_chain
        - KB sources 抓取脚本写入             vs  text_index/ RAG 真实覆盖
        - launchd plist 配置                vs  launchctl list 服务状态

      核心论断：所有这些声明都对应一个"运行时事实"，两者之间的同步
      必须由机器化的检测+修复（或检测+告警）路径承担。**任何依赖人类
      记忆"上线后要手动跑某命令"的同步链都是结构盲区**——它在工程系统
      投入足够多 checkpoint 时仍会潜伏，因为 checkpoint 全部建在仓库
      内层（单测 / governance / preflight）但同步的另一端在仓库外
      （cron/process/http/filesystem）。

      MR-17 与其他元规则的关系：
        - MR-1 (every-declaration-has-enforcement) 关心"声明 → 代码"
          MR-17 关心"声明 → 运行时事实"（更高一阶）
        - MR-3 (every-declaration-change-propagates) 关心"声明变更 → 多个执行层"
          MR-17 关心"声明态 → 运行时态"是否同步成功（结果而非过程）
        - MR-4 (silent-failure-is-a-bug) MR-17 是 MR-4 的上游预防层：
          静默失败的常见根源就是"声明改了但运行时没跟上"，先有 MR-17
          就少很多 MR-4 演出
        - MR-9 (state-writes-go-through-helper) 关心"写入操作走 helper"
          MR-17 关心"声明态 → 运行时态"整体是否收敛（写入只是其中一环）

      实施路径（V37.9.19 +）：
        Step 1 (V37.9.19): convergence framework + 第一个 spec
                           jobs_to_crontab (drift_action=alert_only 一周观察)
        Step 2 (V37.9.20): jobs_to_crontab 升级 auto_sync + 第二个 spec
                           providers_to_adapter (alert_only)
        Step 3 (V37.9.21): openclaw_config_to_runtime + kb_sources_to_index
                           统一进入 convergence framework
        Step 4 (V3 路标):  ontology-engine pip 包暴露 convergence framework
                           作为 control plane 核心抽象，与 OPA 等纯 policy
                           引擎形成差异化（OPA 只做"声明 → 决策"，OpenClaw
                           做"声明 → 运行时事实闭环"）

      合规模式（每个 declared resource 都需要）：
        - declaration_path: 声明文件路径
        - runtime_observable: 怎么观察 runtime 真实状态（method + parser）
        - drift_action: alert_only / machine_sync / block_until_human
        - governance_invariant: 对应 INV-CONVERGENCE-* 的 ID

      违反即立即触发 MR-4 (silent-failure)。
    enforcement:
      - "ontology/convergence.py 提供 verify_convergence(spec_id) 通用函数"
      - "ontology/convergence_ontology.yaml 登记每个 declared resource 的 spec"
      - "INV-CONVERGENCE-* 不变式群守卫每个 spec 真实可执行 + drift 被发现"
      - "新增任何声明态资源时，必须配套提交对应 convergence_spec 否则视为遗漏"
    derivative_invariants: [INV-CONVERGENCE-CRON-001, INV-CONVERGENCE-PROVIDERS-001, INV-CONVERGENCE-OPENCLAW-001, INV-CONVERGENCE-KB-001, INV-CONVERGENCE-INTEGRATION-001, INV-CONVERGENCE-SERVICES-001]
    blood_lessons: |
      2026-04-26 V37.9.18: V37.9.16 (4/24) 上线 kb_deep_dive 时 jobs_registry.yaml
      声明 enabled=true + interval="30 22 * * *"，但**没人手动 crontab_safe.sh add**，
      4/24 + 4/25 两次预期 22:30 触发完全静默，2026-04-26 用户察觉"昨天没收到"
      才浮现。三层 silent bug 协同（preflight grep 选择性吞 warning + crontab_safe
      谎报 ✅ + cron 不触发零监控）让简单运维遗漏潜伏 2 天。

      根本启示：1478 单测 + 309 governance check + 81 preflight 项的工程投入，
      全部解决"代码正确性"，但**代码正确不等于运行时事实**。1478 单测防复杂逻辑漏洞，
      "crontab add 一行"靠 Claude Code 记忆 — 记忆是最弱可靠性机制。
      详见 ontology/docs/cases/kb_deep_dive_cron_unregistered_case.md

  - id: MR-18
    name: auto-batch-injection-must-validate-runtime-semantics
    description: |
      任何"自动批量修改多个文件"的工具（自动注入脚本 / sed -i 多文件 replace /
      Python script 批量 rewrite / Edit replace_all 跨文件 等）必须满足三层验证契约：

      (1) 注入前 dry-run: AST 解析每个目标文件 / 计算注入后预期状态 / 检测
          语义冲突 (import 不一致 / 函数签名冲突 / 名字遮蔽 / 等)
      (2) 注入后 syntactic + semantic validation: 不只查 bash -n 语法层, 还要
          对 Python heredoc / 嵌入式代码 AST 解析验证 referenced names ⊆
          imported names ∪ locally_defined ∪ builtins
      (3) 失败整批 rollback: 任一文件验证失败, 全部目标文件回退, 不允许部分
          提交 (避免 8 文件中 1 个 broken 静默部署到生产)

      核心论断：**自动批量工具是 bug 放大器** — 单点设计错误立即传播到 N 个
      文件, 且失败模式比手工修改更隐蔽（手工每次 Edit 都看 context，注入工具
      不看）。`bash -n` 永远查不到 Python heredoc 内部 NameError，需要 AST
      解析 + 运行时语义验证才能闭合盲点。

      MR-18 与其他元规则的关系：
        - MR-4 (silent-failure-is-a-bug) MR-18 是 MR-4 的上游预防层：
          V37.9.50-hotfix → V37.9.58-hotfix 同款 import 缺漏 8 天间隔重演 =
          V37.9.50 教训没转化为 framework 预防层 = MR-4 必然第 N 次演出
        - MR-6 (critical-invariants-need-depth) MR-18 强制自动批量工具走完整
          三层验证 (declaration AST + runtime semantic + effect rollback)
        - MR-8 (copy-paste-is-a-bug-class) MR-18 是把"自动注入"列为 copy-paste
          的高风险变种 — 机器复制 N 次, 单点 bug 放大 N 倍, 比人工 copy-paste
          更难发现 (人工至少每次看 context)
        - MR-10 (understand-before-fix) MR-18 强制自动工具"理解每个文件再注入",
          不是机械 sed/replace_all

      实施路径：
        Step 1 (V37.9.58-hotfix2): heredoc_import_scanner.py + 立
          INV-HEREDOC-IMPORT-001 作为 MR-18 第一个 derivative_invariant.
          AST 解析所有 .sh 中 `<< 'PYEOF'` heredoc, 检测 referenced ⊆ imported.
        Step 2 (V37.9.59+): inject_level_4_to_aligned_jobs.py / 其他自动注入
          工具自治化 — 内嵌 scanner check, 注入失败整批 rollback.
        Step 3 (V3 路标): ontology-engine pip 包暴露 batch_injection_validator
          通用工具, 作为 framework 级"自动批量改多文件"的安全网, 让 OPA 等
          policy 引擎无法触达的"工具级 silent failure"被治理覆盖.

      合规模式 (每个 auto-batch tool 都需要)：
        - target_files: 列表声明要改的文件
        - pre_check: 注入前 dry-run validator 函数
        - post_check: 注入后 AST 解析 validator 函数
        - rollback: 任一失败整批回退路径
        - governance_invariant: 对应 INV-* 的 ID

      违反即触发 MR-4 (silent-failure) + MR-8 (copy-paste-is-a-bug-class)
      双演出。本元规则正向兑现 = V37.9.58-hotfix2 立 + 不变式 +
      scanner 端到端运行 → V37.9.50-hotfix 8 天前的治理债清零。

    enforcement:
      - "heredoc_import_scanner.py 提供 scan_heredoc_imports(filepath) 通用函数"
      - "INV-HEREDOC-IMPORT-001 守护 V37.9.50/58-hotfix 同款 import 缺漏"
      - "新增自动批量注入工具时, 必须配套提交对应 INV-* 否则视为遗漏"
      - "scanner 集成 full_regression 第一层, 任何 .sh 含 << 'PYEOF' heredoc 都被扫"

    derivative_invariants: [INV-HEREDOC-IMPORT-001, INV-AUTO-INJECT-001]

    blood_lessons: |
      2026-05-10 V37.9.50-hotfix: jobs/semantic_scholar/run_semantic_scholar.sh
      emit heredoc (line 419) 顶部 `import sys, json, re` 缺 `os`, V37.9.50
      加的 lazy import sys.path.insert(0, os.environ.get(...)) 调 `os.environ`
      → NameError → rule_check 跳过 FAIL-OPEN → "高对齐 0" 虚假统计.
      **单点 fix 没提炼为 framework 预防**, 治理债积累.

      2026-05-12 V37.9.58-hotfix: V37.9.57 inject_level_4_to_aligned_jobs.py
      自动批量给 8 个 ALIGNED jobs (hf_papers/arxiv/s2/dblp/github_trending/
      rss_blogs/ai_leaders_x/hn) 的 LLM call heredoc 加
      `prompt += os.environ.get('HG_LEVEL_4_TEXT', '')` 但**未补 import os**.
      7/8 jobs 的 prompt-generation heredoc 顶部 `import sys, json` 都缺 os.
      每次 LLM 调用 NameError 5/5 → retry 包装当成功返回空 content → broken
      push 5 个 cron 影响. 用户 14:46 WhatsApp 发现 → 紧急 hotfix.

      2026-05-12 V37.9.58-hotfix2 (本元规则立案): heredoc_import_scanner.py
      AST 解析所有 .sh heredoc 立即抓出 V37.9.58-hotfix 还**遗漏**的 2 个
      LEVEL_2 jobs (finance_news + ontology_sources) 同款盲点 — scanner 真
      实有效证据. MR-18 立案让"自动批量工具的安全垫"从"下次 Claude Code
      记得"升级为"机器化契约 + governance audit 主动监控".

      详见 V37.9.58-hotfix2 commit + test_heredoc_import_scanner.py 反向验证
      sabotage 守卫真有效证据.

  - id: MR-19
    name: monitor-must-self-alarm-on-silent-abort
    description: |
      任何 "silent failure 监控工具" (watchdog 类) 必须满足三个自监控契约,
      防止 watchdog **自身**变成 silent failure (元监控盲区):

      (1) **awk / 子进程容错**: 任何子进程错误退出不得让 set -e abort 整脚本.
          典型场景 macOS bsd awk 处理含无效 UTF-8 字节的日志 → multibyte
          conversion failure → exit 1 → pipefail → set -e abort.
          合规模式: 子进程加 `LC_ALL=C cmd ... 2>/dev/null || true` 容错.
      (2) **ERR trap 主动告警**: set -e 触发 abort 前必须有 `trap ERR` handler
          推送 [SYSTEM_ALERT] 到 Discord, 让 watchdog 自身死亡可见.
          合规模式: `_fatal_handler()` 函数 + `trap '_fatal_handler $LINENO' ERR`.
      (3) **Canary heartbeat 推送**: EXIT trap 在正常完成时写 canary 文件 +
          (可选) 推送 "alive" 消息. 让长时 silent 可被外部检测.
          合规模式: ~/<tool>_canary.json 写时间戳 + alerts=0 时推 alive 消息.

      核心论断: **监控工具的可观察性必须比业务工具更强**, 因为它失败是元级别
      失败 — 业务工具死了 watchdog 报警; watchdog 死了, 谁报警? 答案: watchdog
      自己必须主动告诉 Discord 自己死了, 用 ERR trap + canary 双层防御.

      MR-19 与其他元规则关系:
        - MR-4 (silent-failure-is-a-bug) MR-19 是 MR-4 的元层应用 — 不仅业务
          层 silent 是 bug, 监控层 silent 也是 bug (实际更严重, 因为掩盖了
          所有下游业务 silent)
        - MR-7 (governance-execution-is-self-observable) MR-19 是 MR-7 在
          运维监控层的具体兑现 — 治理自观察 + 监控自报警
        - MR-17 (declared-state-must-converge-to-runtime) 关心 declared 与
          runtime 同步, MR-19 关心 runtime 监控自身死活的同步

      实施路径:
        Step 1 (V37.9.58-hotfix3): job_watchdog.sh + INV-WATCHDOG-SELF-001
          作为 MR-19 第一个 derivative_invariant.
        Step 2 (V37.9.59+): 扫所有 cron 触发的监控类脚本 (preflight_check /
          governance_audit_cron / wa_keepalive / job_watchdog) 是否都满足
          MR-19 三契约. 如有 silent abort 风险都按同款模式补.
        Step 3 (V3 路标): ontology-engine pip 包暴露 monitor_self_observability
          通用模块 (ERR trap helper + canary writer), 让任何用户自己的 monitor
          一行 source 就获得 MR-19 合规.

      合规模式 (每个 monitor 都需要):
        - awk_safe: LC_ALL=C cmd ... 2>/dev/null || true (容错子进程)
        - err_trap_handler: trap '_fatal_handler $LINENO' ERR (主动告警)
        - canary_writer: EXIT trap 写 ~/<tool>_canary.json (元监控钩子)
        - governance_invariant: 对应 INV-* (本 invariant 守卫)

      违反即触发 MR-4 + MR-7 双演出 (silent + 治理自观察盲区).

    enforcement:
      - "job_watchdog.sh 顶部装 _watchdog_fatal_handler + trap ERR"
      - "INV-WATCHDOG-SELF-001 守 declarative checks + runtime python_assert"
      - "新增监控类 cron 脚本时, 必须配套 ERR trap 否则视为 MR-19 违反"

    derivative_invariants: [INV-WATCHDOG-SELF-001]

    blood_lessons: |
      2026-05-12 V37.9.58-hotfix3 立案: job_watchdog.sh 从 2026-05-05 16:30 起
      静默 abort 7 天. 根因:
        - line 264 `tail -200 "$logfile" | awk -v cutoff=... '...'`
        - 某 log 文件含无效 UTF-8 字节 (surrogate / mojibake)
        - macOS bsd awk: `towc: multibyte conversion failure on: '?'` exit 1
        - `set -eo pipefail` → pipe exit 1 → watchdog 整脚本 abort exit 2
        - 没 ERR trap → 没主动告警 → cron log 仅 heartbeat 一行 + awk error 几行
        - 没 canary 推送 → 没人发现 watchdog 死了
        - 累积影响: hf_papers / s2 / rss_blogs / github_trending lockdir 残留
          (没人清), MOVESPEED 24h 21 次 rsync 失败告警 (没推送), SLO p95 54s
          严重超阈值 (没推送), KB 摘要 29h 未更新告警 (没推送) — 全部 silent.
        - 用户视角发现: 5/12 反馈"今天只收到 HN+HF" → 我深度诊断 →
          手动跑 watchdog 暴露 awk multibyte error → 真因揭晓.

      教训:
        - 5/5 12:30 watchdog 最后一次正常 → 5/5 16:30 起 silent → 用户 5/12
          才发现 = silent failure 持续 7 天没人监控
        - Q1 之前存在? ✓ (5/5 16:30+) / Q2 我引入? ✗ (历史遗留) / Q3 最小
          修复? = LC_ALL=C + ERR trap + canary
        - V37.9.50-hotfix → V37.9.58-hotfix → V37.9.58-hotfix2 → V37.9.58-hotfix3:
          一日内四个连续 hotfix, 每个都把 silent failure 向上一层抽象修复.
          最深层 = MR-19 监控自身死活监控.
        - 这次也是用户视角原则 #13 兑现 — 单测 + governance + preflight 全绿
          + Mac Mini cron 实际跑了 7 天 + 但用户没收到业务推送才发现.

      详 V37.9.58-hotfix3 commit + ontology/docs/cases/watchdog_silent_abort_case.md
      (V37.9.59 候选完整四维度因果链文档化).

  - id: MR-20
    name: framework-level-fix-must-validate-in-target-environment
    description: |
      Framework 级修复必须在目标环境 (Mac Mini) 验证，不能只在 dev 环境验证。
      Dev 单测 + governance + preflight 全过不代表修复真正工作 — bash 版本差异
      (3.2 vs 5.x)、macOS BSD 工具差异 (无 timeout/gtimeout)、launchd 行为差异
      (set -e 不传播 ERR trap 到 function 内需 set -E) 只有目标环境才能暴露。

      MR-20 与 MR-15 (deployment-layout-must-be-tested-on-target) 是姊妹版：
        - MR-15 关心部署路径假设 (~/jobs/X/ vs ~/.openclaw/jobs/X/)
        - MR-20 关心运行时行为假设 (bash 版本 quirk / BSD 工具差异)
      两者共同论断: **dev 环境的"全绿"是必要条件非充分条件**。

    enforcement:
      - "修复推送后必须提醒用户 Mac Mini 同步 + 实测验证 (原则 #14)"
      - "shell helpers 必须考虑 macOS BSD 工具差异 (command -v 检测 + fallback)"

    derivative_invariants: []

    blood_lessons: |
      2026-05-12 V37.9.58-hotfix3 → hotfix4: safe_call helper 用 `timeout 30`
      但 macOS BSD 默认无 timeout 命令. Dev linux 全过, Mac Mini 3 段"工具不可用".
      hotfix4 加 set -E (errtrace) + caller || ALERT 才真激活. 两次增量修复
      证明"dev 全绿不代表修复工作". 2026-05-12 V37.9.58-hotfix 同日:
      macOS BSD timeout 缺失 → 三档 fallback chain (timeout → gtimeout → 直接).

  - id: MR-21
    name: monitor-coverage-must-track-registry
    description: |
      Watchdog 监控覆盖率必须跟踪 jobs_registry.yaml 所有 enabled jobs，
      不允许新增 job 登记了 registry 但不在 watchdog 监控范围内。

      V37.9.59 把覆盖率从 47% 提升到 74%+ (JOBS 数组 +4 / LOG_FRESHNESS_JOBS +11 /
      STALE_LOCK_DIRS +2)，但"新增 job 后必须同步加 watchdog"仍靠程序员记忆。
      MR-21 要求这个同步变成 CI 可检测的约束。

    enforcement:
      - "INV-WATCHDOG-COVERAGE-001 守卫 watchdog JOBS+LOG_FRESHNESS 覆盖率"
      - "新增 enabled job 时必须同步加入 watchdog 监控列表"

    derivative_invariants: [INV-WATCHDOG-COVERAGE-001]

    blood_lessons: |
      2026-05-12 V37.9.59: 用户问"watchdog 是否监控所有任务"驱动审计，
      发现 47% 覆盖率 — kb_deep_dive / kb_dream / chaspark / governance_audit
      四个 job 有 last_run.json 但不在 JOBS 数组. 同时 11 个 job 无 last_run
      但有 log mtime 可监控 (auto_deploy / wa_keepalive / cron_canary 等).

  - id: MR-22
    name: sunset-over-accretion
    description: |
      日落法 (Sunset Law) — 系统演进的默认动作是"退役/合并"，不是"新增"。
      2026-06-05 确立为项目北极星：未来后续发展以降低系统复杂度为目标。

      核心论断（2026-06-05 深度反思）:
      意外频发的真因不是"系统复杂"(部件难懂)，是"系统组合"(简单正确的部件，
      其交互面积超线性增长，超过测试覆盖能力)。每一个意外都是简单正确部件的
      新组合:
        - symlink + abspath + 用 ~/ontology 路径调用 = 挂死 (三者缺一不爆)
        - machine_sync + 裸名 entry + 格式错配 + 审计不 dry-run = 三次复发
      复杂关乎部件，意外关乎接缝。

      三条操作规则:
        (1) 加之前先问能否退役 — 每加一层 (新防御/新表示/新路径/新框架) 之前，
            必须先问"能否退役一个等价的现有机制"。原则 #8 "做减法不做加法" 的
            战略升级 — 不只是"别加"，是"主动退役"。
        (2) 一物一形 — 同一逻辑事物只应有一个物理表示。多重表示 (路径/文件/
            身份) 必然漂移，bug 住在表示之间的缝里 (auto_deploy 两份文件两条
            crontab 路径 / ~/ontology symlink vs repo 路径)。
        (3) 防御本身是事故面 — convergence 框架为关闭"声明态-运行时态"缺口而
            建，却用 machine_sync 改生产成了新事故类 (药参与病)。所以"再加一层
            治理"往往不是答案，"缩小接缝"才是。

      MR-22 与既有元规则的关系:
        - MR-8 (copy-paste-is-a-bug-class) 复制是"多表示"的一种特例
        - MR-15 (deployment-layout) 部署多形 (~/jobs vs ~/.openclaw/jobs) 是漂移源
        - 原则 #8 (做减法不做加法) MR-22 是其战略化北极星版本

    enforcement:
      - "加新机制 (脚本/不变式/MR/框架/表示/路径) 前必须在 changelog 说明：能否退役等价旧机制？"
      - "收工时审视复杂度账本 — suites/invariants/MR 数量增长是否对应价值增长，而非堆叠"
      - "优先 sunset/merge，不优先 add — 减少一物多形、缩小 dev-production 接缝、让观察者只读"

    derivative_invariants: []  # 战略元规则，刻意不铸新不变式 (践行日落法本身)，靠 changelog + review 纪律执行

    blood_lessons: |
      2026-06-05 深度反思 (用户问"为什么发生这么多意外？仅因系统变复杂？"):
      一天五版 (V37.9.112-116) 意外频发。逐层剖析根因:
        ① 组合非复杂 — 部件都简单正确，意外在新组合 (超线性交互面积 > 测试覆盖)
        ② 地图≠领土 — 4063 测试全在 dev 跑，事故全在 production 接缝 (真 crontab/
           symlink/macOS BSD 工具/网络/时间)。dev mock 判 missing=空，Mac Mini 真 apply
        ③ 观察者改被观察者 — 07:00 审计 real-apply 改它审计的 crontab (MR-9 第3次)；
           我的诊断命令 (governance via symlink) 本身是 30min 挂死源 (观察制造问题)
        ④ 不完整修复伪装完整 — V37.9.114 修单 check 过全部测试，根在 _resolve_project_root
           (V37.9.115)；V37.9.106/111 删 line 54 三次从不找根
        ⑤ 潜伏条件累积 — 局部正确的旧决策 (symlink V37.9.12.1 / dry-run 切关 V37.9.58)
           组合成新事故。每个决策局部对，全局加组合面积
      元层: 治理验证"代码符合规则"，验证不了"规则符合现实/部署符合假设"。87 不变式
      全在仓库内层验证仓库自己，事故住在仓库-真实 Mac Mini 的接缝里 (无测试覆盖)。
      平衡视角: 很多"意外"是免疫系统开火 (watchdog 抓重复 / 反向验证抓我的不完整守卫 /
      原子实验证根)。零意外可能只是免疫系统瞎了 (MOVESPEED 潜伏 60 天)。今天看得狠
      所以暴露债多 — 这是好的运维卫生，不是退步。

  - id: MR-23
    name: audit-observes-never-mutates
    description: |
      任何治理/审计/监控操作绝不允许 mutate 它所审计的系统状态。自愈 (self-heal)
      必须是 operator 显式刻意动作，不是审计的副作用。观察者必须与被观察者隔离 —
      否则观察就变成修改，系统开始制造自己的事故。

      这是把"审计"和"自愈"的范畴错误纠正回来:
        - 审计 (audit) = 只读观察 + 告警 drift。检测，不改变。
        - 自愈 (machine_sync apply) = 显式 operator 动作。手动跑/专门 cron，不是审计副作用。
      把两者混在一个操作里 (07:00 审计顺手 real-apply) 让系统在每次"体检"时被"手术"。

      MR-23 与既有元规则的关系:
        - MR-7 (governance-execution-is-self-observable) 关心"观察者可被观察"；
          MR-23 进一步要求"观察者不可改变被观察者"
        - MR-9 (state-writes-go-through-helper) MR-23 是其在治理层的泛化 —
          治理运行的东西 (测试/审计) 都不应静默写生产状态
        - MR-17 (declared→runtime convergence) machine_sync 是兑现 MR-17 的手段，
          但 MR-23 要求它走"显式动作"路径，不是"审计副作用"路径

    enforcement:
      - "governance audit cron 跑 convergence 必须 CONVERGENCE_DRY_RUN=1 (V37.9.116, test_v37_9_116 守卫)"
      - "治理 runtime check 跑的测试必须隔离生产状态 (V37.9.113, test_convergence setUp dry-run)"
      - "machine_sync apply 是 operator 显式动作 (手动无 env=real-apply)，不是 07:00 审计副作用"

    derivative_invariants: []  # 复用既有守卫 (test_v37_9_116 + test_convergence 隔离类)，不铸新不变式 (践行 MR-22 日落法)

    blood_lessons: |
      MR-9 "governance-run 不应 mutate 生产" bug 类三次演出 (一次比一次深):
        V37.9.110 (2026-06-04): test_movespeed 写真 incidents.jsonl → 灌爆假 watchdog 告警
        V37.9.113 (2026-06-05): test_convergence runtime check 真改 crontab/真跑 kb_embed
        V37.9.116 (2026-06-05): 07:00 生产审计本身 real-apply crontab → auto_deploy 双行
                                3 次复发 (V37.9.106/111/116)，每次审计重加 line 54
      前两次是"测试污染生产"，第三次是"生产审计本身静默改它审计的系统" — 同根最深演出。
      2026-06-05 反思补充: 我的诊断命令 (python3 ~/ontology/governance_checker.py via
      symlink，无 dry-run env) 也会 real-apply 重加 line 54 — 观察行为即修改行为。

# ═══════════════════════════════════════════════════════════════════════
# 3. 不变式（Invariants）— 可执行的声明-执行-验证三元组
# ═══════════════════════════════════════════════════════════════════════
invariants:

  # ── 工具治理 ────────────────────────────────────────────────────────

  - id: INV-TOOL-001
    name: tool-count-limit
    meta_rule: MR-1
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "Agent 单次请求工具数 ≤ 12（CLAUDE.md）"
    # V37.8: MR-6 合规 — 声明层(代码引用 MAX_TOOLS) + 运行时层(真跑 filter_tools)
    checks:
      # declaration layer: proxy_filters.py 静态引用了 MAX_TOOLS 约束
      - name: "proxy_filters.py 静态引用 MAX_TOOLS 截断逻辑"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "MAX_TOOLS"
      # runtime layer: 真实构造输入 → 执行 filter_tools → 断言输出上限
      - name: "filter_tools() 输出不超过 MAX_TOOLS"
        check_type: python_assert
        code: |
          from proxy_filters import filter_tools, ALLOWED_TOOLS, CUSTOM_TOOLS
          from config_loader import MAX_TOOLS
          tools = [{"function": {"name": n, "parameters": {}}} for n in ALLOWED_TOOLS]
          filtered, _, kept = filter_tools(tools)
          assert len(filtered) <= MAX_TOOLS, f"filter_tools() 产出 {len(filtered)} > {MAX_TOOLS}"
          custom_names = {t["function"]["name"] for t in CUSTOM_TOOLS}
          for cn in custom_names:
              assert cn in kept, f"Custom tool '{cn}' 被截断丢失"

  - id: INV-TOOL-002
    name: max-tools-config-imported
    meta_rule: MR-1
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "MAX_TOOLS = 12 定义在 config_loader → proxy_filters 必须导入使用"
    # V37.8: 已有声明+运行时双层，仅修正 verification_layer 元数据标签（原先错标单层）
    checks:
      - name: "proxy_filters.py 包含 MAX_TOOLS"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "MAX_TOOLS"
      - name: "config_loader 导出 MAX_TOOLS = 12"
        check_type: python_assert
        code: |
          from config_loader import MAX_TOOLS
          assert MAX_TOOLS == 12, f"MAX_TOOLS = {MAX_TOOLS}, expected 12"

  - id: INV-TOOL-003
    name: custom-tool-schema-sync
    meta_rule: MR-3
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "CUSTOM_TOOLS schema 与 tool_proxy.py 实现一致"
    # V37.9.3: MR-6 补齐 — 两个现存 check 都是 python_assert（真 import proxy_filters
    # 读 CUSTOM_TOOLS + 真跑 set 比较），本质是 runtime 验证。仅修正 metadata 标签
    # 与实际验证层对齐（不新增检查，避免过度工程）。
    checks:
      - name: "data_clean schema 包含所有 tool_proxy 使用的参数"
        check_type: python_assert
        code: |
          from proxy_filters import CUSTOM_TOOLS
          dc = next(t for t in CUSTOM_TOOLS if t["function"]["name"] == "data_clean")
          props = set(dc["function"]["parameters"]["properties"].keys())
          with open("tool_proxy.py") as f:
              code = f.read()
          for param in ["action", "file", "ops", "fix_case_cols", "fix_date_cols"]:
              if param in code:
                  assert param in props, f"tool_proxy 使用 {param} 但 schema 未声明"
      - name: "search_kb schema source enum 与 VALID_SOURCES 一致"
        check_type: python_assert
        code: |
          from proxy_filters import CUSTOM_TOOLS
          sk = next(t for t in CUSTOM_TOOLS if t["function"]["name"] == "search_kb")
          schema_enum = set(sk["function"]["parameters"]["properties"]["source"]["enum"])
          expected = {"all", "arxiv", "hf", "semantic_scholar", "dblp", "acl", "hn", "notes"}
          assert schema_enum == expected, f"schema enum {schema_enum} != expected {expected}"

  # ── 调度治理 ────────────────────────────────────────────────────────

  - id: INV-CRON-001
    name: registry-crontab-interval-sync
    meta_rule: MR-3
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "registry interval 与实际 crontab 一致"
    lesson: "2026-04-07: ArXiv registry 0 8,20 但 crontab 0 */3"
    checks:
      - name: "check_registry.py 有间隔漂移检测代码"
        check_type: file_contains
        file: check_registry.py
        pattern: "间隔漂移"
      - name: "check_registry.py --check-crontab 无漂移"
        check_type: command_succeeds
        command: "python3 check_registry.py --check-crontab 2>&1 | grep -v '间隔漂移'"
        requires_full: true

  - id: INV-CRON-002
    name: quiet-hours-enforcement
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "00:00-07:00 零推送通知（Dream 除外）"
    lesson: "2026-04-07: watchdog 04:30 + ArXiv 04:00 打扰睡眠"
    # V37.9.3: MR-6 补齐 — check 1 是 python_assert（加载 jobs_registry.yaml + 遍历
    # job 的 interval hours 断言）本质 runtime; check 2 是 file_contains 声明层。
    # 两层已并存只是 metadata 未对齐。
    checks:
      - name: "job_watchdog 不在 00-07 时段运行"
        check_type: python_assert
        code: |
          from check_registry import load_yaml
          data = load_yaml("jobs_registry.yaml")
          for j in data["jobs"]:
              if j.get("id") == "job_watchdog" and j.get("enabled"):
                  interval = j.get("interval", "")
                  hours = interval.split()[1] if len(interval.split()) >= 2 else ""
                  # 不能是 */N 格式（会命中凌晨）
                  assert "*" not in hours, f"job_watchdog interval '{interval}' 会命中凌晨时段"
      - name: "auto_deploy 有 quiet_alert 静默封装"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: "quiet_alert"

