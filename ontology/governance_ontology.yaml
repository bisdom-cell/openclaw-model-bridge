      V37.9.68 Dream 三阶推送 (DEEP + WIDE + RADAR + Overview) 不得回退到 V37.8.3 单主题 chunked 模式。

      血案 (2026-05-14): 用户视角原则 #13 兑现 — WhatsApp 连续几周收到同款"Qwen-BIM 14B 颠覆参数"
