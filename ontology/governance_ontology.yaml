      时态"的同步盲区都该升级为 convergence spec, 不只是 cron registration.

      与 V37.9.18 INV-CRON-005/006 的 sibling 关系: 前者守 cron 注册执行
      (interval-based), 本 INV 守 launchd 服务注册执行 (always-on). 互补
      不替代, 一起覆盖 macOS 调度系统两种语义.
    design_decision: |
      为什么 services_registry.yaml 而非扩展 jobs_registry.yaml schema?
        - jobs_registry semantic = scheduled run-and-exit (cron)
        - services_registry semantic = persistent supervised (launchd)
        - 两个独立 source 让 schema 校验 + 文档 + 操作语义清晰分离
