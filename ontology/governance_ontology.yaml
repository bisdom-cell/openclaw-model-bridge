      # ── V37.9.37 升级层 declaration 守卫 ──────────────────────
      - name: "V37.9.37: 标记版本"
        check_type: file_contains
        file: jobs/rss_blogs/run_rss_blogs.sh
        pattern: "V37.9.37"
      - name: "V37.9.37: call_llm_single_with_retry helper 定义"
        check_type: file_contains
