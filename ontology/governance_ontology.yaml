  # ──────────────────────────────────────────────────────────────────
  # INV-LLMCRON-AUDIT-001 (V37.9.38)
  # ──────────────────────────────────────────────────────────────────
  - id: INV-LLMCRON-AUDIT-001
    name: llm-cron-jobs-fail-fast-audit-coverage
    meta_rule: MR-8
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      所有调用 LLM 的 cron 脚本（`jobs/**/run_*.sh` + 主仓库 LLM thin wrapper）
      必须在 ontology/llm_cron_audit.py 的 LLM_CRON_CANDIDATES 清单中登记，
      且其合规状态可由 audit_script() 自动扫描。21 个候选脚本中至少 4 个
      已对齐脚本（V37.5 kb_review / V37.8.10 kb_evening / V37.9.16 kb_deep_dive /
      V37.9.36-37 rss_blogs）必须保持合规（aligned=True）。
    design_decision: |
      V37.9.38 audit 视野 + 预防 + PoC 三件套交付：
        (a) ontology/llm_cron_audit.py — pure Python 扫描器, 行级启发式
            识别 V37.9.36 同款占位符反模式 (贡献：AI领域相关研究 / 价值：⭐⭐⭐ /
            要点：技术深度文章) + prompt 模板豁免 + 三种字面量上下文
            (quoted_inline / shell_multiline_close / py_assignment_open)
        (b) docs/llm_cron_fail_fast_audit.md — 21 脚本扫描报告, 显示
            P1 (≥2 findings) / P2 (1 finding) / P3 (0 findings 但缺标志)
            三档优先级, 是 V37.9.39+ 修复路线图的真理源
        (c) MR-8 兑现 (跨 job 同步 fail-fast 升级 = copy-paste-is-a-bug-class
            的反向案例): V37.5 / V37.8.10 / V37.9.16 三次同款修复都没扫
            其他 LLM cron 是否有同款反模式, 直到 V37.9.36 血案才浮现。
            audit 模块让未来 fail-fast 升级时 grep 范围一目了然。
        (d) ALIGNED_SCRIPTS 4 entry 是 V37.9.38 的合规黄金标准, 任何这 4 个
            脚本失去 aligned=True 状态 → 立即告警 (V37.9.39+ 各次升级都
            必须保持已对齐脚本不退化)
    lesson: |
      V37.9.36 血案教训: 跨 job 没及时同步 fail-fast 升级 = MR-8 反向案例。
      audit 模块把这种"全局视野"从单次回顾升级为持续 governance check —
      下次新增 LLM cron 或修改既有 fail-fast 模式时, governance 立即告知
      "21 个候选脚本中 X 个未对齐, 风险 P1/P2/P3 分布如下"。

      MR-10 (理解再动手) 兑现: V37.9.38 没有一次性修 17 个脚本 (会引入
      V37.9.34 同款 cascade 修复 bug)。今日交付仅 PoC + audit + 路线图,
      让 V37.9.39+ 每次 1-2 个脚本逐个验证, 配合 Mac Mini E2E 真跑数据。
    checks:
      # ── declaration: audit 模块文件 + 关键 API 守卫 ──────────────────
      - name: "audit 模块标 V37.9.38 版本"
        check_type: file_contains
        file: ontology/llm_cron_audit.py
        pattern: "V37.9.38"
      - name: "audit 模块定义 audit_script() 公开 API"
        check_type: file_contains
        file: ontology/llm_cron_audit.py
        pattern: "def audit_script\\(path\\)"
      - name: "audit 模块定义 find_placeholder_findings() 扫描器"
        check_type: file_contains
