  - id: INV-JOB-CANARY-001
    name: cron-canary-atomic-write
    meta_rule: MR-4
    verification_layer: [declaration]
    severity: medium
    declaration: |
      cron_canary.sh 每 10 分钟写心跳时间戳。
      必须使用 tmp+mv 原子写入（防止读到半截文件），
