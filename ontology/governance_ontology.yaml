        assertion: |
          with open("providers.py") as _f:
              _src = _f.read()
          assert "required: Optional[Dict[str, bool]]" in _src, (
              "INV-ROUTER-001 V37.9.76: find_best_provider 必须接受 required: dict 参数"
          )
          assert "prefer: Optional[List[str]]" in _src, (
              "INV-ROUTER-001 V37.9.76: find_best_provider 必须接受 prefer: list 参数"
          )
          assert "exclude: Optional[List[str]]" in _src, (
              "INV-ROUTER-001 V37.9.76: find_best_provider 必须接受 exclude: list 参数"
          )
      # === 声明层: router_decide.py 模块契约 ===
      - name: "V37.9.76 router_decide.py 文件存在"
        check_type: python_assert
        assertion: |
          import os as _os
          assert _os.path.isfile("router_decide.py"), (
              "INV-ROUTER-001 V37.9.76: router_decide.py 模块必须存在"
          )
      - name: "V37.9.76 router_decide.py 含 V37.9.76 marker"
        check_type: file_contains
        file: router_decide.py
        pattern: 'V37.9.76'
      - name: "V37.9.76 shadow 模式必须是默认 (PoC enforcement 不可启用)"
        check_type: file_contains
        file: router_decide.py
        pattern: '_MODE_DEFAULT = "shadow"'
      - name: "V37.9.76 MR-11 log 写 stderr 防 \\$() 命令替换污染"
        check_type: file_contains
        file: router_decide.py
        pattern: 'file=sys.stderr'
      - name: "V37.9.76 JSONL 路径锁定 ~/.kb/router_decisions.jsonl"
        check_type: file_contains
        file: router_decide.py
        pattern: '~/.kb/router_decisions.jsonl'
      # V37.9.76-hotfix 部署 layout 修复 (Mac Mini 09:29 首跑实测发现)
      - name: "V37.9.76-hotfix Mac Mini canonical repo 路径必须在候选列表"
        check_type: python_assert
        assertion: |
          # 守卫: PATH + FALLBACK 在 Mac Mini 部署到 ~/router_decide.py 时会重合 (dirname=$HOME),
          # 必须加 ~/openclaw-model-bridge/jobs_registry.yaml (auto_deploy 同步源) 作第二候选.
