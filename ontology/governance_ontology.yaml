# governance_ontology.yaml — 系统治理不变式本体 v3（验证深度分层）
#
# 核心问题："什么东西坏了我们会发现不了？"
#
# v1 → v2: 从"描述性三元组"升级为"可执行三元组"
# v2 → v3: 从"平面检查"升级为"验证深度三层模型"
#   - 2026-04-07 教训：22 个声明-实际断裂，全在声明层
#   - 2026-04-08 教训：声明层 12/12 全过，WhatsApp 推送却静默失败 3 天
#     根因：只查"代码写了什么"(声明层)，不查"运行时环境对不对"(运行时层)
#
# 验证深度三层模型（Verification Depth Model）：
#   Layer 1 — Declaration（声明层）："代码/配置说了 X 吗？"
#     file_contains, file_not_contains, python_assert(静态)
#     能查：代码级不一致
#     盲区：代码正确但从未被执行
#
#   Layer 2 — Runtime（运行时层）："X 在执行时真的发生了吗？"
#     env_var_exists, command_succeeds, python_assert(subprocess)
#     能查：环境和执行时不一致
#     盲区：执行正确但结果错误
#
#   Layer 3 — Effect（效果层）："X 达到了预期目的吗？"
#     E2E验证：消息真的到达？数据不只新鲜还正确？
#     能查：端到端失败（组件各自正常但整体不工作）
#     盲区：未来的探索方向
#
# 每个不变式标注 verification_layer，让 governance 自我意识盲区深度。
# MR-6 要求关键不变式覆盖 ≥2 层。
# MRD-LAYER-001 自动发现只有单层覆盖的不变式。
#
# 检查类型（check_type）：
#   python_assert  — 执行 Python 代码，assert 不抛异常 = pass
#   file_contains  — 检查文件是否包含指定 pattern（正则）
#   file_not_contains — 检查文件不包含指定 pattern
#   env_var_exists — 检查环境变量非空（需 --full 模式，bash -lc）
#   command_succeeds — 执行 shell 命令，exit code 0 = pass
#
# 使用方式：
#   python3 ontology/governance_checker.py              # dev 模式
#   python3 ontology/governance_checker.py --full        # Mac Mini（含 env/crontab）
#   python3 ontology/governance_checker.py --json        # JSON 输出
#
# 教训来源：
#   2026-04-07 对抗审计 — 22 个声明-实际断裂点
#   2026-04-08 运行时层发现 — 声明全过但推送失败 3 天

# ═══════════════════════════════════════════════════════════════════════
# 1. 元概念（Meta-Concepts）
# ═══════════════════════════════════════════════════════════════════════
meta_concepts:
  Declaration:
    description: "系统中任何可验证的断言"
    sources: [CLAUDE.md, jobs_registry.yaml, config.yaml, status.json]

  Enforcement:
    description: "让声明在运行时真正生效的代码"

  Verification:
    description: "证明声明和执行一致的可执行检查"

  # v3 新增：验证深度分层
  VerificationDepth:
    description: "检查在哪个深度层工作 — 越深越接近真实"
    layers:
      declaration:
        depth: 1
        question: "代码/配置说了 X 吗？"
        check_types: [file_contains, file_not_contains, python_assert]
        catches: "代码级不一致（pattern 缺失、字段缺失、导入缺失）"
        blind_spot: "代码正确但从未被执行（cron 环境不同、PATH 不同）"
        lesson: "2026-04-07: 12/12 声明检查全过"

      runtime:
        depth: 2
        question: "X 在执行环境中真的发生了吗？"
        check_types: [env_var_exists, command_succeeds]
        catches: "执行环境不一致（env vars 缺失、python3 损坏、crontab 漂移）"
        blind_spot: "执行正确但结果错误（发送成功但目标号码是占位号）"
        lesson: "2026-04-08: bash -lc 缺失导致 OPENCLAW_PHONE 为占位号，推送 3 天失败"

      effect:
        depth: 3
        question: "X 达到了预期目的吗？"
        check_types: [log_activity_check]  # MRD-NOTIFY-002 首个效果层检查
        catches: "端到端失败（各组件正常但整体不工作）"
        blind_spot: "需要外部反馈（用户确认收到消息）"
        lesson: "2026-04-09: ontology 频道声明+运行时全 OK 但从未收到消息——驱动首个 effect 检查"

# ═══════════════════════════════════════════════════════════════════════
# 2. 元规则（Meta-Rules）
# ═══════════════════════════════════════════════════════════════════════
meta_rules:
  - id: MR-1
    name: every-declaration-has-enforcement
    description: "每个声明必须有对应的运行时执行代码"
    lesson: "2026-04-07: MAX_TOOLS 在 config_loader 定义但从未被 import"

  - id: MR-2
    name: every-enforcement-has-verification
    description: "每个执行代码必须有测试/审计验证其正确性"

  - id: MR-3
    name: every-declaration-change-propagates
    description: "声明变更必须传播到所有执行层"
    lesson: "2026-04-07: ArXiv registry 0 8,20 但 crontab 仍是 0 */3"

  - id: MR-4
    name: silent-failure-is-a-bug
    description: "任何操作失败必须有可观测信号"
    lesson: "2026-04-07: 6 个 DISCORD_CH_* 为空时推送静默消失"

  - id: MR-5
    name: health-fields-have-freshness-guarantee
    description: "每个健康状态字段必须有刷新机制和陈旧度检测"
    lesson: "2026-04-07: security_score 无时间戳，从不自动刷新"

  - id: MR-6
    name: critical-invariants-need-depth
    description: "severity=critical 的不变式必须有 ≥2 层验证深度（声明层+运行时层）"
    lesson: "2026-04-08: 声明层 12/12 全过但 DBLP/Dream WhatsApp 推送连续失败 3 天。单层检查给出虚假的安全感。"

  - id: MR-7
    name: governance-execution-is-self-observable
    description: |
      治理系统自身是一等运行时代码，必须遵守它强制执行的所有规则，包括 MR-4。
      任何 check 层可能出现的状态（pass/fail/skip/error）都必须在汇总层有明确的
      观察路径——不允许在聚合时被"透明化"。治理的汇总行必须不会说谎。
    lesson: |
      2026-04-11: governance_checker.print_results() 仅统计 status=="fail"，
      status=="error" 被 ✅ 汇总行完全吞掉。INV-CRON-003/004 连续数次 NameError
      崩溃，汇总行持续显示"所有不变式成立"。这是"观察者的自我盲区"：治理系统
      没有把自己当被治理对象。详见 ontology/docs/cases/governance_silent_error_case.md

# ═══════════════════════════════════════════════════════════════════════
# 3. 不变式（Invariants）— 可执行的声明-执行-验证三元组
# ═══════════════════════════════════════════════════════════════════════
invariants:

  # ── 工具治理 ────────────────────────────────────────────────────────

  - id: INV-TOOL-001
    name: tool-count-limit
    meta_rule: MR-1
    verification_layer: [declaration]
    severity: critical
    declaration: "Agent 单次请求工具数 ≤ 12（CLAUDE.md）"
    checks:
      - name: "filter_tools() 输出不超过 MAX_TOOLS"
        check_type: python_assert
        code: |
          from proxy_filters import filter_tools, ALLOWED_TOOLS, CUSTOM_TOOLS
          from config_loader import MAX_TOOLS
          tools = [{"function": {"name": n, "parameters": {}}} for n in ALLOWED_TOOLS]
          filtered, _, kept = filter_tools(tools)
          assert len(filtered) <= MAX_TOOLS, f"filter_tools() 产出 {len(filtered)} > {MAX_TOOLS}"
          custom_names = {t["function"]["name"] for t in CUSTOM_TOOLS}
          for cn in custom_names:
              assert cn in kept, f"Custom tool '{cn}' 被截断丢失"

  - id: INV-TOOL-002
    name: max-tools-config-imported
    meta_rule: MR-1
    verification_layer: [declaration]
    severity: critical
    declaration: "MAX_TOOLS = 12 定义在 config_loader → proxy_filters 必须导入使用"
    checks:
      - name: "proxy_filters.py 包含 MAX_TOOLS"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "MAX_TOOLS"
      - name: "config_loader 导出 MAX_TOOLS = 12"
        check_type: python_assert
        code: |
          from config_loader import MAX_TOOLS
          assert MAX_TOOLS == 12, f"MAX_TOOLS = {MAX_TOOLS}, expected 12"

  - id: INV-TOOL-003
    name: custom-tool-schema-sync
    meta_rule: MR-3
    verification_layer: [declaration]
    severity: high
    declaration: "CUSTOM_TOOLS schema 与 tool_proxy.py 实现一致"
    checks:
      - name: "data_clean schema 包含所有 tool_proxy 使用的参数"
        check_type: python_assert
        code: |
          from proxy_filters import CUSTOM_TOOLS
          dc = next(t for t in CUSTOM_TOOLS if t["function"]["name"] == "data_clean")
          props = set(dc["function"]["parameters"]["properties"].keys())
          with open("tool_proxy.py") as f:
              code = f.read()
          for param in ["action", "file", "ops", "fix_case_cols", "fix_date_cols"]:
              if param in code:
                  assert param in props, f"tool_proxy 使用 {param} 但 schema 未声明"
      - name: "search_kb schema source enum 与 VALID_SOURCES 一致"
        check_type: python_assert
        code: |
          from proxy_filters import CUSTOM_TOOLS
          sk = next(t for t in CUSTOM_TOOLS if t["function"]["name"] == "search_kb")
          schema_enum = set(sk["function"]["parameters"]["properties"]["source"]["enum"])
          expected = {"all", "arxiv", "hf", "semantic_scholar", "dblp", "acl", "hn", "notes"}
          assert schema_enum == expected, f"schema enum {schema_enum} != expected {expected}"

  # ── 调度治理 ────────────────────────────────────────────────────────

  - id: INV-CRON-001
    name: registry-crontab-interval-sync
    meta_rule: MR-3
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "registry interval 与实际 crontab 一致"
    lesson: "2026-04-07: ArXiv registry 0 8,20 但 crontab 0 */3"
    checks:
      - name: "check_registry.py 有间隔漂移检测代码"
        check_type: file_contains
        file: check_registry.py
        pattern: "间隔漂移"
      - name: "check_registry.py --check-crontab 无漂移"
        check_type: command_succeeds
        command: "python3 check_registry.py --check-crontab 2>&1 | grep -v '间隔漂移'"
        requires_full: true

  - id: INV-CRON-002
    name: quiet-hours-enforcement
    meta_rule: MR-4
    verification_layer: [declaration]
    severity: high
    declaration: "00:00-07:00 零推送通知（Dream 除外）"
    lesson: "2026-04-07: watchdog 04:30 + ArXiv 04:00 打扰睡眠"
    checks:
      - name: "job_watchdog 不在 00-07 时段运行"
        check_type: python_assert
        code: |
          from check_registry import load_yaml
          data = load_yaml("jobs_registry.yaml")
          for j in data["jobs"]:
              if j.get("id") == "job_watchdog" and j.get("enabled"):
                  interval = j.get("interval", "")
                  hours = interval.split()[1] if len(interval.split()) >= 2 else ""
                  # 不能是 */N 格式（会命中凌晨）
                  assert "*" not in hours, f"job_watchdog interval '{interval}' 会命中凌晨时段"
      - name: "auto_deploy 有 quiet_alert 静默封装"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: "quiet_alert"

  # ── 通知治理 ────────────────────────────────────────────────────────

  - id: INV-NOTIFY-001
    name: discord-channel-availability
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "所有推送必须双通道（CLAUDE.md #16），6 个 DISCORD_CH_* 非空"
    checks:
      - name: "preflight 检查 DISCORD_CH_PAPERS"
        check_type: file_contains
        file: preflight_check.sh
        pattern: "DISCORD_CH_PAPERS"
      - name: "preflight 检查 DISCORD_CH_ALERTS"
        check_type: file_contains
        file: preflight_check.sh
        pattern: "DISCORD_CH_ALERTS"
      - name: "DISCORD_CH_PAPERS 环境变量非空"
        check_type: env_var_exists
        var: DISCORD_CH_PAPERS
        requires_full: true
      - name: "DISCORD_CH_TECH 环境变量非空"
        check_type: env_var_exists
        var: DISCORD_CH_TECH
        requires_full: true
      - name: "DISCORD_CH_ALERTS 环境变量非空"
        check_type: env_var_exists
        var: DISCORD_CH_ALERTS
        requires_full: true
      - name: "DISCORD_CH_DAILY 环境变量非空"
        check_type: env_var_exists
        var: DISCORD_CH_DAILY
        requires_full: true
      - name: "DISCORD_CH_FREIGHT 环境变量非空"
        check_type: env_var_exists
        var: DISCORD_CH_FREIGHT
        requires_full: true
      - name: "DISCORD_CH_ONTOLOGY 环境变量非空"
        check_type: env_var_exists
        var: DISCORD_CH_ONTOLOGY
        requires_full: true

  - id: INV-NOTIFY-002
    name: notify-empty-channel-error
    meta_rule: MR-4
    verification_layer: [declaration]
    severity: high
    declaration: "推送失败必须有可观测信号，空 channel 不能静默跳过"
    lesson: "2026-04-07: 空 channel ID 静默跳过，消息消失无痕迹"
    checks:
      - name: "notify.sh 在空 channel 时打印 ERROR"
        check_type: file_contains
        file: notify.sh
        pattern: "ERROR.*为空"

  # ── 环境变量治理 ────────────────────────────────────────────────────

  - id: INV-ENV-001
    name: required-env-vars-in-preflight
    meta_rule: MR-2
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "registry needs_api_key 字段被代码消费，不是死文档"
    checks:
      - name: "preflight 消费 needs_api_key 字段"
        check_type: file_contains
        file: preflight_check.sh
        pattern: "needs_api_key"
      - name: "REMOTE_API_KEY 在 preflight 必需列表中"
        check_type: file_contains
        file: preflight_check.sh
        pattern: "REMOTE_API_KEY"
      - name: "GEMINI_API_KEY 在 preflight 必需列表中"
        check_type: file_contains
        file: preflight_check.sh
        pattern: "GEMINI_API_KEY"

  # ── 健康状态治理 ────────────────────────────────────────────────────

  - id: INV-HEALTH-001
    name: health-fields-freshness
    meta_rule: MR-5
    verification_layer: [declaration]
    severity: high
    declaration: "status.json health 字段有自动刷新 + 时间戳"
    checks:
      - name: "kb_status_refresh.sh 有 security_score 自动刷新"
        check_type: file_contains
        file: kb_status_refresh.sh
        pattern: "security_score"
      - name: "kb_status_refresh.sh 写入 security_score_time"
        check_type: file_contains
        file: kb_status_refresh.sh
        pattern: "security_score_time"

  - id: INV-HEALTH-002
    name: service-health-validates-content
    meta_rule: MR-2
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "services: ok 必须验证响应 body，不只是 HTTP 200"
    checks:
      - name: "kb_status_refresh.sh 有 _check_health 函数"
        check_type: file_contains
        file: kb_status_refresh.sh
        pattern: "_check_health"
      - name: "_check_health 验证 JSON body"
        check_type: file_contains
        file: kb_status_refresh.sh
        pattern: "200-bad-body"
      - name: "Adapter /health 返回有效 JSON"
        check_type: command_succeeds
        command: "curl -s --max-time 3 http://localhost:5001/health | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d.get(\"ok\") or d.get(\"status\")'"
        requires_full: true

  # ── 部署治理 ────────────────────────────────────────────────────────

  - id: INV-DEPLOY-001
    name: file-map-completeness
    meta_rule: MR-2
    verification_layer: [declaration]
    severity: medium
    declaration: "未部署文件必须显式声明为不需要部署"
    checks:
      - name: "auto_deploy.sh 有显式排除声明"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: "显式声明不需要部署"

  - id: INV-DEPLOY-002
    name: auto-deploy-never-modifies-crontab
    meta_rule: MR-3
    verification_layer: [declaration]
    severity: critical
    declaration: "auto_deploy 不改 crontab → 必须有漂移检测兜底"
    design_decision: "crontab 变更需人工确认（安全考虑），漂移检测是安全网"
    checks:
      - name: "auto_deploy 不写入 crontab（只读取监控）"
        check_type: python_assert
        code: |
          with open("auto_deploy.sh") as f:
              lines = f.readlines()
          for i, line in enumerate(lines, 1):
              stripped = line.strip()
              # 跳过注释和 FILE_MAP 部署条目（部署 crontab_safe.sh 到 Mac Mini ≠ 执行它）
              if stripped.startswith("#") or stripped.startswith('"') or stripped.startswith("'"):
                  continue
              assert "| crontab -" not in stripped, f"line {i}: auto_deploy 不应 pipe 到 crontab"
              assert "crontab -e" not in stripped, f"line {i}: auto_deploy 不应编辑 crontab"
              # crontab_safe add/remove = 写入。crontab -l = 读取（允许）
              if "crontab_safe" in stripped:
                  assert "add" not in stripped and "remove" not in stripped, \
                      f"line {i}: auto_deploy 不应调用 crontab_safe add/remove"
      - name: "check_registry 有漂移检测"
        check_type: file_contains
        file: check_registry.py
        pattern: "间隔漂移"

  # ── 通知路径治理（2026-04-09 真实 bug 驱动）─────────────────────────
  # 教训：三个论文脚本绕过 notify.sh 直接调 openclaw message send，
  #   ${DISCORD_CH_ONTOLOGY:-} 空默认 + || true 静默吞错误，ontology 频道从未收到推送。
  #   adversarial_audit 只查"环境变量存在"(声明层)，不查"代码路径是否正确"(运行时层)。
  # 维度跃升：从"通道是否配置"到"代码路径是否统一"

  - id: INV-NOTIFY-003
    name: push-through-notify-sh
    meta_rule: MR-4
    verification_layer: [declaration]
    severity: high
    declaration: "所有推送脚本必须通过 notify.sh，禁止直接调用 openclaw message send（否则失去重试+错误捕获+队列）"
    lesson: "2026-04-09: 三个论文脚本绕过 notify.sh 直接发送，ontology 频道从未收到推送且零报错"
    checks:
      - name: "论文脚本 ontology 推送使用 notify.sh"
        check_type: python_assert
        code: |
          import glob, os, re
          violations = []
          for sh in glob.glob("jobs/*/run_*.sh"):
              with open(sh) as f:
                  content = f.read()
              if "DISCORD_CH_ONTOLOGY" not in content:
                  continue
              lines = content.split('\n')
              in_onto_block = False
              for i, line in enumerate(lines, 1):
                  if 'Ontology' in line and '推送' in line:
                      in_onto_block = True
                  elif in_onto_block and line.strip().startswith('fi'):
                      in_onto_block = False
                  if in_onto_block and 'message send' in line and 'DISCORD_CH_ONTOLOGY' in line:
                      # 检查上下文 ±3 行是否有明确的 fallback 标记
                      ctx = '\n'.join(lines[max(0,i-4):i]).lower()
                      if 'fallback' not in ctx and 'fall back' not in ctx and 'falling back' not in ctx:
                          violations.append(f"{sh}:{i}")
          assert not violations, f"直接 openclaw 推送(绕过notify.sh): {violations}"

  - id: INV-NOTIFY-004
    name: notify-error-capture
    meta_rule: MR-4
    verification_layer: [declaration]
    severity: high
    declaration: "notify.sh 的 send 函数必须捕获 stderr，禁止 >/dev/null 2>&1 吞错误"
    lesson: "2026-04-09: _notify_send_with_retry 用 >/dev/null 2>&1 吞掉所有错误，WhatsApp 失败3天无诊断信息"
    checks:
      - name: "notify.sh send 函数不吞 stderr"
        check_type: file_not_contains
        file: notify.sh
        pattern: "message send.*>/dev/null 2>&1"
      - name: "notify.sh send 函数捕获 stderr"
        check_type: file_contains
        file: notify.sh
        pattern: "send_err.*2>&1"

  # ── 运行时治理（2026-04-08 真实 bug 驱动）──────────────────────────
  # 教训：声明层检查全过，但 cron 运行时环境不对导致推送连续失败 3 天
  # 维度跃升：从"声明一致性"到"运行时真实性"

  - id: INV-CRON-003
    name: bash-lc-enforcement
    meta_rule: MR-1
    verification_layer: [runtime]
    severity: critical
    declaration: "每个 enabled job 的 crontab 条目必须包含 bash -lc（否则 cron 环境缺少 env vars）"
    design_decision: "2026-04-08 教训：DBLP/Dream/Watchdog 无 bash -lc → OPENCLAW_PHONE 为占位号 → 推送连续失败 3 天。2026-04-11 修复匹配逻辑：原子串匹配 `script in line` 对同脚本不同参数的条目（kb_dream.sh vs kb_dream.sh --map-sources）会错误命中首条，改为 endswith + 词边界。"
    checks:
      - name: "所有 enabled job 的 crontab 条目包含 bash -lc"
        check_type: python_assert
        requires_full: true
        code: |
          import re, subprocess
          from check_registry import load_yaml

          def _cron_cmd_invokes(line, entry):
              """Return True iff this crontab line's command invokes exactly this registry entry.
              Uses endswith + word-boundary to avoid false-positive on shared prefixes
              (e.g. 'kb_dream.sh' must not match 'kb_dream.sh --map-sources')."""
              parts = line.split(None, 5)
              if len(parts) < 6:
                  return False
              cmd = parts[5]
              # Strip trailing redirection pipeline
              cmd = re.split(r"\s*(?:>>|>|<|2>|\|)", cmd, maxsplit=1)[0]
              cmd = cmd.rstrip(" '\"")
              if not cmd.endswith(entry):
                  return False
              idx = len(cmd) - len(entry)
              if idx == 0:
                  return True
              return cmd[idx - 1] in "/ \t\"'"

          data = load_yaml("jobs_registry.yaml")
          crontab = subprocess.check_output(['crontab', '-l'], text=True)
          missing = []
          for job in data['jobs']:
              if not job.get('enabled') or job.get('scheduler') != 'system':
                  continue
              entry = job.get('entry', '')
              if not entry:
                  continue
              for line in crontab.splitlines():
                  if not line.strip() or line.strip().startswith('#'):
                      continue
                  if _cron_cmd_invokes(line, entry):
                      if 'bash -lc' not in line:
                          missing.append(f"{job['id']}: {entry}")
                      break
          assert not missing, f"缺少 bash -lc: {'; '.join(missing)}"

  - id: INV-CRON-004
    name: crontab-no-duplicates
    meta_rule: MR-3
    verification_layer: [runtime]
    severity: high
    declaration: "每个完整命令（脚本+参数）在 crontab 中最多出现一次（同一脚本不同参数视为不同 job，如 kb_dream.sh vs kb_dream.sh --map-only）"
    design_decision: "2026-04-08 教训：kb_dream 有 3 个完全相同的 crontab 条目→双进程 lock contention；2026-04-10 澄清：同一脚本不同参数是合法的分离调度（Map-Reduce 分阶段执行）；2026-04-11 修复 check bug：原 `sname in l` 子串匹配导致 Reduce 条目（entry=kb_dream.sh）被 --map-sources/--map-notes 误报 x3。改为 endswith + 词边界精确匹配。"
    checks:
      - name: "crontab 中无完全重复的命令条目"
        check_type: python_assert
        requires_full: true
        code: |
          import re, subprocess
          from check_registry import load_yaml

          def _cron_cmd_invokes(line, entry):
              """Return True iff this crontab line's command invokes exactly this registry entry.
              See INV-CRON-003 for rationale."""
              parts = line.split(None, 5)
              if len(parts) < 6:
                  return False
              cmd = parts[5]
              cmd = re.split(r"\s*(?:>>|>|<|2>|\|)", cmd, maxsplit=1)[0]
              cmd = cmd.rstrip(" '\"")
              if not cmd.endswith(entry):
                  return False
              idx = len(cmd) - len(entry)
              if idx == 0:
                  return True
              return cmd[idx - 1] in "/ \t\"'"

          data = load_yaml("jobs_registry.yaml")
          crontab = subprocess.check_output(['crontab', '-l'], text=True)
          lines = [l for l in crontab.splitlines() if l.strip() and not l.strip().startswith('#')]
          dupes = []
          for job in data['jobs']:
              if not job.get('enabled') or job.get('scheduler') != 'system':
                  continue
              entry = job.get('entry', '')
              if not entry:
                  continue
              # Regular for-loop instead of generator: Python exec() puts
              # `def _cron_cmd_invokes` into the local scope of the exec'd code,
              # and generator expressions create their own scope that cannot see
              # enclosing function locals (only module globals). This would fail
              # with NameError: name '_cron_cmd_invokes' is not defined.
              count = 0
              for l in lines:
                  if _cron_cmd_invokes(l, entry):
                      count += 1
              if count > 1:
                  dupes.append(f"{job['id']} x{count}")
          assert not dupes, f"重复 crontab: {'; '.join(dupes)}"

  - id: INV-ENV-002
    name: cron-env-smoke-test
    meta_rule: MR-1
    verification_layer: [runtime]
    severity: critical
    declaration: "cron 环境（bash -lc）中 OPENCLAW_PHONE 必须是真实号码，非占位号"
    design_decision: "2026-04-08 教训：cron 无 bash -lc 时 OPENCLAW_PHONE 为 +85200000000（占位号），所有 WhatsApp 推送静默失败"
    checks:
      - name: "OPENCLAW_PHONE 非占位号"
        check_type: command_succeeds
        requires_full: true
        command: |
          bash -lc 'test -n "$OPENCLAW_PHONE" && test "$OPENCLAW_PHONE" != "+85200000000"'

  # --- 2026-04-10 新增：从 Dream 配额爆炸链案例提炼 ---

  - id: INV-QUOTA-001
    name: llm-batch-circuit-breaker
    meta_rule: MR-1
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "批量 LLM 调用的 Job 必须有连续失败熔断机制，防止 fallback 配额耗尽影响其他 Job"
    design_decision: "2026-04-10 教训：Dream MapReduce 30+ 次调用全部 fallback 到 Gemini，耗尽日配额，导致 HN 推送全部垃圾"
    source_case: "ontology/docs/cases/dream_quota_blast_radius_case.md"
    checks:
      - name: "Dream 有连续失败熔断"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "MAP_CONSECUTIVE_FAILS"

  - id: INV-PUSH-001
    name: no-silent-garbage-push
    meta_rule: MR-1
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "面向用户的推送脚本必须能检测 LLM 完全失败并跳过推送，不允许静默发送回退文案"
    design_decision: "2026-04-10 教训：HN 脚本 LLM 502 后静默填入回退文案推送，用户收到 5 条'技术内容，详见原文'"
    source_case: "ontology/docs/cases/dream_quota_blast_radius_case.md"
    checks:
      - name: "HN 有 LLM 失败检测"
        check_type: file_contains
        file: run_hn_fixed.sh
        pattern: "LLM_FAILED"

  # --- V37.2 新增：Map-Reduce 分离调度治理（ontology 审计发现） ---

  - id: INV-CRON-005
    name: split-job-lock-isolation
    meta_rule: MR-3
    verification_layer: [declaration]
    severity: medium
    declaration: "分离调度的同一脚本的不同阶段，锁超时必须小于阶段间隔（确保前阶段锁不会阻塞后阶段）"
    design_decision: "2026-04-10: Dream Map(00:00) + Reduce(03:00) 共用 lockdir，锁超时 60min < 间隔 3h，安全"
    checks:
      - name: "Dream 锁超时 < Map-Reduce 间隔"
        check_type: python_assert
        code: "assert 3600 < (3 * 3600), 'lock timeout must be less than phase gap'"

  - id: INV-CACHE-001
    name: map-reduce-cache-integrity
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "Reduce 阶段必须显式检测 Map 缓存完整性；缓存为空导致降级时必须输出可观测信号（告警+日志+status字段），不允许静默降级"
    design_decision: "2026-04-10: ontology 审计发现 Reduce 静默降级为 Fast 模式违反 MR-4（静默失败是 bug）；已添加 MAP_DONE_FLAG 检测 + dream_fail_alert + map_degraded 状态字段"
    checks:
      - name: "kb_dream.sh 有 Map 降级检测"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "MAP_DEGRADED"
      - name: "kb_dream.sh 降级时有告警"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "dream_fail_alert.*降级"

  - id: INV-JOB-001
    name: split-job-status-isolation
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: medium
    declaration: "分离调度的不同阶段必须使用独立 status 文件，避免后阶段覆盖前阶段的失败证据"
    design_decision: "2026-04-10: Map 写 .last_map.json，Reduce 写 .last_run.json，两者互不覆盖，各自保留完整执行记录"
    checks:
      - name: "kb_dream.sh 有独立的 MAP_STATUS_FILE"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "MAP_STATUS_FILE"

  # ── 治理系统自观察（MR-7） ─────────────────────────────────────────
  # 2026-04-11: 治理系统自身是一等被治理对象。任何 check 层可能出现的状态
  # 都必须在汇总层有观察路径。详见 ontology/docs/cases/governance_silent_error_case.md

  - id: INV-GOV-001
    name: governance-summary-counts-all-non-pass
    meta_rule: MR-7
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "governance_checker 汇总层必须区分并统计 fail 和 error，两者都不能被 ✅ 汇总行吞掉"
    design_decision: |
      2026-04-11 教训：failed_invs 原本只数 status=="fail"，status=="error"
      被 ✅ 汇总行完全吞掉。INV-CRON-003/004 连续数次 NameError 崩溃，汇总行
      仍报"所有不变式成立"。修复：`if r["status"] in ("fail", "error")`。
    checks:
      - name: "print_results 的 failed_invs 同时统计 fail 和 error"
        check_type: file_contains
        file: ontology/governance_checker.py
        pattern: 'r\["status"\] in \("fail", "error"\)'
      - name: "error 状态注入时汇总行不会说 '所有不变式成立'"
        check_type: python_assert
        code: |
          # 独立回归：构造一个注定 error 的虚假 result，验证汇总不说谎
          # 注意：governance_checker.JSON_MODE 是模块级全局，调用时必须
          # 临时切到 False，否则 print_results 走 JSON 分支无法验证文本汇总。
          import io, contextlib, sys, os
          sys.path.insert(0, 'ontology')
          import governance_checker
          saved = governance_checker.JSON_MODE
          governance_checker.JSON_MODE = False
          try:
              fake_results = [{
                  "id": "INV-FAKE-ERROR",
                  "name": "synthetic-silent-error-probe",
                  "status": "error",
                  "severity": "critical",
                  "meta_rule": "MR-7",
                  "declaration": "注入的 error 用于验证 summary 不吞 error",
                  "checks": [
                      {"name": "synthetic", "status": "error", "message": "NameError: fake"}
                  ],
              }]
              buf = io.StringIO()
              with contextlib.redirect_stdout(buf):
                  exit_code = governance_checker.print_results(fake_results)
              out = buf.getvalue()
          finally:
              governance_checker.JSON_MODE = saved
          assert "所有不变式成立" not in out, \
              "silent error regression: ✅ 汇总行吞掉了 error 状态"
          assert exit_code != 0, \
              f"silent error regression: error 状态未计入失败 (exit={exit_code})"

# ═══════════════════════════════════════════════════════════════════════
# 4. 可执行元规则（Phase 0）— 自动发现缺失不变式
#    只扫描结构化数据源，不解析自然语言
#    误报 → warn（非 fail），不阻塞 CI
# ═══════════════════════════════════════════════════════════════════════
meta_rule_discovery:

  - id: MRD-CRON-001
    meta_rule: MR-3
    name: "每个 enabled system job 应有调度治理覆盖"
    description: |
      扫描 jobs_registry.yaml 中所有 enabled + scheduler=system 的 job，
      检查每个 job 的脚本名是否出现在某个 INV-* 的 checks 中。
      未覆盖的 job = 潜在的声明-执行断裂盲区。
    scan_source: jobs_registry.yaml
    scan_filter: "enabled == true and scheduler == 'system'"
    match_against: "invariants[*].checks[*].code 或 checks[*].pattern"
    severity_when_missing: warn  # 不阻塞，只提醒
    rationale: |
      今天的 ArXiv 漂移就是因为 arxiv_monitor 没有对应的不变式。
      如果当时有这条元规则，新增 job 时就会被提醒"需要加治理覆盖"。

  - id: MRD-ENV-001
    meta_rule: MR-1
    name: "每个 needs_api_key=true 的 job 应有环境变量验证"
    description: |
      扫描 registry 中 needs_api_key=true 的 job，
      检查 preflight_check.sh 是否验证了对应的 API key。
    scan_source: jobs_registry.yaml
    scan_filter: "enabled == true and needs_api_key == true"
    match_against: "preflight_check.sh 中的环境变量检查列表"
    severity_when_missing: warn

  - id: MRD-NOTIFY-001
    meta_rule: MR-4
    name: "每个使用 notify.sh 的脚本应有对应的 topic 频道"
    description: |
      扫描所有 .sh 文件中调用 notify 的 --topic 参数，
      检查每个 topic 是否在 notify.sh 的路由表中有对应。
    scan_source: "*.sh files"
    scan_filter: "grep 'notify.*--topic'"
    match_against: "_notify_discord_target_for_topic() case 分支"
    severity_when_missing: warn

  - id: MRD-ERROR-001
    meta_rule: MR-4
    name: "推送脚本不应静默吞掉发送错误"
    description: |
      扫描所有包含 openclaw message send 的 .sh 文件，
      检查 stderr 是否被 >/dev/null 2>&1 吞掉。
      静默吞错误 = MR-4 违反（silent failure is a bug）。
    scan_source: "*.sh files"
    scan_filter: "grep 'message send.*>/dev/null 2>&1'"
    match_against: "每个 send 调用的 stderr 应被捕获或记录"
    severity_when_missing: warn
    lesson: "2026-04-09: notify.sh 吞掉 stderr → WhatsApp 失败3天无诊断"

  - id: MRD-NOTIFY-002
    meta_rule: MR-4
    name: "每个 Discord 频道最近 7 天应有推送活动"
    description: |
      效果层（Layer 3）首个检查：扫描 notify_queue/ 和日志，
      检查每个已配置的 Discord 频道是否在最近 7 天内成功推送过。
      长期静默的频道 = 推送链路可能断裂。
    scan_source: "~/kb_dream.log, ~/jobs/*/cache/*.log, ~/.kb/notify_queue/"
    scan_filter: "最近 7 天内有 topic=X 的成功推送记录"
    severity_when_missing: warn
    lesson: "2026-04-09: ontology 频道配置完整但从未收到推送——效果层空白导致盲区"

  - id: MRD-LAYER-001
    meta_rule: MR-6
    name: "severity=critical 的不变式应有 ≥2 层验证深度"
    description: |
      扫描所有 severity=critical 的不变式，检查 verification_layer 是否包含
      ≥2 个层（如 [declaration, runtime]）。单层覆盖的 critical 不变式 = 虚假安全感。
    scan_source: "governance_ontology.yaml invariants"
    scan_filter: "severity == 'critical' and len(verification_layer) < 2"
    severity_when_missing: warn
    lesson: "2026-04-08: 声明层 12/12 全过但推送失败 3 天——单层检查的虚假安全感"

