      手动追查才知道 6 个 provider 缺 API key 未生效。当时无 declaration→
      runtime 自动比对机制，盲区潜伏数月。
      INV-CONVERGENCE-PROVIDERS-001 把 V37.8.10 的事后追查升级为
      governance audit 主动监控 — convergence.verify_convergence(
      'providers_to_adapter') 可在每次审计直接给出"declared N / observed
      M / missing K"的可执行 signal。
    design_decision: |
      为什么 alert_only 是永久结构性决策，不是 V37.9.19 同款保守 TODO？
