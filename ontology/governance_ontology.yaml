  - id: INV-DEPLOY-002
    name: auto-deploy-never-modifies-crontab
    meta_rule: MR-3
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "auto_deploy 不改 crontab → 必须有漂移检测兜底"
    design_decision: "crontab 变更需人工确认（安全考虑），漂移检测是安全网"
    # V37.8: MR-6 合规 — 原有单层(静态文本扫描) 无法发现"auto_deploy 进程在 Mac Mini
    # 运行时真的触碰了 crontab"这种真实运行时漂移。新增运行时层：subprocess 级 shlex
    # tokenize，把 auto_deploy.sh 逐行拆成 token 后，任何 token 是 `crontab` 或
    # `crontab_safe.sh` 且后续 token 为 `add/remove/-e/-i` 的命令 = 运行时违反。
    checks:
      # declaration layer: 文本/正则扫描
      - name: "auto_deploy 不写入 crontab（只读取监控）"
        check_type: python_assert
        code: |
          with open("auto_deploy.sh") as f:
              lines = f.readlines()
          for i, line in enumerate(lines, 1):
              stripped = line.strip()
              # 跳过注释和 FILE_MAP 部署条目（部署 crontab_safe.sh 到 Mac Mini ≠ 执行它）
              if stripped.startswith("#") or stripped.startswith('"') or stripped.startswith("'"):
                  continue
              assert "| crontab -" not in stripped, f"line {i}: auto_deploy 不应 pipe 到 crontab"
              assert "crontab -e" not in stripped, f"line {i}: auto_deploy 不应编辑 crontab"
              # crontab_safe add/remove = 写入。crontab -l = 读取（允许）
              if "crontab_safe" in stripped:
                  assert "add" not in stripped and "remove" not in stripped, \
                      f"line {i}: auto_deploy 不应调用 crontab_safe add/remove"
      - name: "check_registry 有漂移检测"
        check_type: file_contains
        file: check_registry.py
        pattern: "间隔漂移"
      # runtime layer: shlex tokenize AST 扫描（比字符串匹配强一层）
      - name: "auto_deploy.sh AST 级扫描无 crontab 写入 token 序列"
        check_type: python_assert
        code: |
          import shlex
          with open("auto_deploy.sh") as f:
              source = f.read()
          # shlex tokenize：识别引号/变量替换/转义，避免被注释或字符串内文本误导
          lex = shlex.shlex(source, posix=True)
          lex.whitespace_split = True
          lex.commenters = "#"
          try:
              tokens = list(lex)
          except ValueError:
              # 有未闭合的引号等复杂结构时，退化为行解析
              tokens = []
              for line in source.splitlines():
                  s = line.split("#", 1)[0].strip()
                  if not s:
                      continue
                  try:
                      tokens.extend(shlex.split(s, posix=True))
                  except ValueError:
                      tokens.extend(s.split())
          # 构造危险 token 序列表
          violations = []
          for i, tok in enumerate(tokens):
              # case 1: 直接 crontab 命令 + 写入操作
              if tok == "crontab":
                  nxt = tokens[i + 1] if i + 1 < len(tokens) else ""
                  if nxt in ("-e", "-i", "-r", "-"):
                      violations.append(f"token[{i}]: crontab {nxt}")
              # case 2: crontab_safe.sh 被调用且下一个 token 是写入动作
              if tok.endswith("crontab_safe.sh") or tok.endswith("crontab_safe"):
                  nxt = tokens[i + 1] if i + 1 < len(tokens) else ""
                  if nxt in ("add", "remove", "rm", "delete", "set", "replace"):
                      # 允许 FILE_MAP 映射字符串里包含文件名 crontab_safe.sh（文件复制）
                      # 映射语法是 "src dst"，不会出现 add/remove 紧随其后
                      violations.append(f"token[{i}]: {tok} {nxt}")
          assert not violations, f"auto_deploy.sh 运行时会写入 crontab: {violations}"

  # ── 通知路径治理（2026-04-09 真实 bug 驱动）─────────────────────────
  # 教训：三个论文脚本绕过 notify.sh 直接调 openclaw message send，
  #   ${DISCORD_CH_ONTOLOGY:-} 空默认 + || true 静默吞错误，ontology 频道从未收到推送。
  #   adversarial_audit 只查"环境变量存在"(声明层)，不查"代码路径是否正确"(运行时层)。
  # 维度跃升：从"通道是否配置"到"代码路径是否统一"

  - id: INV-NOTIFY-003
    name: push-through-notify-sh
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "所有推送脚本必须通过 notify.sh，禁止直接调用 openclaw message send（否则失去重试+错误捕获+队列）"
    lesson: "2026-04-09: 三个论文脚本绕过 notify.sh 直接发送，ontology 频道从未收到推送且零报错"
    # V37.9.3: MR-6 补齐 — 现存 python_assert 用 glob.glob 扫 jobs/*/run_*.sh + 真读
    # 文件内容做 context 判定（不只是 regex 匹配字面量），是 runtime 层验证。仅修正
    # metadata 标签。
    checks:
      - name: "论文脚本 ontology 推送使用 notify.sh"
        check_type: python_assert
        code: |
          import glob, os, re
          violations = []
          for sh in glob.glob("jobs/*/run_*.sh"):
              with open(sh) as f:
                  content = f.read()
              if "DISCORD_CH_ONTOLOGY" not in content:
                  continue
              lines = content.split('\n')
              in_onto_block = False
              for i, line in enumerate(lines, 1):
                  if 'Ontology' in line and '推送' in line:
                      in_onto_block = True
                  elif in_onto_block and line.strip().startswith('fi'):
                      in_onto_block = False
                  if in_onto_block and 'message send' in line and 'DISCORD_CH_ONTOLOGY' in line:
                      # 检查上下文 ±3 行是否有明确的 fallback 标记
                      ctx = '\n'.join(lines[max(0,i-4):i]).lower()
                      if 'fallback' not in ctx and 'fall back' not in ctx and 'falling back' not in ctx:
                          violations.append(f"{sh}:{i}")
          assert not violations, f"直接 openclaw 推送(绕过notify.sh): {violations}"

  - id: INV-NOTIFY-004
    name: notify-error-capture
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "notify.sh 的 send 函数必须捕获 stderr，禁止 >/dev/null 2>&1 吞错误"
    lesson: "2026-04-09: _notify_send_with_retry 用 >/dev/null 2>&1 吞掉所有错误，WhatsApp 失败3天无诊断信息"
    # V37.9.3 MR-6 补齐 — 原双 file_* 只证源码模式，runtime 补强真 subprocess 模拟
    # openclaw 失败并验证 (a) stderr 错误原文被 _notify_send_with_retry 捕获并最终
    # 出现在用户可见的 ERROR log 中 (b) 失败入队文件落盘。两层共守 MR-4 silent-
    # failure 底线。
    checks:
      - name: "notify.sh send 函数不吞 stderr"
        check_type: file_not_contains
        file: notify.sh
        pattern: "message send.*>/dev/null 2>&1"
      - name: "notify.sh send 函数捕获 stderr"
        check_type: file_contains
        file: notify.sh
        pattern: "send_err.*2>&1"
      - name: "V37.9.3 runtime: openclaw 失败时 stderr 被 notify 捕获到用户可见 ERROR"
        check_type: python_assert
        code: |
          # Runtime: mock 一个失败的 openclaw 二进制（exit 1 + stderr 有独特 token）
          # 让 notify.sh 的 _notify_send_with_retry 3 次重试全失败，断言最终 stderr
          # 包含独特 token（证明捕获路径未吞错误）+ 队列文件落盘。
          import subprocess, os, tempfile, glob
          unique_token = "RTMOCK_STDERR_8F2E1"
          with tempfile.TemporaryDirectory() as tmp:
              fake_oc = os.path.join(tmp, "fake_openclaw")
              with open(fake_oc, "w") as f:
                  f.write(
                      "#!/usr/bin/env bash\n"
                      f"echo '{unique_token} upstream err' >&2\n"
                      "exit 1\n"
                  )
              os.chmod(fake_oc, 0o755)
              queue_dir = os.path.join(tmp, "notify_queue")
              env = dict(os.environ)
              env["OPENCLAW"] = fake_oc
              env["OPENCLAW_PHONE"] = "+85200000001"  # 非空让 WhatsApp 分支触发
              env["DISCORD_TARGET"] = ""
              env["NOTIFY_CHANNELS"] = "whatsapp"
              env["NOTIFY_MAX_RETRIES"] = "1"  # 单次失败即入队
              env["NOTIFY_QUEUE_DIR"] = queue_dir
              script = (
                  'source notify.sh && '
                  'notify "runtime test capture stderr" || true'
              )
              # 限 30s 防 sleep backoff 卡死（MAX_RETRIES=1 避免多次 sleep）
              proc = subprocess.run(
                  ["bash", "-c", script],
                  env=env, capture_output=True, text=True, timeout=30,
                  cwd=os.getcwd(),
              )
              combined = proc.stderr + proc.stdout
              # (a) 上游 stderr 被捕获
              assert unique_token in combined, (
                  f"notify.sh 吞掉 openclaw stderr token '{unique_token}':\n"
                  f"stderr={proc.stderr[:500]}\nstdout={proc.stdout[:200]}"
              )
              # (b) 入队文件落盘
              queued = glob.glob(os.path.join(queue_dir, "*.json"))
              assert queued, (
                  f"notify.sh 失败 3 次后未入队到 {queue_dir}:\n"
                  f"combined={combined[:500]}"
              )

  # ── 运行时治理（2026-04-08 真实 bug 驱动）──────────────────────────
  # 教训：声明层检查全过，但 cron 运行时环境不对导致推送连续失败 3 天
  # 维度跃升：从"声明一致性"到"运行时真实性"

  - id: INV-CRON-003
    name: bash-lc-enforcement
    meta_rule: MR-1
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "每个 enabled job 的 crontab 条目必须包含 bash -lc（否则 cron 环境缺少 env vars）"
    design_decision: "2026-04-08 教训：DBLP/Dream/Watchdog 无 bash -lc → OPENCLAW_PHONE 为占位号 → 推送连续失败 3 天。2026-04-11 修复匹配逻辑：原子串匹配 `script in line` 对同脚本不同参数的条目（kb_dream.sh vs kb_dream.sh --map-sources）会错误命中首条，改为 endswith + 词边界。"
    # V37.8: MR-6 合规 — 原有单层(运行时 crontab -l 解析) 在 dev 环境下完全 skip。
    # 新增声明层：V37.2+ 的 _cron_cmd_invokes 精确匹配器必须存在于 YAML 源码中
    # （防止未来重构回到子串匹配的回归），并断言 YAML 文本里既没有 `"X" in line`
    # 类的子串匹配陷阱又包含 word-boundary 字符集。
    checks:
      # declaration layer: 源码级守卫 — 精确匹配器必须存在
      - name: "INV-CRON-003/004 源码包含 _cron_cmd_invokes 精确匹配器"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: "_cron_cmd_invokes"
      - name: "INV-CRON-003/004 匹配器使用 endswith + 词边界（非子串）"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: 'cmd\.endswith\(entry\)'
      # runtime layer: 真实 crontab 解析（Mac Mini --full 模式）
      - name: "所有 enabled job 的 crontab 条目包含 bash -lc"
        check_type: python_assert
        requires_full: true
        code: |
          import re, subprocess
          from check_registry import load_yaml

          def _cron_cmd_invokes(line, entry):
              """Return True iff this crontab line's command invokes exactly this registry entry.
              Uses endswith + word-boundary to avoid false-positive on shared prefixes
              (e.g. 'kb_dream.sh' must not match 'kb_dream.sh --map-sources')."""
              parts = line.split(None, 5)
              if len(parts) < 6:
                  return False
              cmd = parts[5]
              # Strip trailing redirection pipeline
              cmd = re.split(r"\s*(?:>>|>|<|2>|\|)", cmd, maxsplit=1)[0]
              cmd = cmd.rstrip(" '\"")
              if not cmd.endswith(entry):
                  return False
              idx = len(cmd) - len(entry)
              if idx == 0:
                  return True
              return cmd[idx - 1] in "/ \t\"'"

          data = load_yaml("jobs_registry.yaml")
          crontab = subprocess.check_output(['crontab', '-l'], text=True)
          missing = []
          for job in data['jobs']:
              if not job.get('enabled') or job.get('scheduler') != 'system':
                  continue
              entry = job.get('entry', '')
              if not entry:
                  continue
              for line in crontab.splitlines():
                  if not line.strip() or line.strip().startswith('#'):
                      continue
                  if _cron_cmd_invokes(line, entry):
                      if 'bash -lc' not in line:
                          missing.append(f"{job['id']}: {entry}")
                      break
          assert not missing, f"缺少 bash -lc: {'; '.join(missing)}"

  - id: INV-CRON-004
    name: crontab-no-duplicates
    meta_rule: MR-3
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "每个完整命令（脚本+参数）在 crontab 中最多出现一次（同一脚本不同参数视为不同 job，如 kb_dream.sh vs kb_dream.sh --map-only）"
    design_decision: "2026-04-08 教训：kb_dream 有 3 个完全相同的 crontab 条目→双进程 lock contention；2026-04-10 澄清：同一脚本不同参数是合法的分离调度（Map-Reduce 分阶段执行）；2026-04-11 修复 check bug：原 `sname in l` 子串匹配导致 Reduce 条目（entry=kb_dream.sh）被 --map-sources/--map-notes 误报 x3。改为 endswith + 词边界精确匹配。"
    # V37.9.3: MR-6 补齐 — 原单层(runtime requires_full) dev 环境完全 skip。新增声明
    # 层：①INV-CRON-003/004 共享的精确匹配器源码必须在 YAML 中存在（防重构回退到
    # 子串匹配）②禁止裸 `sname in l` 子串反模式（血案回归守卫）。与 INV-CRON-003
    # declaration 层策略一致。
    checks:
      # declaration layer: 源码级守卫（与 INV-CRON-003 同源共享匹配器）
      - name: "INV-CRON-004 源码包含 _cron_cmd_invokes 精确匹配器"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: "_cron_cmd_invokes"
      - name: "INV-CRON-004 匹配器使用 endswith + 词边界（非子串反模式）"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: 'cmd\.endswith\(entry\)'
      # runtime layer: 真实 crontab 解析（Mac Mini --full 模式）
      - name: "crontab 中无完全重复的命令条目"
        check_type: python_assert
        requires_full: true
        code: |
          import re, subprocess
          from check_registry import load_yaml

          def _cron_cmd_invokes(line, entry):
              """Return True iff this crontab line's command invokes exactly this registry entry.
              See INV-CRON-003 for rationale."""
              parts = line.split(None, 5)
              if len(parts) < 6:
                  return False
              cmd = parts[5]
              cmd = re.split(r"\s*(?:>>|>|<|2>|\|)", cmd, maxsplit=1)[0]
              cmd = cmd.rstrip(" '\"")
              if not cmd.endswith(entry):
                  return False
              idx = len(cmd) - len(entry)
              if idx == 0:
                  return True
              return cmd[idx - 1] in "/ \t\"'"

          data = load_yaml("jobs_registry.yaml")
          crontab = subprocess.check_output(['crontab', '-l'], text=True)
          lines = [l for l in crontab.splitlines() if l.strip() and not l.strip().startswith('#')]
          dupes = []
          for job in data['jobs']:
              if not job.get('enabled') or job.get('scheduler') != 'system':
                  continue
              entry = job.get('entry', '')
              if not entry:
                  continue
              # Regular for-loop instead of generator: Python exec() puts
              # `def _cron_cmd_invokes` into the local scope of the exec'd code,
              # and generator expressions create their own scope that cannot see
              # enclosing function locals (only module globals). This would fail
              # with NameError: name '_cron_cmd_invokes' is not defined.
              count = 0
              for l in lines:
                  if _cron_cmd_invokes(l, entry):
                      count += 1
              if count > 1:
                  dupes.append(f"{job['id']} x{count}")
          assert not dupes, f"重复 crontab: {'; '.join(dupes)}"

  - id: INV-ENV-002
    name: cron-env-smoke-test
    meta_rule: MR-1
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "cron 环境（bash -lc）中 OPENCLAW_PHONE 必须是真实号码，非占位号"
    design_decision: "2026-04-08 教训：cron 无 bash -lc 时 OPENCLAW_PHONE 为 +85200000000（占位号），所有 WhatsApp 推送静默失败"
    # V37.8: MR-6 合规 — 原有单层(Mac Mini --full 模式 bash -lc 运行时读取)
    # 在 dev 环境下被跳过，整个 critical 不变式每天 dev 跑法都是盲区。新增声明层：
    # ① preflight_check.sh 必须把 OPENCLAW_PHONE 声明为 REQUIRED_VARS（否则连
    # 每日体检都不会拦截占位号）② YAML 源码里必须保留占位号字面量 `+85200000000`
    # 作为 runtime 比较的反例（防止有人把真实号填进 YAML 占位）
    checks:
      # declaration layer: preflight 把 OPENCLAW_PHONE 列为必需
      - name: "preflight_check.sh 声明 OPENCLAW_PHONE 为 REQUIRED_VARS"
        check_type: python_assert
        code: |
          with open("preflight_check.sh") as f:
              content = f.read()
          # REQUIRED_VARS 是一个 bash 数组，必须在数组内出现 OPENCLAW_PHONE
          import re
          m = re.search(r'REQUIRED_VARS=\((.*?)\)', content, re.DOTALL)
          assert m, "preflight_check.sh 未找到 REQUIRED_VARS 数组"
          assert "OPENCLAW_PHONE" in m.group(1), \
              "OPENCLAW_PHONE 未声明为 REQUIRED_VARS（占位号会绕过每日体检）"
      - name: "INV-ENV-002 YAML 保留占位号字面量作为反例守卫"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: '\+85200000000'
      # runtime layer: 真实 bash -lc 读取环境
      - name: "OPENCLAW_PHONE 非占位号"
        check_type: command_succeeds
        requires_full: true
        command: |
          bash -lc 'test -n "$OPENCLAW_PHONE" && test "$OPENCLAW_PHONE" != "+85200000000"'

