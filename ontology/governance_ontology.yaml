  - id: INV-JOB-HARVEST-001
    name: kb-harvest-chat-mapreduce-no-data-loss
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      kb_harvest_chat.py 每日从 proxy 对话日志提炼精华写入 KB。
      对话数据是最高质量信号源，MapReduce 保证零数据丢失。
    # V37.9.3 MR-6 补齐 — 原双 file_contains 仅声明层，runtime 补"真 import + 关键
    # 函数存在 + AST 语法合法"三重守卫。避免声明层 pattern 命中注释/文档字面量而
    # 实际函数缺失的假阳性（参考 INV-REVIEW-001 validation pattern）。
    checks:
      - name: "kb_harvest_chat.py 有 MapReduce 分块处理"
        check_type: file_contains
        file: kb_harvest_chat.py
        pattern: 'MapReduce'
      - name: "kb_harvest_chat.py 调用 kb_write 写入 KB"
        check_type: file_contains
        file: kb_harvest_chat.py
        pattern: 'kb_write'
      - name: "V37.9.3 runtime: kb_harvest_chat 模块可 import + AST 含 Map/Reduce 阶段函数"
        check_type: python_assert
        code: |
          # Runtime 层补强: AST 解析 kb_harvest_chat.py 证实"MapReduce 字样"不是
          # 注释或 docstring 而是真实函数结构。MR-4 教训: 字面量存在 != 语义生效。
          import ast
          with open("kb_harvest_chat.py", "r", encoding="utf-8") as f:
              source = f.read()
          tree = ast.parse(source)  # 语法合法性兜底
          # V37.3 教训: 避免 generator/comprehension 跨 exec 作用域
          func_names = []
          for node in ast.walk(tree):
              if isinstance(node, ast.FunctionDef):
                  func_names.append(node.name)
          # 至少存在 map/reduce/harvest 其中两类函数名片段
          hits = []
          for kw in ("map", "reduce", "harvest", "extract", "merge"):
              for fn in func_names:
                  if kw in fn.lower():
                      hits.append(kw)
                      break
          assert len(set(hits)) >= 2, (
              f"kb_harvest_chat.py AST 函数名未出现 MapReduce 语义模式: "
              f"函数 = {func_names[:10]}, 命中关键词 = {set(hits)}"
          )

  - id: INV-BACKUP-001
    name: ssd-rsync-backup-fails-loud
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      所有 cron 脚本对外挂 SSD 的 rsync 备份必须在失败时 log WARN 到 stderr，
      不得用 `2>/dev/null || true` 双层吞错。MR-4 silent-failure 在
      V37.9.4 第 14 次演出（exfat 6 天阻塞）的预防层修复。
    lesson: |
      2026-04-21 V37.9.4 血案：MOVESPEED exfat → APFS 转换暴露了 6 天 cron rsync
      静默失败盲区。19 个脚本（kb_dream/kb_save_arxiv/kb_evening/kb_inject/
      kb_review + 13 个 jobs/）统一改为 `2>&1 || echo "[XXX] WARN: SSD rsync
      failed (exit=$?)" >&2`，让未来同类故障可见。
    design_decision: |
      不抽 helper（如 rsync_to_ssd.sh）以保持 inline 简洁——19 处统一模式 grep
      可验证，违反 = 立即 audit 失败。helper 抽象在 V3 路标后期再考虑。
    checks:
      - name: "无脚本含 rsync MOVESPEED 2>/dev/null || true 反模式"
        check_type: python_assert
        code: |
          # V37.9.4: 全局扫描 .sh 禁止 rsync MOVESPEED 双层吞错反模式
          import os, re
          violations = []
          # V37.3 教训: 避免 generator 跨 exec scope，用 iterative loop
          for root, dirs, files in os.walk("."):
              if ".git" in dirs:
                  dirs.remove(".git")
              if "node_modules" in dirs:
                  dirs.remove("node_modules")
              for fn in files:
                  if not fn.endswith(".sh"):
                      continue
                  p = os.path.join(root, fn)
                  try:
                      with open(p, "r", encoding="utf-8") as f:
                          content = f.read()
                  except (IOError, UnicodeDecodeError):
                      continue
                  if re.search(r"rsync.*MOVESPEED.*2>/dev/null\s*\|\|\s*true", content):
                      violations.append(p)
          assert not violations, (
              f"反模式残留 {len(violations)} 个: {violations}\n"
              f"应改为 `2>&1 || echo \"[xxx] WARN: ...\" >&2`"
          )
      - name: "所有 SSD 备份脚本含 WARN: SSD 失败 log"
        check_type: python_assert
        code: |
          # V37.9.4: 任何含 rsync MOVESPEED 的 .sh 必须同时有 "WARN: SSD" 字样
          import os, re
          missing = []
          for root, dirs, files in os.walk("."):
              if ".git" in dirs:
                  dirs.remove(".git")
              if "node_modules" in dirs:
                  dirs.remove("node_modules")
              for fn in files:
                  if not fn.endswith(".sh"):
                      continue
                  # V37.9.26: monitor consumers reference "rsync" + "MOVESPEED"
                  # ONLY in alert message text, never invoke rsync. Skip them
                  # (same exemption as INV-INCIDENT-001 site detection logic).
                  if fn == "job_watchdog.sh":
                      continue
                  # V37.9.27: helper itself emits "WARN: SSD" string but its
                  # OWN file shouldn't be checked as a "site" — exempt.
                  if fn == "movespeed_rsync_helper.sh":
                      continue
                  p = os.path.join(root, fn)
                  try:
                      with open(p, "r", encoding="utf-8") as f:
                          content = f.read()
                  except (IOError, UnicodeDecodeError):
                      continue
                  if "rsync" in content and "MOVESPEED" in content:
                      # V37.9.27: sites that use movespeed_rsync_helper.sh delegate
                      # the WARN: SSD contract to helper internals — exempt from
                      # site-level WARN: SSD literal check (helper is single
                      # source of truth, MR-8 兑现).
                      if "movespeed_rsync_helper.sh" in content:
                          continue
                      if "WARN: SSD" not in content:
                          missing.append(p)
          assert not missing, (
              f"{len(missing)} 个 SSD rsync 脚本缺失 WARN log: {missing}"
          )
      - name: "V37.9.4 runtime: rsync 失败时真 log 到 stderr (非吞)"
        check_type: python_assert
        code: |
          # Runtime: 模拟 rsync 失败场景，验证新模式确实 log WARN 到 stderr
          # 构造一个最小 sample 使用同样的 fail-loud 模式
          import subprocess, tempfile, os
          script = '''#!/usr/bin/env bash
          # 模拟新模式（与 19 个生产脚本相同结构）
          rsync -a /nonexistent/source/ /nonexistent/dest/ 2>&1 || \
              echo "[$(basename "$0")] WARN: SSD rsync failed (exit=$?)" >&2
          '''
          with tempfile.NamedTemporaryFile(mode='w', suffix='.sh', delete=False) as f:
              f.write(script)
              tmp = f.name
          try:
              os.chmod(tmp, 0o755)
              proc = subprocess.run(
                  ["bash", tmp],
                  capture_output=True, text=True, timeout=10,
              )
              # 关键断言: stderr 包含 WARN: SSD（不再静默吞）
              assert "WARN: SSD" in proc.stderr, (
                  f"新模式未在 rsync 失败时 log 到 stderr:\n"
                  f"stderr={proc.stderr[:300]}\nstdout={proc.stdout[:300]}"
              )
              # 反例验证: 不应在 stdout（必须是 stderr，命令替换才不污染）
              assert "WARN: SSD" not in proc.stdout, (
                  f"WARN log 错误地写到 stdout 而非 stderr (会污染 cmd substitution):\n"
                  f"stdout={proc.stdout[:300]}"
              )
          finally:
              os.unlink(tmp)
      - name: "V37.9.14: 所有 SSD 备份脚本 fail-loud 分支必须调用 incident capture helper"
        check_type: python_assert
        code: |
          # V37.9.14: forensic capture — rsync-MOVESPEED 脚本必须在失败分支调用
          # $HOME/movespeed_incident_capture.sh 记录现场快照到 JSONL，防止 4/22
          # 间歇性 EPERM 无证据复发。未来新增脚本忘记加 helper 会被此守卫抓住。
          # MR-9 state-writes-go-through-helper 扩展：取证也走单一 helper 路径。
          # V37.3 教训: 用 iterative loop 而非 generator，避开 exec scope trap。
          import os
          missing = []
          for root, dirs, files in os.walk("."):
              if ".git" in dirs:
                  dirs.remove(".git")
              if "node_modules" in dirs:
                  dirs.remove("node_modules")
              for fn in files:
                  if not fn.endswith(".sh"):
                      continue
                  # V37.9.26: monitor consumers (job_watchdog.sh) reference
                  # "rsync" + "MOVESPEED" ONLY in alert text, not as production
                  # rsync sites — skip to avoid false-positive forensic checks.
                  if fn == "job_watchdog.sh":
                      continue
                  # V37.9.27: helper itself doesn't need this check
                  if fn == "movespeed_rsync_helper.sh":
                      continue
                  p = os.path.join(root, fn)
                  try:
                      with open(p, "r", encoding="utf-8") as f:
                          content = f.read()
                  except (IOError, UnicodeDecodeError):
                      continue
                  if "rsync" not in content:
                      continue
                  if "MOVESPEED" not in content:
                      continue
                  # V37.9.27: sites using movespeed_rsync_helper.sh inherit the
                  # incident capture wiring from helper internals — exempt.
                  if "movespeed_rsync_helper.sh" in content:
                      continue
                  # helper 自身 MOVESPEED 在注释里，但无 rsync → 不会进到此处
                  if "movespeed_incident_capture.sh" not in content:
                      missing.append(p)
          assert not missing, (
              f"{len(missing)} 个 SSD rsync 脚本未调用 incident capture helper: "
              f"{missing}\n建议模式: "
              f'|| {{ _rc=$?; echo "[...] WARN: SSD..." >&2; '
              f'"$HOME/movespeed_incident_capture.sh" "$_rc" "$0"; }}'
          )
      - name: "V37.9.14 runtime: helper 在 rsync 失败场景下不挂 caller"
        check_type: python_assert
        code: |
          # Runtime: 端到端模拟 — rsync 失败触发 helper，验证 caller exit 0
          # 且 JSONL 行写入成功。这是 INV-BACKUP-001 运行时层的 forensic 契约。
          import os, subprocess, tempfile, json
          helper = os.path.join(os.getcwd(), "movespeed_incident_capture.sh")
          assert os.path.isfile(helper), f"helper missing: {helper}"
          with tempfile.TemporaryDirectory() as td:
              incident_file = os.path.join(td, "incidents.jsonl")
              caller_script = os.path.join(td, "mock_caller.sh")
              with open(caller_script, "w") as f:
                  f.write(
                      '#!/usr/bin/env bash\n'
                      f'export MOVESPEED_INCIDENT_FILE="{incident_file}"\n'
                      'rsync -a /nonexistent/source/ /Volumes/MOVESPEED/KB/ 2>&1 || '
                      '{ _rc=$?; '
                      'echo "[$(basename "$0")] WARN: SSD rsync failed (exit=$_rc)" >&2; '
                      f'"{helper}" "$_rc" "$0"; '
                      '}\n'
                  )
              os.chmod(caller_script, 0o755)
              proc = subprocess.run(
                  ["bash", caller_script],
                  capture_output=True, text=True, timeout=15,
              )
              assert proc.returncode == 0, (
                  f"caller exit={proc.returncode} (helper must not break caller)"
              )
              assert "WARN: SSD" in proc.stderr, (
                  f"WARN not on stderr: {proc.stderr[:300]}"
              )
              assert os.path.isfile(incident_file), "JSONL not written"
              with open(incident_file) as f:
                  lines = [l for l in f.read().splitlines() if l.strip()]
              assert len(lines) == 1, f"expected 1 JSONL line, got {len(lines)}"
              rec = json.loads(lines[0])
              assert rec.get("caller") == "mock_caller.sh", rec
              assert rec.get("timestamp_iso"), "timestamp missing"

  - id: INV-WATCHDOG-FRESHNESS-001
    name: watchdog-line-level-timestamp-filter
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      job_watchdog.sh scan_logs() 必须按行级时间戳过滤，仅报告 24h 内错误。
      防止 tail -50 grep 模式把 13 天前已闭环的旧错误反复报告（告警噪声 = 用户疲劳）。
      MR-4 silent-failure 的反向变种：noisy false alarm（不是漏报，是过度报）。
    lesson: |
      2026-04-21 V37.9.6 12:30 watchdog 告警 12 项中 6 项是陈旧错误：
        • kb_evening 4/14-15 502（V37.8.10 已闭环）
        • openclaw_discussions 4/8 推送失败
        • openclaw_official / kb_inject gateway 1006（陈旧）
      根因：scan_logs() 只过滤文件 mtime（24h），但 tail -50 行内可能含
      13 天前错误（在持续更新但内容历史悠久的日志文件里）。
      修复：awk 行级解析 [YYYY-MM-DD ...] 时间戳，仅保留 24h 内的行 +
      跟随状态保留无时间戳的 Traceback 多行延续。
    design_decision: |
      为什么不直接清旧日志？
        - 日志保留有审计价值，不应主动截断
        - 修过滤逻辑而非数据是更稳健的设计
      为什么 awk 不用 grep？
        - grep 无法做"按时间戳条件过滤+延续行跟随"的组合
        - awk 自然支持 in_recent 状态机
      为什么 24h 不是 6h 或 72h？
        - 24h 覆盖一天 cron 周期
        - 短于 24h 会漏报夜间错误（用户次日才看告警）
        - 长于 24h 又开始引入历史噪声
    checks:
      - name: "job_watchdog.sh 含 V37.9.6 标记"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: "V37.9.6"
      - name: "job_watchdog.sh scan_logs 用 awk 过滤 cutoff_date"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: "cutoff_date"
      - name: "job_watchdog.sh awk 含 in_recent 状态机（处理 Traceback 延续行）"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: "in_recent"
      - name: "job_watchdog.sh grep 操作 recent_window 而非 raw tail"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: 'echo "\$recent_window" \| grep'
      - name: "ACL Anthology 阈值已调到 28 天 (2419200s, V37.9.8 最新)"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: "2419200"
      - name: "rss_blogs.sh 已注释掉死链 LangChain"
        check_type: python_assert
        code: |
          # 任何活跃（非注释）行不得含 blog.langchain.dev
          # exec() 上下文不能用 return，用 if 控制流
          import os
          path = os.path.join(os.getcwd(), "jobs/rss_blogs/run_rss_blogs.sh")
          if os.path.exists(path):
              with open(path, "r", encoding="utf-8") as f:
                  source = f.read()
              for line in source.split("\n"):
                  s = line.strip()
                  if s.startswith("#"):
                      continue
                  assert "blog.langchain.dev" not in s, (
                      f"LangChain RSS 还在活跃配置里: {line}"
                  )
      - name: "V37.9.6 runtime: 外部单测 test_watchdog_freshness 全过"
        check_type: python_assert
        code: |
          # Runtime: subprocess 调外部 unittest，避开 V37.3 exec scope trap
          # 12 单测覆盖：
          #   - 今日/昨日错误保留
          #   - 13 天前错误过滤（含 Traceback 多行延续）
          #   - state machine in_recent 在新旧切换时正确重置
          #   - shell 源码守卫（V37.9.6 标记/awk/cutoff/in_recent/recent_window/1209600）
          #   - LangChain 死链确实注释
          import subprocess, sys, os
          proc = subprocess.run(
              [sys.executable, "-m", "unittest", "test_watchdog_freshness", "-v"],
              capture_output=True, text=True, timeout=60, cwd=os.getcwd(),
          )
          assert proc.returncode == 0, (
              f"test_watchdog_freshness 单测失败:\n"
              f"STDOUT={proc.stdout[-500:]}\nSTDERR={proc.stderr[-1500:]}"
          )

  - id: INV-RETRY-001
    name: movespeed-rsync-uses-helper-with-jitter-and-retry
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      V37.9.27 主动修复 B 问题: V37.9.26 watchdog 第一次跑就立即抓到 24h
      19 条 incident, 真相浮现 — V37.9.4 APFS 重建只解决文件系统层 fskit
      EPERM, OS 调度层 SSD I/O 竞争仍每天 ~19 次 transient 失败影响 11 个
      KB cron jobs (60 天 silent failure, MR-4 第 18 次演出, 架构假设级).

      V37.9.27 三层主动修复:
        Phase 1 错峰 30-180s 抖动 (避多 cron 同秒触发抢 SSD I/O 总线)
        Phase 2 retry 3 次 10s/20s 指数退避 (transient EPERM 30s 内自愈)
        Phase 3 全部失败才 fail-loud + 调 movespeed_incident_capture.sh

      Helper 接口契约 (movespeed_rsync_helper.sh):
        bash $HOME/movespeed_rsync_helper.sh <caller> -- <rsync args>
      预期效果: 24h incident 数从 ~19 降到 <1 (95%+ 减少).

      所有 24 个 EXPECTED rsync site 必须用 helper, 不再用 V37.9.4/V37.9.14
      的 inline `rsync ... 2>&1 || { capture; }` 模式 (V37.9.27 完全替代).

      V37.9.31 fail-open contract 修正: helper 全 retry 失败时 exit 0 (而非
      透传 rsync exit code). 原因 — V37.9.30 EPERM 100% 持平数据后, V37.9.27
      的 exit "$EXIT_CODE" 让 20 个 set -e caller 每天被杀 mid-script (e.g.
      freight Step 8-10 / kb_dream Reduce 全部静默丢失). V37.9.31 恢复 V37.9.4-
      V37.9.26 的 inline pattern `rsync ... || echo WARN` 同款 invariant: 失败
      时通过 stderr WARN: SSD + JSONL forensic + watchdog ≥5 alert 三路 fail-
      loud, 不杀 caller. MR-4 silent-failure 第 24 次演出 — 修复 (V37.9.27
      retry helper) 引入更深的 silent failure (20 caller daily silent loss).
    lesson: |
      V37.9.4 修文件系统层不修调度层 = 误判闭环. V37.9.14 取证不告警 = 60 天
      silent failure 潜伏. V37.9.26 watchdog 主动消费 = 真相浮现. V37.9.27
      retry+jitter = 真正修复.

      MR-4 演出第 18 次新形态: **架构假设级** silent failure (前 17 次都
      在代码层). "我以为闭环了" 比 "代码 bug" 更危险, 因为整个团队基于
      错误假设继续工作 60 天.

      原则 #28 反向兑现: 修复前必答三问之"这问题之前存在吗" — 之前**以为**
      不存在 (V37.9.4 闭环), 实际**一直存在** (V37.9.14 数据从不撒谎).
      跳过这一步 = V37.9.14~26 半年时间被浪费.

      与 INV-BACKUP-001 (V37.9.4 fail-loud) + INV-INCIDENT-001 (V37.9.26
      主动告警) 形成三阶段防御: 失败时取证 → 累积时告警 → 主动修复减少
      失败. 三 INV 一起覆盖 detection → forensic → alert → recovery 完整链路.
    design_decision: |
      为什么 jitter 30-180s 而非最初设计的 5-15min?
        - 5-15min sleep 让所有 cron job 推迟 5-15min, 数据延迟太大
        - 30-180s 足以错开多 cron 同秒触发 (主问题), 平均 ~2min cron 漂移
          可接受, retry 是真正的恢复主力
      为什么 retry 3 次 10s/20s 指数退避?
        - V37.9.26 数据: transient EPERM 通常 30s 内自愈
        - 3 次 = 10s + 20s 共 30s 等待 + 3 次执行机会, 覆盖 transient 窗口
        - 退避避免在 SSD I/O 高峰持续重试加剧拥塞
      为什么独立 helper 而非 inline?
        - MR-8 单一真理源 — 20 个 site 一处定义, 不漂移
        - 单测可端到端跑 helper 行为 (24 单测覆盖)
        - 未来调整 jitter/retry 参数只改一处
        - V37.9.26 同款"独立 monitor 模块"模式横向扩展
      为什么不用 retry=5 或更多?
        - 数据: 99% 的 transient 在 30s 内恢复, 5+ 次过度
        - SSD 真正不可用时 (mounting issue) 无限 retry 反加剧问题
        - 阈值 3 是 "transient vs persistent" 的合理分界
    checks:
      # ── declaration: helper 文件 + 关键设计常量 ────────────────────
      - name: "movespeed_rsync_helper.sh 存在于 repo root"
        check_type: file_contains
        file: movespeed_rsync_helper.sh
        pattern: 'V37\.9\.27'
      - name: "helper Phase 1 jitter 30-180s 抖动"
        check_type: file_contains
        file: movespeed_rsync_helper.sh
        pattern: 'JITTER_S=\$\(\(30 \+ RANDOM % 151\)\)'
      - name: "helper Phase 2 默认 MAX_ATTEMPTS=3"
        check_type: file_contains
        file: movespeed_rsync_helper.sh
        pattern: 'MAX_ATTEMPTS="\$\{MOVESPEED_RSYNC_MAX_ATTEMPTS:-3\}"'
      - name: "helper Phase 2 默认 BACKOFF_BASE=10"
        check_type: file_contains
        file: movespeed_rsync_helper.sh
        pattern: 'BACKOFF_BASE="\$\{MOVESPEED_RSYNC_BACKOFF_BASE:-10\}"'
      - name: "helper 防御性 clamp MAX_ATTEMPTS ≤ 10"
        check_type: file_contains
        file: movespeed_rsync_helper.sh
        pattern: 'MAX_ATTEMPTS=10'
      - name: "helper Phase 3 fail-loud WARN: SSD 字面量"
        check_type: file_contains
        file: movespeed_rsync_helper.sh
        pattern: 'WARN: SSD rsync failed'
      - name: "helper Phase 3 调 movespeed_incident_capture.sh"
        check_type: file_contains
        file: movespeed_rsync_helper.sh
        pattern: 'movespeed_incident_capture\.sh'
      # V37.9.31: fail-open exit 0 — 20 caller set -e 安全
      - name: "V37.9.31 fail-open: helper 末尾 exit 0 (恢复 V37.9.4 invariant)"
        check_type: file_contains
        file: movespeed_rsync_helper.sh
        pattern: 'V37\.9\.31: fail-open exit 0'
      - name: "V37.9.31 文档说明 set -e contract"
        check_type: file_contains
        file: movespeed_rsync_helper.sh
        pattern: 'set -e contract'
      - name: "helper env override: MOVESPEED_RSYNC_NO_SLEEP (testability)"
        check_type: file_contains
        file: movespeed_rsync_helper.sh
        pattern: 'MOVESPEED_RSYNC_NO_SLEEP'
      # ── declaration: auto_deploy FILE_MAP 部署 ────────────────────
      - name: "auto_deploy.sh FILE_MAP 部署 movespeed_rsync_helper.sh"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: 'movespeed_rsync_helper\.sh\|\$HOME/movespeed_rsync_helper\.sh'
      # ── runtime: 24 单测端到端通过 ─────────────────────────────────
      - name: "RUNTIME: test_movespeed_rsync_helper.py 24 单测全过 (usage/env/success/retry/all-fail/capture/sites/source)"
        check_type: python_assert
        assertion: |
          import subprocess
          import sys
          import os
          repo_root = os.environ.get("OPENCLAW_REPO_ROOT", os.getcwd())
          test_file = os.path.join(repo_root, "test_movespeed_rsync_helper.py")
          assert os.path.exists(test_file), f"test_movespeed_rsync_helper.py 不存在: {test_file}"
          proc = subprocess.run(
              [sys.executable, test_file],
              capture_output=True, text=True, timeout=120,
              cwd=repo_root,
          )
          assert proc.returncode == 0, (
              f"test_movespeed_rsync_helper 单测失败:\n"
              f"STDOUT={proc.stdout[-500:]}\nSTDERR={proc.stderr[-1500:]}"
          )

  - id: INV-INCIDENT-001
    name: movespeed-incidents-trigger-active-alert
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      V37.9.26 主动告警升级: V37.9.14 已落地 20 处 rsync fail-loud → 写
      ~/.kb/movespeed_incidents.jsonl 取证, 但只是被动证据收集 (operator 不会
      主动 cat 看). 本 INV 守卫 watchdog 主动消费 incidents.jsonl: 24h 窗口内
      ≥5 条 incident 推 [SYSTEM_ALERT], 让 B 问题 (exfat fskit transient
      EPERM) 连续性复发立即可见, 不依赖 operator 记忆.

      集成契约:
        - movespeed_incident_monitor.py 是独立纯函数模块 (不内嵌 watchdog)
        - 阈值常量 INCIDENT_24H_THRESHOLD=5 在 watchdog 中明确定义
        - 文件不存在 + monitor 脚本不存在 → 整段 if [ -f ... ] 跳过 (静默)
        - parse_iso_to_epoch / count_recent_incidents 是 monitor 独占
          (watchdog 不应内嵌副本 — MR-8 单一真理源)
        - 36 单测覆盖 24h 窗口边界 + 阈值触发 + 损坏 JSON 容忍 + CLI FAIL-OPEN
    lesson: |
      V37.9.4 案例: MOVESPEED exfat → APFS 重建闭环 B 问题, 但 V37.9.14 收工
      时观察到 transient EPERM 仍偶发 (~1 周 18 次). V37.9.14 落地 20 处
      fail-loud + JSONL 取证作为下次复发的现场数据保全机制. 但仅取证不告警 =
      operator 永远不知道复发已发生.

      V37.9.26 升级: 从被动证据 → 主动告警链. watchdog 每小时跑 (system cron),
      读 JSONL 计 24h 内条目数, ≥5 推 [SYSTEM_ALERT] 含 24h 计数 + 最近 5 个
      caller basename. 这是 MR-4 silent-failure 的反例 — 把"漏报"变"主动报",
      又是 V37.9.6 watchdog 行级时间戳过滤的延续 (从"过度报"修到"恰当报",
      再到 V37.9.26 "升级为主动报").

      与 INV-BACKUP-001 (V37.9.4 fail-loud 写 JSONL) 是 sibling: 前者守证据
      收集发生, 后者守证据被消费产告警. 两个 INV 一起覆盖 declared → runtime
      → alert 完整链路.
    design_decision: |
      为什么 24h 窗口而非更长 (一周/一月)?
        - 24h 与 watchdog cron 频率 (每小时) 协调 — 可观察"今天异常爆发"
        - 一周窗口会让阈值需要更高 (5 条/周 = 0.7/天 = 高于噪声基线但不指示
          异常爆发); 24h 窗口 ≥5 条 = 平均 5 倍噪声基线, 信号清晰
      为什么阈值 5 而非 10 (更保守) 或 3 (更敏感)?
        - V37.9.4 案例数据: 一周 18 次 = 24h 平均 ~3 次为噪声基线
        - 5 是噪声 +2σ, 10 太迟 (一天 10 次复发已是严重故障), 3 等于噪声
      为什么独立 movespeed_incident_monitor.py 而非 watchdog 内嵌?
        - 单测可直接 import 函数 (不需 subprocess 跑 watchdog)
        - MR-8 一处真理源, 防止 watchdog 内 inline heredoc 与单测漂移
        - 未来如增第二种 monitor (e.g. ssd_smart_monitor) 可同款独立模块
    checks:
      # ── declaration: monitor 模块存在 + 关键函数定义 ─────────────────
      - name: "movespeed_incident_monitor.py 存在于 repo root"
        check_type: file_contains
        file: movespeed_incident_monitor.py
        pattern: 'def count_recent_incidents'
      - name: "monitor 模块定义 parse_iso_to_epoch 纯函数"
        check_type: file_contains
        file: movespeed_incident_monitor.py
        pattern: 'def parse_iso_to_epoch'
      - name: "monitor 模块定义 extract_caller_basename 纯函数"
        check_type: file_contains
        file: movespeed_incident_monitor.py
        pattern: 'def extract_caller_basename'
      - name: "monitor 模块定义 format_watchdog_output (pipe 分隔输出)"
        check_type: file_contains
        file: movespeed_incident_monitor.py
        pattern: 'def format_watchdog_output'
      # ── declaration: watchdog 集成 ────────────────────────────────────
      - name: "watchdog 调 movespeed_incident_monitor.py (不内嵌 heredoc)"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: 'movespeed_incident_monitor\.py'
      - name: "watchdog 阈值常量 INCIDENT_24H_THRESHOLD=5"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: 'INCIDENT_24H_THRESHOLD=5'
      - name: "watchdog 检查 INCIDENT_FILE 文件存在再调监控"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: '\[ -f "\$INCIDENT_FILE" \]'
      - name: "watchdog 检查 INCIDENT_MONITOR 脚本存在再调监控"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: '\[ -f "\$INCIDENT_MONITOR" \]'
      - name: "watchdog 阈值触发时 ALERTS+= 推送 24h 计数 + callers"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: 'MOVESPEED 24h 内.*次 rsync 失败'
      # ── declaration: auto_deploy 部署映射 ─────────────────────────────
      - name: "auto_deploy.sh FILE_MAP 部署 movespeed_incident_monitor.py"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: 'movespeed_incident_monitor\.py\|\$HOME/movespeed_incident_monitor\.py'
      # ── runtime: 36 单测端到端通过 ────────────────────────────────────
      - name: "RUNTIME: test_movespeed_incident_monitor.py 36 单测全过 (parse/extract/count/format/CLI/threshold/watchdog 集成守卫)"
        check_type: python_assert
        assertion: |
          import subprocess
          import sys
          import os
          repo_root = os.environ.get("OPENCLAW_REPO_ROOT", os.getcwd())
          test_file = os.path.join(repo_root, "test_movespeed_incident_monitor.py")
          assert os.path.exists(test_file), f"test_movespeed_incident_monitor.py 不存在: {test_file}"
          proc = subprocess.run(
              [sys.executable, test_file],
              capture_output=True, text=True, timeout=60,
              cwd=repo_root,
