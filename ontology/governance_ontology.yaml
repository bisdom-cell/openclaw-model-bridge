          )
      # === V37.9.77 enforcement (adapter ?provider=X + ROUTER_ENFORCE env feature flag) ===
      # 设计: enforcement opt-in via ROUTER_ENFORCE=on env (默认 off = V37.9.76 shadow 行为)
      # 三方契约: adapter._resolve_primary_provider / kb_dream.sh llm_call 6th 参数 / router_decide._resolve_mode
      - name: "V37.9.77 adapter._resolve_primary_provider 方法定义"
        check_type: file_contains
        file: adapter.py
        pattern: 'def _resolve_primary_provider\(self\):'
      - name: "V37.9.77 ROUTER_ENFORCE feature flag 默认 off (PoC 安全网, V37.9.78+ 评估默认 on)"
        check_type: python_assert
        assertion: |
          # V37.9.77 守卫: adapter / kb_dream / router_decide 三方都用 ROUTER_ENFORCE="off" 默认
          # 反向 sabotage 任一处 → 立即 fail
          for _path, _expected in [
              ("adapter.py", '"ROUTER_ENFORCE", "off"'),
              ("kb_dream.sh", "ROUTER_ENFORCE:-off"),
              ("router_decide.py", '"ROUTER_ENFORCE", "off"'),
          ]:
              with open(_path) as _f:
                  _src = _f.read()
              assert _expected in _src, (
                  f"INV-ROUTER-001 V37.9.77: {_path} 必须用 ROUTER_ENFORCE 默认 off"
              )
      - name: "V37.9.77 adapter 必须 strip query string 再 forward provider URL"
        check_type: python_assert
        assertion: |
          # V37.9.77 守卫: provider API 不识别 ?provider= query, 必须先 urlparse 后用 .path
          with open("adapter.py") as _f:
              _src = _f.read()
          assert "_parsed_path = urlparse(self.path)" in _src, (
              "INV-ROUTER-001 V37.9.77: 必须 urlparse self.path"
          )
          assert "_clean_path = _parsed_path.path" in _src, (
              "INV-ROUTER-001 V37.9.77: 必须用 _parsed_path.path 不含 query 拼 forward URL"
          )
      - name: "V37.9.77 kb_dream llm_call 必须接受 provider_override 第 6 参数"
