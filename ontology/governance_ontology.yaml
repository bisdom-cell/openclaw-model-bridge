  # --- 2026-04-15 新增：Dream 自引用幻觉血案（V37.8.6）---

  - id: INV-DREAM-003
    name: dream-log-cannot-pollute-cache-nor-fabricate-platform-crises
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      kb_dream.sh 必须阻断"log() 输出污染 cache → Reduce 读 cache → LLM 把内部运行时
      痕迹当外部信号编造平台危机"的幻觉链路：
        (1) log() 函数必须写到 stderr（>&2），不得写 stdout，否则
            signals=$(llm_call ...) 命令替换会把 log 输出捕获进 signals → 写入 cache。
        (2) llm_call heredoc 必须对 prompt 和 system_msg 做 surrogate 清洗
            （U+D800-U+DFFF → U+FFFD），防止 json.dump 触发 UnicodeEncodeError
            导致 body_file 截断 → adapter 返回 400 Bad JSON → 错误日志最终污染 cache。
        (3) 文件 open 必须显式指定 encoding='utf-8' 和 errors='replace' 作为第二防线。
        (4) REDUCE/CHUNK1/2/3 system prompt 必须含反污染守卫，明示禁止：
            - 把 HTTP 错误码/Python 异常/错误页 HTML/U+FFFD 片段 当作外部信号
            - 基于这些字样推断 Hugging Face / GitHub / npm 等平台状态
            - 在行动建议中针对'平台错误'（因为它们不是外部事件）给建议
    design_decision: |
      2026-04-15 03:00 血案：Dream run 出现 4 次 "Bad JSON 400" 错误（adapter.py:386），
      但 Dream 仍产出完整 "Hugging Face 平台危机" 分析，Action 建议监控 Hugging Face。
      用户察觉 Signal(Papers with Code)↔Action(Hugging Face) 主题断裂后上报。

      三层根因：
        (a) 触发器: scraped 内容含 surrogate UTF-8 → llm_call heredoc 的
            json.dump(body, f, ensure_ascii=False) 触发 UnicodeEncodeError →
            body_file 截断 → adapter.py:383 json.loads 炸 400 "Bad JSON"。
        (b) 放大器: kb_dream.sh log() 用 `echo` 写 stdout，而 signals=$(llm_call ...)
            是命令替换 → log 行被捕获进 signals → line 563/其他 cache 写入路径
            把"LLM raw response: <HTML>...Error code: 400 Bad JSON..."写进 cache file。
        (c) 掩护者: Reduce cache-only fast path 读 cache 把错误日志注入 LLM 上下文 →
            Qwen3 基于这些字样自动编造 "Hugging Face 平台 400 Bad JSON 危机" 叙事
            来合理化看到的运行时痕迹 = 原则 #23 链式幻觉 + MR-4 silent failure 复合。

      修复是结构性的：stderr 隔离 + sanitize + errors='replace' + 反污染 prompt
      四层防御，任一层都能单独阻断幻觉链（defense-in-depth）。
      meta_rule=MR-4 因为这是 silent failure 的第 7 次演出：
      4 次 LLM 失败 + 整体输出"看起来正常"+ 无任何 degraded 标记。
    blood_lessons:
      - "2026-04-15 V37.8.6: Dream log→stdout 污染 cache → LLM 编造 Hugging Face 危机；MR-4 第 7 次演出 + 原则 #23 链式幻觉实证"
    checks:
      - name: "kb_dream.sh log() 必须写 stderr（阻断 stdout 污染 cache 通道）"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'log\(\) \{ echo.*>&2; \}'
      - name: "kb_dream.sh log() 附近有 V37.8.6 血案注释"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'V37.8.6.*stderr'
      - name: "kb_dream.sh heredoc 含 _sanitize 函数（surrogate 清洗）"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'def _sanitize\(s\):'
      - name: "kb_dream.sh sanitize 覆盖 U+D800-U+DFFF 完整代理范围"
        check_type: file_contains
        file: kb_dream.sh
        pattern: '0xD800 <= ord\(c\) <= 0xDFFF'
      - name: "kb_dream.sh sanitize 用 U+FFFD (\\ufffd) 替换（不是 ?）"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "'\\\\ufffd' if 0xD800"
      - name: "kb_dream.sh sanitize 应用于 prompt"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'prompt = _sanitize\(prompt\)'
      - name: "kb_dream.sh sanitize 应用于 system_msg"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'system_msg = _sanitize\(system_msg\)'
      - name: "kb_dream.sh body_file open 用 errors='replace' 第二防线"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "errors='replace'"
      - name: "kb_dream.sh body_file open 显式 encoding='utf-8'"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "encoding='utf-8'"
      - name: "kb_dream.sh REDUCE_SYSTEM 含 V37.8.6 反污染守卫"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'V37.8.6 反污染守卫'
      - name: "kb_dream.sh REDUCE_SYSTEM 禁止引用 Bad JSON 作为外部信号"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'Bad JSON/Error code'
      - name: "kb_dream.sh REDUCE_SYSTEM 点名 Hugging Face 作为禁止编造对象示例"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'Hugging Face.*GitHub.*npm'
      - name: "kb_dream.sh CHUNK1_SYSTEM 含反污染条款"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'CHUNK1_SYSTEM="[^"]*V37.8.6 反污染'
      - name: "kb_dream.sh CHUNK2_SYSTEM 含反污染条款"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'CHUNK2_SYSTEM="[^"]*V37.8.6 反污染'
      - name: "kb_dream.sh CHUNK3_SYSTEM 含反污染条款"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'CHUNK3_SYSTEM="[^"]*V37.8.6 反污染'
      - name: "V37.8.6 runtime: sanitize 等价实现正确去除孤立代理"
        check_type: python_assert
        code: |
          # 执行与 kb_dream.sh heredoc 等价的 sanitize 逻辑
          def _sanitize(s):
              if not s:
                  return s
              return ''.join('\ufffd' if 0xD800 <= ord(c) <= 0xDFFF else c for c in s)
          # 孤立高位代理
          assert _sanitize("hello\ud800world") == "hello\ufffdworld", "high surrogate not replaced"
          # 孤立低位代理
          assert _sanitize("\udfffprefix") == "\ufffdprefix", "low surrogate not replaced"
          # 正常字符串不变
          assert _sanitize("Papers with Code 2026-04") == "Papers with Code 2026-04"
          # 代理范围外边界不误伤
          assert _sanitize("\ud7ff") == "\ud7ff", "U+D7FF 不应被替换"
          assert _sanitize("\ue000") == "\ue000", "U+E000 不应被替换"
          # sanitize 后可通过 json + utf-8 编码（原 bug 就炸在此）
          import json
          out = json.dumps({"x": _sanitize("bad\ud800char")}, ensure_ascii=False).encode("utf-8")
          assert b'\xef\xbf\xbd' in out, "U+FFFD UTF-8 bytes not in output"

  # --- 2026-04-15 新增：ontology_sources 推送格式错位血案（V37.8.7）---

  - id: INV-ONTOLOGY-001
    name: ontology-sources-parser-must-be-key-based-not-positional
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      jobs/ontology_sources/run_ontology_sources.sh 解析 LLM 输出时必须用
      separator-切块 + key-based prefix 解析，禁止严格位置 (lines[i],
      lines[i+1], lines[i+2]) + i+=3 步进。原模式在 LLM 漏一行"要点"
      或多一行空白时会**级联错位** —— 后续所有条目的 cn_title/highlight/stars
      全部错位（如 *---* 当 cn_title、价值行被当 cn_title）。
        (1) 解析器必须是独立模块 jobs/ontology_sources/ontology_parser.py
            （纯函数 parse_llm_blocks(llm_content) -> list[(str,str,str)]
            可单测，避开 V37.5 heredoc-only 不可测血案）
        (2) shell 脚本必须 `export ONTOLOGY_JOBS_DIR=$JOB_DIR` + heredoc
            内 `from ontology_parser import parse_llm_blocks`
        (3) 可执行代码层不得含 lines[i+1]/lines[i+2]/i += 3（注释里说明
            历史的字串允许保留）
        (4) auto_deploy.sh FILE_MAP 必须包含 ontology_parser.py 部署
    design_decision: |
      2026-04-15 用户 WhatsApp 收到 ontology_sources 推送出现严重错位：
      第 2 篇 cn_title 是 *---*，中文标题串到 highlight 槽，第 3 篇 cn_title
      变成 *价值：⭐⭐⭐⭐*。根因：LLM 第 2 篇漏了"要点"行，原解析器的
      i+=3 步进让所有后续条目的 (cn_title, highlight, stars) 全部右移一格。
      MR-4 silent-failure 第 8 次演出（用户察觉违和才发现）。
      meta_rule=MR-4 因为输出"看起来正常"（结构完整 6 字段都在）但
      实际语义错乱。
    blood_lessons:
      - "2026-04-15 V37.8.7: ontology_sources 位置解析 i+=3 级联污染所有后续条目；MR-4 第 8 次演出"
    checks:
      - name: "ontology_parser.py 模块存在"
        check_type: file_contains
        file: jobs/ontology_sources/ontology_parser.py
        pattern: 'def parse_llm_blocks\(llm_content'
      - name: "ontology_parser.py 用 separator 切块"
        check_type: file_contains
        file: jobs/ontology_sources/ontology_parser.py
        pattern: '_SEPARATOR_RE\.split'
      - name: "ontology_parser.py 块内 key-based 识别字段"
        check_type: file_contains
        file: jobs/ontology_sources/ontology_parser.py
        pattern: "line\\.startswith\\('中文标题'\\)"
      - name: "shell 脚本 export ONTOLOGY_JOBS_DIR"
        check_type: file_contains
        file: jobs/ontology_sources/run_ontology_sources.sh
        pattern: 'export ONTOLOGY_JOBS_DIR='
      - name: "shell heredoc import parse_llm_blocks"
        check_type: file_contains
        file: jobs/ontology_sources/run_ontology_sources.sh
        pattern: 'from ontology_parser import parse_llm_blocks'
      - name: "auto_deploy FILE_MAP 含 ontology_parser.py"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: 'jobs/ontology_sources/ontology_parser\.py'
      - name: "V37.8.7 runtime: 缺要点不级联污染后续块"
        check_type: python_assert
        code: |
          import sys, os
          sys.path.insert(0, "jobs/ontology_sources")
          from ontology_parser import parse_llm_blocks
          # 模拟用户 2026-04-15 看到的污染场景：第 2 篇缺要点
          content = (
              "中文标题：A\n要点：B\n价值：⭐⭐⭐\n"
              "---\n"
              "中文标题：D\n价值：⭐⭐⭐⭐\n"
              "---\n"
              "中文标题：E\n要点：F\n价值：⭐⭐⭐⭐⭐"
          )
          got = parse_llm_blocks(content)
          assert len(got) == 3, f"expected 3 blocks, got {len(got)}"
          assert got[0] == ("A", "要点：B", "价值：⭐⭐⭐"), f"block 0 wrong: {got[0]}"
          assert got[1] == ("D", "", "价值：⭐⭐⭐⭐"), f"block 1 cascaded: {got[1]}"
          assert got[2] == ("E", "要点：F", "价值：⭐⭐⭐⭐⭐"), f"block 2 cascaded: {got[2]}"
          # 关键反例：cn_title 不能是 ---、不能是价值行
          for i, (ct, _, _) in enumerate(got):
              assert "---" not in ct, f"block {i} cn_title 含分隔符残留: {ct}"
              assert "价值" not in ct, f"block {i} cn_title 串到价值行: {ct}"

  - id: INV-DEPLOY-003
    name: status-json-is-exempt-from-drift-sync-at-both-preflight-and-auto-deploy
    meta_rule: MR-4
    verification_layer: [declaration]
    severity: high
    declaration: |
      status.json 是 Claude Code（仓库快照）和 Mac Mini cron（每小时 runtime
      刷新）**双向写入**的 state 文件，不是静态部署产物。
      两侧都**必须豁免** drift 检测中对 status.json 的 md5 比对，否则：
        - runtime 数据被仓库快照每小时覆盖清空
        - "修复 1 个文件不一致"告警每小时推送一次，成为噪声
      但 status.json 仍须在**new-commit 同步路径**保留（Claude Code 的 intent
      变更如 priorities / unfinished / recent_changes 单向下传到 runtime）。
      这是"one-way intent flow + exempt from two-way drift detection"的契约。
    design_decision: |
      2026-04-15 V37.8.11: 用户反馈 [SYSTEM_ALERT] 每小时推送"漂移检测: 修复 1 个
      部署文件不一致"，问题存在长期 — V37.8.1 preflight_check.sh 加了 status.json
      分叉豁免，但 auto_deploy.sh 的等价 drift 循环**没有同步加**。
      V37.4.3 [SYSTEM_ALERT] 前缀让这些噪声告警从 Discord 静默区变得用户可见，
      于是"预期噪声"升级为"需要消除的噪声"。
      修复：auto_deploy.sh drift 循环加同款 `if SRC == status.json then continue`
      豁免；new-commit 路径保留同步（intent 下传）。
    blood_lessons:
      - "2026-04-15 V37.8.11: auto_deploy hourly drift 每小时告警 + 每小时覆盖 runtime status.json；V37.8.1 preflight 已修复同类问题但 auto_deploy 漏改"
    checks:
      - name: "preflight_check.sh 豁免 status.json drift"
        check_type: file_contains
        file: preflight_check.sh
        pattern: 'if \[\[ "\$SRC" == "status\.json" \]\]; then'
      - name: "preflight_check.sh 豁免含 pass 消息"
        check_type: file_contains
        file: preflight_check.sh
        pattern: 'status\.json.*豁免'
      - name: "auto_deploy.sh drift 循环豁免 status.json (V37.8.11)"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: 'V37\.8\.11.*status\.json'
      - name: "auto_deploy.sh drift 循环含 if SRC == status.json continue"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: 'if \[\[ "\$SRC" == "status\.json" \]\]; then\s+continue'
      - name: "auto_deploy.sh FILE_MAP 仍包含 status.json (new-commit 路径 intent 下传)"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: '"status\.json\|\$HOME/\.kb/status\.json"'

  - id: INV-OBSERVABILITY-001
    name: llm-error-chain-is-transparent-across-proxy-and-client
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      LLM 调用链（client → proxy:5002 → adapter:5001 → upstream LLM）中任何
      一跳返回 HTTP 错误时，真实错误原因必须透传到最下游的 client，不得在中间
      层被稀释为"HTTP 502: Bad Gateway"状态短语。
        (1) proxy_filters.py 必须定义 compose_backend_error_str(exc) 纯函数，
            对 HTTPError 读取 response body 并拼进 error 字符串（失败 fail-open）
        (2) tool_proxy.py 的 except Exception 分支必须 import 并调用
            compose_backend_error_str，不得直接 str(e)
        (3) kb_review_collect.py 必须定义 _compose_http_reason(http_error)
            纯函数（相同语义 client 侧版本）
        (4) call_llm 的 urllib.error.HTTPError 分支必须调 _compose_http_reason，
            不得直接 return f"HTTP {e.code}: {e.reason}"
        (5) 两侧 helper 都必须有 MAX_UPSTREAM_BODY_CHARS 常量控制上限
            （避免告警消息超出 WhatsApp 4000 字符限制）
        (6) test_tool_proxy.py + test_kb_review.py 各自提供回归测试锁定
    design_decision: |
      2026-04-14/15 连续 2 天 kb_evening 22:00 告警"HTTP 502: Bad Gateway"，
      用户无法从告警判断根因。Mac Mini 日志显示真实原因是 primary Qwen3
      circuit breaker OPEN + fallback gemini HTTP 429 quota exhausted。但
      adapter→proxy→client 三跳中每一跳都把上游错误 body 丢弃：
        - adapter: _send_json(502, {"error": "ALL 1 FALLBACKS FAILED: gemini 429"})
        - proxy:   urllib.error.HTTPError → str(e) → "HTTP Error 502: Bad Gateway"
                   body 从未被 e.read() 提取，wfile.write(json.dumps({"error": str(e)}))
        - client:  rc.call_llm HTTPError.reason → "Bad Gateway"，body 再次丢弃
      结果：用户告警"HTTP 502: Bad Gateway"，真实原因经过 3 次稀释完全不可见。
      MR-4 silent-failure 第 9 次演出：错误没被吞，只是内容被稀释到无意义。

      修复契约：proxy 层和 client 层都必须读 HTTPError.read() body。两层修复
      缺一不可——只改 client 只能看到 proxy 的 "HTTP Error 502"，看不到
      adapter 的 "gemini 429"。
    blood_lessons:
      - "2026-04-14/15 V37.8.10: kb_evening 22:00 连续 2 天告警'HTTP 502: Bad Gateway'，真实原因 primary 断路器 OPEN + gemini 429 quota 耗尽被三层稀释；MR-4 第 9 次演出（错误被稀释而非吞）"
    checks:
      - name: "proxy_filters.py 定义 compose_backend_error_str"
        check_type: file_contains
        file: proxy_filters.py
        pattern: 'def compose_backend_error_str\(exc\)'
      - name: "proxy_filters.py 定义 MAX_UPSTREAM_BODY_CHARS 常量"
        check_type: file_contains
        file: proxy_filters.py
        pattern: 'MAX_UPSTREAM_BODY_CHARS\s*='
      - name: "proxy_filters helper 读 exc.read() body"
        check_type: file_contains
        file: proxy_filters.py
        pattern: 'body_bytes\s*=\s*exc\.read\(\)'
      - name: "proxy_filters helper 有 fail-open 契约 (try/except)"
        check_type: file_contains
        file: proxy_filters.py
        pattern: 'return base'
      - name: "tool_proxy.py import compose_backend_error_str"
        check_type: file_contains
        file: tool_proxy.py
        pattern: 'compose_backend_error_str'
      - name: "tool_proxy.py 不重新定义 helper（MR-8: 必须 import）"
        check_type: file_not_contains
        file: tool_proxy.py
        pattern: 'def compose_backend_error_str'
      - name: "tool_proxy.py except 分支调 compose_backend_error_str"
        check_type: file_contains
        file: tool_proxy.py
        pattern: 'error_str\s*=\s*compose_backend_error_str\(e\)'
      - name: "kb_review_collect.py 定义 _compose_http_reason"
        check_type: file_contains
        file: kb_review_collect.py
        pattern: 'def _compose_http_reason\(http_error\)'
      - name: "kb_review_collect.py 定义 MAX_UPSTREAM_BODY_CHARS 常量"
        check_type: file_contains
        file: kb_review_collect.py
        pattern: 'MAX_UPSTREAM_BODY_CHARS\s*='
      - name: "kb_review call_llm HTTPError 分支调 _compose_http_reason"
        check_type: file_contains
        file: kb_review_collect.py
        pattern: 'return False, "", _compose_http_reason\(e\)'
      - name: "V37.8.10 runtime: proxy helper 真实读 HTTPError body + extract error 字段"
        check_type: python_assert
        code: |
          import sys, os, io, json
          import urllib.error
          sys.path.insert(0, ".")
          from proxy_filters import compose_backend_error_str
          # 模拟 2026-04-15 22:00 实际产生的 adapter 错误 body
          body = json.dumps({"error": "ALL 1 FALLBACKS FAILED: gemini HTTP 429"}).encode()
          fp = io.BytesIO(body)
          e = urllib.error.HTTPError("http://adapter:5001", 502, "Bad Gateway", {}, fp)
          result = compose_backend_error_str(e)
          assert "upstream:" in result, f"upstream body not extracted: {result}"
          assert "gemini" in result, f"gemini not in result: {result}"
          assert "429" in result, f"429 not in result: {result}"
      - name: "V37.8.10 runtime: kb_review helper 真实读 HTTPError body + fail-open on exception"
        check_type: python_assert
        code: |
          import sys, os, io, json
          import urllib.error
          sys.path.insert(0, ".")
          import kb_review_collect as m
          body = json.dumps({"error": "ALL 1 FALLBACKS FAILED: gemini HTTP 429"}).encode()
          fp = io.BytesIO(body)
          e = urllib.error.HTTPError("http://proxy:5002", 502, "Bad Gateway", {}, fp)
          reason = m._compose_http_reason(e)
          assert "HTTP 502" in reason
          assert "upstream:" in reason
          assert "gemini" in reason
          assert "429" in reason
          # Fail-open: e.read 抛异常也不炸
          body2 = b"whatever"
          fp2 = io.BytesIO(body2)
          e2 = urllib.error.HTTPError("http://proxy", 502, "Bad Gateway", {}, fp2)
          e2.read = lambda: (_ for _ in ()).throw(RuntimeError("boom"))
          reason2 = m._compose_http_reason(e2)
          assert "HTTP 502" in reason2, "fail-open contract violated"

  - id: INV-WA-001
    name: wa-keepalive-escalates-to-discord-on-consecutive-warn
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      wa_keepalive 连续 N 次 WARN（Gateway 不可达）必须自动升级到 Discord #alerts 告警。
      告警链不得依赖失效主体自身——Gateway 宕时 WhatsApp 也不通，必须走 Discord。
    design_decision: |
      V37.8.13 2026-04-16 血案：Gateway 宕 9 小时，wa_keepalive 每 30 分钟写 WARN 到本地日志
      却不推送任何告警。Discord 正常但用户没收到 Gateway 相关告警。MR-4 silent-failure 第 11 次演出。
    blood_lessons:
      - "V37.8.13: 告警链依赖失效主体 (WhatsApp 告警走 WhatsApp 通道 → Gateway 宕 → 告警也死)"
    checks:
      - name: "wa_keepalive.sh 有 WARN 计数器文件定义"
        check_type: file_contains
        file: wa_keepalive.sh
        pattern: "WARN_COUNT_FILE"
      - name: "wa_keepalive.sh 有升级阈值定义 (ESCALATE_FIRST)"
        check_type: file_contains
        file: wa_keepalive.sh
        pattern: "ESCALATE_FIRST"
      - name: "wa_keepalive.sh 升级路径使用 Discord"
        check_type: file_contains
        file: wa_keepalive.sh
        pattern: "DISCORD_CH_ALERTS"
      - name: "wa_keepalive.sh 包含 V37.8.13 血案注释"
        check_type: file_contains
        file: wa_keepalive.sh
        pattern: "V37.8.13"
      - name: "wa_keepalive.sh 告警消息包含恢复命令"
        check_type: file_contains
        file: wa_keepalive.sh
        pattern: "launchctl bootstrap"
      - name: "wa_keepalive.sh source env vars for Discord channel IDs"
        check_type: file_contains
        file: wa_keepalive.sh
        pattern: "source.*(bash_profile|env_shared)"
      - name: "V37.8.13 runtime: 计数器递增 + OK 重置 + Discord 告警路径存在"
        check_type: python_assert
        code: |
          src = open("wa_keepalive.sh").read()
          # 计数器递增
          assert "PREV_COUNT" in src and "+ 1" in src, "缺少计数器递增"
          # OK 重置
          import re
          lines = src.splitlines()
          found_reset = False
          for i, line in enumerate(lines):
              if "Gateway reachable" in line:
                  window = "\n".join(lines[i:i+5])
                  if '"0"' in window and "WARN_COUNT" in window:
                      found_reset = True
          assert found_reset, "成功路径缺少 WARN 计数器重置"
          # 告警不走 WhatsApp（告警链独立于失效主体）
          escalation = src[src.find("ESCALAT"):]
          assert "--channel whatsapp" not in escalation, "告警路径不应走 WhatsApp"

  - id: INV-QUIET-001
    name: quiet-alert-sends-discord-during-silence-period
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      auto_deploy.sh 的 quiet_alert() 在凌晨静默期（00-07 HKT）仅跳过 WhatsApp，
      Discord #alerts 必须始终推送。CRITICAL 告警不应被静默期吞没。
    design_decision: |
      V37.8.13 2026-04-16 血案：auto_deploy preflight 连续三次（00:20/00:48/00:52）
      检测到 Gateway :18789 不可达，但全被 [QUIET] 静默期跳过 WhatsApp + Discord 双通道
      推送。9 小时无人知道 Gateway 宕机。修复：静默期仅跳过 WhatsApp（用户在睡觉），
      Discord 始终推送（用户醒来能看到告警记录）。
    blood_lessons:
      - "V37.8.13: 凌晨静默期不分级地吞掉所有告警（CRITICAL 和 WARNING 一视同仁）"
      - "V37.8.13: 3 次 preflight FAIL 全被 [QUIET] 吞没 → 9h 完全静默"
    checks:
      - name: "quiet_alert 静默期路径包含 discord send"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: "静默期跳过WhatsApp.*Discord仍推"
      - name: "quiet_alert 包含 V37.8.13 血案注释"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: "V37.8.13"
      - name: "V37.8.13 runtime: 静默期路径有 discord 无 whatsapp"
        check_type: python_assert
        code: |
          import re
          src = open("auto_deploy.sh").read()
          match = re.search(r"quiet_alert\(\)\s*\{(.*?)\n\}", src, re.DOTALL)
          assert match, "quiet_alert 函数未找到"
          body = match.group(1)
          quiet_block = body.split("return 0")[0] if "return 0" in body else ""
          assert "discord" in quiet_block, "静默期路径缺 discord"
          assert "whatsapp" not in quiet_block, "静默期路径不应含 whatsapp"
      - name: "V37.8.13 runtime: [SYSTEM_ALERT] 前缀在 is_quiet_hours 判断之前"
        check_type: python_assert
        code: |
          import re
          src = open("auto_deploy.sh").read()
          match = re.search(r"quiet_alert\(\)\s*\{(.*?)\n\}", src, re.DOTALL)
          body = match.group(1)
          alert_pos = body.find("SYSTEM_ALERT")
          quiet_pos = body.find("is_quiet_hours")
          assert quiet_pos > alert_pos, "[SYSTEM_ALERT] 标记应在 quiet 判断之前"

  # --- V37.8.16 新增：HEARTBEAT.md 保留文件写入拦截（MR-15 落地）---

  - id: INV-HB-001
    name: heartbeat-md-reserved-file-not-llm-writable
    meta_rule: MR-15
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      HEARTBEAT.md 是 OpenClaw runtime 保留文件 — LLM 不得通过 write/edit 工具写入
      任何非注释内容。Proxy 层必须定义 RESERVED_FILE_BASENAMES 包含 "HEARTBEAT.md"
      并在 fix_tool_args 中调用 detect_reserved_file_write 拦截违规写入，将
      args.content 改写为仅含 # 注释的安全占位（保证 OpenClaw
      isHeartbeatContentEffectivelyEmpty() 返回 true）。SOUL.md 必须含规则 11
      "禁止写 HEARTBEAT.md"作为 LLM 层最终防线。
    design_decision: |
      V37.8.16 2026-04-19 血案：PA (Wei) 把 HN 告警总结写进 workspace/HEARTBEAT.md，
      13 小时后用户发消息时触发 OpenClaw heartbeat 机制，所有 WhatsApp 消息回 HEARTBEAT_OK
      被 Gateway 剥离。MR-4 silent-failure 第 12 次演出。这条不变式锁定四层联合防御：
      LLM 层（SOUL.md 规则 11）+ Proxy 层（detect_reserved_file_write）+ 数据层
      （RESERVED_FILE_SAFE_CONTENT 常量只含注释）+ 集成层（fix_tool_args 调用）。
    blood_lessons:
      - "V37.8.16: PA 不知道 HEARTBEAT.md 是 OpenClaw runtime 控制文件，当 TODO 写了三行 → 13h 静默"
      - "V37.8.16: 默认 HEARTBEAT prompt 的 'If nothing needs attention, reply HEARTBEAT_OK' 指令让 LLM 覆盖用户消息"
      - "V37.8.16: Gateway stripTokenAtEdges 剥离 12 字符 HEARTBEAT_OK → outbound 空 → 用户看不到任何回复"
    checks:
      - name: "proxy_filters.py 定义 RESERVED_FILE_BASENAMES 常量"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "RESERVED_FILE_BASENAMES"
      - name: "proxy_filters.py RESERVED_FILE_BASENAMES 含 HEARTBEAT.md"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "\"HEARTBEAT.md\""
      - name: "proxy_filters.py 定义 detect_reserved_file_write 纯函数"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "def detect_reserved_file_write"
      - name: "proxy_filters.py 定义 RESERVED_FILE_SAFE_CONTENT 安全占位"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "RESERVED_FILE_SAFE_CONTENT"
      - name: "proxy_filters.fix_tool_args 调用 detect_reserved_file_write"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "detect_reserved_file_write\\(name, args\\)"
      - name: "proxy_filters.py 包含 V37.8.16 MR-15 注释锚点"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "V37.8.16 MR-15"
      - name: "SOUL.md 含规则 11 '禁止写 OpenClaw 保留文件'"
        check_type: file_contains
        file: SOUL.md
        pattern: "禁止写 OpenClaw 保留文件"
      - name: "SOUL.md 规则 11 含 2026-04-19 血案锚点"
        check_type: file_contains
        file: SOUL.md
        pattern: "2026-04-19 血案规则"
      - name: "SOUL.md 规则 11 含 MR-15 标识"
        check_type: file_contains
        file: SOUL.md
        pattern: "MR-15"
      - name: "V37.8.16 runtime: detect_reserved_file_write 对 HEARTBEAT.md 返回 (True, ...)"
        check_type: python_assert
        code: |
          import sys, os
          sys.path.insert(0, os.getcwd())
          from proxy_filters import detect_reserved_file_write
          # 正向：workspace/HEARTBEAT.md 写入必须被检出
          blocked, reason = detect_reserved_file_write(
              "write", {"path": "/Users/bisdom/.openclaw/workspace/HEARTBEAT.md", "content": "x"})
          assert blocked, "workspace/HEARTBEAT.md 写入应被拦截"
          assert "HEARTBEAT.md" in reason, f"reason 应含 HEARTBEAT.md: {reason}"
          # 负向：正常文件不应误拦
          blocked2, _ = detect_reserved_file_write(
              "write", {"path": "/tmp/note.md", "content": "x"})
          assert not blocked2, "正常文件不应被拦截"
          # 非 write/edit 不应触发
          blocked3, _ = detect_reserved_file_write(
              "read", {"path": "~/HEARTBEAT.md"})
          assert not blocked3, "read 工具不应触发拦截"
      - name: "V37.8.16 runtime: fix_tool_args 对 HEARTBEAT.md 写入改写 content 为注释占位"
        check_type: python_assert
        code: |
          import sys, os, json
          sys.path.insert(0, os.getcwd())
          from proxy_filters import fix_tool_args, RESERVED_FILE_SAFE_CONTENT
          rj = {"choices": [{"message": {"tool_calls": [{
              "function": {
                  "name": "write",
                  "arguments": json.dumps({
                      "path": "/Users/bisdom/.openclaw/workspace/HEARTBEAT.md",
                      "content": "- 任务完成\n- 下一步监控"
                  })
              }
          }]}}]}
          modified = fix_tool_args(rj)
          assert modified, "fix_tool_args 应改写"
          args = json.loads(rj["choices"][0]["message"]["tool_calls"][0]["function"]["arguments"])
          assert args["content"] == RESERVED_FILE_SAFE_CONTENT, \
              f"content 应被替换为 SAFE_CONTENT，实际: {args['content'][:80]}"
          assert "任务完成" not in args["content"], "PA 原写入内容应被清除"
      - name: "V37.8.16 runtime: RESERVED_FILE_SAFE_CONTENT 只含 # 注释行（isHeartbeatContentEffectivelyEmpty=true）"
        check_type: python_assert
        code: |
          import sys, os
          sys.path.insert(0, os.getcwd())
          from proxy_filters import RESERVED_FILE_SAFE_CONTENT
          for line in RESERVED_FILE_SAFE_CONTENT.split("\n"):
              s = line.strip()
              if not s:
                  continue
              assert s.startswith("#"), \
                  f"SAFE_CONTENT 含非注释行 {line!r} — 会让 HEARTBEAT.md 变成 actionable"

  # --- V37.8.14 新增：8 个 uncovered job 治理覆盖（MRD-CRON-001 gap closure）---

  - id: INV-JOB-HEALTH-001
