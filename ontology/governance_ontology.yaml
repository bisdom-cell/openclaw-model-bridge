      - name: "V37.9.77 router_decide._resolve_mode 函数定义 + mode 字段动态化"
        check_type: python_assert
        assertion: |
          # V37.9.77 守卫: mode 字段必须由 _resolve_mode() 动态决定, 不能硬编码 "shadow"
          with open("router_decide.py") as _f:
