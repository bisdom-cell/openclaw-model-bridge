  # ── V37.9.58-hotfix3: INV-WATCHDOG-SELF-001 ──────────────────────────
  - id: INV-WATCHDOG-SELF-001
    name: monitor-must-self-alarm-on-silent-abort
    meta_rule: MR-19
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      job_watchdog.sh 自身必须满足三个自监控契约 (V37.9.58-hotfix3 血案立案):

      (1) **awk multibyte 容错**: 所有 awk pipe 必须 LC_ALL=C + `|| true` 防止
          macOS bsd awk 处理 surrogate / 无效 UTF-8 时 NameError abort 整脚本.
      (2) **ERR trap 主动告警**: set -e 触发 abort 前必须有 trap ERR handler
          推送 [SYSTEM_ALERT] 到 Discord, 让 watchdog 自身死亡可见.
      (3) **Canary heartbeat 推送**: EXIT trap 在正常完成时写
          ~/watchdog_canary.json + 当 ALERTS 为空时推一条 "alive" 到 Discord,
          让长时 silent 可被外部检测.

      血案 (2026-05-12 V37.9.58-hotfix3 立案): watchdog 5/5 16:30 起因
      `awk: towc: multibyte conversion failure on: '?'` 错误 + set -eo pipefail
      + 没 ERR trap = 静默 abort 7 天. 期间 hf_papers / s2 / rss_blogs /
      github_trending lockdir 累计残留, MOVESPEED 24h 21 次 rsync 失败累积告警,
      SLO p95 54s 严重超阈值告警, KB 摘要 29h 未更新告警 — 全部 silent.
      用户 5/12 视角发现"今天只收到 HN+HF"才暴露 watchdog 自身死亡.
      详 ontology/docs/cases/watchdog_silent_abort_case.md (V37.9.59 候选)
    # MR-6 合规: declaration (源码字面量) + runtime (subprocess 真跑 watchdog 验证)
    checks:
      # declaration layer
      - name: "watchdog awk 必须 LC_ALL=C 防 multibyte abort"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: 'LC_ALL=C awk'
      - name: "watchdog awk pipe 必须有 `|| true` 容错 (V37.9.58-hotfix3)"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: '2>/dev/null \|\| true\)'
      # V37.9.63: 接受 helper 模式 (V37.9.63 抽公共) — alternation 用 python_assert 双路径
      - name: "watchdog 必须有 ERR trap handler (inline OR V37.9.63 helper)"
        check_type: python_assert
        assertion: |
          import os
          repo = os.getcwd()  # V37.9.118 日落法 #30: 单一源 (chdir 后==_PROJECT_ROOT), 替代 abspath+ternary
          with open(os.path.join(repo, "job_watchdog.sh"), "r", encoding="utf-8") as f:
              content = f.read()
          # 接受任一形态:
          #   (legacy) inline _watchdog_fatal_handler 函数定义 + trap 字面量
          #   (V37.9.63 helper) source cron_monitor_fatal_handler.sh + trap _cron_monitor_fatal_handler
          has_inline = (
              "_watchdog_fatal_handler" in content
              and "trap '_watchdog_fatal_handler" in content
          )
          has_helper = (
              "source" in content
              and "cron_monitor_fatal_handler.sh" in content
              and "trap '_cron_monitor_fatal_handler" in content
          )
          assert has_inline or has_helper, (
              f"INV-WATCHDOG-SELF-001: watchdog 必须有 ERR trap handler. "
              f"inline 模式 (legacy V37.9.58-hotfix3) 或 V37.9.63 helper 模式 任一即可. "
              f"has_inline={has_inline}, has_helper={has_helper}"
          )
      - name: "ERR trap 必须推送 [SYSTEM_ALERT] 关键字 (silent abort 变 loud; inline OR V37.9.63 helper)"
        check_type: python_assert
        assertion: |
          import os
          repo = os.getcwd()  # V37.9.118 日落法 #30: 单一源 (chdir 后==_PROJECT_ROOT), 替代 abspath+ternary
          watchdog_path = os.path.join(repo, "job_watchdog.sh")
          with open(watchdog_path, "r", encoding="utf-8") as f:
              content = f.read()
          # V37.9.58-hotfix3 inline 模式: watchdog 自身含 [SYSTEM_ALERT] watchdog FATAL 字面量
          inline_alert = "[SYSTEM_ALERT] watchdog FATAL" in content
          # V37.9.63 helper 模式: watchdog source helper + helper 自身含 [SYSTEM_ALERT] 字面量
          if not inline_alert:
              helper_path = os.path.join(repo, "cron_monitor_fatal_handler.sh")
              uses_helper = (
                  "source" in content and "cron_monitor_fatal_handler.sh" in content
              )
              helper_has_alert = False
              if uses_helper and os.path.exists(helper_path):
                  with open(helper_path, "r", encoding="utf-8") as f:
                      helper_content = f.read()
                  helper_has_alert = "[SYSTEM_ALERT]" in helper_content
              assert uses_helper and helper_has_alert, (
                  f"INV-WATCHDOG-SELF-001: watchdog 必须把 silent abort 变 loud. "
                  f"inline 模式 (含 '[SYSTEM_ALERT] watchdog FATAL') 或 V37.9.63 helper 模式 "
                  f"(source helper + helper 自身含 '[SYSTEM_ALERT]') 任一即可. "
                  f"inline_alert={inline_alert}, uses_helper={uses_helper}, helper_has_alert={helper_has_alert}"
              )
      - name: "EXIT trap 必须写 watchdog_canary.json (canary 文件)"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: 'watchdog_canary.json'
      - name: "EXIT trap 必须在 ALERTS=0 时推 alive canary (元监控)"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: 'watchdog alive'
      - name: "STALE_LOCK_DIRS 必须含 rss_blogs (V37.9.58-hotfix3 补齐 5 jobs)"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: '/tmp/rss_blogs\.lockdir'
      - name: "STALE_LOCK_DIRS 必须含 github_trending"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: '/tmp/github_trending\.lockdir'
      - name: "STALE_LOCK_DIRS 必须含 ai_leaders_x"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: '/tmp/ai_leaders_x\.lockdir'
      - name: "V37.9.58-hotfix3 marker 在源码 (历史追溯)"
        check_type: file_contains
        file: job_watchdog.sh
        pattern: 'V37.9.58-hotfix3'
      # runtime layer: 真跑单测套件
      - name: "RUNTIME: test_watchdog_self_monitoring 全套通过"
        check_type: python_assert
        assertion: |
          import subprocess, os, sys
          repo_root = os.getcwd()  # V37.9.118 日落法 #30: 单一源 (chdir 后==_PROJECT_ROOT), 替代 abspath+ternary
          result = subprocess.run(
              [sys.executable, "test_watchdog_self_monitoring.py"],
              cwd=repo_root, capture_output=True, text=True, timeout=60
          )
          assert result.returncode == 0, (
              f"INV-WATCHDOG-SELF-001 单测违反:\n"
              f"stdout=\n{result.stdout}\n\nstderr=\n{result.stderr}\n"
              f"血案: V37.9.58-hotfix3 立案 — watchdog 不能 silent abort"
          )

  - id: INV-CRON-MONITOR-001
    name: cron-monitor-scripts-must-have-err-trap
    meta_rule: MR-19
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      所有 cron 类聚合监控脚本启用 set -e* 时必须注册 trap ERR handler 主动推送
      [SYSTEM_ALERT], 防止 silent abort 累积告警 invisible (V37.9.60 MR-19 框架化推广)。

      MR-19 治理对象 (4 个):
        - job_watchdog.sh             ← V37.9.58-hotfix3 立案的标杆 (already compliant)
        - governance_audit_cron.sh    ← V37.9.60 加入 (set -euo + 推送 alerts)
        - daily_ops_report.sh         ← V37.9.60 加入 (set -eo + ops 报告聚合)
        - auto_deploy.sh              ← V37.9.60 加入 (set -euo + 高频 2min cron)

      MR-19 不适用 (轻量 probe / heartbeat writer / user-interactive 诊断):
        - wa_keepalive (V37.9.59 LOG_FRESHNESS_JOBS 已通过 log mtime 监控)
        - cron_canary (本身就是 heartbeat writer)
        - health_check (周报无 set -e, 不属 silent abort 类)
        - preflight_check (user-interactive 诊断, fail-fast 给用户看是预期行为)

      上游血案 (2026-05-12 V37.9.58-hotfix3): watchdog 自身因 macOS bsd awk multibyte
      + set -eo pipefail + 无 ERR trap 静默 abort 7 天累积告警全部 silent. 单点立 MR-19
      时只把 job_watchdog 升级为合规, V37.9.60 把 err_trap_handler 契约横向推广到所有
      cron 类聚合监控避免新血案复演.

      V37.9.60 修复细节 (3 个脚本):
        1. set -e* → set -eE* (加 -E errtrace 让 function 内 fail 也触发 ERR trap,
           V37.9.58-hotfix4 教训 — bash 默认作用域陷阱)
        2. 定义 _<script>_fatal_handler 函数 (推送 [SYSTEM_ALERT] + 三层 FAIL-OPEN:
           notify.sh / openclaw 直发 / 本地 .openclaw_alerts.log)
        3. trap '_<script>_fatal_handler $LINENO' ERR 注册

