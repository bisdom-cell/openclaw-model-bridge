      # ── declaration layer (Python AST/grep 级深度检查) ─────────────────
      - name: "run_rss_blogs.sh 执行代码不得含'技术深度文章'占位符 (跳过注释)"
        check_type: python_assert
        assertion: |
          # V37.9.36 反模式守卫: 占位符 fallback 不得出现在执行代码中
          # 跳过 # 开头的 shell 注释行允许文档描述反模式 (V37.5 同款模式)
          src_path = "jobs/rss_blogs/run_rss_blogs.sh"
          with open(src_path, encoding="utf-8") as f:
              content = f.read()
          for lineno, line in enumerate(content.splitlines(), start=1):
