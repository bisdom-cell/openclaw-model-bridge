        pattern: '"V37.9.51"'
      - name: "V37.9.51 ALIGNED_SCRIPTS 6 个目标脚本路径 (Sub-Stage 4b batch)"
        check_type: python_assert
        code: |
          import re
          src = open("ontology/llm_cron_audit.py", encoding="utf-8").read()
          # V37.9.51 Sub-Stage 4b 6 个脚本必须都出现在 ALIGNED_SCRIPTS dict 中
          required_paths = [
              "jobs/rss_blogs/run_rss_blogs.sh",
              "jobs/dblp/run_dblp.sh",
              "jobs/arxiv_monitor/run_arxiv.sh",
              "jobs/github_trending/run_github_trending.sh",
              "jobs/ai_leaders_x/run_ai_leaders_x.sh",
              "jobs/hn_watcher/run_hn_fixed.sh",
          ]
          for path in required_paths:
              assert path in src, f"V37.9.51: {path} 必须在 llm_cron_audit.py 中声明"
          # 这 6 个脚本应映射到 V37.9.51 (而非历史 V37.9.40/41/43/44 等)
          # V37.9.100: 用 regex 验证映射值, 不用 importlib —
          #   importlib.util.module_from_spec + exec_module 在 exec() 环境下 @dataclass
          #   (llm_cron_audit.py:78) 触发 'NoneType has no __dict__'. regex 直接读 dict 字面量更稳.
          for path in required_paths:
              m = re.search(re.escape(path) + r'"\s*:\s*"([^"]+)"', src)
              v = m.group(1) if m else None
              assert v == "V37.9.51", f"V37.9.51: {path} 应映射 V37.9.51, 实际 {v!r}"
      - name: "ALIGNED_SCRIPTS 含 V37.5 kb_review 锚点"
