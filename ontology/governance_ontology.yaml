# governance_ontology.yaml — 系统治理不变式本体 v3（验证深度分层）
#
# 核心问题："什么东西坏了我们会发现不了？"
#
# v1 → v2: 从"描述性三元组"升级为"可执行三元组"
# v2 → v3: 从"平面检查"升级为"验证深度三层模型"
#   - 2026-04-07 教训：22 个声明-实际断裂，全在声明层
#   - 2026-04-08 教训：声明层 12/12 全过，WhatsApp 推送却静默失败 3 天
#     根因：只查"代码写了什么"(声明层)，不查"运行时环境对不对"(运行时层)
#
# 验证深度三层模型（Verification Depth Model）：
#   Layer 1 — Declaration（声明层）："代码/配置说了 X 吗？"
#     file_contains, file_not_contains, python_assert(静态)
#     能查：代码级不一致
#     盲区：代码正确但从未被执行
#
#   Layer 2 — Runtime（运行时层）："X 在执行时真的发生了吗？"
#     env_var_exists, command_succeeds, python_assert(subprocess)
#     能查：环境和执行时不一致
#     盲区：执行正确但结果错误
#
#   Layer 3 — Effect（效果层）："X 达到了预期目的吗？"
#     E2E验证：消息真的到达？数据不只新鲜还正确？
#     能查：端到端失败（组件各自正常但整体不工作）
#     盲区：未来的探索方向
#
# 每个不变式标注 verification_layer，让 governance 自我意识盲区深度。
# MR-6 要求关键不变式覆盖 ≥2 层。
# MRD-LAYER-001 自动发现只有单层覆盖的不变式。
#
# 检查类型（check_type）：
#   python_assert  — 执行 Python 代码，assert 不抛异常 = pass
#   file_contains  — 检查文件是否包含指定 pattern（正则）
#   file_not_contains — 检查文件不包含指定 pattern
#   env_var_exists — 检查环境变量非空（需 --full 模式，bash -lc）
#   command_succeeds — 执行 shell 命令，exit code 0 = pass
#
# 使用方式：
#   python3 ontology/governance_checker.py              # dev 模式
#   python3 ontology/governance_checker.py --full        # Mac Mini（含 env/crontab）
#   python3 ontology/governance_checker.py --json        # JSON 输出
#
# 教训来源：
#   2026-04-07 对抗审计 — 22 个声明-实际断裂点
#   2026-04-08 运行时层发现 — 声明全过但推送失败 3 天

# ═══════════════════════════════════════════════════════════════════════
# 1. 元概念（Meta-Concepts）
# ═══════════════════════════════════════════════════════════════════════
meta_concepts:
  Declaration:
    description: "系统中任何可验证的断言"
    sources: [CLAUDE.md, jobs_registry.yaml, config.yaml, status.json]

  Enforcement:
    description: "让声明在运行时真正生效的代码"

  Verification:
    description: "证明声明和执行一致的可执行检查"

  # v3 新增：验证深度分层
  VerificationDepth:
    description: "检查在哪个深度层工作 — 越深越接近真实"
    layers:
      declaration:
        depth: 1
        question: "代码/配置说了 X 吗？"
        check_types: [file_contains, file_not_contains, python_assert]
        catches: "代码级不一致（pattern 缺失、字段缺失、导入缺失）"
        blind_spot: "代码正确但从未被执行（cron 环境不同、PATH 不同）"
        lesson: "2026-04-07: 12/12 声明检查全过"

      runtime:
        depth: 2
        question: "X 在执行环境中真的发生了吗？"
        check_types: [env_var_exists, command_succeeds]
        catches: "执行环境不一致（env vars 缺失、python3 损坏、crontab 漂移）"
        blind_spot: "执行正确但结果错误（发送成功但目标号码是占位号）"
        lesson: "2026-04-08: bash -lc 缺失导致 OPENCLAW_PHONE 为占位号，推送 3 天失败"

      effect:
        depth: 3
        question: "X 达到了预期目的吗？"
        check_types: [log_activity_check]  # MRD-NOTIFY-002 首个效果层检查
        catches: "端到端失败（各组件正常但整体不工作）"
        blind_spot: "需要外部反馈（用户确认收到消息）"
        lesson: "2026-04-09: ontology 频道声明+运行时全 OK 但从未收到消息——驱动首个 effect 检查"

# ═══════════════════════════════════════════════════════════════════════
# 2. 元规则（Meta-Rules）
# ═══════════════════════════════════════════════════════════════════════
meta_rules:
  - id: MR-1
    name: every-declaration-has-enforcement
    description: "每个声明必须有对应的运行时执行代码"
    lesson: "2026-04-07: MAX_TOOLS 在 config_loader 定义但从未被 import"

  - id: MR-2
    name: every-enforcement-has-verification
    description: "每个执行代码必须有测试/审计验证其正确性"

  - id: MR-3
    name: every-declaration-change-propagates
    description: "声明变更必须传播到所有执行层"
    lesson: "2026-04-07: ArXiv registry 0 8,20 但 crontab 仍是 0 */3"

  - id: MR-4
    name: silent-failure-is-a-bug
    description: "任何操作失败必须有可观测信号"
    lesson: "2026-04-07: 6 个 DISCORD_CH_* 为空时推送静默消失"

  - id: MR-5
    name: health-fields-have-freshness-guarantee
    description: "每个健康状态字段必须有刷新机制和陈旧度检测"
    lesson: "2026-04-07: security_score 无时间戳，从不自动刷新"

  - id: MR-6
    name: critical-invariants-need-depth
    description: "severity=critical 的不变式必须有 ≥2 层验证深度（声明层+运行时层）"
    lesson: "2026-04-08: 声明层 12/12 全过但 DBLP/Dream WhatsApp 推送连续失败 3 天。单层检查给出虚假的安全感。"

  - id: MR-7
    name: governance-execution-is-self-observable
    description: |
      治理系统自身是一等运行时代码，必须遵守它强制执行的所有规则，包括 MR-4。
      任何 check 层可能出现的状态（pass/fail/skip/error）都必须在汇总层有明确的
      观察路径——不允许在聚合时被"透明化"。治理的汇总行必须不会说谎。
    lesson: |
      2026-04-11: governance_checker.print_results() 仅统计 status=="fail"，
      status=="error" 被 ✅ 汇总行完全吞掉。INV-CRON-003/004 连续数次 NameError
      崩溃，汇总行持续显示"所有不变式成立"。这是"观察者的自我盲区"：治理系统
      没有把自己当被治理对象。详见 ontology/docs/cases/governance_silent_error_case.md

  - id: MR-8
    name: copy-paste-is-a-bug-class
    description: |
      跨 job/模块复制相似逻辑 = 引入 bug 类。修复一处其他地方仍然带病运行，
      新增字段需要 N 处同步更新，任何一处忘记同步就成为静默漂移源。正确做法是
      把公共原语提取为可 import 的模块，只允许通过"差异注入"（函数参数、
      配置传参、依赖注入）扩展行为，禁止 fork-then-modify。
      对这条规则的正向兑现 = 新 job 直接 `import X as rc` 而不是复制 500 行。
    lesson: |
      2026-04-11: V37.5 kb_review_collect.py 被 V37.6 kb_evening_collect.py
      直接 import 复用（load_sources_from_registry/extract_recent_sections/
      collect_notes/collect_sources/call_llm 零重复），只覆写 evening-specific
      的 prompt 结构 + 1-day 窗口 + WA header。这是 kb_evening 三年来第一次
      不靠"文件名前 80 字"伪摘要——靠的是拒绝 copy-paste。同场演出 V37.6 P0-2:
      14 个 RSS/cron job 各自独立 `>> sources/*.md`，每次架构升级都要改 14 处，
      V37.6 统一到 kb_append_source.sh helper。MR-8 是 MR-9 的上位法则。

  - id: MR-9
    name: state-writes-go-through-helper-not-raw-redirect
    description: |
      shell `>>` 直写持久化状态文件（~/.kb/sources/*.md、index.json、seen.txt
      等任何跨进程/跨 cron 共享的 state 文件）必须走一个强制 dedup / 并发锁 /
      契约的 helper（kb_append_source.sh、kb_write.sh 等），禁止 job 里出现
      裸的 `echo ... >> "$KB_SRC"`、`cat >> "$INDEX"`、`printf >> "$STATE"`。
      理由：state 文件的写入语义（append / upsert / idempotent-section /
      atomic-replace）不能交给每个 caller 自己理解，否则：
        (a) 同一 cron 一天跑多次 → 重复 section 污染（如 ontology_sources 10:00/20:00）
        (b) 并发写 → 内容交错损坏（没有 flock）
        (c) 架构升级时 14 个 caller 要改 14 次（14 个 H2-dedup 补丁都要复制粘贴）
        (d) 单个 caller 遗漏迁移 → 静默退回旧行为（V37.6 run_discussions.sh 第 16 处漏网）
      helper 的契约必须声明（且自测）：幂等性 / 并发安全 / section 标记 /
      SLOT_TAG 支持（同日多 run） / 失败时 exit ≠ 0 让 caller fail-fast。
    enforcement:
      - "INV-SRC-001 声明层：扫 jobs/*/run*.sh 不得出现 `>> \"$KB_SRC\"` 或 `>> .*sources/.*\\.md`"
      - "INV-SRC-001 运行时层：扫 15 个 enabled source-producing jobs 必须调用 kb_append_source.sh"
      - "新增 source-producing job 必须在 jobs_registry.yaml 声明 kb_source_file 且 grep 确认 helper 调用存在"
    derivative_invariants: [INV-SRC-001, INV-DEDUP-001, INV-DEDUP-002]
    blood_lessons: |
      2026-04-11 V37.6: 438 行 sources 污染（多个 cron 在 `## $DAY` 下重复追加同一条目，
      滚动窗口内一条论文出现 N 次），根因是 14 个 cron job 各自独立 `>> sources/*.md`，
      没有统一 helper。修复引入 kb_append_source.sh + SLOT_TAG，但 run_discussions.sh
      第 16 处漏网（MR-4 第 5 次演出），直到 V37.7 双跑审计才发现。
      结论：这不是"14 个 caller 每个都要记得调 helper"的纪律问题，而是 ontology
      必须禁止裸 `>>` 直写 state 文件的架构问题——让 CI/governance 自动拦截，
      不靠程序员记忆。MR-9 是 MR-4 "silent-failure-is-a-bug" 的上游预防层。

  - id: MR-10
    name: understand-before-fix
    description: |
      看到报错/失败时，禁止直接开始"修"。必须先回答三个问题：
        (1) 这个问题之前存在吗？如果之前不存在，那是我的改动引入的，不是系统的 bug。
        (2) 是我的哪个改动引入的？精确定位因果链，不猜测。
        (3) 最小修复方案是什么？不引入新概念、新模式、新复杂度。
      三个问题答不上来 = 还没理解问题，禁止动手。
      每次"修复"都可能制造下一个 bug——连锁修复（fix → new bug → fix → new bug）
      是最危险的系统破坏模式，因为：
        (a) 每层修复增加系统复杂度
        (b) 新复杂度创造新的故障面
        (c) 用户被迫反复手动测试
        (d) 最终修复的总成本远超最初问题
      MR-10 是 MR-4 (silent-failure) 和 MR-6 (depth) 的上位原则——在写代码之前
      截断"不理解就动手"的冲动。与原则 #26 (异常分析宪法) 互为表里：#26 说"画图先于修复"，
      MR-10 说"理解先于画图"。
    enforcement:
      - "CLAUDE.md 原则 #28 声明三问检查"
      - "异常分析宪法（原则 #26）要求因果链架构图在修复之前输出"
    blood_lessons: |
      2026-04-13 V37.8.3: preflight 一个部署同步问题（~/auto_deploy.sh 未跟上仓库更新）
      被误诊为"缺少 FILE_MAP 配置条目"，触发 5 轮连锁修复：
        Round 1: 加 preflight/job_smoke_test 到 FILE_MAP → 引入 HOME 部署拓扑
        Round 2: 加 auto_deploy.sh 双目标部署 → 引入从未有过的一源两目标模式
        Round 3: 加 SCRIPT_DIR HOME 检测 → Round 1 的"修复"制造了此 bug
        Round 4: 改 FILE_MAP parser dict→list → Round 2 的"修复"制造了此 bug
        Round 5: 给 job_smoke_test.sh 加同样的 SCRIPT_DIR 检测
      原始问题只需 `cp ~/openclaw-model-bridge/auto_deploy.sh ~/auto_deploy.sh`。
      4 层新复杂度 × 用户 5 次 Mac Mini 手动测试 = 最贵的一次 `cp` 命令。
      951 个单测全部通过但无一能暴露部署拓扑问题——dev 环境 (Linux/root) 没有
      HOME 部署拓扑，SCRIPT_DIR 永远指向仓库目录。这不是"测试不够"的问题，
      而是"不理解就动手"的问题——如果 Round 1 时先问"之前为什么能通过"，
      就不会走上 5 轮连锁修复的歧路。

  - id: MR-11
    name: shell-function-output-must-go-to-stderr-if-not-returned-value
    description: |
      shell 函数内的诊断/日志/状态输出 (log / debug / status / warn) 必须写到 stderr
      （`>&2`），**不得写 stdout**。原因：调用方经常用命令替换 `RESULT=$(func ...)`
      捕获函数的 stdout 作为"返回值"。如果 log 也写 stdout，它会污染 RESULT，
      然后被当作业务数据向下游传递。
      只有函数的"真正返回值"（被调用方需要捕获的字符串）才应该写 stdout。
      所有其他输出一律 `>&2`。
    violation_patterns:
      - '^\s*(log|debug|status|warn|info)\(\)\s*\{\s*echo\s+.*[^&]2?\s*[^>&]\s*\}$'  # log 函数 echo 不带 >&2
      - 'echo\s+"\[.*\]"\s*$'  # 时间戳日志行结尾无重定向（heuristic）
    enforcement:
      - "CLAUDE.md 原则待立项（V37.8.8 候选）"
      - "governance runtime python_assert 扫所有 shell 函数定义"
    blood_lessons: |
      2026-04-15 V37.8.6 Dream 血案：kb_dream.sh:109 `log() { echo "[$TS] dream: $1"; }`
      写 stdout。Map 循环用 `signals=$(llm_call ...)` 命令替换捕获 stdout。llm_call
      失败时 log() 发出的 "LLM raw response: <HTML>Error code: 400 Bad JSON..."
      错误日志被捕获进 `$signals` 变量 → 写入 cache → Reduce LLM 读 cache →
      基于错误字样编造"Hugging Face 平台危机"推送给用户。
      **一个 `>&2` 就阻断了整条幻觉链。** 这证明 MR-11 不是纪律问题，而是架构硬规则。

  - id: MR-12
    name: llm-output-parser-must-be-key-based-not-positional
    description: |
      解析 LLM 文本输出的代码**不得用严格位置索引**（`lines[i]` / `lines[i+1]` /
      `lines[i+2]` / `i += N` / `content.split()[0/1/2]`）。LLM 输出永远不能假设
      格式严格遵守——模型偶尔会：
        - 漏一行（如漏"要点："）
        - 多一行空白
        - 保留 prompt 序号（"文章1：..."）
        - 把分隔符 (---) 放错位置
        - 用变体前缀（"标题:"/"中文标题："）
      任何位置依赖的解析器都会因这些偏差**级联错位**，污染所有后续条目。

      **允许的模式**（按推荐度排序）：
        1. **JSON/YAML schema 校验**：让 LLM 返回结构化 JSON，validate schema
        2. **key-based prefix dict**：`line.startswith('字段名：')` 识别字段
        3. **语义 state-machine**：用特征字符（⭐/---/:) 界定块边界 + pending_*
           状态机 + 完整块触发后 reset
        4. **正则直接提取**：`re.search(r'字段:\s*(.+)', content)`

      **强制要求**（所有模式都必须满足）：
        - 每个字段缺失时必须有 sentinel 默认值（`pending_title or ''`）
        - 输出层必须有兜底（`cn_title = paper['title']` 用原始数据作 fallback）
        - 每块相互独立，单块缺字段不影响其他块（无级联）

    violation_patterns:
      - 'lines\[i\s*[+]\s*[0-9]+\]'           # lines[i+N] 位置索引
      - '^\s*i\s*\+=\s*[0-9]+\s*$'             # i += N 固定步进（arxiv 的 state-machine 不会出现这个）
      - 'content\.split\([^)]*\)\[[0-9]+\]'   # split()[0/1/2] 固定索引
    enforcement:
      - "CLAUDE.md 原则待立项（V37.8.8 候选）"
      - "governance runtime python_assert 扫所有 LLM 输出解析 heredoc"
    blood_lessons: |
      2026-04-15 V37.8.7 ontology_sources 格式错位血案：
      `run_ontology_sources.sh:300-313` 用严格位置 `lines[i], lines[i+1], lines[i+2]`
      + `i += 3` 步进。LLM 第 2 篇漏一行"要点"就让所有后续条目的 (cn_title,
      highlight, stars) 全部右移一格——用户 WhatsApp 看到 cn_title 显示为
      `*---*` 和 `*价值：⭐⭐⭐⭐*`。修复：抽到独立模块 ontology_parser.py
      按 separator 切块 + 块内 key-based prefix 解析，单块缺行不影响其他块。

      V37.8.7 同日扫描所有 15 个 LLM 输出解析器，发现 **7 个论文类 job**
      (arxiv/semantic_scholar/hf_papers/dblp/pwc/acl_anthology/github_trending
       + rss_blogs) 已用 state-machine key-based + fallback 模式，是 MR-12
      合规的参考实现。ai_leaders_x 用 pure dict key-based。run_hn_fixed 用
      JSON + 正则 fallback。其余脚本 LLM 输出作为 markdown 整段用（不抽字段）。

      **MR-12 与 MR-4 (silent-failure) 的关系**：MR-4 是"问题分类"（输出看起来
      正常但语义错乱就是 bug），MR-12 是"防御机制"（不用严格位置解析就能从
      架构层规避这类 silent-failure）。

  - id: MR-13
    name: error-chain-must-preserve-upstream-cause-across-layers
    description: |
      跨组件错误传播链中，每一跳必须保留上游的真实错误原因（至少包含 HTTP 状态码 +
      error body 的 key 字段），不得只传递本层的泛化状态码或异常类型名。

      典型违反：
        - adapter 返回 `{"error": "ALL FALLBACKS FAILED: gemini 429"}`
          → proxy `except Exception as e: str(e)` 只拿 "HTTP Error 502: Bad Gateway"
          → client `e.reason` 再次丢弃 body
          → 用户告警只看到 "HTTP 502" 无法判断根因

      合规做法：
        - HTTPError 捕获时调 `e.read()` 读 body + 解析 JSON error 字段
        - 构造错误消息时拼接 `"HTTP {code}: {reason} | upstream: {body_summary}"`
        - body 超长时截断到 MAX_UPSTREAM_BODY_CHARS（不是丢弃）
        - `e.read()` 本身抛异常时 fail-open 返回基础信息（不炸）

      MR-13 与 MR-4 (silent-failure) 的关系：MR-4 检测"错误被完全吞没"，
      MR-13 检测"错误被报出但原因被稀释到信息密度为零"——用户看到告警但
      无从判断根因，误以为可观测性工作正常。这是 MR-4 的更隐蔽变种。
    enforcement:
      - "INV-OBSERVABILITY-001 声明+运行时层：proxy compose_backend_error_str 读 body + 截断 + fail-open"
      - "INV-OBSERVABILITY-001 client 侧：kb_review_collect._compose_http_reason 镜像语义"
      - "新增跨组件错误路径时必须验证：下游能否从告警消息中定位上游真实原因"
    derivative_invariants: [INV-OBSERVABILITY-001]
    blood_lessons: |
      2026-04-14/15 V37.8.10: kb_evening 连续 2 天 22:00 告警 "HTTP 502: Bad Gateway"，
      用户看到告警但无法判断根因。Mac Mini 证据显示真实原因是 primary Qwen3 breaker OPEN
      + gemini HTTP 429 quota 耗尽，但 adapter→proxy→client 三跳每跳丢弃 upstream body：
        跳 1: adapter _send_json(502, {"error": "ALL 1 FALLBACKS FAILED: gemini 429"})
        跳 2: proxy str(HTTPError) → "HTTP Error 502: Bad Gateway"（从未调 e.read()）
        跳 3: client e.reason → "Bad Gateway"（body 再次丢弃）
      三层稀释让 "gemini 429 quota 耗尽" 变成 "502"——信息密度从完整原因变为零。
      MR-4 第 9 次演出新形态："错误被发现但原因不可见"。

  - id: MR-14
    name: alert-path-must-not-depend-on-failing-subject
    description: |
      告警路径不得依赖被监控的对象本身。如果对象 X 宕机，用于告警 X 宕机的
      通道必须独立于 X。否则告警和被监控对象同生共死 = 死循环。

      典型违反：
        - Gateway 宕 → WhatsApp 不通 → 用 WhatsApp 告警 Gateway 宕 = 死循环
        - 数据库宕 → 告警写数据库 → 告警也丢
        - 网络断 → 用同一网络推送告警 → 告警发不出

      合规做法：
        - 监控 Gateway → 用 Discord（独立于 Gateway）告警
        - 监控单通道 → 用其他通道告警
        - 关键基础设施 → 至少两条独立告警路径

      MR-14 与 MR-4 (silent-failure) 的关系：MR-4 是"发现静默故障的元分类"，
      MR-14 是"阻止告警本身成为静默故障的架构规则"。当告警路径依赖失效主体时，
      故障不仅静默，而且连"本该发现故障"的机制也一起死了。
    enforcement:
      - "INV-WA-001 声明层：wa_keepalive 告警路径强制走 Discord（不经 Gateway/WhatsApp）"
      - "INV-QUIET-001 声明层：quiet_alert 静默期仅跳过 WhatsApp，Discord 始终推送"
      - "新增监控/告警机制的设计评审必须回答：告警路径是否独立于被监控对象？"
    derivative_invariants: [INV-WA-001, INV-QUIET-001]
    blood_lessons: |
      2026-04-16 V37.8.13: Gateway 宕 9 小时完全静默。wa_keepalive 每 30 分钟
      检测到 Gateway 不可达（18 次 WARN），但告警路径只写日志不推送。auto_deploy
      preflight 三次检测到 Gateway CRITICAL 失败，但凌晨静默期同时跳过了 WhatsApp
      和 Discord。job_watchdog 的告警虽然走 notify.sh 双通道（WhatsApp 失败但
      Discord 成功），但 watchdog 自身 08:30 运行时竟然没检出 Gateway 不可达。
      最终用户靠人工对比 WhatsApp(空) vs Discord(满) 才发现 — 9 小时的系统级
      观察力黑洞，核心原因就是"告警链依赖了失效主体"。

  - id: MR-15
    name: reserved-files-must-not-be-writable-by-llm
    description: |
      任何被底层 runtime（OpenClaw / Gateway / Proxy / Adapter）赋予特殊语义的
      文件路径，不得暴露给 LLM 的 write/edit 工具作为无约束写入目标。LLM 不知道
      这些文件的 runtime 语义，随手写入会触发静默故障链路。

      典型违反：
        - LLM 把"任务完成"写进 HEARTBEAT.md → OpenClaw heartbeat 激活 → 所有用户
          消息被 LLM 按 HEARTBEAT_OK 指令覆盖 → Gateway stripTokenAtEdges 剥离 →
          用户完全静默（V37.8.16 血案）
        - LLM 把日志写进 AGENTS.md / CLAUDE.md 等 workspace 保留文件 → 改变下次
          session 加载上下文 → 行为漂移

      合规做法（四层联合防御）：
        1. 声明层：维护 RESERVED_FILES 明细表（路径 + 语义 + 违规后果）
        2. 行为层：SOUL.md 等 LLM system prompt 明确列出"禁止写"+血案注释
        3. Proxy 拦截层：检测到写入保留文件时改写 args.content 为安全占位 +
           [SYSTEM_ALERT] 日志，让 LLM 的写入成为 no-op
        4. 测试层：单测覆盖每条保留文件路径 + 每种 path alias（file/file_path/filepath）

      MR-15 与 MR-4 (silent-failure) 的关系：MR-4 是"问题分类"（静默故障是 bug），
      MR-15 是"上游预防层"（别让 LLM 碰能制造静默故障的 runtime 文件）。MR-4 问
      "发生了什么静默"，MR-15 问"凭什么 LLM 能够触发静默"。

      MR-15 与 MR-8 (copy-paste-is-a-bug-class) / MR-9 (state-writes-go-through-helper)
      的关系：MR-8/MR-9 约束源码层；MR-15 约束 LLM 调用层。三者共同覆盖"人/机/源码"
      三个边界。
    enforcement:
      - "INV-HB-001 声明层：proxy_filters.RESERVED_FILE_BASENAMES 含 HEARTBEAT.md + fix_tool_args 集成 detect_reserved_file_write()"
      - "INV-HB-001 运行时层：真实调用 fix_tool_args 构造 HEARTBEAT.md 写入场景，断言 content 被改写为安全占位"
      - "新增 OpenClaw 保留文件时必须同时更新 RESERVED_FILE_BASENAMES + SOUL.md + 测试"
    derivative_invariants: [INV-HB-001]
    blood_lessons: |
      2026-04-19 V37.8.16: PA (Wei) 处理 HN 告警对话时，调用 write 工具把
      "[SYSTEM_ALERT] HN热帖抓取已恢复" / "任务完成" / "下一步监控" 写进
      ~/.openclaw/workspace/HEARTBEAT.md（PA 当 TODO 笔记文件名用）。13 小时后
      用户开始发 WhatsApp 消息时，OpenClaw heartbeat 机制（auth-profiles.js:48796）
      检测到 HEARTBEAT.md 非空非注释（isHeartbeatContentEffectivelyEmpty=false），
      runKind=heartbeat 激活，system prompt 变成默认的 "Read HEARTBEAT.md ...
      If nothing needs attention, reply HEARTBEAT_OK"。Qwen3 严格执行指令 + 看到
      HEARTBEAT.md 里"任务完成/下一步监控"判定"无需关注"，对每条用户消息都回
      "HEARTBEAT_OK"（12 字符）。Gateway stripTokenAtEdges 剥离 12 字符 → outbound
      空 → 用户完全看不到 PA 回复。proxy 日志 22:09-23:04 每次 TEXT=12 稳定印证。
      MR-4 silent-failure 第 12 次演出——这次不是错误被吞，是 LLM 正确响应系统
      prompt 却误读了其适用范围。详见 heartbeat_md_pa_self_silencing_case.md。

