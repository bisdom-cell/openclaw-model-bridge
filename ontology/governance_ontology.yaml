  - id: INV-JOB-HARVEST-001
    name: kb-harvest-chat-mapreduce-no-data-loss
    meta_rule: MR-4
    verification_layer: [declaration]
    severity: high
    declaration: |
      kb_harvest_chat.py 每日从 proxy 对话日志提炼精华写入 KB。
      对话数据是最高质量信号源，MapReduce 保证零数据丢失。
    checks:
      - name: "kb_harvest_chat.py 有 MapReduce 分块处理"
        check_type: file_contains
        file: kb_harvest_chat.py
        pattern: 'MapReduce'
      - name: "kb_harvest_chat.py 调用 kb_write 写入 KB"
        check_type: file_contains
        file: kb_harvest_chat.py
        pattern: 'kb_write'
# ═══════════════════════════════════════════════════════════════════════
# 4. 可执行元规则（Phase 0）— 自动发现缺失不变式
#    只扫描结构化数据源，不解析自然语言
#    误报 → warn（非 fail），不阻塞 CI
# ═══════════════════════════════════════════════════════════════════════
meta_rule_discovery:

  - id: MRD-CRON-001
    meta_rule: MR-3
    name: "每个 enabled system job 应有调度治理覆盖"
    description: |
      扫描 jobs_registry.yaml 中所有 enabled + scheduler=system 的 job，
      检查每个 job 的脚本名是否出现在某个 INV-* 的 checks 中。
      未覆盖的 job = 潜在的声明-执行断裂盲区。
    scan_source: jobs_registry.yaml
    scan_filter: "enabled == true and scheduler == 'system'"
    match_against: "invariants[*].checks[*].code 或 checks[*].pattern"
    severity_when_missing: warn  # 不阻塞，只提醒
    rationale: |
      今天的 ArXiv 漂移就是因为 arxiv_monitor 没有对应的不变式。
      如果当时有这条元规则，新增 job 时就会被提醒"需要加治理覆盖"。

  - id: MRD-ENV-001
    meta_rule: MR-1
    name: "每个 needs_api_key=true 的 job 应有环境变量验证"
    description: |
      扫描 registry 中 needs_api_key=true 的 job，
      检查 preflight_check.sh 是否验证了对应的 API key。
    scan_source: jobs_registry.yaml
    scan_filter: "enabled == true and needs_api_key == true"
    match_against: "preflight_check.sh 中的环境变量检查列表"
    severity_when_missing: warn

  - id: MRD-NOTIFY-001
    meta_rule: MR-4
    name: "每个使用 notify.sh 的脚本应有对应的 topic 频道"
    description: |
      扫描所有 .sh 文件中调用 notify 的 --topic 参数，
      检查每个 topic 是否在 notify.sh 的路由表中有对应。
    scan_source: "*.sh files"
    scan_filter: "grep 'notify.*--topic'"
    match_against: "_notify_discord_target_for_topic() case 分支"
    severity_when_missing: warn

  - id: MRD-ERROR-001
    meta_rule: MR-4
    name: "推送脚本不应静默吞掉发送错误"
    description: |
      扫描所有包含 openclaw message send 的 .sh 文件，
      检查 stderr 是否被 >/dev/null 2>&1 吞掉。
      静默吞错误 = MR-4 违反（silent failure is a bug）。
    scan_source: "*.sh files"
    scan_filter: "grep 'message send.*>/dev/null 2>&1'"
    match_against: "每个 send 调用的 stderr 应被捕获或记录"
    severity_when_missing: warn
    lesson: "2026-04-09: notify.sh 吞掉 stderr → WhatsApp 失败3天无诊断"

  - id: MRD-NOTIFY-002
    meta_rule: MR-4
    name: "每个 Discord 频道必须有 caller，且 Mac Mini 上最近 7 天有推送活动"
    description: |
      效果层（Layer 3）两段检查（V37.8 重写）：
        1. source layer（dev + full）：扫描 jobs/*/run_*.sh + *.sh，每个 topic
           至少要有一个 caller — 要么是 `--topic T`（通过 notify.sh 路由），
           要么是 `DISCORD_CH_<T_upper>`（直接 openclaw message send 调用）。
           同时接受两种路径，因为 32 个 job 中 28 个不经过 notify.sh。
        2. activity layer（仅 --full 且存在 ~/.kb 时）：扫描 notify_queue/*.json
           和 jobs/*/cache/*.log 的 mtime，检查源码里有 caller 的 topic 最近
           7 天是否还在被实际调用。只对"源码有 caller 但运行时静默"的 topic
           报警，避免在原实现里 28 个 bypass 日志误报为 silent。
      原实现的致命缺陷：只 grep `--topic X` 字符串，28 个 bypass notify.sh 的
      caller 永不产生该字样 → ontology/tech/freight 等频道被误报 silent。
    scan_source: "jobs/*/run_*.sh + *.sh (source), ~/.kb/notify_queue + ~/jobs/*/cache/*.log (activity, --full only)"
    scan_filter: "source: `--topic T` 或 `DISCORD_CH_<T_upper>` 任一存在; activity: 7 天内 mtime"
    severity_when_missing: warn
    lesson: |
      2026-04-09: ontology 频道配置完整但从未收到推送——效果层空白导致盲区。
      2026-04-11 (V37.8): 只 grep --topic 字符串的检测器产生 false positive，
      因为 28/32 个 caller bypass notify.sh 直接走 DISCORD_CH_<X>，需要接受
      两种 caller 形式才能反映真实源码拓扑。

  - id: MRD-LAYER-001
    meta_rule: MR-6
    name: "severity=critical 的不变式应有 ≥2 层验证深度"
    description: |
      扫描所有 severity=critical 的不变式，检查 verification_layer 是否包含
      ≥2 个层（如 [declaration, runtime]）。单层覆盖的 critical 不变式 = 虚假安全感。
    scan_source: "governance_ontology.yaml invariants"
    scan_filter: "severity == 'critical' and len(verification_layer) < 2"
    severity_when_missing: warn
    lesson: "2026-04-08: 声明层 12/12 全过但推送失败 3 天——单层检查的虚假安全感"

  - id: MRD-LOG-STDERR-001
    meta_rule: MR-11
    name: "shell 的 log/debug/status/warn 函数必须写 stderr（不污染 stdout）"
    description: |
      扫描所有 shell 脚本，找 log()/debug()/status()/warn()/info()/notice() 等
      诊断函数定义，检查 echo 输出是否 >&2 重定向到 stderr。

      合规模式：
        log() { echo "..." >&2; }              # echo 行带 >&2
        log() { echo "..."; } >&2              # 函数整体后置 >&2
        log() {
            local ts=$(date)
            echo "[$ts] $1" >&2
        }

      违规模式（MR-11 违反）：
        log() { echo "..."; }                  # echo 写 stdout
        log() {
            echo "$1"                          # 无 >&2
        }

      调用方常用 `RESULT=$(func ...)` 命令替换捕获 stdout。如果 log 写 stdout，
      log 行会污染 RESULT → 被当作业务数据向下游传递（cache / LLM context）。
    scan_source: "**/*.sh (except test_*.sh)"
    scan_filter: "函数名 in {log, debug, status, warn, info, notice, err, err_log}"
    severity_when_missing: warn
    lesson: |
      2026-04-15 V37.8.6 Dream 血案：kb_dream.sh `log() { echo ...; }` 写 stdout，
      `signals=$(llm_call ...)` 命令替换把 LLM 失败日志捕获进 signals → cache →
      Reduce LLM 上下文 → 编造"Hugging Face 平台危机"推送。一个 `>&2` 阻断整条
      幻觉链，证明 MR-11 是架构硬规则。

  - id: MRD-LLM-PARSER-POSITIONAL-001
    meta_rule: MR-12
    name: "LLM 输出解析器不得用严格位置索引（lines[i+N] / i += N / split()[N]）"
    description: |
      扫描 LLM 调用脚本（jobs/*/run_*.sh 内嵌 Python heredoc + kb_*.py/sh +
      run_hn_fixed.sh + jobs/**/*.py），找三种位置索引反模式：

        1. lines[i+N]                     # 按偏移读下一行
        2. i += N                          # 固定步进
        3. var.split()[N]                  # 按固定索引取分割结果

      其中 var ∈ {content, text, response, result, output, raw, llm_content}
      以减少噪音（普通代码里的 .split()[0] 不会被匹配）。

      跳过（避免噪音）：
        - 注释行（# / //）
        - unittest 断言行（assertNotIn / assertRaises 刻意列反模式作反例）
        - 文档字符串行
        - test_*.py 测试文件（会故意包含反模式检测）

      允许的解析模式（按推荐度）：
        1. JSON/YAML schema 校验
        2. key-based prefix dict（line.startswith('字段：')）
        3. 语义 state-machine（pending_* 累积器 + ⭐/--- 特征字符块边界）
        4. 正则直接提取（re.search(r'字段:\s*(.+)')）
    scan_source: "jobs/*/run_*.sh + kb_*.{py,sh} + run_hn_fixed.sh + jobs/**/*.py"
    scan_filter: "regex: lines\\[i\\+N\\] | i += N | var.split()[N]"
    severity_when_missing: warn
    lesson: |
      2026-04-15 V37.8.7 ontology_sources 格式错位血案：`lines[i], lines[i+1],
      lines[i+2]` + `i += 3` 步进，LLM 漏一行"要点"就让所有后续条目 cn_title/
      highlight/stars 全部右移一格级联错位 → 用户 WhatsApp 看到 *---* 和
      *价值：⭐⭐⭐⭐* 当 cn_title。修复：抽到 ontology_parser.py 按 separator
      切块 + key-based prefix，单块缺行不影响其他块。

  - id: MRD-RESERVED-FILES-001
    meta_rule: MR-15
    name: "OpenClaw runtime 保留文件必须登记在 RESERVED_FILE_BASENAMES"
    description: |
      扫描 OpenClaw dist/*.js 里的 runtime 文件名语义声明（如
      `params.files.filter(f => f.name === "HEARTBEAT.md")`），
      确保所有被赋予特殊语义的文件都登记在 proxy_filters.py 的
      RESERVED_FILE_BASENAMES 中，让 LLM 的 write/edit 工具对其自动拦截。

      扫描模式：
        1. `f.name === "X.md"`             # 严格等值（heartbeat 源码模式）
        2. `file.name === "X.md"`          # 同上变体
        3. `\.name\s*===\s*"([A-Z_]+\.md)"` # 大写 + _ 的 md 文件名（惯例）

      跳过（避免噪音）：
        - 普通文本文件名（如 README.md 通常是用户文档非 runtime 语义）
        - 路径片段（含 / 的不算纯 basename）

      dev 环境（OpenClaw dist 不存在）→ skip
      Mac Mini --full 模式 → 真实扫描 /opt/homebrew/lib/node_modules/openclaw/dist/*.js
    scan_source: "/opt/homebrew/lib/node_modules/openclaw/dist/*.js (Mac Mini only)"
    scan_filter: "匹配 f.name === / file.name === 字面模式"
    severity_when_missing: warn
    lesson: |
      2026-04-19 V37.8.16 PA 自残 HEARTBEAT.md 血案：PA 用 write 工具把
      "任务完成"写进 workspace/HEARTBEAT.md，13h 后 OpenClaw heartbeat
      机制激活让用户消息被 HEARTBEAT_OK 吞掉。RESERVED_FILE_BASENAMES 当时
      不存在，audit 完全无知。MR-15 立案 + INV-HB-001 防御单个文件，
      MRD-RESERVED-FILES-001 是第二步跃迁——从"人类手动登记"升级为
      "扫 OpenClaw 源码自动发现新保留文件"，未来 OpenClaw 升级引入新保留
      文件（如 AGENTS.md / BOOTSTRAP.md）会被 audit 立即报警。

  - id: MRD-PUSH-ROUTE-001
    meta_rule: MR-4
    name: "所有推送调用必须走 notify.sh 或已知白名单脚本"
    description: |
      扫描所有 shell 脚本中的 `openclaw message send` 直接调用，禁止绕过
      notify.sh 统一路由层（否则 [SYSTEM_ALERT] 标记、Discord 双通道、重试
      队列等治理机制都会被 bypass）。

      白名单（允许直接 send 的脚本）：
        - notify.sh 自己（是路由层实现）
        - 少数历史 job 的 topic-specific sender（按 jobs_registry 声明）

      违反模式：
        新建任何 shell 脚本 A.sh 调 `openclaw message send` 但不在白名单
        → 绕过 notify.sh → [SYSTEM_ALERT] 前缀不会被注入 / Discord 通道
        不会被触发 / 失败重试队列不会记录

      历史上类 job 有合法直推路径（run_hn_fixed.sh / freight_watcher 等）
      已迁移或在白名单中。新增 rogue pusher 是本 MRD 的检测目标。
    scan_source: "所有 *.sh（排除 test_*.sh）"
    scan_filter: "grep 'openclaw message send' 且不在白名单"
    severity_when_missing: warn
    lesson: |
      Route B C15 (2026-04-20) 对抗性审计：新建 chaos_rogue_pusher.sh 直接调
      `openclaw message send --channel whatsapp "rogue"` 完全绕过 notify.sh。
      audit 当时无任何检测手段。MRD-PUSH-ROUTE-001 补上这个维度，未来任何
      rogue 推送脚本会被扫到 warn。

  - id: MRD-SILENT-EXCEPT-001
    meta_rule: MR-4
    name: "Python 代码不得使用裸 except 或 except Exception: pass 静默吞错误"
    description: |
      扫描所有 Python 文件的 try/except 块，禁止以下反模式：
        1. `except:` (裸 except 捕获所有异常包括 SystemExit/KeyboardInterrupt)
        2. `except Exception:` 后立即 `pass` (静默吞所有 Exception)
        3. `except BaseException:` 后立即 `pass` (同上)

      允许模式：
        - `except SpecificError as e: log.error(e)` — 有具体类型 + 日志
        - `except Exception: return fallback_value` — 有降级处理 + 非 pass
        - `except: raise` — re-raise 虽然裸但不 silent

      跳过（避免噪音）：
        - 测试代码 (`test_*.py`) 中的 `except ... pass` 合法（某些 fixture）
        - `except ImportError: pass` 常见用于可选依赖探测（允许）
        - 注释行中的反模式（不执行）
    scan_source: "所有 *.py（排除 test_*.py / __pycache__ / .git）"
    scan_filter: "AST 扫描 try/except 块"
    severity_when_missing: warn
    lesson: |
      Route B C11 (2026-04-20) 对抗性审计发现：adapter.py 末尾注入
      `try: x=1/0; except: pass` 裸吞错模式后，audit 完全抓不到。
      MR-4 silent-failure 的静默失败很多源自"裸 except pass"，但历史
      血案都只修具体实例（如 V37.8.10 observability 透明度），从未
      普适化为"所有代码的裸 except 都是嫌疑"。MRD-SILENT-EXCEPT-001
      把这个模式升级为 CI 级扫描。

  - id: MRD-ALERT-INDEPENDENCE-001
    meta_rule: MR-14
    name: "监控脚本的告警通道不得依赖被监控对象自身"
    description: |
      扫描监控脚本（wa_*.sh / *keepalive*.sh / *watchdog*.sh），检查其告警
      路径是否走独立于被监控对象的通道。典型违反：监控 WhatsApp 健康的脚本
      用 WhatsApp 自己发告警（Gateway 宕则 WhatsApp 不通，告警发不出）。

      规则矩阵：
        脚本名前缀 / pattern    禁止的告警通道
        wa_*.sh / *whatsapp*   --channel whatsapp (告警必须走 Discord 或其他)
        *gateway*.sh           gateway 依赖的通道 (告警走 Discord)
        discord_*.sh (如有)    --channel discord

      检测策略：
        1. 识别脚本监控对象（脚本名前缀 / grep 关键词）
        2. 检测告警路径（grep `--channel X` / `openclaw message send X`）
        3. 如果告警通道 ∈ 监控对象 fate chain → warn

      白名单豁免：监控脚本的"升级"路径（escalation）必须走独立通道，但"成功
      路径"或"探测"可以走被监控通道（如 wa_keepalive 的探测本身必须走 WhatsApp
      才能验证存活）。只检测"告警"关键字附近的通道选择。
    scan_source: "wa_*.sh, *keepalive*.sh, *watchdog*.sh"
    scan_filter: "识别脚本监控对象 + 扫告警路径通道选择"
    severity_when_missing: warn
    lesson: |
      2026-04-16 V37.8.13 Gateway 宕 9h 静默血案：wa_keepalive 每 30min 探测
      Gateway 不可达（18 次 WARN）但告警路径只写本地日志不推送。修复后
      wa_keepalive 连续 2 次 WARN → Discord #alerts。MR-14 立案 + INV-WA-001
      锁定 wa_keepalive.sh 单个脚本，MRD-ALERT-INDEPENDENCE-001 是第二步跃迁——
      从"锁 wa_keepalive 一个脚本"升级为"扫所有监控脚本的告警路径"，未来新增
      监控脚本（如 discord_keepalive.sh / gateway_watchdog_v2.sh）违反告警路径
      独立原则会被 audit 立即发现。

