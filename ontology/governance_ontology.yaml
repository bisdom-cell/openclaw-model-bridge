  # ── V37.9.100: INV-GOV-FIELD-001 (治理执行器 assertion 字段 bug 防再漂移 meta-guard) ──
  - id: INV-GOV-FIELD-001
    name: python-assert-checks-must-not-be-vacuous
    meta_rule: MR-7
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      V37.9.100 治理执行器血案: governance_checker._exec_python_assert 历史只读
      check.get("code"), 但 67 个 python_assert (跨 21 INV) 写成 assertion: 字段 →
      exec("") vacuous pass. 治理报"✅ 所有不变式成立"但 67 个 check 从未真执行
      (含 2 critical: INV-DREAM-003 dream 反污染 / INV-WATCHDOG-SELF-001 watchdog 自监控).
      由 INV-DREAM-CROSS-DOMAIN-001 立案的反向验证暴露 (sabotage 没被抓). 这是教科书级
      MR-4 silent-failure + MR-7 治理自观察盲区 — 讽刺: 一个 MR-7 INV 暴露了治理执行器
      自身的 MR-7 盲区. 修复: _check_code(check) helper 读 code OR assertion 双字段
      (单一真理源, MR-8). 本 meta-guard 守 (1) 执行器读双字段不退回 code-only
      (2) 无 vacuous python_assert (每个经 _check_code 非空) — 本可一开始就抓住整个 bug 类.
    checks:
      - name: "执行器 _check_code helper 读 code OR assertion 双字段 (file_contains)"
        check_type: file_contains
        file: ontology/governance_checker.py
        pattern: 'check\.get\("code"\) or check\.get\("assertion"'
      - name: "_exec_python_assert 用 _check_code (不退回 check.get(\"code\") only) (python_assert)"
        check_type: python_assert
        code: |
          src = open("ontology/governance_checker.py", encoding="utf-8").read()
          idx = src.find("def _exec_python_assert")
          assert idx != -1, "INV-GOV-FIELD-001: _exec_python_assert 必须存在"
          body = src[idx:idx + 600]
          assert "_check_code(check)" in body, (
              "INV-GOV-FIELD-001: _exec_python_assert 必须用 _check_code(check) 读双字段, "
              "不得退回 check.get('code') only (V37.9.100 血案: 67 check vacuous pass)"
          )
      - name: "无 vacuous python_assert check (每个 code+assertion 非空) (python_assert)"
        check_type: python_assert
        code: |
          import yaml
          data = yaml.safe_load(open("ontology/governance_ontology.yaml", encoding="utf-8"))
          vacuous = []
          for inv in data.get("invariants", []):
              for c in inv.get("checks", []):
                  if c.get("check_type") == "python_assert":
                      code_val = c.get("code") or c.get("assertion") or ""
                      if not str(code_val).strip():
                          vacuous.append(inv.get("id", "?") + " :: " + str(c.get("name", "?"))[:40])
          assert not vacuous, (
              f"INV-GOV-FIELD-001: {len(vacuous)} 个 vacuous python_assert "
              f"(code+assertion 都空 → exec('') silent pass): {vacuous[:5]}"
          )
      - name: "V37.9.100 INV-GOV-FIELD-001 marker (file_contains)"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: 'INV-GOV-FIELD-001'

