          #   部分失败标 [LLM_DEGRADED] + RSS 摘要 fallback (绝不写"技术深度文章"静默占位符).
          src = open("jobs/rss_blogs/run_rss_blogs.sh", encoding="utf-8").read()
          assert "empty_content" in src, "缺少空内容检测 (LAST_LLM_FAIL_REASON=empty_content)"
          assert "[LLM_DEGRADED]" in src, "失败篇必须标 [LLM_DEGRADED] (不静默)"
          assert "技术深度文章" not in src, "INV-RSSBLOGS-001: 严禁静默占位符 '技术深度文章'"

      # ── runtime layer (subprocess 真跑端到端验证) ─────────────────────
      - name: "RUNTIME: 复现 2026-05-07 18:00 血案场景 — LLM 502 响应触发 fail-fast 检测"
        check_type: python_assert
