                          "idx": i, "content": "", "failed": True,
                          "fail_reason": "HTTP Error 502",
                      }, ensure_ascii=False) + "\n")
              subprocess.run(
                  [sys.executable, "-c", emit_code, articles_file, results_file,
                   "2026-05-07", msg_file],
