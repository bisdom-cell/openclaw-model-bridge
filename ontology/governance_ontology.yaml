        file: ontology/docs/cases/movespeed_tcc_sandbox_blood_case.md
        pattern: "/usr/sbin/cron"
      - name: "V37.4.3 案例加 V37.9.80 修正备注 (FDA 方向当时判定错)"
        check_type: file_contains
        file: ontology/docs/cases/pa_alert_contamination_case.md
        pattern: "V37.9.80 更新"
      - name: "V37.4.3 案例修正引用 movespeed_tcc_sandbox_blood_case"
        check_type: file_contains
        file: ontology/docs/cases/pa_alert_contamination_case.md
        pattern: "movespeed_tcc_sandbox_blood_case"
      # runtime layer (MR-6 ≥2 层硬强制): 真读 case doc 验证 6 个核心字面量同时出现
      - name: "RUNTIME: case doc 6 个核心字面量同时存在 (V37.9.80 真因 + 证据 + 修复)"
        check_type: python_assert
        assertion: |
          import os
          _repo = os.getcwd()  # V37.9.118 日落法 #30: 单一源 (chdir 后==_PROJECT_ROOT), 替代 abspath+ternary
          _case_path = os.path.join(_repo, "ontology", "docs", "cases",
                                    "movespeed_tcc_sandbox_blood_case.md")
          assert os.path.exists(_case_path), \
              f"V37.9.80 case doc 不存在: {_case_path}"
          with open(_case_path, "r", encoding="utf-8") as f:
              _content = f.read()
          # 6 个核心字面量必须同时存在 (真因 + 证据 + 修复 + 教训 + V37.4.3 修正 + MR-10 反向)
          _required = [
              "macOS TCC Sandbox",       # 真因关键词
              "kernel (Sandbox)",         # 系统日志铁证
              "60 天",                    # 时间跨度
              "/usr/sbin/cron",           # 修复路径
              "V37.4.3 案例",             # 历史认知修正
              "MR-10",                    # 元规则反向兑现
          ]
          # V37.9.100: 列表推导 → for-loop. exec() 作用域陷阱 (V37.3 教训) — 推导式在 exec 内
          #   创建新作用域看不到 exec locals 的 _content/_required → NameError. for-loop 同作用域可见.
          _missing = []
          for _k in _required:
              if _k not in _content:
                  _missing.append(_k)
          assert not _missing, (
              f"V37.9.80 case doc 缺少核心字面量: {_missing}"
              f" (V37.9.80 主交付契约: 真因+证据+修复+教训+认知修正+MR 引用 6 项齐全)"
          )
      # ── V37.9.81 B declaration: capture.sh 修 V37.9.30 取证盲区 ──
      # V37.9.30 引入 lsof/ACL/snapshots 三维度时用 `2>/dev/null` 吞 stderr →
      # 采集器自身被 TCC sandbox 拒绝产空 stdout → analyzer 误判 normal/empty.
      # V37.9.81 B 把 stderr 重定向到独立 file + Python 端检测 sandbox 关键字 +
      # 加 [sandbox_denied] / [tool_unavailable] marker. V37.9.80 TCC 真因揭示后,
      # 这是 framework 级的"未采集 vs 采集到空"必备区分能力 — 否则未来同款
      # sandbox 问题仍会 6 周潜伏 (V37.9.30 同款盲区).
      - name: "V37.9.81 B: capture.sh acl_top stderr 捕获到 file (非 /dev/null)"
        check_type: file_contains
        file: movespeed_incident_capture.sh
        pattern: '2> "\$_TMP/acl_top_err"'
      - name: "V37.9.81 B: capture.sh lsof stderr 捕获到 file"
        check_type: file_contains
        file: movespeed_incident_capture.sh
        pattern: '2> "\$_TMP/lsof_err"'
      - name: "V37.9.81 B: capture.sh 含 read_file_with_stderr helper 定义"
        check_type: file_contains
        file: movespeed_incident_capture.sh
        pattern: "def read_file_with_stderr\\("
      - name: "V37.9.81 B: capture.sh 含 sandbox_denied marker 字面量"
        check_type: file_contains
        file: movespeed_incident_capture.sh
        pattern: "\\[sandbox_denied\\]"
      - name: "V37.9.81 B: analyzer.py 含 sandbox_denied 桶识别"
        check_type: file_contains
        file: movespeed_incident_analyzer.py
        pattern: 'return "sandbox_denied"'
      - name: "V37.9.81 B: capture.sh 含 V37.9.81 B marker 注释 (溯源)"
        check_type: file_contains
        file: movespeed_incident_capture.sh
        pattern: "V37.9.81 B"
      # ── V37.9.81 B runtime: 真跑分析器函数验证 marker 识别 + priority 顺序 ──
      - name: "RUNTIME: V37.9.81 B classify_* 函数识别 [sandbox_denied] marker + priority 顺序锁"
        check_type: python_assert
        assertion: |
          import os, sys
          _repo = os.getcwd()  # V37.9.118 日落法 #30: 单一源 (chdir 后==_PROJECT_ROOT), 替代 abspath+ternary
          # 临时把 repo root 加到 sys.path 让 import 工作
          _added = False
          if _repo not in sys.path:
              sys.path.insert(0, _repo)
              _added = True
          try:
              from movespeed_incident_analyzer import (
                  classify_acl_anomaly,
                  classify_handle_holders,
                  classify_snapshot_count,
                  analyze,
              )
              # 1. 三个 classify 函数都识别 [sandbox_denied] marker
              assert classify_acl_anomaly("[sandbox_denied] x") == "sandbox_denied", \
                  "V37.9.81 B classify_acl_anomaly missing sandbox_denied bucket"
              assert classify_handle_holders("[sandbox_denied] x") == "sandbox_denied", \
                  "V37.9.81 B classify_handle_holders missing sandbox_denied bucket"
              assert classify_snapshot_count("[sandbox_denied] x") == "sandbox_denied", \
                  "V37.9.81 B classify_snapshot_count missing sandbox_denied bucket"
              # 2. 三个函数都识别 [tool_unavailable] marker
              assert classify_acl_anomaly("[tool_unavailable] x") == "tool_unavailable"
              # 3. 向后兼容 — 无 marker 的旧 record 仍走老桶
              assert classify_acl_anomaly("total 0") == "normal", \
                  "V37.9.81 B broke V37.9.30 backward compat: normal -> 必须仍是 normal"
              assert classify_acl_anomaly("0: group:everyone deny add") == "acl_deny", \
                  "V37.9.81 B broke V37.9.30 backward compat: acl_deny -> 必须仍是 acl_deny"
              # 4. priority dict: sandbox_denied 必须高于 acl_deny (V37.9.81 B 核心契约)
              records = [{
                  "timestamp_iso": "2026-05-19T01:00:00Z",
                  "caller": "test.sh",
                  "exit_code": "1",
                  "acl_top": "[sandbox_denied] x",
                  "acl_kb": "0: group:everyone deny add",
              }]
              _result = analyze(records)
              _by_acl = _result.get("by_acl_anomaly", {})
              assert _by_acl.get("sandbox_denied", 0) == 1, (
                  f"V37.9.81 B priority dict violated: sandbox_denied should win "
                  f"over acl_deny but got by_acl={_by_acl}"
              )
          finally:
              if _added:
                  sys.path.remove(_repo)

      # ── V37.9.81 runtime: 真扫 incidents.jsonl 验证 24h ≤ 2 (V37.9.80 判定窗口机器化) ──
      # dev 环境无 jsonl → silent pass (FAIL-OPEN, 不能在 dev 因缺数据文件误报)
      # 生产环境有 jsonl → 真验证 V37.9.80 收工 "24h ≤ 2" 判定标准
      # 价值: 把 "Claude Code 记忆 FDA 修复有效" 升级为 "governance audit 机器化检查"
      # 未来 FDA 被误关闭 / 新 macOS 升级 reset TCC profile / 其他外置卷 sandbox 问题 →
      # 24h incident > 2 立即被 audit 抓到, 不再依赖人记得每天看 incident_analyzer
      - name: "RUNTIME: incidents.jsonl 24h ≤ 2 (V37.9.80 FDA 修复机器化判定)"
        check_type: python_assert
        # V37.9.100: requires_full — 这是 Mac Mini 生产数据检查 (真 incidents.jsonl ≤2/24h),
        #   dev 可能有 test fixture 的 ~/.kb/movespeed_incidents.jsonl (4.4MB 历史数据) 触发假阳性.
        requires_full: true
        code: |
          # V37.9.100: 去掉 module 级 return (exec() 环境 'return' outside function 是 SyntaxError),
          #   改用 if os.path.exists() 嵌套 + _io_ok 标志保持同款 FAIL-OPEN 契约
          import os, json
          from datetime import datetime, timedelta, timezone
          _jsonl_path = os.path.expanduser("~/.kb/movespeed_incidents.jsonl")
          # FAIL-OPEN: dev 无文件 → silent pass (governance dev 不应误报缺生产数据)
          if os.path.exists(_jsonl_path):
              _now = datetime.now(timezone.utc)
              _cutoff = _now - timedelta(hours=24)
              _count_24h = 0
              _io_ok = True
              # FAIL-OPEN: 文件损坏单行 skip 不阻塞 governance (V37.9.18 mtime-stable 同款契约)
              try:
                  with open(_jsonl_path, "r", encoding="utf-8", errors="replace") as f:
                      for line in f:
                          line = line.strip()
                          if not line:
                              continue
                          try:
                              rec = json.loads(line)
                          except (ValueError, TypeError):
                              continue
                          _ts_str = rec.get("timestamp_iso", "")
                          if not _ts_str:
                              continue
                          try:
                              # ISO 8601 with Z suffix or explicit offset
                              if _ts_str.endswith("Z"):
                                  _ts = datetime.fromisoformat(_ts_str[:-1]).replace(tzinfo=timezone.utc)
                              else:
                                  _ts = datetime.fromisoformat(_ts_str)
                                  if _ts.tzinfo is None:
                                      _ts = _ts.replace(tzinfo=timezone.utc)
                          except (ValueError, TypeError):
                              continue
                          if _ts >= _cutoff:
                              _count_24h += 1
              except (IOError, OSError):
                  # FAIL-OPEN: 文件 IO 失败 silent pass (e.g. 权限问题不该阻塞 audit)
                  _io_ok = False
              if _io_ok:
                  # V37.9.80 判定窗口: 24h ≤ 2 = FDA 真生效
                  assert _count_24h <= 2, (
                      f"V37.9.81 MOVESPEED 24h incident 数 = {_count_24h} > 2 "
                      f"(V37.9.80 判定窗口失效, FDA 修复可能回退). "
                      f"立即跑 python3 ~/movespeed_incident_analyzer.py --window 24h 取证. "
                      f"可能原因: macOS 升级 reset TCC / FDA 被手动移除 / 其他外置卷 sandbox 问题."
                  )

