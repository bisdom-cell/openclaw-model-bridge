        pattern: '"status":"partial_degraded"'
      - name: "V37.9.37: 全部失败 fail-fast reason 前缀 all_failed_"
        check_type: file_contains
        file: jobs/rss_blogs/run_rss_blogs.sh
        pattern: '"all_failed_'
      - name: "V37.9.37: emit 端 LLM_DEGRADED 标记替代占位符"
        check_type: file_contains
        file: jobs/rss_blogs/run_rss_blogs.sh
        pattern: "\\[LLM_DEGRADED\\]"
      - name: "V37.9.37: 5 字段 prompt 结构 (5 个 emoji marker)"
        check_type: python_assert
        assertion: |
          src = open("jobs/rss_blogs/run_rss_blogs.sh", encoding="utf-8").read()
          for marker in ["📌", "🔑", "💡", "🎯", "⭐"]:
