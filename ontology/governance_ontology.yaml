        pattern: |-
          extractor: registry_kb_source_files
      - name: "kb_sources_to_index 复用 V37.9.19 line_contains_identifier parser"
        check_type: file_contains
        file: ontology/convergence_ontology.yaml
        pattern: 'parser: line_contains_identifier'
      # V37.9.24 升级: drift_action alert_only → machine_sync (Plan B 渐进 dry-run).
      # 字面量守卫迁移到 test_convergence.py block 级守卫 (yaml 全文有其他 spec
      # alert_only_permanent, file_contains 不能限定块).
      - name: "V37.9.24: kb_sources_to_index 升级 machine_sync"
        check_type: file_contains
        file: ontology/convergence_ontology.yaml
        # block 级精准守卫见 TestV37924SourceLevelGuards.test_yaml_kb_sources_to_index_apply_function;
        # 此层是粗粒度: yaml 必须含 apply_function: kb_embed_incremental 字面量
        pattern: 'apply_function: kb_embed_incremental'
      - name: "V37.9.24: convergence.py _apply_kb_embed_incremental 函数定义"
