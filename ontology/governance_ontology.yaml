        pattern: "def find_placeholder_findings\\(src\\)"
      - name: "audit 模块定义 _is_prompt_template_line() 豁免函数 (防 prompt 模板误报)"
        check_type: file_contains
        file: ontology/llm_cron_audit.py
        pattern: "def _is_prompt_template_line\\(line\\)"
      - name: "ALIGNED_SCRIPTS 含 V37.9.51 Sub-Stage 4b 批量锚点 (rss_blogs + dblp + arxiv + github_trending + ai_leaders_x + hn 6 个脚本机械迁移到 V37.9.45/V37.9.50 同款 6 字段 + rule_check)"
        check_type: file_contains
