          assert "技术深度文章" not in emit_code, "emit code 严禁占位符"
          # 端到端运行: 2 篇 article 都失败 → 两篇都标 [LLM_DEGRADED] + RSS description
          tmpdir = tempfile.mkdtemp(prefix="rss_inv_")
          try:
              articles_file = os.path.join(tmpdir, "articles.jsonl")
              results_file = os.path.join(tmpdir, "results.jsonl")
              msg_file = os.path.join(tmpdir, "msg.txt")
              with open(articles_file, "w") as f:
                  for i in range(2):
