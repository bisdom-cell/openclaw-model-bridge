  # --- 2026-04-11 新增：Dream Map 预算溢出 + cache key 漂移案例 ---

  - id: INV-DREAM-001
    name: map-budget-scales-with-mode
    meta_rule: MR-4
    verification_layer: [declaration]
    severity: high
    declaration: "Dream 的 DREAM_TIMEOUT_SEC 必须按模式动态：Map-Only 模式 >= 5400s (90min) 以容纳全量 KB bootstrap，Reduce full run 保持 3600s (60min)"
    design_decision: |
      2026-04-11 教训：Notes 总量增长到 286 → Notes Map 总耗时 ~60 min 刚好撞上
      DREAM_TIMEOUT_SEC=3600 的硬预算。00:40 --map-notes 和 03:00 full run 连续
      超时，Reduce 从未执行。固定预算是"定时炸弹"——workload 长到某天就会炸。
      修复：按 MAP_ONLY 动态预算（90min / 60min），并把 Notes Map 的 batch size
      翻倍（15/12KB → 30/24KB）将 LLM 调用次数减半。
    source_case: "ontology/docs/cases/dream_map_budget_overflow_case.md"
    checks:
      - name: "kb_dream.sh 动态 DREAM_TIMEOUT_SEC（MAP_ONLY=5400）"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "MAP_ONLY.*=.*true.*\\n.*DREAM_TIMEOUT_SEC=5400"
      - name: "kb_dream.sh Notes batch 阈值为 30 条 / 24000B"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'PENDING_COUNT.*-ge 30.*PENDING_SIZE.*-gt 24000'

  - id: INV-DREAM-002
    name: reduce-path-must-not-re-run-map-loops
    meta_rule: MR-4
    verification_layer: [declaration]
    severity: critical
    declaration: "Map-Reduce 分离调度的契约：默认 full run（MAP_ONLY=false 且 FAST_MODE=false）必须跳过 Phase 1a/1b 的 LLM 循环，只从 .map_cache/ 读取，否则 Reduce 会重复燃烧 Map 预算"
    design_decision: |
      2026-04-11 教训：Reduce full run 之前会再跑一遍完整的 Phase 1a/1b，即使
      00:00 --map-sources 和 00:40 --map-notes 已经把缓存写好。这让"分离调度
      节省预算"的设计意图形同虚设——Reduce 每次都重跑 47 批 Notes Map，每次
      超时在同一位置。修复：Reduce 路径新增 cache-only fast path，扫 $MAP_DIR
      直接填充 MAP_SIGNALS/NOTES_SIGNALS 并 SKIP_MAP_LOOPS=true。
    source_case: "ontology/docs/cases/dream_map_budget_overflow_case.md"
    checks:
      - name: "kb_dream.sh 有 SKIP_MAP_LOOPS 开关"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "SKIP_MAP_LOOPS=true"
      - name: "Phase 1a 受 SKIP_MAP_LOOPS 门控"
        check_type: file_contains
        file: kb_dream.sh
        pattern: '\[ "\$SKIP_MAP_LOOPS" = false \].*SRC_COUNT'
      - name: "Phase 1b 受 SKIP_MAP_LOOPS 门控"
        check_type: file_contains
        file: kb_dream.sh
        pattern: '\[ "\$SKIP_MAP_LOOPS" = false \].*ALL_NOTES'

  - id: INV-CACHE-002
    name: notes-cache-key-stable-under-mtime-drift
    meta_rule: MR-4
    verification_layer: [declaration]
    severity: critical
    declaration: "Dream Notes Map 的 cache key 必须只依赖 note content（md5(content)），不依赖 mtime / sort 顺序 / 批次组合；同一条 note 在不同 run 中必须产生相同 cache key"
    design_decision: |
      2026-04-11 教训：原 cache key = md5(batch 拼接文本)。SORTED_NOTES 按 mtime
      DESC 排序，mm_index.py/kb_embed.py 任何一次触碰都会改变顺序 → 改变批次边界
      → 改变 md5 → 00:40 写的缓存 03:00 全部 miss。修复：每 note 一个 cache 文件，
      key = md5(content) 前 12 位。mtime/sort/batch 组合的漂移都不再影响。
      读取时按 signal hash 去重（一批 N 个 note 共享同一份 signals）。
    source_case: "ontology/docs/cases/dream_map_budget_overflow_case.md"
    checks:
      - name: "cache key 使用 content_hash 而非 batch_hash"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'content_hash=.*printf.*content.*md5sum'
      - name: "缓存文件名格式为 _note_<content_hash>.txt"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'DAY.*_note_.*content_hash'
      - name: "不再使用脆弱的批次级 batch_hash"
        check_type: file_not_contains
        file: kb_dream.sh
        pattern: 'batch_hash=.*echo.*BATCH.*md5sum'
      - name: "读取缓存时按 signal hash 去重"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'seen_note_signal_hashes'

  # ── 治理系统自观察（MR-7） ─────────────────────────────────────────
  # 2026-04-11: 治理系统自身是一等被治理对象。任何 check 层可能出现的状态
  # 都必须在汇总层有观察路径。详见 ontology/docs/cases/governance_silent_error_case.md

  - id: INV-GOV-001
    name: governance-summary-counts-all-non-pass
    meta_rule: MR-7
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "governance_checker 汇总层必须区分并统计 fail 和 error，两者都不能被 ✅ 汇总行吞掉"
    design_decision: |
      2026-04-11 教训：failed_invs 原本只数 status=="fail"，status=="error"
      被 ✅ 汇总行完全吞掉。INV-CRON-003/004 连续数次 NameError 崩溃，汇总行
      仍报"所有不变式成立"。修复：`if r["status"] in ("fail", "error")`。
    checks:
      - name: "print_results 的 failed_invs 同时统计 fail 和 error"
        check_type: file_contains
        file: ontology/governance_checker.py
        pattern: 'r\["status"\] in \("fail", "error"\)'
      - name: "error 状态注入时汇总行不会说 '所有不变式成立'"
        check_type: python_assert
        code: |
          # 独立回归：构造一个注定 error 的虚假 result，验证汇总不说谎
          # 注意：governance_checker.JSON_MODE 是模块级全局，调用时必须
          # 临时切到 False，否则 print_results 走 JSON 分支无法验证文本汇总。
          import io, contextlib, sys, os
          sys.path.insert(0, 'ontology')
          import governance_checker
          saved = governance_checker.JSON_MODE
          governance_checker.JSON_MODE = False
          try:
              fake_results = [{
                  "id": "INV-FAKE-ERROR",
                  "name": "synthetic-silent-error-probe",
                  "status": "error",
                  "severity": "critical",
                  "meta_rule": "MR-7",
                  "declaration": "注入的 error 用于验证 summary 不吞 error",
                  "checks": [
                      {"name": "synthetic", "status": "error", "message": "NameError: fake"}
                  ],
              }]
              buf = io.StringIO()
              with contextlib.redirect_stdout(buf):
                  exit_code = governance_checker.print_results(fake_results)
              out = buf.getvalue()
          finally:
              governance_checker.JSON_MODE = saved
          assert "所有不变式成立" not in out, \
              "silent error regression: ✅ 汇总行吞掉了 error 状态"
          assert exit_code != 0, \
              f"silent error regression: error 状态未计入失败 (exit={exit_code})"

  # ── PA 对话上下文隔离（V37.4.3 血案）──────────────────────────────────

  - id: INV-PA-001
    name: alert-does-not-pollute-chat-context
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "系统告警必须在进入 LLM 上下文前被剥离；推送侧注入 [SYSTEM_ALERT] 标记，消费侧 filter_system_alerts() 在 truncate_messages 之前执行"
    design_decision: |
      2026-04-11 血案：13:06 用户问"AI Agent 终极架构：本体×随机×贝叶斯"，
      PA 回复"已收到系统告警跟进任务，请打开系统偏好设置添加 /usr/sbin/cron
      到完全磁盘访问权限"——完全忽略用户真实问题，编造错误的 macOS 指令。
      根因：12:30 job_watchdog 通过 notify.sh --topic alerts 推送 WARNING，
      Gateway 把告警写入 sessions.json 作为 assistant role，truncate 的"最近 N 条"
      窗口把它带到 13:06 的请求上下文，Qwen3 attention 错误跨主题关联。
      结构性修复：push 端注入 [SYSTEM_ALERT] 标记，proxy 端在 truncate 之前
      剥离。这条不变式锁定两侧契约。
    checks:
      - name: "proxy_filters 定义 SYSTEM_ALERT_MARKER"
        check_type: file_contains
        file: proxy_filters.py
        pattern: 'SYSTEM_ALERT_MARKER = "\[SYSTEM_ALERT\]"'
      - name: "proxy_filters 定义 filter_system_alerts"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "def filter_system_alerts"
      - name: "tool_proxy 导入 filter_system_alerts"
        check_type: file_contains
        file: tool_proxy.py
        pattern: "filter_system_alerts"
      - name: "tool_proxy 在 truncate_messages 之前调用 filter_system_alerts"
        check_type: python_assert
        code: |
          # 顺序锁定：filter_system_alerts 必须在 truncate_messages 之前执行，
          # 否则 truncate 的"最近 N 条"窗口会把告警带过去。
          import re
          src = open("tool_proxy.py", encoding="utf-8").read()
          # 允许函数调用或符号引用，只要 filter 在 truncate 前出现即可
          filter_idx = src.find("filter_system_alerts(")
          trunc_idx = src.find("truncate_messages(")
          assert filter_idx != -1, "tool_proxy.py 未调用 filter_system_alerts()"
          assert trunc_idx != -1, "tool_proxy.py 未调用 truncate_messages()"
          assert filter_idx < trunc_idx, (
              f"filter_system_alerts 必须在 truncate_messages 之前执行 "
              f"(filter_idx={filter_idx}, trunc_idx={trunc_idx})"
          )
      - name: "notify.sh --topic alerts 路径注入 [SYSTEM_ALERT] 标记"
        check_type: file_contains
        file: notify.sh
        pattern: '\[SYSTEM_ALERT\]'
      - name: "auto_deploy.sh quiet_alert 注入 [SYSTEM_ALERT] 标记"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: '\[SYSTEM_ALERT\]'
      - name: "run_hn_fixed.sh 直接 send 告警路径注入 [SYSTEM_ALERT] 标记"
        check_type: file_contains
        file: run_hn_fixed.sh
        pattern: '\[SYSTEM_ALERT\]'
      - name: "run.sh releases 告警路径注入 [SYSTEM_ALERT] 标记"
        check_type: file_contains
        file: jobs/openclaw_official/run.sh
        pattern: '\[SYSTEM_ALERT\]'
      - name: "run_discussions.sh 告警路径注入 [SYSTEM_ALERT] 标记"
        check_type: file_contains
        file: jobs/openclaw_official/run_discussions.sh
        pattern: '\[SYSTEM_ALERT\]'
      - name: "filter_system_alerts 运行时真的剥离 [SYSTEM_ALERT] 消息"
        check_type: python_assert
        code: |
          # 运行时回归：构造真实告警消息结构，验证 filter 正确剥离。
          import sys, os
          sys.path.insert(0, os.getcwd())
          from proxy_filters import filter_system_alerts, SYSTEM_ALERT_MARKER
          # 1. 普通对话：混入 assistant 告警消息
          msgs = [
              {"role": "system", "content": "you are Wei"},
              {"role": "user", "content": "hello"},
              {"role": "assistant", "content": "[SYSTEM_ALERT]\n⚠️ job_watchdog fire"},
              {"role": "user", "content": "what is ontology"},
          ]
          filtered, dropped = filter_system_alerts(msgs)
          assert dropped == 1, f"应剥离 1 条告警,实际 {dropped}"
          roles = [m["role"] for m in filtered]
          assert roles == ["system", "user", "user"], f"roles 错误: {roles}"
          # 2. system role 即使带标记也保留（system prompt 例外）
          sys_msgs = [
              {"role": "system", "content": "[SYSTEM_ALERT]\nsome rule"},
              {"role": "user", "content": "hi"},
          ]
          filtered, dropped = filter_system_alerts(sys_msgs)
          assert dropped == 0, "system role 告警不应被剥离"
          assert len(filtered) == 2
          # 3. OpenAI content blocks 格式也要处理
          block_msgs = [
              {"role": "user", "content": "q"},
              {"role": "assistant", "content": [
                  {"type": "text", "text": "[SYSTEM_ALERT]\nfire"}
              ]},
          ]
          filtered, dropped = filter_system_alerts(block_msgs)
          assert dropped == 1, f"content blocks 告警应剥离,实际 dropped={dropped}"
          # 4. 普通消息提到标记字符串不应被误伤（仅匹配开头）
          mention = [
              {"role": "user", "content": "the [SYSTEM_ALERT] marker prevents contamination"},
          ]
          filtered, dropped = filter_system_alerts(mention)
          assert dropped == 0, "标记只能出现在开头才被剥离"
          assert len(filtered) == 1

  - id: INV-PA-002
    name: soul-rule-10-present
    meta_rule: MR-4
    verification_layer: [declaration]
    severity: high
    declaration: "SOUL.md 规则 10 '告警消息不跟进' 必须存在且包含主题对齐硬规则，作为 LLM 层最终防线（当 proxy filter 漏过时）"
    design_decision: |
      2026-04-11 血案：结构性修复（INV-PA-001 的 filter_system_alerts）是主防线，
      但 LLM 有可能被其他未标记告警源污染。SOUL.md 规则 10 是最后一道防线——
      即使告警进入上下文，LLM 本身也必须拒绝把它当作用户任务。
      这条不变式锁定 SOUL.md 必须包含规则 10 的核心声明文本。
    lesson: |
      Proxy filter 是结构修复（处理"告警进来"的问题），SOUL.md 规则是行为修复
      （处理"告警进来后 LLM 怎么响应"的问题）。两层同时存在才是纵深防御。
    checks:
      - name: "SOUL.md 包含规则 10 标题 '告警消息不跟进'"
        check_type: file_contains
        file: SOUL.md
        pattern: "告警消息不跟进"
      - name: "SOUL.md 包含 '2026-04-11 血案规则' 版本锚点"
        check_type: file_contains
        file: SOUL.md
        pattern: "2026-04-11 血案规则"
      - name: "SOUL.md 包含 '主题对齐' 硬规则"
        check_type: file_contains
        file: SOUL.md
        pattern: "主题对齐"
      - name: "SOUL.md 明确禁止编造 macOS FDA 指令"
        check_type: file_contains
        file: SOUL.md
        pattern: "完全磁盘访问权限"
      - name: "SOUL.md 包含 [SYSTEM_ALERT] 识别标志"
        check_type: file_contains
        file: SOUL.md
        pattern: '\[SYSTEM_ALERT\]'

  - id: INV-REVIEW-001
    name: kb-review-fails-loud-not-silent
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      kb_review 必须 fail-fast：LLM 失败→推送 [SYSTEM_ALERT]+exit 1；
      不允许机械 fallback 伪装成功；status.json 的 llm_status 字段必须诚实；
      源文件枚举必须从 jobs_registry.yaml 读取（registry-driven，消除硬编码漂移）；
      最近 N 天提取必须按 H2 章节 drill-down（而非行级日期匹配），避免把
      digest 容器标题当论文亮点。
    design_decision: |
      2026-04-11 血案（与 V37.4.3 PA 告警污染同血案类，"效果层静默降级"）：
      kb_review.sh V29 原实现有 6 个 bug 构成 silent degradation 链：
      (1) export NOTES_CONTENT 在 LLM 调用之后，Python 子进程始终拿到空 prompt
      (2) 源枚举硬编码 7 个（缺 ai_leaders_x + ontology_sources）
      (3) LLM 失败后机械 fallback（把 `## 今日arXiv精选(YYYY-MM-DD)` digest 容器
          标题当论文亮点写入 review，看起来像成功，实际是垃圾）
      (4) status.json 永远写 "llm": true，即使 LLM 实际失败
      (5) 行级日期匹配漏掉整个 H2 section 的实体内容
      (6) "回复任何话题可深入讨论"悬空承诺但没有对应实现

      V37.5 结构性修复：
      - 删除 shell 变量传递（全部 Python 化）→ 消除 scope bug class
      - 源枚举 registry-driven（jobs_registry.yaml::kb_source_file）
      - H2 章节解析（extract_recent_sections）替代行级匹配
      - LLM 失败 fail-fast 推送 [SYSTEM_ALERT] 并 exit 1
      - status.json 诚实字段 llm_status: ok|failed|unknown
      - 移除"回复任何话题可深入讨论"悬空承诺

      这条不变式锁定：①代码层契约（fail-fast + registry-driven + H2 parser）
      ②运行时契约（mock LLM 失败 → status=llm_failed 不伪装）
      ③诚实状态层（不再永远写 llm:true）
    lesson: |
      V37.4.3 PA 告警污染是"告警数据结构性污染 LLM 上下文"；
      V37.5 kb_review 是"失败路径结构性伪装成功状态"。两者都属于
      MR-4 (silent failure is a bug) 下的血案类——声明层检查全过，
      效果层却完全失效。治理体系必须在两个维度同时拦截：结构契约 +
      运行时回归。
    checks:
      - name: "kb_review.sh 标注 V37.5 fail-fast 版本"
        check_type: file_contains
        file: kb_review.sh
        pattern: "V37.5"
      - name: "kb_review.sh 失败路径注入 [SYSTEM_ALERT] 标记"
        check_type: file_contains
        file: kb_review.sh
        pattern: '\[SYSTEM_ALERT\]'
      - name: "kb_review.sh 不再包含 V29 机械 fallback 标签"
        check_type: file_not_contains
        file: kb_review.sh
        pattern: "LLM 不可用, 基础整理"
      - name: "kb_review.sh 不再包含悬空承诺 '回复任何话题可深入讨论'"
        check_type: file_not_contains
        file: kb_review.sh
        pattern: "回复任何话题可深入讨论"
      - name: "kb_review_collect.py 定义 load_sources_from_registry"
        check_type: file_contains
        file: kb_review_collect.py
        pattern: "def load_sources_from_registry"
      - name: "kb_review_collect.py 定义 extract_recent_sections (H2 parser)"
        check_type: file_contains
        file: kb_review_collect.py
        pattern: "def extract_recent_sections"
      - name: "kb_review_collect.py 定义 call_llm 函数"
        check_type: file_contains
        file: kb_review_collect.py
        pattern: "def call_llm"
      - name: "kb_review_collect.py 不再包含悬空承诺"
        check_type: file_not_contains
        file: kb_review_collect.py
        pattern: "回复任何话题可深入讨论"
      - name: "jobs_registry.yaml 声明 kb_source_file 字段 (registry-driven 证据)"
        check_type: file_contains
        file: jobs_registry.yaml
        pattern: "kb_source_file:"
      - name: "kb_review.sh llm_failed 分支必须紧跟 exit 1 (fail-fast 顺序锁)"
        check_type: python_assert
        code: |
          # fail-fast 顺序锁：llm_failed 分支后 500 字符内必须有 exit 1，
          # 否则可能存在"检测到失败但继续推送"的 silent degradation 漏洞。
          src = open("kb_review.sh", encoding="utf-8").read()
          llm_failed_idx = src.find('STATUS" = "llm_failed"')
          assert llm_failed_idx != -1, "kb_review.sh 缺少 llm_failed 处理分支"
          exit_idx = src.find("exit 1", llm_failed_idx)
          assert exit_idx != -1, "llm_failed 分支后未找到 exit 1"
          assert (exit_idx - llm_failed_idx) < 500, (
              f"llm_failed 分支必须立即 fail-fast exit 1, "
              f"实际距离 {exit_idx - llm_failed_idx} 字符"
          )
      - name: "registry-driven: load_sources_from_registry 真实发现 >=12 源含 ai_leaders_x + ontology_sources"
        check_type: python_assert
        code: |
          # 运行时回归：registry 必须发现 V37.5 修复前遗漏的两个源，
          # 防止未来有人手动改回硬编码或者从 registry 删除字段。
          import sys, os
          sys.path.insert(0, os.getcwd())
          import kb_review_collect as m
          srcs = m.load_sources_from_registry("jobs_registry.yaml")
          assert len(srcs) >= 12, f"期望 registry 声明 >=12 sources, 实际 {len(srcs)}"
          ids = {s["id"] for s in srcs}
          assert "ai_leaders_x" in ids, (
              f"ai_leaders_x 必须在 registry-driven 发现列表中 "
              f"(V37.5 新增, 此前硬编码漏掉), got: {sorted(ids)}"
          )
          assert "ontology_sources" in ids, (
              f"ontology_sources 必须在 registry-driven 发现列表中 "
              f"(V37.1 新增信息源, 此前硬编码漏掉), got: {sorted(ids)}"
          )
          # 每条必须有 kb_source_file
          for s in srcs:
              assert s.get("kb_source_file"), f"source {s['id']} 缺少 kb_source_file"
      - name: "H2 parser drill-down: 窗口内章节保留, 窗口外章节剔除"
        check_type: python_assert
        code: |
          # 运行时回归：H2 章节解析替代行级日期匹配。
          # 构造 3 个 H2 章节 (窗口内 + 窗口外 + 今日), 验证正确过滤。
          import sys, os
          sys.path.insert(0, os.getcwd())
          import kb_review_collect as m
          from datetime import datetime
          today = datetime(2026, 4, 11)
          content = (
              "# title\n\n"
              "## 2026-04-10 arxiv report\n"
              "Paper A: 重要论文 A 的细节内容\n\n"
              "## 2026-04-05 arxiv report\n"
              "Paper B: 过期论文 B (应被剔除)\n\n"
              "## 2026-04-11 arxiv report\n"
              "Paper C: 今日论文 C\n"
          )
          result = m.extract_recent_sections(content, days=3, max_chars=5000, today=today)
          assert "Paper A" in result, f"窗口内章节 Paper A 必须保留: {result!r}"
          assert "Paper B" not in result, f"窗口外章节 Paper B 必须剔除: {result!r}"
          assert "Paper C" in result, f"今日章节 Paper C 必须保留: {result!r}"
      - name: "fail-fast contract: mock LLM 失败 → status=llm_failed, 不伪装 ok"
        check_type: python_assert
        code: |
          # 运行时回归：run() 以 llm_caller 注入失败 → status 必须 llm_failed,
          # 不允许降级为 ok, 不允许写入 review_markdown / wa_message 伪造产物。
          import sys, os, tempfile
          sys.path.insert(0, os.getcwd())
          import kb_review_collect as m
          from datetime import datetime
          tmp = tempfile.mkdtemp(prefix="gov_inv_review_")

          def mock_fail(prompt):
              return (False, "", "proxy_unreachable_for_test")

          result = m.run(
              tmp, 7, "jobs_registry.yaml",
              today=datetime(2026, 4, 11),
              llm_caller=mock_fail,
          )
          assert result["status"] == "llm_failed", (
              f"LLM 失败必须 fail-fast, status={result['status']}"
          )
          assert result["reason"] == "proxy_unreachable_for_test"
          # 关键: 失败路径不允许产出 review_markdown / wa_message
          assert "review_markdown" not in result, (
              "LLM 失败后 run() 不得产出 review_markdown (silent degradation 漏洞)"
          )
          assert "wa_message" not in result, (
              "LLM 失败后 run() 不得产出 wa_message (silent degradation 漏洞)"
          )
      - name: "call_llm 最小内容阈值: 短响应判失败"
        check_type: python_assert
        code: |
          # call_llm 必须拒绝空/过短响应, 防止 LLM 返回空壳被当成功。
          src = open("kb_review_collect.py", encoding="utf-8").read()
          assert "LLM content too short" in src, (
              "call_llm 必须拒绝过短 LLM 响应 (V37.5 fail-fast 契约)"
          )
          assert "len(content.strip()) < 80" in src, (
              "call_llm 必须声明 80-char 最小内容阈值"
          )
          assert "LLM returned empty content" in src, (
              "call_llm 必须拒绝空响应 (不允许空字符串伪装成功)"
          )

# ═══════════════════════════════════════════════════════════════════════
# 4. 可执行元规则（Phase 0）— 自动发现缺失不变式
#    只扫描结构化数据源，不解析自然语言
#    误报 → warn（非 fail），不阻塞 CI
# ═══════════════════════════════════════════════════════════════════════
meta_rule_discovery:

  - id: MRD-CRON-001
    meta_rule: MR-3
    name: "每个 enabled system job 应有调度治理覆盖"
    description: |
      扫描 jobs_registry.yaml 中所有 enabled + scheduler=system 的 job，
      检查每个 job 的脚本名是否出现在某个 INV-* 的 checks 中。
      未覆盖的 job = 潜在的声明-执行断裂盲区。
    scan_source: jobs_registry.yaml
    scan_filter: "enabled == true and scheduler == 'system'"
    match_against: "invariants[*].checks[*].code 或 checks[*].pattern"
    severity_when_missing: warn  # 不阻塞，只提醒
    rationale: |
      今天的 ArXiv 漂移就是因为 arxiv_monitor 没有对应的不变式。
      如果当时有这条元规则，新增 job 时就会被提醒"需要加治理覆盖"。

  - id: MRD-ENV-001
    meta_rule: MR-1
    name: "每个 needs_api_key=true 的 job 应有环境变量验证"
    description: |
      扫描 registry 中 needs_api_key=true 的 job，
      检查 preflight_check.sh 是否验证了对应的 API key。
    scan_source: jobs_registry.yaml
    scan_filter: "enabled == true and needs_api_key == true"
    match_against: "preflight_check.sh 中的环境变量检查列表"
    severity_when_missing: warn

  - id: MRD-NOTIFY-001
    meta_rule: MR-4
    name: "每个使用 notify.sh 的脚本应有对应的 topic 频道"
    description: |
      扫描所有 .sh 文件中调用 notify 的 --topic 参数，
      检查每个 topic 是否在 notify.sh 的路由表中有对应。
    scan_source: "*.sh files"
    scan_filter: "grep 'notify.*--topic'"
    match_against: "_notify_discord_target_for_topic() case 分支"
    severity_when_missing: warn

  - id: MRD-ERROR-001
    meta_rule: MR-4
    name: "推送脚本不应静默吞掉发送错误"
    description: |
      扫描所有包含 openclaw message send 的 .sh 文件，
      检查 stderr 是否被 >/dev/null 2>&1 吞掉。
      静默吞错误 = MR-4 违反（silent failure is a bug）。
    scan_source: "*.sh files"
    scan_filter: "grep 'message send.*>/dev/null 2>&1'"
    match_against: "每个 send 调用的 stderr 应被捕获或记录"
    severity_when_missing: warn
    lesson: "2026-04-09: notify.sh 吞掉 stderr → WhatsApp 失败3天无诊断"

  - id: MRD-NOTIFY-002
    meta_rule: MR-4
    name: "每个 Discord 频道最近 7 天应有推送活动"
    description: |
      效果层（Layer 3）首个检查：扫描 notify_queue/ 和日志，
      检查每个已配置的 Discord 频道是否在最近 7 天内成功推送过。
      长期静默的频道 = 推送链路可能断裂。
    scan_source: "~/kb_dream.log, ~/jobs/*/cache/*.log, ~/.kb/notify_queue/"
    scan_filter: "最近 7 天内有 topic=X 的成功推送记录"
    severity_when_missing: warn
    lesson: "2026-04-09: ontology 频道配置完整但从未收到推送——效果层空白导致盲区"

  - id: MRD-LAYER-001
    meta_rule: MR-6
    name: "severity=critical 的不变式应有 ≥2 层验证深度"
    description: |
      扫描所有 severity=critical 的不变式，检查 verification_layer 是否包含
      ≥2 个层（如 [declaration, runtime]）。单层覆盖的 critical 不变式 = 虚假安全感。
    scan_source: "governance_ontology.yaml invariants"
    scan_filter: "severity == 'critical' and len(verification_layer) < 2"
    severity_when_missing: warn
    lesson: "2026-04-08: 声明层 12/12 全过但推送失败 3 天——单层检查的虚假安全感"

# ═══════════════════════════════════════════════════════════════════════
# 5. 审计元数据
