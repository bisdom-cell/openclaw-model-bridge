  - id: INV-CONVERGENCE-INTEGRATION-001
    name: governance-checker-integrates-convergence-framework
    meta_rule: MR-17
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      V37.9.22+ Phase 4 Layer 5 闭合: governance_checker.py 主流程必须主动调用
      convergence framework 跑所有 enabled spec 并报告 drift。这把 Layer 5
      从"可被 INV runtime python_assert 间接验证"升级为"每次 governance audit
      cron 都直接消费 framework"，实现 V37.9.19 引入 framework 时承诺的
      "每天主动检查 declared-vs-runtime drift" 终态。

      集成契约:
        - run_convergence_specs() 调 cv.list_spec_ids() 遍历所有 spec
        - 每个 spec 调 cv.verify_convergence(spec_id) 取 ConvergenceResult
        - print_convergence_results(specs) 用统一格式输出（与 INV/MRD 一致）
        - drift_detected 是 informational (drift_action=alert_only) 不影响 exit code
        - JSON 输出 combined dict 含 invariants/discovery/convergence 三键
        - FAIL-OPEN: 任何 framework 异常 → 单条 error 结果继续 audit

      不破坏现有契约:
        - run_all() / run_meta_discovery() / print_results() / print_discovery()
          全部不动
        - 退出码仍只受 invariant violations 影响（convergence drift 不算 fail）
        - JSON_MODE 时 print_convergence_results 走 early return 让 __main__
          统一 dump combined JSON
    lesson: |
      V37.9.19~22 引入 4 个 convergence spec 后, framework 只在 INV runtime
      python_assert 中被间接调用（验证 spec 测试类, 不是 spec 本身）。这意味着
      framework 实际"verify_convergence(spec_id)"调用从未在生产 audit 流程中
      发生 — 只在 dev/test 环境下作为 unit test 跑过。V37.9.22+ 把 framework
      从"测试时被调用"升级为"每次 audit cron 主动调用", 让 declared-vs-runtime
      drift 检测真正成为 control plane 的运行时事实。
    design_decision: |
      为什么不让 drift_detected 算 invariant fail (i.e. 影响 exit code)?
        - drift_action=alert_only 的语义就是 "informational, NOT enforce"
        - dev 环境永远会 drift（无 crontab/adapter/Gateway/text_index）
          → 让 audit fail 会让所有 dev run 都 exit 1, 信号失效
        - Mac Mini cron 可独立解析 stdout/JSON 决定是否推 alert
        - 与 V37.9.19 framework 设计 "drift_action 不是 enforcement" 一致
      为什么 FAIL-OPEN 而不是让 framework 异常算 fail?
        - 一个 broken spec 不应阻止其他 spec 检查或主 audit 流程
        - 与 INV-GOV-001 (V37.3 silent error must surface) 不同 — 那个守的是
          "audit 结果说所有不变式成立 但 error 被忽略", 这里守的是 "framework
          异常不阻塞 audit", error 仍 visibly 显示 💥 不静默
      为什么不在 invariant phase 里跑 convergence 而是新 phase?
        - INV phase 跑 INV-CONVERGENCE-* (4 个 INV) 已经在间接守 framework
          各部件正确 (extractor/observer/parser 注册)
        - 新 phase 跑 framework 自身, 验证整体 wiring 正确
        - 两层独立: INV 守 framework 的"零件"; 新 phase 跑 framework 的"运行"
    checks:
      # ── declaration layer ─────────────────────────────────────────────
      - name: "governance_checker.py 定义 run_convergence_specs 函数"
        check_type: file_contains
        file: ontology/governance_checker.py
        pattern: 'def run_convergence_specs'
      - name: "governance_checker.py 定义 print_convergence_results 函数"
        check_type: file_contains
        file: ontology/governance_checker.py
        pattern: 'def print_convergence_results'
      - name: "governance_checker.py __main__ 调用 run_convergence_specs"
        check_type: file_contains
        file: ontology/governance_checker.py
        pattern: 'convergence_results = run_convergence_specs'
      - name: "governance_checker.py __main__ 调用 print_convergence_results"
        check_type: file_contains
        file: ontology/governance_checker.py
        pattern: 'print_convergence_results\(convergence_results\)'
      - name: "governance_checker.py JSON 输出包含 convergence 键"
        check_type: file_contains
        file: ontology/governance_checker.py
        pattern: '"convergence": convergence_results'
      - name: "run_convergence_specs FAIL-OPEN: import 失败不冒泡"
        check_type: file_contains
        file: ontology/governance_checker.py
        pattern: 'convergence module not importable'
      - name: "run_convergence_specs FAIL-OPEN: per-spec verify_convergence 异常被吃"
        check_type: file_contains
        file: ontology/governance_checker.py
        pattern: 'verify_convergence raised'
      # ── runtime layer ──────────────────────────────────────────────────
      - name: "RUNTIME: governance_checker --json 输出 combined dict 含 convergence 键并能跑所有 5 spec"
        check_type: python_assert
        # V37.9.100: requires_full 破递归 — 此 check 跑 subprocess governance_checker, 执行器修好后
        #   子进程会再跑此 check → 无限递归. requires_full 让子进程 (无 --full) skip 它, 递归终止.
        #   dev 模式本就每次跑 convergence specs, 集成隐式已验证; 显式 subprocess 仅 --full 需要.
        requires_full: true
        code: |
          import subprocess
          import sys
          import json
          import os
          repo_root = os.environ.get("OPENCLAW_REPO_ROOT", os.getcwd())
          proc = subprocess.run(
              [sys.executable, "ontology/governance_checker.py", "--json"],
              capture_output=True, text=True, timeout=120,
              cwd=repo_root,
          )
          # Last line of stdout should be valid JSON (governance_checker prints
          # human-readable header THEN JSON dump; JSON is the long final block)
          # Find the JSON dump (starts with '{' on its own line near end)
          out = proc.stdout
          start = out.rfind("{\n  \"invariants\"")
          assert start >= 0, f"combined JSON not found in --json output: tail={out[-500:]}"
          parsed = json.loads(out[start:])
          assert "invariants" in parsed
          assert "discovery" in parsed
          assert "convergence" in parsed, "JSON output must contain 'convergence' key"
          specs = parsed["convergence"]
          assert isinstance(specs, list)
          # V37.9.105-hotfix3: stale check 修 — V37.9.25 加第 5 spec services_to_launchd,
          # 但本 check 仍写死 4. requires_full 让它在 dev 跳过 (dev governance 全过假象),
          # 只在 Mac Mini --full 跑 → 断言 4 但实际 5 → 失败. (MR-8 单一真理源漂移)
          assert len(specs) == 5, f"expected 5 convergence specs, got {len(specs)}"
          spec_ids = {s["spec_id"] for s in specs}
          for sid in ["jobs_to_crontab", "providers_to_adapter",
                      "openclaw_config_to_runtime", "kb_sources_to_index",
                      "services_to_launchd"]:
              assert sid in spec_ids, f"missing spec {sid} in audit JSON"
      - name: "RUNTIME: dev mode convergence drift 不影响 exit code (informational only)"
        check_type: python_assert
        # V37.9.100: requires_full 破递归 (同上 — 子进程 governance_checker 会再跑此 check)
        requires_full: true
        code: |
          import subprocess
          import sys
          import os
          repo_root = os.environ.get("OPENCLAW_REPO_ROOT", os.getcwd())
          proc = subprocess.run(
              [sys.executable, "ontology/governance_checker.py"],
              capture_output=True, text=True, timeout=120,
              cwd=repo_root,
          )
          # In dev, convergence specs always show drift (no crontab/adapter/etc),
          # but exit code should reflect ONLY invariant violations.
          # If invariants pass, dev should exit 0 even with convergence drift visible.
          # We verify this by checking convergence section appears in stdout
          # AND the script doesn't fail with a Python exception.
          assert "CONVERGENCE FRAMEWORK" in proc.stdout, (
              f"convergence section missing from dev output:\n{proc.stdout[-800:]}"
          )
          # Stderr should not contain Python tracebacks from framework
          assert "Traceback" not in proc.stderr, (
              f"framework raised exception:\n{proc.stderr[-800:]}"
          )

  - id: INV-RSSBLOGS-001
    name: rss-blogs-fails-loud-not-silent
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      run_rss_blogs.sh 必须 fail-fast：LLM HTTP 错误 / JSON 解析失败 / content 空
      任一触发 → 推送 [SYSTEM_ALERT] + status:llm_failed + exit 1。
      绝不允许"技术深度文章 ⭐⭐⭐"占位符 fallback 静默推送伪造数据。
      emit 端 partial parser fallback 必须用显式 [LLM_DEGRADED] 标记 + RSS description
      兜底, 让用户感知层不被欺骗 (V37.5/V37.8.10/V37.9.16 同款 fail-fast 模式对齐)。

      V37.9.37 升级 (产品深度): 单条"要点+价值"两行 → 5 字段深度分析
      (📌 中文标题 / 🔑 核心要点 / 💡 关键洞察 / 🎯 实践启发 / ⭐ 评级);
      调用策略从单次调用全部 N 篇 → 每篇独立调 + retry 3 次(5/10/20s 退避);
      失败语义从"任一失败 fail-fast"细化为"全部失败才 fail-fast, 部分失败
      partial_degraded 仍推送其余篇"; 多窗口切片 (>8000 字触发 V37.9.21 同款)
      让深度分析能充分展开 (3 篇 ⭐⭐⭐⭐⭐ 旗舰文章 ~4500 字也能完整推送)。
    design_decision: |
      2026-05-07 18:00 血案 (用户视角 #13 第 8 次正向兑现): 用户收到 3 条全是
      "要点：技术深度文章 / 价值：⭐⭐⭐"占位符的博客推送, last_run.json 谎报
      status:ok。Mac Mini cache 揭示真相:
        - llm_raw_last.txt = '{"error":"HTTP 502 | upstream: primary 301; gemini 503"}'
        - llm_content.txt = 1 byte (空)
        - rss_message.txt 全部 3 篇 fallback "技术深度文章 ⭐⭐⭐"
        - last_run.json status:ok, sent:true ← 谎报

      MR-4 silent-failure 第 26 次演出新形态:
        - 触发器: Qwen3 主+gemini fallback 双 provider 同时故障 (基础设施层)
        - 放大器: 三层宽容 (except pass 吞 KeyError → log WARN 不 exit →
          emit 硬编码占位符)
        - 掩护者: last_run.json 谎报 status:ok + 零 [SYSTEM_ALERT] 推送
        rss_blogs 是 V36 之前老代码, V37.5/V37.8.10/V37.9.16 同款 fail-fast 模式
        从未对齐。

      V37.9.36 结构性修复:
        (a) source notify.sh + send_alert helper 走统一 [SYSTEM_ALERT] 通道
        (b) LLM 响应三层检测 (HTTP error / JSON parse fail / empty content)
        (c) 任一失败 → fail-fast: 推 [SYSTEM_ALERT] + status:llm_failed + exit 1
        (d) emit 端删除 "要点：技术深度文章" + "价值：⭐⭐⭐" 占位符 fallback
        (e) partial parse fallback 改为 "（本篇 LLM 摘要缺失，参见原文链接）"
            显式标记缺失而非伪造数据
    lesson: |
      原则 #13 (定期像用户用) 第 8 次正向兑现 — V37.9.35 budget 升级后用户立即
      在 WhatsApp 发现 3 条占位符推送, 单测 / 治理 / preflight 全过但用户感知
      质量为零。这是测试三层 "WhatsApp 业务验证" (原则 #15) 在 rss_blogs 老代码
      上的首次暴露 — V37.5 (kb_review) / V37.8.10 (kb_evening) / V37.9.16
      (kb_deep_dive) 都已对齐 fail-fast 模式, 但 rss_blogs 一直是 V36 前老代码。

      MR-8 反例提醒: 如果 V37.5 / V37.8.10 / V37.9.16 三次修复时同步扫描所有
      LLM 调用 job 是否有同款反模式, 这次血案在 V37.9.16 时就能预防。这是
      MR-8 copy-paste-is-a-bug-class 的反向案例 — 不只跨文件复制造 bug,
      跨 job 没及时同步 fail-fast 升级也是 bug。
    checks:
      # ── declaration layer (源码级守卫) ────────────────────────────────
      - name: "run_rss_blogs.sh 标注 V37.9.36 fail-fast 版本"
        check_type: file_contains
        file: jobs/rss_blogs/run_rss_blogs.sh
        pattern: "V37.9.36"
