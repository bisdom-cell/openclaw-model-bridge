              )
      - name: "run_rss_blogs.sh 全部 LLM 失败必须 fail-loud (status:llm_failed + send_alert + exit 1)"
        check_type: python_assert
        code: |
          # V37.9.100: V37.9.37 把 HTTP-error-立即-exit-1 改为 per-paper retry 模型 —
          #   单篇 HTTP error 不再立即 exit, 而是 retry → 全部失败才 status:llm_failed + exit 1.
          #   fail-loud 契约保留 (不静默), 只是机制从 per-error → all-failed. 旧 assertion 找
