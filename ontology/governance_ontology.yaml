  - id: INV-CONVERGENCE-KB-001
    name: kb-source-files-converge-to-text-index
    meta_rule: MR-17
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      V37.9.22 Phase 4 Layer 5（convergence framework 第四个 spec — 同 V37.9.22
      第二次 framework 扩展 push）：jobs_registry.yaml enabled jobs 声明的
      kb_source_file 字段每个必须在 ~/.kb/text_index/meta.json 的
      chunks[].source_file 中至少出现一次（kb_embed.py 真的索引到了）。
      convergence framework 通过 named-dispatch 第三次纯扩展（仅新增
      registry_kb_source_files extractor，复用 V37.9.19 _observe_shell_command +
      _parse_line_contains_identifier — 零新 observer + 零新 parser），
      验证 framework 模式的 minimal-extension path 也能工作（不是每次扩展都
      需要新 observer/parser）。

      drift_action 起步 alert_only（与 jobs_to_crontab V37.9.19 同款保守路线）：
      kb_embed.py 重建是幂等的且技术上可 machine_sync，但增量 re-index 路径
      在 V37.9.22 不在范围。一周观察期后 V37.9.23+ 可考虑升级 machine_sync。

      与 V37.9.5 INV-KB-COVERAGE-001 是 sibling 关系不是替代：
        - V37.9.5 守 kb_embed.py 源码逻辑（"代码会扫"）— declaration layer
        - V37.9.22 spec 守运行时事实（"代码扫了 + chunks 看见了"）— convergence layer
      两者 V37.9.5 INV 不变，本 INV 加在它之上做互补保护。
    lesson: |
      V37.9.5 INV-KB-COVERAGE-001 引入时是 MR-4 silent-failure 第 15 次演出
      （workspace .md 数月业务数据接缝盲区），守住了 kb_embed.py 源码逻辑会扫
      workspace。V37.9.22 把同款血案防线从声明层升级到运行时层 — 即使代码逻辑
      正确，cron 故障 / file mtime 漂移 / kb_embed.py 内部限制都可能让"代码扫了
      但 chunks 没看见"的 silent drift 发生。本 INV 把 V37.5 引入的
      kb_source_file 字段用作 declared 真理源，与 chunks[].file 实际 runtime
      事实直接 set-diff 比对（V37.9.22 hotfix 9d60dd3 修正字段名是 file 不是
      source_file）。

      V37.9.23 加固层 (TestKbSourcesToIndexCommandRuntime, 6 单测): V37.9.22
      hotfix 9d60dd3 教训表明 dev 单测全过 + governance 全过 + Mac Mini
      preflight 全过 都不能保证 spec yaml 里 runtime_observable.command 的
      python oneliner 字段名假设正确 — 只有 Mac Mini 实测 framework 才暴露
      declared=14 observed=0 missing=14 的字段名错。原来的 dev 单测只测
      declared extractor 逻辑层 (TestExtractRegistryKbSourceFiles), 没测
      observer command 的实际执行路径 + JSON 字段读取语义层。V37.9.23 加固
      构造 mock meta.json + monkey-patch HOME → tempdir + 真实跑
      verify_convergence("kb_sources_to_index") subprocess, 字面量字段名
      回归 (file → source_file) 立即被抓 — 反向验证已确认守卫真有效（故意
      改回 source_file 后 6 测试 3 失败, 还原后全绿）。这是原则 #15 第三层
      "WhatsApp 业务验证"教训在 ontology framework 层的兑现 — 从"等生产
      实测才发现"升级为"dev 单测就能拦"。
    design_decision: |
      为什么不创建新 observer / 新 parser？
        - V37.9.19 _observe_shell_command 已能跑 python oneliner 输出
          chunks 的 source_file basename 一行一个
        - V37.9.19 _parse_line_contains_identifier 已能做 substring 匹配
        - 复用 = MR-8 兑现 + 验证"添加新 spec 类型不一定每次都要新 dispatch"
        - 这是 V37.9.20/V37.9.22 第三 spec extension 模式之外的另一种模式：
          minimal extension（只 1 个 extractor），证明 framework 可以多种
          extension 路径
      为什么 alert_only 起步而非 machine_sync？
        - kb_embed.py 全量重建是 LLM embedding 调用密集型 (cost/latency)
        - 应该是增量 re-index 而非全量，路径需 V37.9.23+ 设计
        - 一周观察期收集 false-positive 数据（如 chunks list size 限制 vs
          真实未索引的歧义）
      为什么 substring match 而非 exact equality？
        - chunks[].source_file 通常是绝对路径如 "/Users/.../arxiv_daily.md"
        - declared 是 basename "arxiv_daily.md"
        - line_contains_identifier 默认 substring 行为与 jobs_to_crontab
          (V37.9.19) 完全一致
    checks:
      # ── declaration layer: convergence.py 扩展点 ────────────────────
