      - name: "kb_sources_to_index 引用本 INV"
        check_type: file_contains
        file: ontology/convergence_ontology.yaml
        pattern: 'governance_invariant: INV-CONVERGENCE-KB-001'
      - name: "convergence_ontology meta version 升级到 ≥ 0.4 (V37.9.22 0.4 → V37.9.25 0.7 → V37.9.58 0.8-machine-sync-activated)"
        check_type: file_contains
        file: ontology/convergence_ontology.yaml
        # regex alternation: 任一字面量出现即 pass (向前兼容下个 minor 版本升级)
        pattern: '0\.4-fourth-spec|0\.5-machine-sync-dry-run|0\.6-named-dispatch-apply-functions|0\.7-fifth-spec-services-to-launchd|0\.8-machine-sync-activated'
      - name: "convergence_ontology meta 引用本 INV (related_invariants)"
