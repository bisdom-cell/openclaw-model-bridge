              assert s in src, f"PLACEHOLDER_PATTERNS 必须含 V37.9.36 血案字符串: {s!r}"

      # ── declaration: 报告文件 + 测试文件存在 + 关键内容检查 ──────────
      - name: "audit 报告 markdown 已落盘 + 显示 21 个候选脚本扫描结果"
        check_type: file_contains
        file: docs/llm_cron_fail_fast_audit.md
        pattern: "候选脚本总数：21"
      - name: "audit 报告含 V37.9.38+ 修复路线图"
        check_type: file_contains
        file: docs/llm_cron_fail_fast_audit.md
        pattern: "V37.9.38\\+ 修复路线图"
