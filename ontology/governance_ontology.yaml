      根因 6 因子叠加（涌现行为，非单点 bug）:
        1) 用户主动保存的 ⭐⭐⭐⭐⭐ 笔记反复出现同一主题
        2) Phase 1b prompt 偏好"重复出现=持续关注"放大同一信号
        3) content-stable cache (V37.3 fix C) 锁定 signals
        4) mtime 倒序处理 + user notes 静态 → 反复参与
        5) NOTES_SIGNALS 按 signal-hash dedup 但不按主题层去重
        6) PREV_THEMES 只看 3 天 + prompt 留后门"同主题新角度可深挖"

      V37.9.68 结构修复 (用户决策方案 C):
        - PREV_THEMES 3 → 14 天 + Python helper 提取主题关键词 + DEEP 硬规则禁选 14 天 ban-list
        - 拆 1 个单主题 chunked → 2 LLM 调用 + 4 段 ## header 多窗口推送:
            · DEEP (1500 字): 14 天未出现的新主题深挖 + fail-fast 顺序锁
            · WIDE (5 × 200 = 1000 字): 跨领域鲜人知信号
            · RADAR (5 × 300 = 1500 字): 准期信号 (今日 1 份证据但累积有趋势)
            · Overview (规则提取, 不调 LLM): 连动 + 明日关注
        - DEEP 必过 / WIDE+RADAR 独立 [DEGRADED] 降级
        - 主题归一化用 2-gram + 3-gram 中文 + anchor 长 token 单独命中
    design_decision: |
