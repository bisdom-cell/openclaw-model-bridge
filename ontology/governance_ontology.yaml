        check_type: file_contains
        file: ontology/docs/cases/movespeed_tcc_sandbox_blood_case.md
        pattern: "macOS TCC Sandbox"
      - name: "案例文档铁证字面量 kernel + Sandbox + deny"
        check_type: file_contains
        file: ontology/docs/cases/movespeed_tcc_sandbox_blood_case.md
        pattern: "kernel \\(Sandbox\\) System Policy: rsync"
      - name: "案例文档含 60 天 6 假说证伪表"
        check_type: file_contains
        file: ontology/docs/cases/movespeed_tcc_sandbox_blood_case.md
        pattern: "6 个假说全证伪"
      - name: "案例文档含 V37.9.30 取证盲区分析 (lsof/ACL 采集自身被 sandbox 拒绝)"
