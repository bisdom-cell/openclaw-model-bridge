    verification_layer: [declaration]
    severity: medium
    declaration: |
      kb_dream.sh --map-notes 预热笔记缓存(00:40 cron)。
      已被 INV-DREAM-001/002/003 深度覆盖，此条补齐 MRD-CRON-001 扫描匹配。
    checks:
