  - id: INV-JOB-TREND-001
    name: kb-trend-calls-llm-with-timeout
    meta_rule: MR-4
    verification_layer: [declaration]
    severity: medium
    declaration: |
      kb_trend.py 每周分析关键词趋势并调用 LLM 生成报告。
      必须有 STOP_WORDS 过滤噪声词，且通过 proxy 调用 LLM。
    checks:
