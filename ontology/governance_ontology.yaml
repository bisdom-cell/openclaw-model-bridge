              f"抓到任何 .sh heredoc 内 import 不一致"
          )

  # ── V37.9.85: INV-AUTO-INJECT-001 ──────────────────────────────────
  - id: INV-AUTO-INJECT-001
    name: batch-inject-tools-must-integrate-scanner
    meta_rule: MR-18
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      MR-18 Step 2 前瞻守卫: 仓库内任何 batch injection/migration 工具
      (匹配 inject_*.py / migrate_*.py 命名模式) 必须内嵌
      heredoc_import_scanner 验证, 注入前 dry-run + 注入后 validation +
      失败整批 rollback. 当前 (V37.9.85) 无此类工具存在于仓库 — 它们是
      V37.9.57/58 session 内使用的一次性脚本. 本守卫的价值是: 未来如果
      有人 commit 了 inject/migrate 工具但没集成 scanner, governance
      audit 立即抓到.

      血案谱系:
        - V37.9.57 inject_level_4_to_aligned_jobs.py 自动注入 8 jobs
          但未补 import os → 8 倍放大同款 NameError
        - V37.9.58-hotfix 批量修复 + V37.9.58-hotfix2 立 MR-18 + scanner
        - V37.9.85 立 INV-AUTO-INJECT-001 前瞻守卫 (MR-18 Step 2 兑现)
    checks:
      - name: "MR-18 enforcement 段列出 INV-AUTO-INJECT-001"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: 'INV-AUTO-INJECT-001'
      - name: "heredoc_import_scanner.py scan_repo 函数存在 (batch 工具必须调的 API)"
        check_type: file_contains
        file: heredoc_import_scanner.py
        pattern: 'def scan_repo'
      - name: "V37.9.85 marker 存在"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: 'V37.9.85'
      - name: "test_auto_inject_guard.py 单测存在"
        check_type: file_contains
        file: test_auto_inject_guard.py
        pattern: 'class TestAutoInjectGuard'
      # runtime: 扫 repo 内 inject_*.py / migrate_*.py 是否存在且合规
      - name: "RUNTIME: 任何 inject_*.py/migrate_*.py 必须含 scanner 集成 (当前无此类文件=pass)"
        check_type: python_assert
        code: |
          import os, re, fnmatch
          # V37.9.114: realpath (非 abspath) 解析 ~/ontology symlink → 仓库根. 原 abspath(__file__)
          # 在 `python3 ~/ontology/governance_checker.py` (经 V37.9.12.1 symlink) 调用下误解析
          # repo_root=$HOME → glob($HOME/**, recursive=True) 跟随 symlink 遍历整个家目录
          # (venv 109M/.openclaw media+logs/.kb) 100% CPU 无限挂死 (V37.9.114 血案).
          # V37.9.119 日落法决策: 保留 realpath (非收敛到 os.getcwd()) — 本块有 V37.9.114 anti-hang
          # 守卫专门 pin realpath, 守卫开火=免疫系统工作; realpath 与 governance_checker._resolve_project_root
          # /engine.py 统一为 __file__-resolution 单一形式 (一物一形按 resolution 家族, 非按 chdir 上下文).
          _real = os.path.realpath(__file__)
          if "ontology" in _real:
              repo_root = os.path.dirname(os.path.dirname(_real))
          else:
              repo_root = os.path.dirname(_real)
          # V37.9.114: os.walk(followlinks=False) 替代 glob('**', recursive=True) — 后者跟随
          # symlink 遇环无限遍历挂死; os.walk 默认不跟随 symlink + 跳过大目录有界.
          # 全用 plain for-loop 不用 comprehension — exec() 作用域陷阱 (V37.3/V37.9.100):
          # exec'd 代码里 comprehension 新作用域看不到 exec-local 变量 (skip_dirs/patterns) → NameError.
          patterns = ["inject_*.py", "migrate_*.py"]
          skip_dirs = (".git", "__pycache__", "node_modules", "venv", "venv_pptx", ".kb", ".openclaw")
          found_tools = []
          for dp, dns, fns in os.walk(repo_root, followlinks=False):
              pruned = []
              for d in dns:
                  if d not in skip_dirs:
                      pruned.append(d)
              dns[:] = pruned
              for f in fns:
                  for pat in patterns:
                      if fnmatch.fnmatch(f, pat):
                          found_tools.append(os.path.join(dp, f))
                          break
          found_tools = [f for f in found_tools
                         if not any(skip in f for skip in ["__pycache__", "test_", ".git"])]
          violations = []
          for tool_path in found_tools:
              with open(tool_path, "r", encoding="utf-8", errors="replace") as fh:
                  content = fh.read()
              has_scanner = (
                  "scan_heredoc_imports" in content
                  or "heredoc_import_scanner" in content
                  or "scan_repo" in content
              )
              if not has_scanner:
                  violations.append(os.path.relpath(tool_path, repo_root))
          assert len(violations) == 0, (
              f"INV-AUTO-INJECT-001: {len(violations)} batch inject/migrate tool(s) "
              f"lack scanner integration: {violations}. "
              f"MR-18 requires: from heredoc_import_scanner import scan_repo"
          )

  # ── V37.9.86: INV-HALLUCINATION-001 ─────────────────────────────────
  - id: INV-HALLUCINATION-001
    name: llm-tasks-must-use-hallucination-guards
    meta_rule: MR-7
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
