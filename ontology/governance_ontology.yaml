  - id: INV-CONVERGENCE-SERVICES-001
    name: services-registry-converges-to-launchd
    meta_rule: MR-17
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      V37.9.25 Phase 4 Layer 5 第 5 个 spec services_to_launchd:
      services_registry.yaml 中所有 service 的 launchd label 必须在 macOS
      `launchctl list` stdout 中至少出现一次（即 launchd 已 load 该 service
      并在 supervise 它）。framework 第 5 次扩展, 验证 V37.9.20 named-dispatch
      "添加新 spec 类型零 framework 改动" 承诺第 5 次实证 (minimal-extension 路径:
      只新加 1 个 extractor _extract_services_from_registry, 复用 V37.9.19
      _observe_shell_command + _parse_line_contains_identifier).

      首期 (V37.9.25) drift_action=alert_only — 与 V37.9.19 jobs_to_crontab
      同款保守路线. machine_sync 升级延后到 V37.9.26+ 一周观察期之后.
      Plan B 渐进 dry-run 模式预留 (planned_helper: bash $HOME/restart.sh
      或 per-service launchctl bootstrap).

      与其他 4 个 convergence spec 的关系:
        - jobs_to_crontab (V37.9.19, machine_sync): 守 system cron 注册
        - kb_sources_to_index (V37.9.22, machine_sync): 守 KB index 索引
        - providers_to_adapter (V37.9.20, alert_only_permanent): 守 adapter
          fallback chain (operator decision, no auto-fix)
        - openclaw_config_to_runtime (V37.9.22, alert_only_permanent): 守
          Gateway runtime version (operator decision, no auto-fix)
        - services_to_launchd (V37.9.25, alert_only): 守 launchd 服务注册
          (V37.9.26+ machine_sync 候选)
      五个 spec 互补无重叠, 共同覆盖 declared → runtime 同步全栈.
    lesson: |
      V37.9.13 候选首次登记 status.json: "如果 macOS 重装或 plist 意外删除,
      V37.9.12.1 给 proxy plist 加的 ONTOLOGY_MODE=on 会丢失". 延后多版本因
      plist 入仓涉及敏感 env vars handling (复杂 deployment 问题).

      V37.9.25 重新审视: convergence framework 不需要解决"plist 入仓"问题,
      只需解决"声明的 service 是否真在 launchd 注册" — 这是更上游的事实层守卫.
      plist 文件本身可继续作为 Mac Mini 本地配置, 但其加载状态由 framework
