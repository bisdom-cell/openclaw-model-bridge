        pattern: 'INV-CONVERGENCE-OPENCLAW-001'
      # ── runtime layer: V37.9.22 specific test classes 端到端通过 ───
      - name: "RUNTIME: test_convergence.py V37.9.22 测试类全部通过 (TestWalkJsonPathsToSet + TestExtractJsonFilePaths + TestVerifyOpenclawConfigToRuntimeIntegration + TestOpenclawSpecSourceGuards)"
