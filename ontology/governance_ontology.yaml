          )
      - name: "V37.9.77 反向 sabotage 守卫: 27 个 V37.9.77 单测全过"
        check_type: python_assert
        assertion: |
          # 守卫: 端到端真跑 test_v37_9_77_enforcement.py 全部单测
          import os as _os
          import subprocess as _sub
