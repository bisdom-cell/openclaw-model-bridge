        pattern: '"status":"llm_failed"'
      # V37.9.37 升级: "LLM 摘要缺失" → "[LLM_DEGRADED]" 标记 (LLM_DEGRADED 守卫见后)
      # 旧守卫已被 V37.9.37 升级层中的 "emit 端 LLM_DEGRADED 标记替代占位符" 等效替代
      - name: "run_rss_blogs.sh 不再含 V37.9.36 前 silent warn 反模式"
        check_type: file_not_contains
        file: jobs/rss_blogs/run_rss_blogs.sh
