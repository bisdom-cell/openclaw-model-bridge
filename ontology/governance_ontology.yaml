        Q1 LLM 调用次数: 2 次 (DEEP 独立 + WIDE+RADAR 合一) — 平衡成本+质量
        Q2 主题防衰减窗口: 14 天 — 防 Qwen-BIM 类连续几周不过度约束
        Q3 WIDE+RADAR 数量: WIDE 5 + RADAR 5 — RADAR 多视野
        Q4 失败降级: DEEP 必过 / WIDE+RADAR 可独立降级 — 保 DEEP 是核心 SLO

      anchor 关键词阈值实测调优（避免 false positive）:
        - 英文复合标识符 (含 hyphen / digit) ≥4 字 → anchor (qwen-bim/gpt-4/14b ✓)
        - 英文纯字母 ≥8 字 → anchor (ontology ✓, plane ✗ 因 5 字, control ✗ 因 7 字)
        - 中文 ≥3 字 → anchor (3-gram 控制平/制平面 ✓)
        - 实证防 false positive: Memory Plane vs Control Plane 共享 "plane" 但 5 字不算 anchor
