                          "title": f"T{i}",
                          "link": f"https://x/{i}",
                          "feed_label": "L",
                          "pub_date": "2026-05-07T12:00",
                          "description": f"RSS desc for article {i}",
                      }, ensure_ascii=False) + "\n")
              with open(results_file, "w") as f:
                  for i in range(2):
