  - id: INV-HEALTH-001
    name: health-fields-freshness
    meta_rule: MR-5
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "status.json health 字段有自动刷新 + 时间戳"
    # V37.9.3 MR-6 补齐 — 原双 file_contains 仅证字符串存在，runtime 补 (a) shell
    # 语法合法 (b) 真调 security_score.py --update 命令（模式化对 `--update` 或
    # `>` 到 status.json 的代码结构）(c) status.json 顶层含 health 键用于双侧对齐。
    # 三层共守 observability 最低保障。
    checks:
      - name: "kb_status_refresh.sh 有 security_score 自动刷新"
        check_type: file_contains
        file: kb_status_refresh.sh
        pattern: "security_score"
      - name: "kb_status_refresh.sh 写入 security_score_time"
        check_type: file_contains
        file: kb_status_refresh.sh
        pattern: "security_score_time"
      - name: "V37.9.3 runtime: kb_status_refresh.sh 语法合法 + 真调 security_score.py"
        check_type: python_assert
        code: |
          # Runtime: (a) bash -n 验证脚本语法 (b) 真实扫脚本内容 AST-like 解析确认
          # security_score.py 不是注释字面量而是真实子进程调用 (c) 验证脚本存在
          # 且有执行位或可被 bash 执行。
          import subprocess, os, re
          assert os.path.exists("kb_status_refresh.sh"), "kb_status_refresh.sh 不存在"
          # (a) 语法合法
          proc = subprocess.run(
              ["bash", "-n", "kb_status_refresh.sh"],
              capture_output=True, text=True, timeout=10,
          )
          assert proc.returncode == 0, (
              f"kb_status_refresh.sh 语法错误:\n{proc.stderr[:500]}"
          )
          # (b) 真实调 security_score.py（非注释）
          with open("kb_status_refresh.sh", "r", encoding="utf-8") as f:
              source = f.read()
          # 剥离注释行后再扫，避免文档字面量假阳性
          non_comment_lines = []
          for line in source.split("\n"):
              stripped = line.strip()
              if stripped.startswith("#"):
                  continue
              non_comment_lines.append(line)
          non_comment = "\n".join(non_comment_lines)
          # 必须有 python3 ... security_score.py 或 security_score.py 直接执行
          has_call = bool(re.search(
              r"(python3?\s+\S*security_score\.py|\./security_score\.py|bash\s+.*security_score)",
              non_comment
          ))
          assert has_call, (
              "kb_status_refresh.sh 非注释行中未发现 security_score.py 真调用"
          )
          # (c) security_score.py 文件存在
          assert os.path.exists("security_score.py"), (
              "kb_status_refresh.sh 引用 security_score.py 但文件不存在"
          )

