    name: movespeed-tcc-sandbox-blood-case-documented
    meta_rule: MR-4  # silent-failure (60 天 6 个假说全证伪, 真因在 macOS 系统日志中)
    verification_layer: [declaration, runtime]
    # severity=high (非 critical) — 修复在 macOS 系统 GUI 操作不在代码层,
    # 但文档+认知修正的工程严肃性通过 7 declaration + 1 runtime python_assert 锁定.
    severity: high
    declaration: |
      V37.9.80 终结 V37.9.4 起 60 天 MOVESPEED EPERM 血案 — 真因 = macOS TCC Sandbox
      拒绝 cron 派生进程访问外置卷 /Volumes/MOVESPEED. 不是 fskit / ACL / ownership /
      TM snapshot / SSD 物理掉线 (全 6 个假说被 V37.9.30 累积数据证伪).

      铁证: macOS 系统日志含 `kernel (Sandbox) System Policy: rsync deny(1)
      file-read-data /Volumes/MOVESPEED/KB` 字面量, V37.9.30 取证扩展 lsof/ACL
      自身也被 sandbox 拒绝产 empty.

      修复路径 (用户手动): 系统设置 → 隐私与安全性 → 完全磁盘访问权限 → 添加
      /usr/sbin/cron. 验证 24h 后 incidents 应从 ~13/24h → 0 或 ≤2/24h.

      INV 守 (1) 案例文档存在 (movespeed_tcc_sandbox_blood_case.md) (2) V37.4.3
      案例 (pa_alert_contamination_case.md) 加入 V37.9.80 修正备注承认当时
      "FDA 修复方向 60 天后证实是对的, PA 场景错配但局部真值正确".
    checks:
      # declaration layer
