          # 把 V37.9.36 detection snippet (run_rss_blogs.sh 内嵌) 提出来 subprocess 真跑
          # 输入实际血案 LLM_RESP, 断言 stderr 含 __LLM_HTTP_ERROR__ marker
          import subprocess, sys
          snippet = """
          import json, sys
          try:
              d = json.load(sys.stdin)
          except Exception as e:
              print(f'__LLM_PARSE_FAIL__:bad_json:{type(e).__name__}', file=sys.stderr)
              sys.exit(0)
          if isinstance(d, dict) and 'error' in d:
              err_msg = str(d['error'])[:500].replace(chr(10), ' ')
              print(f'__LLM_HTTP_ERROR__:{err_msg}', file=sys.stderr)
              sys.exit(0)
          try:
              content = d['choices'][0]['message']['content']
          except (KeyError, IndexError, TypeError) as e:
              print(f'__LLM_PARSE_FAIL__:no_choices:{type(e).__name__}', file=sys.stderr)
              sys.exit(0)
          print(content)
          """
          # 实际血案数据 (来自 Mac Mini 2026-05-07 18:00 cache/llm_raw_last.txt)
          actual_resp = '{"error":"HTTP Error 502: Bad Gateway | upstream: primary: HTTP Error 301: Moved Permanently; gemini: HTTP Error 503"}'
          result = subprocess.run(
              [sys.executable, "-c", snippet],
              input=actual_resp,
              capture_output=True, text=True, timeout=10,
          )
          assert "__LLM_HTTP_ERROR__" in result.stderr, (
              f"detection 应识别 502 error: stderr={result.stderr!r}"
          )
          assert "primary: HTTP Error 301" in result.stderr
          assert "gemini: HTTP Error 503" in result.stderr
          assert result.stdout == "", "HTTP error 不应输出 content 到 stdout"
