  # ── V37.9.58-hotfix2: INV-HEREDOC-IMPORT-001 ─────────────────────────
  - id: INV-HEREDOC-IMPORT-001
    name: heredoc-python-imports-must-cover-all-referenced-modules
    meta_rule: MR-18
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      所有 .sh 中的 Python heredoc (`<< 'PYEOF' ... PYEOF`) 顶部 import 行
      必须覆盖 heredoc body 中所有 referenced 的模块名 (考虑 builtin / locally
      defined 豁免). 否则 Python 执行时 NameError → 自动 retry 包装可能当
      "返回空 content 成功" → 下游 silent failure.

      血案谱系 (V37.9.50-hotfix → V37.9.58-hotfix → 本不变式立案):
        - V37.9.50-hotfix (2026-05-10): semantic_scholar 单点 fix 没转化为治理
        - V37.9.58-hotfix (2026-05-12): V37.9.57 自动批量注入工具引入 8 倍
          放大同款 bug, 用户视角发现
        - V37.9.58-hotfix2 (2026-05-12): heredoc_import_scanner.py AST 解析
          + 立 INV-HEREDOC-IMPORT-001 + 立 MR-18 (auto-batch-injection-must-
          validate-runtime-semantics) — 治理债清零, scanner 主动监控
    # MR-6 合规: declaration 层 (scanner 模块 + 单测存在) + runtime 层
    # (scanner 真扫整 repo 必须报 0 violations)
    checks:
      # declaration layer
      - name: "heredoc_import_scanner.py 文件存在 + scan_heredoc_imports 函数定义"
        check_type: file_contains
        file: heredoc_import_scanner.py
        pattern: 'def scan_heredoc_imports'
      - name: "scanner 头部声明 FAIL-CLOSE 契约 (反 MR-4 silent)"
        check_type: file_contains
        file: heredoc_import_scanner.py
        pattern: 'FAIL-CLOSE'
      - name: "scanner 引用 V37.9.50-hotfix 血案历史 (8 天前同款 bug 治理债)"
        check_type: file_contains
        file: heredoc_import_scanner.py
        pattern: 'V37.9.50-hotfix'
      - name: "test_heredoc_import_scanner.py 单测存在 + 反向验证守卫类"
        check_type: file_contains
        file: test_heredoc_import_scanner.py
        pattern: 'class TestRepoScanIntegration'
      # runtime layer: scanner 真扫整 repo 必须 0 violations (V37.9.58-hotfix2 状态)
      - name: "RUNTIME: heredoc_import_scanner --scan-all exit 0 (0 violations)"
        check_type: python_assert
        code: |
          import subprocess, os, sys
          repo_root = os.getcwd()  # V37.9.118 日落法 #30: 单一源 (chdir 后==_PROJECT_ROOT), 替代 abspath+ternary
          result = subprocess.run(
              [sys.executable, "heredoc_import_scanner.py", "--scan-all"],
              cwd=repo_root, capture_output=True, text=True, timeout=60
