          # V37.9.74 守卫: retry 成功必须双重验证 — chars >= MIN + 含 ## 📡 字面量
          # 防 LLM 产 1500 字垃圾但仍漏 header 的 corner case
          with open("kb_dream.sh") as _f:
              _src = _f.read()
          assert 'RADAR_RETRY_HAS_HEADER' in _src, "V37.9.74: 必须有 has_header 验证变量"
          assert '[ "$RADAR_RETRY_HAS_HEADER" = "true" ]' in _src, (
              "INV-DREAM-MULTITHEME-001 V37.9.74: retry 成功必须双重验证 (chars + header)"
          )
      - name: "V37.9.74 status.json schema 含 radar_retried 字段 (运维可观测 LLM drift 频率)"
        check_type: file_contains
        file: kb_dream.sh
        pattern: '"radar_retried":%s'
      - name: "V37.9.75 候选 B (doubao 试水) 必须登记在 V37.9.74 注释 (防止候选丢失)"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'V37.9.75\+ 候选 B'
      # === V37.9.75: DEEP LLM partial content 修复 (retry 兜底, 镜像 V37.9.74 RADAR retry 同款模式) ===
      # 触发: 2026-05-18 03:02 Mac Mini cron LLM partial 823 chars (5/15-17 三天稳定 6314-7125 chars)
      # 修复: DEEP retry 兜底 (走默认 primary), 失败仍 fail-fast (V37.9.68 DEEP 必过原则不破)
      # 多层防御: V37.9.68 prompt 严格 (预防) + V37.9.75 retry 一次 (恢复) + V37.9.68 fail-fast (兜底)
      - name: "V37.9.75 marker 在 kb_dream.sh (审计可追)"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'V37.9.75'
      - name: "V37.9.75 retry 兜底: DEEP_RETRY_SYSTEM 变量必须定义"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'DEEP_RETRY_SYSTEM='
      - name: "V37.9.75 retry 兜底: DEEP_RETRY_PROMPT 变量必须定义"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'DEEP_RETRY_PROMPT='
      - name: "V37.9.75 retry 触发条件: 仅在 partial content (非空但短) 时"
        check_type: python_assert
        assertion: |
          # V37.9.75 守卫: retry 必须仅在 LLM 真返回非空 partial content 时触发
          # 完全空时 skip (llm_call 已 retry, 不浪费 token)
          # 反向 sabotage: 移除 retry 触发条件 → V37.9.75 单测立即 fail
          with open("kb_dream.sh") as _f:
              _src = _f.read()
          _trigger = '[ -n "${DEEP_RESULT// }" ] && [ "$DEEP_CHARS" -lt "$MIN_DEEP_CHARS" ]'
          assert _trigger in _src, (
              "INV-DREAM-MULTITHEME-001 V37.9.75: retry 触发条件必须是 -n DEEP_RESULT AND DEEP_CHARS<MIN "
              "(防止完全空时浪费 retry token, llm_call 内已 retry 过)"
          )
      - name: "V37.9.75 retry 结果双重验证 (chars + header)"
        check_type: python_assert
        assertion: |
          # V37.9.75 守卫: retry 成功必须双重验证 — DEEP_CHARS >= MIN + 含 ## 🌙 今日深度 字面量
          # 防 LLM 产 1400 字垃圾但漏 header 的 corner case
          with open("kb_dream.sh") as _f:
              _src = _f.read()
          assert 'DEEP_RETRY_HAS_HEADER' in _src, "V37.9.75: 必须有 has_header 验证变量"
          assert '[ "$DEEP_RETRY_HAS_HEADER" = "true" ]' in _src, (
              "INV-DREAM-MULTITHEME-001 V37.9.75: retry 成功必须双重验证 (chars + header)"
          )
          assert "'## 🌙 今日深度'" in _src, (
              "INV-DREAM-MULTITHEME-001 V37.9.75: header 字面量必须是 '## 🌙 今日深度' (V37.9.68 prompt 输出格式)"
          )
      - name: "V37.9.75 retry 成功路径: 用 retry 结果继续 WIDE+RADAR"
        check_type: python_assert
        assertion: |
          # V37.9.75 守卫: retry 成功后必须替换 DEEP_RESULT + 更新 DEEP_CHARS, 让下游 pipeline 用 retry 结果
          # 反向 sabotage: 删除 DEEP_RESULT="$DEEP_RETRY_RESULT" → 用户看到 partial 不是 retry 结果
          with open("kb_dream.sh") as _f:
              _src = _f.read()
          _idx = _src.find('V37.9.75 DEEP retry 成功')
          assert _idx > 0, "V37.9.75: retry 成功日志字面量必须存在"
          _window = _src[max(0, _idx - 300):_idx]
          assert 'DEEP_RESULT="$DEEP_RETRY_RESULT"' in _window, (
              "INV-DREAM-MULTITHEME-001 V37.9.75: retry 成功后必须替换 DEEP_RESULT"
          )
          assert 'DEEP_CHARS=$DEEP_RETRY_CHARS' in _window, (
              "INV-DREAM-MULTITHEME-001 V37.9.75: retry 成功后必须更新 DEEP_CHARS"
          )
      - name: "V37.9.75 status.json schema 含 deep_retried 字段 (运维可观测 LLM partial content 频率)"
        check_type: file_contains
        file: kb_dream.sh
        pattern: '"deep_retried":%s'
      - name: "V37.9.75 status.json schema 含 deep_retry_chars 字段"
        check_type: file_contains
        file: kb_dream.sh
        pattern: '"deep_retry_chars":%d'
      # === 运行时层 ===
      - name: "DEEP fail-fast 顺序锁 (失败必 exit 1)"
        check_type: python_assert
        code: |
          # 守卫: DEEP fail-fast 顺序锁 — phase":"deep" 字面量后 800 字符内必须含 exit 1
          # 防回退到"静默继续到 WIDE+RADAR"反模式
          # V37.9.100: 窗口 500→800 (V37.9.75 加 deep_retried/deep_retry_chars 字段撑长 status
          #   printf 行, exit 1 实测在 604 字符, 属性仍在只是 status 行变长)
          with open("kb_dream.sh") as _f:
              _src = _f.read()
          _idx = _src.find('"status":"llm_failed","phase":"deep"')
          assert _idx > 0, "INV-DREAM-MULTITHEME-001: DEEP fail-fast 分支必须存在"
          _window = _src[_idx:_idx + 800]
          assert "exit 1" in _window, (
              "INV-DREAM-MULTITHEME-001: DEEP fail 分支 800 字符内必须 exit 1 fail-fast"
          )
      - name: "kb_dream_helpers 单测 68 个全过"
        check_type: python_assert
        assertion: |
          # 守卫: 端到端真跑 test_kb_dream_helpers.py 全部单测
          import os as _os
          import subprocess as _sub
          _repo = _os.environ.get("OPENCLAW_REPO_ROOT", _os.getcwd())
          _result = _sub.run(
              ["python3", "test_kb_dream_helpers.py"],
              cwd=_repo, capture_output=True, text=True, timeout=120,
          )
          assert _result.returncode == 0, (
              f"INV-DREAM-MULTITHEME-001 单测失败:\n"
              f"{_result.stdout[-500:]}\n{_result.stderr[-500:]}"
          )

  - id: INV-ROUTER-001
    name: capability-router-shadow-mode-deployed
    description: |
      V37.9.76 Capability-Based Dynamic Router PoC shadow 模式部署契约.
      providers.find_best_provider 纯函数 + router_decide.py 决策记录器 +
      jobs_registry capability profile (kb_dream + hf_papers) + 集成 shadow
      调用 (kb_dream RADAR retry + hf_papers per_paper) + auto_deploy
      FILE_MAP 部署 + ~/.kb/router_decisions.jsonl observability.

      shadow 模式契约: 决策记录但不强制 LLM 路由. caller 仍用 adapter PROVIDER_NAME
      默认路径. 一周观察期数据反馈调 cap_score, V37.9.77+ 评估 enforcement
      (adapter ?provider= 支持).

      镜像 V37.9.19 → V37.9.23 → V37.9.58 Plan B 同款渐进策略路径:
      declarative (shadow mode 决策可见) → on (enforcement 真路由) — 一周观察期保险.
    meta_rule: MR-7
    severity: high
    verification_layer: [declaration, runtime]
    blood_lessons: |
      V37.9.55+ doubao 试水承诺: 不再硬编码"doubao 走 RADAR retry", 而是 "task 声明
      reasoning + cost_tier=low → router 自动选 doubao". V37.9.76 shadow 模式
      让这个承诺可以观察验证而不冒 enforcement 风险.

      V3 路标 pip install ontology-engine 核心交付方向 — declarative capability
      framework 真正能做到 "task 声明 → router 自动选择 → observability 反馈" 完整闭环.
    checks:
      # === 声明层: providers.find_best_provider 函数定义 + 签名 ===
      - name: "V37.9.76 providers.find_best_provider 函数定义"
        check_type: file_contains
