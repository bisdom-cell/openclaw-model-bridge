  # --- 2026-04-11 新增：Dream Map 预算溢出 + cache key 漂移案例 ---

  - id: INV-DREAM-001
    name: map-budget-scales-with-mode
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "Dream 的 DREAM_TIMEOUT_SEC 必须按模式动态：Map-Only 模式 >= 5400s (90min) 以容纳全量 KB bootstrap，Reduce full run 保持 3600s (60min)"
    design_decision: |
      2026-04-11 教训：Notes 总量增长到 286 → Notes Map 总耗时 ~60 min 刚好撞上
      DREAM_TIMEOUT_SEC=3600 的硬预算。00:40 --map-notes 和 03:00 full run 连续
      超时，Reduce 从未执行。固定预算是"定时炸弹"——workload 长到某天就会炸。
      修复：按 MAP_ONLY 动态预算（90min / 60min），并把 Notes Map 的 batch size
      翻倍（15/12KB → 30/24KB）将 LLM 调用次数减半。
    source_case: "ontology/docs/cases/dream_map_budget_overflow_case.md"
    checks:
      - name: "kb_dream.sh 动态 DREAM_TIMEOUT_SEC（MAP_ONLY=5400）"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "MAP_ONLY.*=.*true.*\\n.*DREAM_TIMEOUT_SEC=5400"
      - name: "kb_dream.sh Notes batch 阈值为 30 条 / 24000B"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'PENDING_COUNT.*-ge 30.*PENDING_SIZE.*-gt 24000'
      # V37.9.2: MR-6 深度补齐 runtime 层（原仅 declaration）
      - name: "V37.9.2 runtime: MAP_ONLY 模式预算 >= 5400s + Reduce 模式预算 <= 3600s"
        check_type: python_assert
        code: |
          # Runtime 层补强: 真读 kb_dream.sh 解析两处 DREAM_TIMEOUT_SEC 赋值
          # 确保预算映射正确（MAP_ONLY 必须比 Reduce 更宽，否则一切退化到固定预算）
          import re
          with open("kb_dream.sh", "r", encoding="utf-8") as f:
              src = f.read()
          # 找 DREAM_TIMEOUT_SEC 所有赋值位点
          assignments = re.findall(r'DREAM_TIMEOUT_SEC\s*=\s*(\d+)', src)
          assert len(assignments) >= 2, (
              f"kb_dream.sh 至少应有 2 处 DREAM_TIMEOUT_SEC 赋值（MAP_ONLY 与 Reduce），"
              f"实际 {len(assignments)}: {assignments}"
          )
          # 转成 int
          values = []
          for a in assignments:
              values.append(int(a))
          # 最大值应 >= 5400 (MAP_ONLY 90 min 窗口)
          max_budget = max(values)
          assert max_budget >= 5400, (
              f"DREAM_TIMEOUT_SEC 最大值 {max_budget}s 应 >= 5400s (MAP_ONLY 模式)"
          )
          # 最小值 <= 3600 (Reduce 60 min 足够读缓存)
          min_budget = min(values)
          assert min_budget <= 3600, (
              f"DREAM_TIMEOUT_SEC 最小值 {min_budget}s 应 <= 3600s (Reduce 模式)"
          )
          # 差距 >= 1800s (30 min)：证明确实按模式动态而非同一常量
          assert max_budget - min_budget >= 1800, (
              f"MAP_ONLY 与 Reduce 预算差 {max_budget - min_budget}s < 1800s: "
              "预算可能未真正按模式分化"
          )

  - id: INV-DREAM-002
    name: reduce-path-must-not-re-run-map-loops
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "Map-Reduce 分离调度的契约：默认 full run（MAP_ONLY=false 且 FAST_MODE=false）必须跳过 Phase 1a/1b 的 LLM 循环，只从 .map_cache/ 读取，否则 Reduce 会重复燃烧 Map 预算"
    design_decision: |
      2026-04-11 教训：Reduce full run 之前会再跑一遍完整的 Phase 1a/1b，即使
      00:00 --map-sources 和 00:40 --map-notes 已经把缓存写好。这让"分离调度
      节省预算"的设计意图形同虚设——Reduce 每次都重跑 47 批 Notes Map，每次
      超时在同一位置。修复：Reduce 路径新增 cache-only fast path，扫 $MAP_DIR
      直接填充 MAP_SIGNALS/NOTES_SIGNALS 并 SKIP_MAP_LOOPS=true。
    source_case: "ontology/docs/cases/dream_map_budget_overflow_case.md"
    # V37.8: MR-6 合规 — 原有三层全是 file_contains(declaration)，grep 能证明
    # `SKIP_MAP_LOOPS=true` 字面量存在 + 门控语句存在，但无法证明**门控在
    # Phase 1a/1b 循环之前生效**。新增运行时层：读文件拿行号，断言
    # SKIP_MAP_LOOPS 赋值在 Phase 1a 循环行之前（顺序锁定，防止重构时把赋值
    # 移到循环之后的回归）。
    checks:
      - name: "kb_dream.sh 有 SKIP_MAP_LOOPS 开关"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "SKIP_MAP_LOOPS=true"
      - name: "Phase 1a 受 SKIP_MAP_LOOPS 门控"
        check_type: file_contains
        file: kb_dream.sh
        pattern: '\[ "\$SKIP_MAP_LOOPS" = false \].*SRC_COUNT'
      - name: "Phase 1b 受 SKIP_MAP_LOOPS 门控"
        check_type: file_contains
        file: kb_dream.sh
        pattern: '\[ "\$SKIP_MAP_LOOPS" = false \].*ALL_NOTES'
      # runtime layer: 行号顺序锁 — SKIP_MAP_LOOPS=true 赋值必须在 Phase 1a/1b 门控之前
      - name: "SKIP_MAP_LOOPS=true 赋值位于 Phase 1a/1b 门控之前（顺序锁）"
        check_type: python_assert
        code: |
          with open("kb_dream.sh") as f:
              lines = f.readlines()
          assign_line = None
          gate_1a_line = None
          gate_1b_line = None
          for i, line in enumerate(lines, 1):
              if assign_line is None and "SKIP_MAP_LOOPS=true" in line:
                  assign_line = i
              if gate_1a_line is None and '[ "$SKIP_MAP_LOOPS" = false ]' in line and "SRC_COUNT" in line:
                  gate_1a_line = i
              if gate_1b_line is None and '[ "$SKIP_MAP_LOOPS" = false ]' in line and "ALL_NOTES" in line:
                  gate_1b_line = i
          assert assign_line, "kb_dream.sh 无 SKIP_MAP_LOOPS=true 赋值"
          assert gate_1a_line, "kb_dream.sh 无 Phase 1a 门控"
          assert gate_1b_line, "kb_dream.sh 无 Phase 1b 门控"
          assert assign_line < gate_1a_line, \
              f"SKIP_MAP_LOOPS 赋值(L{assign_line}) 应在 Phase 1a 门控(L{gate_1a_line}) 之前"
          assert assign_line < gate_1b_line, \
              f"SKIP_MAP_LOOPS 赋值(L{assign_line}) 应在 Phase 1b 门控(L{gate_1b_line}) 之前"

  - id: INV-CACHE-002
    name: notes-cache-key-stable-under-mtime-drift
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "Dream Notes Map 的 cache key 必须只依赖 note content（md5(content)），不依赖 mtime / sort 顺序 / 批次组合；同一条 note 在不同 run 中必须产生相同 cache key"
    design_decision: |
      2026-04-11 教训：原 cache key = md5(batch 拼接文本)。SORTED_NOTES 按 mtime
      DESC 排序，mm_index.py/kb_embed.py 任何一次触碰都会改变顺序 → 改变批次边界
      → 改变 md5 → 00:40 写的缓存 03:00 全部 miss。修复：每 note 一个 cache 文件，
      key = md5(content) 前 12 位。mtime/sort/batch 组合的漂移都不再影响。
      读取时按 signal hash 去重（一批 N 个 note 共享同一份 signals）。
    source_case: "ontology/docs/cases/dream_map_budget_overflow_case.md"
    # V37.8: MR-6 合规 — 原有四层全是 file_contains/file_not_contains(declaration)，
    # 只能证明代码中有 `content_hash=$(printf ... md5sum)` 字样，无法证明"同一内容
    # 在不同 mtime 下真的产生相同 hash"。新增运行时层：真跑 md5，两个 tempfile 同
    # 内容不同 mtime，断言 hash 一致 + 不同内容 hash 不同。
    checks:
      - name: "cache key 使用 content_hash 而非 batch_hash"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'content_hash=.*printf.*content.*md5sum'
      - name: "缓存文件名格式为 _note_<content_hash>.txt"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'DAY.*_note_.*content_hash'
      - name: "不再使用脆弱的批次级 batch_hash"
        check_type: file_not_contains
        file: kb_dream.sh
        pattern: 'batch_hash=.*echo.*BATCH.*md5sum'
      - name: "读取缓存时按 signal hash 去重"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'seen_note_signal_hashes'
      # runtime layer: content-only hash 真实稳定性验证
      # 注意：exec() 作用域陷阱——嵌套函数看不到 exec local dict 的 import，
      # 所以 hash 计算必须 inline，不能包成 def _content_hash(s): ...
      - name: "content-hash 在 mtime 漂移下稳定（真跑 md5 对照）"
        check_type: python_assert
        code: |
          import hashlib, os, tempfile, time
          content_a = "# Note about Qwen3\n\nbody line 1\nbody line 2\n"
          content_b = "# Note about Gemini\n\ndifferent body\n"
          with tempfile.TemporaryDirectory() as td:
              p1 = os.path.join(td, "note_old.md")
              p2 = os.path.join(td, "note_new.md")
              p3 = os.path.join(td, "note_other.md")
              for p, c in ((p1, content_a), (p2, content_a), (p3, content_b)):
                  with open(p, "w") as f:
                      f.write(c)
              # 人为给 p1/p2 不同的 mtime（模拟 mm_index/kb_embed 触碰）
              past = time.time() - 86400 * 2
              os.utime(p1, (past, past))
              now = time.time()
              os.utime(p2, (now, now))
              # 读回各自内容并计算 hash（inline md5 避免 exec 作用域陷阱）
              # 语义与 kb_dream.sh 的 md5(content) 前 12 位一致
              with open(p1) as f:
                  h1 = hashlib.md5(f.read().encode("utf-8")).hexdigest()[:12]
              with open(p2) as f:
                  h2 = hashlib.md5(f.read().encode("utf-8")).hexdigest()[:12]
              with open(p3) as f:
                  h3 = hashlib.md5(f.read().encode("utf-8")).hexdigest()[:12]
              # 必须：
              #   h(p1) == h(p2)   （同内容不同 mtime → cache key 相同）
              #   h(p1) != h(p3)   （不同内容 → cache key 不同）
              assert h1 == h2, \
                  f"mtime 漂移导致 cache key 变化: h(p1)={h1}, h(p2)={h2} — INV-CACHE-002 契约被违反"
              assert h1 != h3, \
                  f"不同内容产生相同 hash（碰撞或实现缺陷）: h(p1)={h1} == h(p3)={h3}"

  # ── 治理系统自观察（MR-7） ─────────────────────────────────────────
  # 2026-04-11: 治理系统自身是一等被治理对象。任何 check 层可能出现的状态
  # 都必须在汇总层有观察路径。详见 ontology/docs/cases/governance_silent_error_case.md

  - id: INV-GOV-001
    name: governance-summary-counts-all-non-pass
    meta_rule: MR-7
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "governance_checker 汇总层必须区分并统计 fail 和 error，两者都不能被 ✅ 汇总行吞掉"
    design_decision: |
      2026-04-11 教训：failed_invs 原本只数 status=="fail"，status=="error"
      被 ✅ 汇总行完全吞掉。INV-CRON-003/004 连续数次 NameError 崩溃，汇总行
      仍报"所有不变式成立"。修复：`if r["status"] in ("fail", "error")`。
    checks:
      - name: "print_results 的 failed_invs 同时统计 fail 和 error"
        check_type: file_contains
        file: ontology/governance_checker.py
        pattern: 'r\["status"\] in \("fail", "error"\)'
      - name: "error 状态注入时汇总行不会说 '所有不变式成立'"
        check_type: python_assert
        code: |
          # V37.7: 用 json_mode=False 参数注入，不再污染 module-level
          # JSON_MODE 全局状态（嵌套调用下该全局会被 save/restore 污染其他
          # check 的视角）。print_results(results, json_mode=False) 的参数
          # 注入是 V37.7 dependency injection 重构的核心目的。
          import io, contextlib, sys
          sys.path.insert(0, 'ontology')
          import governance_checker
          fake_results = [{
              "id": "INV-FAKE-ERROR",
              "name": "synthetic-silent-error-probe",
              "status": "error",
              "severity": "critical",
              "meta_rule": "MR-7",
              "declaration": "注入的 error 用于验证 summary 不吞 error",
              "checks": [
                  {"name": "synthetic", "status": "error", "message": "NameError: fake"}
              ],
          }]
          buf = io.StringIO()
          with contextlib.redirect_stdout(buf):
              exit_code = governance_checker.print_results(fake_results, json_mode=False)
          out = buf.getvalue()
          assert "所有不变式成立" not in out, \
              "silent error regression: ✅ 汇总行吞掉了 error 状态"
          assert exit_code != 0, \
              f"silent error regression: error 状态未计入失败 (exit={exit_code})"
      - name: "print_results 参数化 json_mode（不污染全局状态）"
        check_type: file_contains
        file: ontology/governance_checker.py
        pattern: "def print_results\\(results, json_mode=None\\)"

  # ── 治理深度自我强制（MR-6 + MR-7 交汇点，V37.8） ─────────────────────
  # MR-6 说"critical 不变式必须有 ≥2 层验证深度"，MR-7 说"治理系统自身是一等
  # 被治理对象"。MRD-LAYER-001 只 warn 不 fail，执行中 7 个 critical 单层漏
  # 洞连续 4 天没被修复。本不变式把 MR-6 从"建议"升级为"硬强制"——任何新增的
  # critical 不变式只要少于 2 层验证深度就直接 fail governance_checker，在 CI
  # 层面防止回归到"虚假安全感"的声明层单层快餐检查。

  - id: INV-LAYER-001
    name: critical-invariants-have-two-layers
    meta_rule: MR-6
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "所有 severity=critical 的不变式必须在 verification_layer 中声明 ≥2 个层（典型组合 [declaration, runtime]），防止单层虚假安全感"
    design_decision: |
      2026-04-11 V37.8：MR-6 在 v3 引入时只配了警告级元发现 MRD-LAYER-001
      （severity_when_missing: warn），不阻塞。结果 7 个 critical 不变式
      （INV-TOOL-001/002, INV-DEPLOY-002, INV-CRON-003, INV-ENV-002,
      INV-DREAM-002, INV-CACHE-002）长期单层覆盖，其中 INV-ENV-002 在 dev
      环境下还是整个 critical 检查被 skip（只 runtime 层 + 需 --full）。
      本不变式把 MR-6 升级为 fail-stopping hard invariant — 再有人提交
      single-layer critical，governance_checker 直接退出 1。
    source_case: "2026-04-11 V37.7 双跑审计发现 MRD-LAYER-001 warn 漂移"
    checks:
      # declaration layer: MR-6 元规则文本存在
      - name: "MR-6 critical-invariants-need-depth 元规则存在"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: "critical-invariants-need-depth"
      # runtime layer: 遍历自身 YAML，任何 severity==critical 但 layers<2 = fail
      - name: "所有 critical 不变式声明 ≥2 层验证深度"
        check_type: python_assert
        code: |
          import yaml
          with open("ontology/governance_ontology.yaml") as f:
              data = yaml.safe_load(f)
          shallow = []
          for inv in data.get("invariants", []):
              if inv.get("severity") != "critical":
                  continue
              layers = inv.get("verification_layer", [])
              if not isinstance(layers, list) or len(layers) < 2:
                  shallow.append(
                      f"{inv.get('id','?')} (verification_layer={layers})"
                  )
          assert not shallow, (
              f"{len(shallow)} 个 critical 不变式仅有单层验证（MR-6 违反）: "
              f"{', '.join(shallow)}. "
              "critical 不变式必须有 ≥2 层，典型组合 [declaration, runtime]。"
          )

  - id: INV-LAYER-002
    name: high-invariants-have-two-layers
    meta_rule: MR-6
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "所有 severity=high 的不变式必须在 verification_layer 中声明 ≥2 个层（典型组合 [declaration, runtime]），防止单层虚假安全感"
    design_decision: |
      V37.9 引入 MRD-LAYER-002 作为 severity=high 的渐进警告层：
      当时有 12 个单层 high 技术债，warn 级暴露但不阻塞。
      V37.9.2 减到 9，V37.9.3 减到 0，MRD-LAYER-002 变 ✅ pass。
      V37.9.8 把保护升级为 fail-stopping hard invariant — 再有新增
      single-layer high 不变式，governance_checker 直接退出 1。

      与 INV-LAYER-001 的关系（双轨一致）：
        - INV-LAYER-001: severity=critical 不变式 ≥2 层（2026-04-11 立案）
        - INV-LAYER-002: severity=high 不变式 ≥2 层（2026-04-21 立案）
      MRD-LAYER-002 仍保留作为自发现扫描器（供未来扩展到 medium 时参考）。
    source_case: |
      2026-04-21 V37.9.3 完成 MR-6 所有 high 不变式补齐后，
      今日 V37.9.8 把渐进警告升级为硬强制。
    checks:
      # declaration layer: 同 INV-LAYER-001 的 MR-6 元规则引用
      - name: "MR-6 critical-invariants-need-depth 元规则存在（共享 INV-LAYER-001）"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: "critical-invariants-need-depth"
      # runtime layer: 遍历自身 YAML，任何 severity==high 但 layers<2 = fail
      - name: "所有 high 不变式声明 ≥2 层验证深度"
        check_type: python_assert
        code: |
          import yaml
          with open("ontology/governance_ontology.yaml") as f:
              data = yaml.safe_load(f)
          shallow = []
          for inv in data.get("invariants", []):
              if inv.get("severity") != "high":
                  continue
              layers = inv.get("verification_layer", [])
              if not isinstance(layers, list) or len(layers) < 2:
                  shallow.append(
                      f"{inv.get('id','?')} (verification_layer={layers})"
                  )
          assert not shallow, (
              f"{len(shallow)} 个 high 不变式仅有单层验证（MR-6 违反）: "
              f"{', '.join(shallow)}. "
              "high 不变式必须有 ≥2 层（V37.9.8 起硬强制，原 MRD-LAYER-002 警告级）。"
          )

  # ── PA 对话上下文隔离（V37.4.3 血案）──────────────────────────────────

  - id: INV-PA-001
    name: alert-does-not-pollute-chat-context
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: "系统告警必须在进入 LLM 上下文前被剥离；推送侧注入 [SYSTEM_ALERT] 标记，消费侧 filter_system_alerts() 在 truncate_messages 之前执行"
    design_decision: |
      2026-04-11 血案：13:06 用户问"AI Agent 终极架构：本体×随机×贝叶斯"，
      PA 回复"已收到系统告警跟进任务，请打开系统偏好设置添加 /usr/sbin/cron
      到完全磁盘访问权限"——完全忽略用户真实问题，编造错误的 macOS 指令。
      根因：12:30 job_watchdog 通过 notify.sh --topic alerts 推送 WARNING，
      Gateway 把告警写入 sessions.json 作为 assistant role，truncate 的"最近 N 条"
      窗口把它带到 13:06 的请求上下文，Qwen3 attention 错误跨主题关联。
      结构性修复：push 端注入 [SYSTEM_ALERT] 标记，proxy 端在 truncate 之前
      剥离。这条不变式锁定两侧契约。
    checks:
      - name: "proxy_filters 定义 SYSTEM_ALERT_MARKER"
        check_type: file_contains
        file: proxy_filters.py
        pattern: 'SYSTEM_ALERT_MARKER = "\[SYSTEM_ALERT\]"'
      - name: "proxy_filters 定义 filter_system_alerts"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "def filter_system_alerts"
      - name: "tool_proxy 导入 filter_system_alerts"
        check_type: file_contains
        file: tool_proxy.py
        pattern: "filter_system_alerts"
      - name: "tool_proxy 在 truncate_messages 之前调用 filter_system_alerts"
        check_type: python_assert
        code: |
          # 顺序锁定：filter_system_alerts 必须在 truncate_messages 之前执行，
          # 否则 truncate 的"最近 N 条"窗口会把告警带过去。
          import re
          src = open("tool_proxy.py", encoding="utf-8").read()
          # 允许函数调用或符号引用，只要 filter 在 truncate 前出现即可
          filter_idx = src.find("filter_system_alerts(")
          trunc_idx = src.find("truncate_messages(")
          assert filter_idx != -1, "tool_proxy.py 未调用 filter_system_alerts()"
          assert trunc_idx != -1, "tool_proxy.py 未调用 truncate_messages()"
          assert filter_idx < trunc_idx, (
              f"filter_system_alerts 必须在 truncate_messages 之前执行 "
              f"(filter_idx={filter_idx}, trunc_idx={trunc_idx})"
          )
      - name: "notify.sh --topic alerts 路径注入 [SYSTEM_ALERT] 标记"
        check_type: file_contains
        file: notify.sh
        pattern: '\[SYSTEM_ALERT\]'
      - name: "auto_deploy.sh quiet_alert 注入 [SYSTEM_ALERT] 标记"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: '\[SYSTEM_ALERT\]'
      - name: "run_hn_fixed.sh 直接 send 告警路径注入 [SYSTEM_ALERT] 标记"
        check_type: file_contains
        file: jobs/hn_watcher/run_hn_fixed.sh
        pattern: '\[SYSTEM_ALERT\]'
      - name: "run.sh releases 告警路径注入 [SYSTEM_ALERT] 标记"
        check_type: file_contains
        file: jobs/openclaw_official/run.sh
        pattern: '\[SYSTEM_ALERT\]'
      - name: "run_discussions.sh 告警路径注入 [SYSTEM_ALERT] 标记"
        check_type: file_contains
        file: jobs/openclaw_official/run_discussions.sh
        pattern: '\[SYSTEM_ALERT\]'
      - name: "filter_system_alerts 运行时真的剥离 [SYSTEM_ALERT] 消息"
        check_type: python_assert
        code: |
          # 运行时回归：构造真实告警消息结构，验证 filter 正确剥离。
          import sys, os
          sys.path.insert(0, os.getcwd())
          from proxy_filters import filter_system_alerts, SYSTEM_ALERT_MARKER
          # 1. 普通对话：混入 assistant 告警消息
          msgs = [
              {"role": "system", "content": "you are Wei"},
              {"role": "user", "content": "hello"},
              {"role": "assistant", "content": "[SYSTEM_ALERT]\n⚠️ job_watchdog fire"},
              {"role": "user", "content": "what is ontology"},
          ]
          filtered, dropped = filter_system_alerts(msgs)
          assert dropped == 1, f"应剥离 1 条告警,实际 {dropped}"
          roles = [m["role"] for m in filtered]
          assert roles == ["system", "user", "user"], f"roles 错误: {roles}"
          # 2. system role 即使带标记也保留（system prompt 例外）
          sys_msgs = [
              {"role": "system", "content": "[SYSTEM_ALERT]\nsome rule"},
              {"role": "user", "content": "hi"},
          ]
          filtered, dropped = filter_system_alerts(sys_msgs)
          assert dropped == 0, "system role 告警不应被剥离"
          assert len(filtered) == 2
          # 3. OpenAI content blocks 格式也要处理
          block_msgs = [
              {"role": "user", "content": "q"},
              {"role": "assistant", "content": [
                  {"type": "text", "text": "[SYSTEM_ALERT]\nfire"}
              ]},
          ]
          filtered, dropped = filter_system_alerts(block_msgs)
          assert dropped == 1, f"content blocks 告警应剥离,实际 dropped={dropped}"
          # 4. 普通消息提到标记字符串不应被误伤（仅匹配开头）
          mention = [
              {"role": "user", "content": "the [SYSTEM_ALERT] marker prevents contamination"},
          ]
          filtered, dropped = filter_system_alerts(mention)
          assert dropped == 0, "标记只能出现在开头才被剥离"
          assert len(filtered) == 1

  - id: INV-PA-002
    name: soul-rule-10-present
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: "SOUL.md 规则 10 '告警消息不跟进' 必须存在且包含主题对齐硬规则，作为 LLM 层最终防线（当 proxy filter 漏过时）"
    design_decision: |
      2026-04-11 血案：结构性修复（INV-PA-001 的 filter_system_alerts）是主防线，
      但 LLM 有可能被其他未标记告警源污染。SOUL.md 规则 10 是最后一道防线——
      即使告警进入上下文，LLM 本身也必须拒绝把它当作用户任务。
      这条不变式锁定 SOUL.md 必须包含规则 10 的核心声明文本。
    lesson: |
      Proxy filter 是结构修复（处理"告警进来"的问题），SOUL.md 规则是行为修复
      （处理"告警进来后 LLM 怎么响应"的问题）。两层同时存在才是纵深防御。
    checks:
      - name: "SOUL.md 包含规则 10 标题 '告警消息不跟进'"
        check_type: file_contains
        file: SOUL.md
        pattern: "告警消息不跟进"
      - name: "SOUL.md 包含 '2026-04-11 血案规则' 版本锚点"
        check_type: file_contains
        file: SOUL.md
        pattern: "2026-04-11 血案规则"
      - name: "SOUL.md 包含 '主题对齐' 硬规则"
        check_type: file_contains
        file: SOUL.md
        pattern: "主题对齐"
      - name: "SOUL.md 明确禁止编造 macOS FDA 指令"
        check_type: file_contains
        file: SOUL.md
        pattern: "完全磁盘访问权限"
      - name: "SOUL.md 包含 [SYSTEM_ALERT] 识别标志"
        check_type: file_contains
        file: SOUL.md
        pattern: '\[SYSTEM_ALERT\]'
      # V37.9.2: MR-6 深度补齐 runtime 层（原仅 declaration）
      - name: "V37.9.2 runtime: SOUL.md 规则 10 结构完整（非片段式混入）"
        check_type: python_assert
        code: |
          # Runtime 层补强: 真读 SOUL.md 解析规则 10 完整段落，
          # 确保 5 个声明层 pattern 都在"规则 10"内部而非分散在文件各处。
          # file_contains 只能证"字符串存在"，runtime 证"语义结构连贯"。
          with open("SOUL.md", "r", encoding="utf-8") as f:
              soul = f.read()
          # 定位规则 10 块：从"10. **🔴 告警消息不跟进"到下一条规则（"11." 或 "## 我的性格"）
          import re
          rule10_start = soul.find("告警消息不跟进")
          assert rule10_start > 0, "规则 10 标题未找到"
          # 结束边界：下一条"11. **" 或 "## 我的性格"，取最近者
          rule11_match = re.search(r'\n\s*11\.\s*\*\*', soul[rule10_start:])
          next_section = soul.find("## 我的性格", rule10_start)
          end_candidates = []
          if rule11_match:
              end_candidates.append(rule10_start + rule11_match.start())
          if next_section > 0:
              end_candidates.append(next_section)
          assert end_candidates, "规则 10 结束边界未找到"
          rule10_end = min(end_candidates)
          rule10_text = soul[rule10_start:rule10_end]
          # 5 个关键短语必须都在规则 10 块内（不是散落在其他规则）
          # V37.3 教训: 避免 generator expression / list comprehension
          # 在 exec() locals 作用域看不到外层变量
          required_phrases = [
              "告警消息不跟进",
              "2026-04-11 血案规则",
              "主题对齐",
              "完全磁盘访问权限",
              "[SYSTEM_ALERT]",
          ]
          missing = []
          for p in required_phrases:
              if p not in rule10_text:
                  missing.append(p)
          assert not missing, (
              f"规则 10 块内缺失关键短语: {missing}. 整块长度={len(rule10_text)} chars"
          )
          # 合理的规则 10 块长度 ≥ 400 字（过短 = 内容被意外删除）
          assert len(rule10_text) >= 400, (
              f"规则 10 块过短 ({len(rule10_text)} chars)，可能已被压缩或删除"
          )

  - id: INV-REVIEW-001
    name: kb-review-fails-loud-not-silent
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      kb_review 必须 fail-fast：LLM 失败→推送 [SYSTEM_ALERT]+exit 1；
      不允许机械 fallback 伪装成功；status.json 的 llm_status 字段必须诚实；
      源文件枚举必须从 jobs_registry.yaml 读取（registry-driven，消除硬编码漂移）；
      最近 N 天提取必须按 H2 章节 drill-down（而非行级日期匹配），避免把
      digest 容器标题当论文亮点。
    design_decision: |
      2026-04-11 血案（与 V37.4.3 PA 告警污染同血案类，"效果层静默降级"）：
      kb_review.sh V29 原实现有 6 个 bug 构成 silent degradation 链：
      (1) export NOTES_CONTENT 在 LLM 调用之后，Python 子进程始终拿到空 prompt
      (2) 源枚举硬编码 7 个（缺 ai_leaders_x + ontology_sources）
      (3) LLM 失败后机械 fallback（把 `## 今日arXiv精选(YYYY-MM-DD)` digest 容器
          标题当论文亮点写入 review，看起来像成功，实际是垃圾）
      (4) status.json 永远写 "llm": true，即使 LLM 实际失败
      (5) 行级日期匹配漏掉整个 H2 section 的实体内容
      (6) "回复任何话题可深入讨论"悬空承诺但没有对应实现

      V37.5 结构性修复：
      - 删除 shell 变量传递（全部 Python 化）→ 消除 scope bug class
      - 源枚举 registry-driven（jobs_registry.yaml::kb_source_file）
      - H2 章节解析（extract_recent_sections）替代行级匹配
      - LLM 失败 fail-fast 推送 [SYSTEM_ALERT] 并 exit 1
      - status.json 诚实字段 llm_status: ok|failed|unknown
      - 移除"回复任何话题可深入讨论"悬空承诺

      这条不变式锁定：①代码层契约（fail-fast + registry-driven + H2 parser）
      ②运行时契约（mock LLM 失败 → status=llm_failed 不伪装）
      ③诚实状态层（不再永远写 llm:true）
    lesson: |
      V37.4.3 PA 告警污染是"告警数据结构性污染 LLM 上下文"；
      V37.5 kb_review 是"失败路径结构性伪装成功状态"。两者都属于
      MR-4 (silent failure is a bug) 下的血案类——声明层检查全过，
      效果层却完全失效。治理体系必须在两个维度同时拦截：结构契约 +
      运行时回归。
    checks:
      - name: "kb_review.sh 标注 V37.5 fail-fast 版本"
        check_type: file_contains
        file: kb_review.sh
        pattern: "V37.5"
      - name: "kb_review.sh 失败路径注入 [SYSTEM_ALERT] 标记"
        check_type: file_contains
        file: kb_review.sh
        pattern: '\[SYSTEM_ALERT\]'
      - name: "kb_review.sh 不再包含 V29 机械 fallback 标签"
        check_type: file_not_contains
        file: kb_review.sh
        pattern: "LLM 不可用, 基础整理"
      - name: "kb_review.sh 不再包含悬空承诺 '回复任何话题可深入讨论'"
        check_type: file_not_contains
        file: kb_review.sh
        pattern: "回复任何话题可深入讨论"
      - name: "kb_review_collect.py 定义 load_sources_from_registry"
        check_type: file_contains
        file: kb_review_collect.py
        pattern: "def load_sources_from_registry"
      - name: "kb_review_collect.py 定义 extract_recent_sections (H2 parser)"
        check_type: file_contains
        file: kb_review_collect.py
        pattern: "def extract_recent_sections"
      - name: "kb_review_collect.py 定义 call_llm 函数"
        check_type: file_contains
        file: kb_review_collect.py
        pattern: "def call_llm"
      - name: "kb_review_collect.py 不再包含悬空承诺"
        check_type: file_not_contains
        file: kb_review_collect.py
        pattern: "回复任何话题可深入讨论"
      - name: "jobs_registry.yaml 声明 kb_source_file 字段 (registry-driven 证据)"
        check_type: file_contains
        file: jobs_registry.yaml
        pattern: "kb_source_file:"
      - name: "kb_review.sh llm_failed 分支必须紧跟 exit 1 (fail-fast 顺序锁)"
        check_type: python_assert
        code: |
          # fail-fast 顺序锁：llm_failed 分支后 500 字符内必须有 exit 1，
          # 否则可能存在"检测到失败但继续推送"的 silent degradation 漏洞。
          src = open("kb_review.sh", encoding="utf-8").read()
          llm_failed_idx = src.find('STATUS" = "llm_failed"')
          assert llm_failed_idx != -1, "kb_review.sh 缺少 llm_failed 处理分支"
          exit_idx = src.find("exit 1", llm_failed_idx)
          assert exit_idx != -1, "llm_failed 分支后未找到 exit 1"
          assert (exit_idx - llm_failed_idx) < 500, (
              f"llm_failed 分支必须立即 fail-fast exit 1, "
              f"实际距离 {exit_idx - llm_failed_idx} 字符"
          )
      - name: "registry-driven: load_sources_from_registry 真实发现 >=12 源含 ai_leaders_x + ontology_sources"
        check_type: python_assert
        code: |
          # 运行时回归：registry 必须发现 V37.5 修复前遗漏的两个源，
          # 防止未来有人手动改回硬编码或者从 registry 删除字段。
          import sys, os
          sys.path.insert(0, os.getcwd())
          import kb_review_collect as m
          srcs = m.load_sources_from_registry("jobs_registry.yaml")
          assert len(srcs) >= 12, f"期望 registry 声明 >=12 sources, 实际 {len(srcs)}"
          ids = {s["id"] for s in srcs}
          assert "ai_leaders_x" in ids, (
              f"ai_leaders_x 必须在 registry-driven 发现列表中 "
              f"(V37.5 新增, 此前硬编码漏掉), got: {sorted(ids)}"
          )
          assert "ontology_sources" in ids, (
              f"ontology_sources 必须在 registry-driven 发现列表中 "
              f"(V37.1 新增信息源, 此前硬编码漏掉), got: {sorted(ids)}"
          )
          # 每条必须有 kb_source_file
          for s in srcs:
              assert s.get("kb_source_file"), f"source {s['id']} 缺少 kb_source_file"
      - name: "H2 parser drill-down: 窗口内章节保留, 窗口外章节剔除"
        check_type: python_assert
        code: |
          # 运行时回归：H2 章节解析替代行级日期匹配。
          # 构造 3 个 H2 章节 (窗口内 + 窗口外 + 今日), 验证正确过滤。
          import sys, os
          sys.path.insert(0, os.getcwd())
          import kb_review_collect as m
          from datetime import datetime
          today = datetime(2026, 4, 11)
          content = (
              "# title\n\n"
              "## 2026-04-10 arxiv report\n"
              "Paper A: 重要论文 A 的细节内容\n\n"
              "## 2026-04-05 arxiv report\n"
              "Paper B: 过期论文 B (应被剔除)\n\n"
              "## 2026-04-11 arxiv report\n"
              "Paper C: 今日论文 C\n"
          )
          result = m.extract_recent_sections(content, days=3, max_chars=5000, today=today)
          assert "Paper A" in result, f"窗口内章节 Paper A 必须保留: {result!r}"
          assert "Paper B" not in result, f"窗口外章节 Paper B 必须剔除: {result!r}"
          assert "Paper C" in result, f"今日章节 Paper C 必须保留: {result!r}"
      - name: "fail-fast contract: mock LLM 失败 → status=llm_failed, 不伪装 ok"
        check_type: python_assert
        code: |
          # 运行时回归：run() 以 llm_caller 注入失败 → status 必须 llm_failed,
          # 不允许降级为 ok, 不允许写入 review_markdown / wa_message 伪造产物。
          import sys, os, tempfile
          sys.path.insert(0, os.getcwd())
          import kb_review_collect as m
          from datetime import datetime
          tmp = tempfile.mkdtemp(prefix="gov_inv_review_")

          def mock_fail(prompt):
              return (False, "", "proxy_unreachable_for_test")

          result = m.run(
              tmp, 7, "jobs_registry.yaml",
              today=datetime(2026, 4, 11),
              llm_caller=mock_fail,
          )
          assert result["status"] == "llm_failed", (
              f"LLM 失败必须 fail-fast, status={result['status']}"
          )
          assert result["reason"] == "proxy_unreachable_for_test"
          # 关键: 失败路径不允许产出 review_markdown / wa_message
          assert "review_markdown" not in result, (
              "LLM 失败后 run() 不得产出 review_markdown (silent degradation 漏洞)"
          )
          assert "wa_message" not in result, (
              "LLM 失败后 run() 不得产出 wa_message (silent degradation 漏洞)"
          )
      - name: "call_llm 最小内容阈值: 短响应判失败"
        check_type: python_assert
        code: |
          # call_llm 必须拒绝空/过短响应, 防止 LLM 返回空壳被当成功。
          src = open("kb_review_collect.py", encoding="utf-8").read()
          assert "LLM content too short" in src, (
              "call_llm 必须拒绝过短 LLM 响应 (V37.5 fail-fast 契约)"
          )
          assert "len(content.strip()) < 80" in src, (
              "call_llm 必须声明 80-char 最小内容阈值"
          )
          assert "LLM returned empty content" in src, (
              "call_llm 必须拒绝空响应 (不允许空字符串伪装成功)"
          )
      - name: "V37.5.1 反模式: 禁止 `| python3 -` stdin-as-code 与 heredoc 冲突"
        check_type: python_assert
        code: |
          # V37.5.1 血案: 2026-04-11 Mac Mini E2E 第一次 run 就炸 JSONDecodeError。
          # 原代码 `echo $OUT | python3 - "$arg" << 'PYEOF'` 让 pipe 和 heredoc
          # 同时注入 python3 stdin, heredoc 覆盖 pipe, python3 - 读代码耗尽 stdin,
          # json.load(sys.stdin) 读到空 → 崩溃。修复: 改用 env var 传数据, heredoc 只传代码。
          # 跳过 shell 注释行 (允许文档描述 bug)。
          import re
          src = open("kb_review.sh", encoding="utf-8").read()
          bad_lines = []
          for lineno, line in enumerate(src.splitlines(), start=1):
              stripped = line.lstrip()
              if stripped.startswith("#"):
                  continue
              if re.search(r"\|\s*python3\s+-(\s|$|\")", line):
                  bad_lines.append((lineno, line))
          assert not bad_lines, (
              f"kb_review.sh 包含 V37.5.1 反模式 (pipe+stdin-as-code) 在行: "
              f"{[(ln, line.strip()[:80]) for ln, line in bad_lines]}"
          )
      - name: "V37.5.1 runtime: 真实 subprocess 执行 kb_review.sh 不触发 JSONDecodeError"
        check_type: python_assert
        code: |
          # 运行时 E2E 守卫: 用 mock collector 驱动 kb_review.sh, 验证写文件路径
          # 能正确从 env var 读数据, 不再因 pipe+heredoc 冲突而崩溃。
          # MR-6 要求: grep 守卫不足, 必须有 runtime 回归。
          import subprocess, tempfile, os, shutil, json as _json
          tmp = tempfile.mkdtemp(prefix="gov_inv_review_runtime_")
          try:
              repo_dir = os.getcwd()
              shutil.copy(os.path.join(repo_dir, "kb_review.sh"), tmp)
              mock = os.path.join(tmp, "kb_review_collect.py")
              with open(mock, "w", encoding="utf-8") as f:
                  f.write(
                      "import json\n"
                      "print(json.dumps({\n"
                      '    "status": "ok",\n'
                      '    "review_markdown": "# gov runtime test\\n",\n'
                      '    "wa_message": "x",\n'
                      '    "note_count": 1,\n'
                      '    "sources_used": [],\n'
                      '    "sources_skipped": [],\n'
                      '    "sources_missing": []\n'
                      "}))\n"
                  )
              with open(os.path.join(tmp, "jobs_registry.yaml"), "w") as f:
                  f.write("jobs:\n  - id: stub\n    enabled: true\n")
              kb_dir = os.path.join(tmp, "kb")
              os.makedirs(os.path.join(kb_dir, "daily"), exist_ok=True)
              result = subprocess.run(
                  ["bash", os.path.join(tmp, "kb_review.sh")],
                  env={
                      "PATH": "/usr/bin:/bin:/usr/local/bin:/opt/homebrew/bin",
                      "KB_BASE": kb_dir,
                      "KB_REVIEW_REGISTRY": os.path.join(tmp, "jobs_registry.yaml"),
                      "OPENCLAW_PHONE": "+85200000000",
                      "HOME": tmp,
                  },
                  capture_output=True, text=True, timeout=30,
              )
              assert "JSONDecodeError" not in result.stderr, (
                  f"V37.5.1 回归! kb_review.sh 触发 JSONDecodeError: "
                  f"{result.stderr[:400]}"
              )
              assert "Expecting value" not in result.stderr, (
                  f"V37.5.1 JSON 空输入错误: {result.stderr[:400]}"
              )
              daily = os.path.join(kb_dir, "daily")
              review_files = [f for f in os.listdir(daily) if f.startswith("review_")]
              assert len(review_files) == 1, (
                  f"期望 1 份 review 文件, 实际 {review_files}. "
                  f"stderr: {result.stderr[:400]}"
              )
              with open(os.path.join(daily, review_files[0]), encoding="utf-8") as f:
                  content = f.read()
              assert "gov runtime test" in content, (
                  f"review 文件内容错误: {content[:200]}"
              )
          finally:
              shutil.rmtree(tmp, ignore_errors=True)

  - id: INV-EVENING-001
    name: kb-evening-fails-loud-not-silent
    meta_rule: MR-8
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      kb_evening 必须继承 V37.5 kb_review 的 6 条架构保证：全 Python 化 /
      registry-driven / H2 drill-down / LLM 深度分析 / fail-fast / 诚实 status。
      kb_evening_collect.py 必须通过 import 复用 kb_review_collect.py 的采集原语
      (load_sources_from_registry / extract_recent_sections / collect_notes /
      collect_sources / call_llm)，禁止复制代码。kb_evening.sh 必须是 thin wrapper:
      LLM 失败 → [SYSTEM_ALERT] 推送 alerts topic + exit 1（不再静默"今日无"）。
    design_decision: |
      V37.6 升级理由: 原 kb_evening.sh 用"文件名前 80 字"作为摘要, 属于"假摘要":
      ① 零 LLM 智能 — 只是把今日文件名拼接, 无法提取跨源信号
      ② 仅扫描 notes — 完全忽略 sources (ArXiv/HN/freight 等 cron 抓取的全部价值)
      ③ 没有 registry 驱动 — 新增源永远看不到
      ④ 没有 fail-fast — "今日无新增知识记录"掩盖了采集失败/LLM 宕机
      ⑤ PA 无法说"今天用户知识库涨了什么" — evening 从未产出过结构化回顾

      V37.6 方案: 复用 V37.5 kb_review_collect.py 已证明的 6 大架构, 只改 3 件事:
      (1) DAYS 默认 1 (今日窗口, kb_review 是 7 天)
      (2) build_evening_prompt 改成"今日要闻 / 一条行动 / 明日关注 / 健康度"结构
      (3) 输出文件名 evening_YYYYMMDD.md (与 review_*.md 区分)
      其他全部通过 `import kb_review_collect as rc` 复用, 两个 job 共享一份采集
      代码、一份 bug 修复点 — 消除"V37.5 修了 kb_review, V37.6 evening 还在踩同一
      个坑"的跨 job 漂移风险.
    lesson: |
      V37.5 教训: kb_review silent degradation 属于"架构投资有效, 但没有被第二个
      消费者复用"的典型盲区. kb_evening 是第二个最强复用场景 (同样的 KB 数据源,
      同样的 registry, 同样的 LLM 调用). 如果两个 job 各写一套, 未来每次架构升级
      都要双倍工作量 + 漂移风险. MR-8 候选 "copy-paste-is-a-bug-class" 的正面
      兑现: 不允许复制, 必须 import. 本不变式锁定这一契约 — import 消失 = 回归.
    checks:
      - name: "kb_evening_collect.py 必须通过 import 复用 kb_review_collect"
        check_type: file_contains
        file: kb_evening_collect.py
        pattern: "import kb_review_collect"
      - name: "kb_evening_collect.py 不得重定义 load_sources_from_registry"
        check_type: file_not_contains
        file: kb_evening_collect.py
        pattern: "def load_sources_from_registry"
      - name: "kb_evening_collect.py 不得重定义 extract_recent_sections (H2 parser)"
        check_type: file_not_contains
        file: kb_evening_collect.py
        pattern: "def extract_recent_sections"
      - name: "kb_evening_collect.py 不得重定义 call_llm"
        check_type: file_not_contains
        file: kb_evening_collect.py
        pattern: "def call_llm\\("
      - name: "kb_evening_collect.py 定义 build_evening_prompt (evening-specific)"
        check_type: file_contains
        file: kb_evening_collect.py
        pattern: "def build_evening_prompt"
      - name: "kb_evening_collect.py 定义 run() orchestrator"
        check_type: file_contains
        file: kb_evening_collect.py
        pattern: "def run\\("
      - name: "kb_evening.sh 标注 V37.6 fail-fast 版本"
        check_type: file_contains
        file: kb_evening.sh
        pattern: "V37.6"
      - name: "kb_evening.sh 失败路径注入 [SYSTEM_ALERT] 标记 (V37.4.3 规则 10)"
        check_type: file_contains
        file: kb_evening.sh
        pattern: '\[SYSTEM_ALERT\]'
      - name: "kb_evening.sh 调用 kb_evening_collect.py"
        check_type: file_contains
        file: kb_evening.sh
        pattern: "kb_evening_collect.py"
      - name: "kb_evening.sh 写入 evening_*.md (非 review_*.md)"
        check_type: file_contains
        file: kb_evening.sh
        pattern: "evening_\\$\\{DATE\\}.md"
      - name: "kb_evening.sh 不应包含 review_*.md 输出 (防止 copy-paste 回漂)"
        check_type: file_not_contains
        file: kb_evening.sh
        pattern: "review_\\$\\{DATE\\}.md"
      - name: "kb_evening.sh 保留 kb_dedup 健康附注拼接 (V37 前功能)"
        check_type: file_contains
        file: kb_evening.sh
        pattern: "kb_dedup.py"
      - name: "auto_deploy.sh FILE_MAP 包含 kb_evening_collect.py (部署闭环)"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: "kb_evening_collect.py"
      - name: "auto_deploy.sh FILE_MAP 包含 kb_review_collect.py (V37.5 历史漏洞补齐)"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: "kb_review_collect.py"
      - name: "kb_evening.sh llm_failed 分支必须 send_alert + exit 1 (fail-fast 顺序锁)"
        check_type: python_assert
        code: |
          # fail-fast 顺序锁: llm_failed 分支 500 字符内必须有 send_alert + exit 1.
          src = open("kb_evening.sh", encoding="utf-8").read()
          llm_failed_idx = src.find('STATUS" = "llm_failed"')
          assert llm_failed_idx != -1, "kb_evening.sh 缺少 llm_failed 处理分支"
          branch = src[llm_failed_idx : llm_failed_idx + 500]
          assert "send_alert" in branch, (
              "llm_failed 分支必须调用 send_alert (V37.4.3 规则 10)"
          )
          assert "exit 1" in branch, (
              "llm_failed 分支必须 exit 1 (fail-fast 契约)"
          )
      - name: "V37.5.1 反模式: kb_evening.sh 不得包含 `| python3 -` stdin-as-code"
        check_type: python_assert
        code: |
          # 与 kb_review.sh 同 V37.5.1 血案保护: pipe+stdin-as-code 与 heredoc 冲突.
          import re
          src = open("kb_evening.sh", encoding="utf-8").read()
          bad_lines = []
          for lineno, line in enumerate(src.splitlines(), start=1):
              stripped = line.lstrip()
              if stripped.startswith("#"):
                  continue
              if re.search(r"\|\s*python3\s+-(\s|$|\")", line):
                  bad_lines.append((lineno, line))
          assert not bad_lines, (
              f"kb_evening.sh 包含 V37.5.1 反模式在行: "
              f"{[(ln, line.strip()[:80]) for ln, line in bad_lines]}"
          )
      - name: "runtime: kb_evening_collect.run() mock LLM 失败 → status=llm_failed"
        check_type: python_assert
        code: |
          # 运行时回归: evening 继承 fail-fast 契约, LLM 失败不得伪装成功.
          import sys, os, tempfile, shutil, json as _json
          sys.path.insert(0, os.getcwd())
          import kb_evening_collect as ev
          from datetime import datetime
          tmp = tempfile.mkdtemp(prefix="gov_inv_evening_")
          try:
              os.makedirs(os.path.join(tmp, "notes"))
              os.makedirs(os.path.join(tmp, "sources"))
              with open(os.path.join(tmp, "index.json"), "w", encoding="utf-8") as f:
                  _json.dump({"entries": []}, f)
              reg = os.path.join(tmp, "jobs_registry.yaml")
              with open(reg, "w", encoding="utf-8") as f:
                  f.write("jobs:\n")

              def mock_fail(prompt):
                  return (False, "", "proxy_unreachable_for_test")

              result = ev.run(
                  tmp, 1, reg,
                  today=datetime(2026, 4, 11),
                  llm_caller=mock_fail,
              )
              assert result["status"] == "llm_failed", (
                  f"LLM 失败必须 fail-fast, got status={result['status']}"
              )
              # 失败路径不得产出伪造产物
              assert "evening_markdown" not in result, (
                  "llm_failed 路径不得产出 evening_markdown (silent degradation)"
              )
              assert "wa_message" not in result, (
                  "llm_failed 路径不得产出 wa_message (silent degradation)"
              )
          finally:
              shutil.rmtree(tmp, ignore_errors=True)
      - name: "runtime: DAYS=1 窗口真实过滤今日外 notes (直接测 collect_notes, 避免 exec 闭包陷阱)"
        check_type: python_assert
        code: |
          # 运行时回归: 1-day 窗口契约真实过滤旧 note, 不会回退到 review 的 7 天.
          # V37.2+ 教训: exec() 内嵌闭包看不到外部变量, 此处直接调 collect_notes
          # (evening 通过 import 复用的 kb_review 原语), 验证过滤行为.
          import sys, os, tempfile, shutil
          sys.path.insert(0, os.getcwd())
          import kb_review_collect as rc
          import kb_evening_collect as ev
          from datetime import datetime
          tmp = tempfile.mkdtemp(prefix="gov_inv_evening_days_")
          try:
              os.makedirs(os.path.join(tmp, "notes"))
              today = datetime(2026, 4, 11)
              # Today (in window) + 3-days-ago (outside 1-day window)
              with open(os.path.join(tmp, "notes", "20260411090000.md"), "w", encoding="utf-8") as f:
                  f.write("TODAY_SIGNAL_UNIQUE_EV")
              with open(os.path.join(tmp, "notes", "20260408090000.md"), "w", encoding="utf-8") as f:
                  f.write("OLD_SIGNAL_UNIQUE_EV")
              # Use evening's own budget to match production path
              notes_text = rc.collect_notes(
                  tmp, days=1, max_chars=ev.MAX_NOTES_CHARS, today=today,
              )
              assert "TODAY_SIGNAL_UNIQUE_EV" in notes_text, (
                  f"DAYS=1 窗口必须包含今日 note. 实际内容: {notes_text[:200]!r}"
              )
              assert "OLD_SIGNAL_UNIQUE_EV" not in notes_text, (
                  f"DAYS=1 窗口必须排除 3 天前 note (否则等同 review 7 天窗口). "
                  f"实际内容: {notes_text[:200]!r}"
              )
              # 同时验证 evening import 了正确的 helper (复用契约硬锁)
              assert rc.collect_notes is not None
              assert hasattr(ev, "MAX_NOTES_CHARS"), "kb_evening_collect 必须声明自己的 notes budget"
          finally:
              shutil.rmtree(tmp, ignore_errors=True)

  - id: INV-KB-001
    name: content-blocks-flattened-before-kb-write
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      OpenAI content blocks (list[{type,text}]) 在写入 KB / 对话日志前必须
      通过 flatten_content() 压平成纯字符串，禁止使用 str(m["content"])
      — 否则 Python repr `[{'type':'text',...}]` 会污染 KB notes 标题。
    design_decision: |
      V37.6 血案: 2026-04-10 kb_dedup 报告发现 2 条精确重复 notes, 其中一个标题
      是 `[[{'type': 'text', 'text': 'Qwen3-235B 工具] × 2`. 根因: tool_proxy.py
      的 _capture_conversation_turn 热路径 (line 947-953) 用 `str(m["content"])`
      记录用户消息, content 是多模态 OpenAI content blocks list 时, str() 产生
      Python repr 而非文本. 这条污染流进了 conversation JSONL → kb_harvest_chat
      提炼 → KB notes title.

      三层修复:
      1. proxy_filters.py 新增 flatten_content(content) -> str 纯函数, 处理
         None/str/list[dict]/unknown 四种形态, 只保留 type=text 的 block
      2. tool_proxy.py 导入 flatten_content 并替换 str(m["content"]) 调用
      3. 本不变式锁定: 导入 + 使用 + 反模式守卫 + 运行时契约

      同血案类归属: 与 V37.4.3 PA 告警污染 filter_system_alerts 处理
      content blocks 同属一个"OpenAI 多模态消息结构 × 字符串暴力转换"
      bug class, 都是 MR-4 silent failure (KB 污染无任何告警/错误).
    lesson: |
      2026-04-10: 2 条精确重复 notes, 一个标题是 Python repr. MR-4
      (silent failure) 第三次演出: 错误结果写入 KB, 零错误码, 零告警,
      用户需要跑 kb_dedup 才能发现 — 典型的效果层静默污染.
    checks:
      - name: "proxy_filters.py 定义 flatten_content 函数"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "def flatten_content"
      - name: "proxy_filters.py 导出 flatten_content (模块层可见)"
        check_type: python_assert
        code: |
          from proxy_filters import flatten_content
          assert callable(flatten_content)
      - name: "tool_proxy.py 导入 flatten_content"
        check_type: file_contains
        file: tool_proxy.py
        pattern: "flatten_content"
      - name: "tool_proxy.py 反模式守卫: 不再使用 str(m[\"content\"])"
        check_type: file_not_contains
        file: tool_proxy.py
        pattern: 'str\(m\["content"\]\)'
      - name: "tool_proxy.py 反模式守卫: 不再使用 str(m['content'])"
        check_type: file_not_contains
        file: tool_proxy.py
        pattern: "str\\(m\\['content'\\]\\)"
      - name: "tool_proxy.py 调用 flatten_content(m[\"content\"])"
        check_type: file_contains
        file: tool_proxy.py
        pattern: 'flatten_content\(m\["content"\]\)'
      - name: "runtime: flatten_content 正确处理 OpenAI content blocks, 不产生 repr"
        check_type: python_assert
        code: |
          # 运行时回归: 构造 content blocks 直接调用 flatten_content,
          # 验证绝不返回 Python repr 字符串.
          from proxy_filters import flatten_content
          content = [{"type": "text", "text": "Qwen3-235B 工具路由"}]
          result = flatten_content(content)
          assert result == "Qwen3-235B 工具路由", f"纯 text block 提取失败: {result!r}"
          assert "{'type'" not in result, f"泄漏 Python repr: {result!r}"
          assert "[{" not in result, f"泄漏 list repr: {result!r}"
          # 多模态: text + image_url 混合, image 应被过滤
          mixed = [
              {"type": "text", "text": "看图"},
              {"type": "image_url", "image_url": {"url": "data:..."}},
              {"type": "text", "text": "分析"},
          ]
          r2 = flatten_content(mixed)
          assert r2 == "看图 分析", f"多模态提取错误: {r2!r}"
          assert "image_url" not in r2, f"image block 未被过滤: {r2!r}"
          # None / 未知类型 → 空串 (不抛异常)
          assert flatten_content(None) == ""
          assert flatten_content(42) == ""
      # V37.8.18 Route B C14 盲区修复: dict 变种污染
      - name: "V37.8.18 runtime: flatten_content dict 变种不产生 repr 污染"
        check_type: python_assert
        code: |
          # C14 Route B 盲区: OpenAI API 未来可能以 dict 形式传 content
          # (e.g. content={"type":"text","text":"..."} 未包在 list 中),
          # str(dict) 会产生 `{'type':...}` repr 污染 KB. flatten_content
          # 的 "unknown type fallback" 必须对 dict 也返回空串 (或 text 字段).
          from proxy_filters import flatten_content
          # 单个 dict (非 list 包裹) → fallback to ""，不泄漏 repr
          single_dict = {"type": "text", "text": "hello"}
          r = flatten_content(single_dict)
          assert "{'type'" not in r, f"dict 变种泄漏 repr: {r!r}"
          assert "{" not in r, f"dict 变种泄漏大括号: {r!r}"
          # 嵌套 dict → 同样安全
          nested = {"nested": {"k": "v"}}
          r2 = flatten_content(nested)
          assert "{" not in r2, f"嵌套 dict 泄漏: {r2!r}"

  - id: INV-SRC-001
    name: sources-writes-are-idempotent-at-source
    meta_rule: MR-9
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      所有 cron job 向 ~/.kb/sources/*.md 追加 H2 section 必须通过
      kb_append_source.sh 做 grep -Fxq 整行精确匹配的幂等检查, 禁止
      直接使用 `} >> "$KB_SRC"` 块追加, 否则同一 H2 marker 被重复写入
      会导致 sources 文件行数爆炸.
    design_decision: |
      V37.6 血案: 2026-04-10 kb_dedup 报告发现 438 行 sources 重复
      (ontology_sources 183 / dblp 77 / arxiv 42 / rss 40 / freight 36).
      根因: 14 个 cron job (arxiv/ai_leaders_x/karpathy/rss_blogs/
      github_trending/s2/pwc/hf_papers/dblp/acl_anthology/ontology_sources/
      freight×2/openclaw_official) 全部使用相同的 pattern:
          { echo ""; echo "## ${DAY}"; cat "$MSG_FILE"; } >> "$KB_SRC"
      cron 重跑 / watchdog 触发 / 手动调用都会重复追加. SEEN_FILE 内存缓
      存只防重复 WhatsApp 推送, 不防源文件追加. kb_dedup.py 是事后清理,
      本不变式锁定源头幂等 — 阻断重复在产生点.

      修复: 创建 kb_append_source.sh shared helper:
        1. mkdir -p + touch (自动初始化)
        2. grep -Fxq "$H2_MARKER" "$KB_SRC" 已存在 → drain stdin + exit 0
        3. flock -w 30 200 保护并发 cron 同写
        4. KB_APPEND_SOURCE_QUIET=1 env var 用于测试静默
      14 个 job 全部切换到 `} | bash "$HOME/kb_append_source.sh" "$KB_SRC" "$MARKER"`
      pipeline. ontology_sources (2x/day) 和 freight_watcher (3x/day DAY 含 HH:MM)
      用更细粒度的 marker 避免同一天合法重跑被误判.
    lesson: |
      2026-04-10: 438 行 sources 重复爆炸. MR-4 第三次演出的数据层版本:
      14 个 job 全部是同一 bug class 但声明/运行时/效果三层都没拦住.
      kb_dedup.py 事后清理是补救不是根治. 不变式要求治理重心左移到
      "写入发生之前", 而不是"写入产生之后".
    checks:
      - name: "kb_append_source.sh helper 脚本存在"
        check_type: python_assert
        code: |
          import os
          assert os.path.exists("kb_append_source.sh"), "缺少 kb_append_source.sh"
      - name: "kb_append_source.sh 使用 grep -Fxq (整行 + fixed string + quiet)"
        check_type: file_contains
        file: kb_append_source.sh
        pattern: "grep -Fxq"
      - name: "kb_append_source.sh 有 flock 并发保护"
        check_type: file_contains
        file: kb_append_source.sh
        pattern: "flock"
      - name: "auto_deploy.sh FILE_MAP 包含 kb_append_source.sh (Mac Mini 同步)"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: "kb_append_source.sh"
      - name: "15 个 job 写入点全部切换到 kb_append_source.sh (静态守卫)"
        check_type: python_assert
        code: |
          # 字节级约束: 每个 job 脚本必须 import helper. freight 有 2 个写入点.
          # V37.7: openclaw_official/run_discussions.sh 补齐 (V37.6 P0-2 漏网).
          job_sites = [
              ("jobs/arxiv_monitor/run_arxiv.sh", 1),
              ("jobs/ai_leaders_x/run_ai_leaders_x.sh", 1),
              ("jobs/karpathy_x/run_karpathy_x.sh", 1),
              ("jobs/rss_blogs/run_rss_blogs.sh", 1),
              ("jobs/github_trending/run_github_trending.sh", 1),
              ("jobs/semantic_scholar/run_semantic_scholar.sh", 1),
              # V37.8.13: pwc 脚本已删除 (jobs_registry.yaml entry pwc.enabled=false)
              ("jobs/hf_papers/run_hf_papers.sh", 1),
              ("jobs/dblp/run_dblp.sh", 1),
              ("jobs/acl_anthology/run_acl_anthology.sh", 1),
              ("jobs/ontology_sources/run_ontology_sources.sh", 1),
              ("jobs/freight_watcher/run_freight.sh", 2),
              ("jobs/openclaw_official/run.sh", 1),
              ("jobs/openclaw_official/run_discussions.sh", 1),  # V37.7 补齐
          ]
          for path, expected in job_sites:
              with open(path, encoding="utf-8") as f:
                  src = f.read()
              n = src.count("kb_append_source.sh")
              assert n >= expected, (
                  f"{path} 应有 >={expected} 处 kb_append_source.sh, 实际 {n}"
              )
      - name: "反模式守卫: jobs/**/*.sh 不再有 `} >> \"$KB_SRC\"` 直接追加"
        check_type: python_assert
        code: |
          import subprocess
          r = subprocess.run(
              ["bash", "-c", r'grep -rEn "} >> \"\$KB_SRC\"" jobs/ || true'],
              capture_output=True, text=True,
          )
          assert not r.stdout.strip(), (
              f"发现 V37.6 反模式残留: {r.stdout[:400]}"
          )
      - name: "V37.7 全量扫描: jobs/**/*.sh 不得有任何 `>> \"$KB_SRC\"` 直写"
        check_type: python_assert
        code: |
          # V37.7: 跨 run_discussions.sh 第 16 个漏网事件后加的 catch-all 守卫.
          # 之前的 `} >> $KB_SRC` 正则只匹配块追加, run_discussions.sh 的
          # `echo ... >> $KB_SRC` 单行追加在 while-loop 内部逃过. 本检查
          # 用更宽的 regex 锁死所有 `>> $KB_SRC` 形式.
          import subprocess
          r = subprocess.run(
              ["bash", "-c", r'grep -rEn ">>[[:space:]]*\"\$KB_SRC\"" jobs/ || true'],
              capture_output=True, text=True,
          )
          # 允许: kb_append_source.sh helper 脚本本身的注释与文档
          leaks = [
              line for line in r.stdout.splitlines()
              if line.strip() and "kb_append_source.sh" not in line
          ]
          assert not leaks, (
              f"发现 V37.7 catch-all 反模式残留 ({len(leaks)} 行): "
              + "\n".join(leaks[:10])
          )
      - name: "V37.7 catch-all: 任何 jobs/*.sh 追加 .kb/sources/*.md 必须通过 helper"
        check_type: python_assert
        code: |
          # 字符串匹配法(不依赖变量展开): 检查所有 jobs/*.sh 脚本中
          # 是否存在直接 append 到 sources 目录的实体行.
          import subprocess
          r = subprocess.run(
              ["bash", "-c",
               r'grep -rEn ">>[[:space:]]*.*sources/.*\.md" jobs/ || true'],
              capture_output=True, text=True,
          )
          leaks = [
              line for line in r.stdout.splitlines()
              if line.strip() and "kb_append_source.sh" not in line
          ]
          assert not leaks, (
              f"发现 sources/*.md 直接追加 ({len(leaks)} 行):\n"
              + "\n".join(leaks[:10])
          )
      - name: "runtime: helper 幂等契约 - 同一 marker 第二次写入被跳过"
        check_type: python_assert
        code: |
          # 运行时回归: 真实 subprocess 驱动 helper, 验证幂等.
          import subprocess, tempfile, os
          with tempfile.TemporaryDirectory() as tmp:
              f = os.path.join(tmp, "test.md")
              open(f, "w").write("# Test\n")
              marker = "## 2026-04-11"
              payload = f"\n{marker}\n- item\n"
              env = {**os.environ, "KB_APPEND_SOURCE_QUIET": "1"}
              r1 = subprocess.run(
                  ["bash", "kb_append_source.sh", f, marker],
                  input=payload, capture_output=True, text=True, env=env,
              )
              assert r1.returncode == 0, f"first call failed: {r1.stderr}"
              c1 = open(f).read()
              assert "- item" in c1
              r2 = subprocess.run(
                  ["bash", "kb_append_source.sh", f, marker],
                  input=payload, capture_output=True, text=True, env=env,
              )
              assert r2.returncode == 0
              c2 = open(f).read()
              assert c1 == c2, "helper 不幂等: 同一 marker 被重复追加"
              assert c2.count(marker) == 1, f"marker 出现多次: {c2.count(marker)}"

  - id: INV-DEDUP-001
    name: kb-dedup-is-h2-scoped-and-scans-unindexed-notes
    meta_rule: MR-3
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      kb_dedup.find_duplicate_source_lines 必须是 H2 section-scoped
      (seen set 在每个 `## ` 边界重置), 不能把跨 H2 section 的合法
      重复内容 (RSS rolling window) 误判为需要删除的 duplicate.
      kb_dedup.find_duplicate_notes 必须扫描 NOTES_DIR, 不能只扫
      index.entries, 否则未索引的孤儿 note 永远逃过 dedup.
    design_decision: |
      V37.6 kb_dedup 审计发现两个算法 bug:
      1. find_duplicate_source_lines 用 file-level seen set (line 146),
         同一条 RSS 条目合法出现在 `## 2026-04-09` AND `## 2026-04-10`
         被计为 duplicate, --apply 会删掉历史记录.
      2. find_duplicate_notes 只遍历 index.get("entries"), 2026-04-10
         报告 Notes 286 但 Index 282, 4 条孤儿 note (索引漂移或脚本
         直写 NOTES_DIR) 永远逃过 dedup.

      修复:
      1. find_duplicate_source_lines 跟踪 current_h2: 遇到 `## `
         开头的行 → 重置 seen set, 保留 header. `### ` 子标题不重置
         (同一 H2 内的 sub-section 仍应 dedup).
      2. find_duplicate_notes 先把 NOTES_DIR 下所有未索引的 .md 追加
         为虚拟 entries (summary="", __unindexed__=True), 参与 fuzzy
         hash pass (不参与 summary 精确 pass 因为 summary 为空).
    lesson: |
      2026-04-10 报告的 "438 行重复" 数字部分是 V37.6 之前的真实 bug
      (14 个 job 的 `} >> $KB_SRC` 反模式), 部分是 kb_dedup 算法 bug
      (把跨 H2 合法重复当成真重复). 两个 bug 同时存在时, kb_dedup
      --apply 会在删除重复的同时丢失历史. 源头幂等 (INV-SRC-001)
      + 算法正确 (本不变式) 缺一不可.
    checks:
      - name: "kb_dedup.find_duplicate_source_lines 在 H2 边界重置 seen"
        check_type: file_contains
        file: kb_dedup.py
        pattern: 'stripped.startswith\("## "\)'
      - name: "kb_dedup.find_duplicate_notes 扫描 NOTES_DIR 纳入未索引 note"
        check_type: file_contains
        file: kb_dedup.py
        pattern: "os.listdir\\(NOTES_DIR\\)"
      - name: "runtime: 跨 H2 section 的相同内容不被误判为 duplicate"
        check_type: python_assert
        code: |
          # 运行时回归: 构造双 H2 + 相同内容, 验证不触发 dedup.
          import sys, os, tempfile, importlib
          sys.path.insert(0, os.getcwd())
          if "kb_dedup" in sys.modules:
              importlib.reload(sys.modules["kb_dedup"])
          import kb_dedup
          with tempfile.TemporaryDirectory() as tmp:
              open(os.path.join(tmp, "rss.md"), "w").write(
                  "# RSS\n"
                  "## 2026-04-09\n"
                  "- W3C SHACL 1.2\n"
                  "## 2026-04-10\n"
                  "- W3C SHACL 1.2\n"
              )
              results = kb_dedup.find_duplicate_source_lines(tmp)
              assert results == {}, (
                  f"跨 H2 合法重复被误判: {results}"
              )
      - name: "runtime: 同一 H2 section 内的真实重复被检测"
        check_type: python_assert
        code: |
          import sys, os, tempfile, importlib
          sys.path.insert(0, os.getcwd())
          if "kb_dedup" in sys.modules:
              importlib.reload(sys.modules["kb_dedup"])
          import kb_dedup
          with tempfile.TemporaryDirectory() as tmp:
              open(os.path.join(tmp, "arxiv.md"), "w").write(
                  "## 2026-04-10\n"
                  "- Paper A\n"
                  "- Paper B\n"
                  "- Paper A\n"
              )
              results = kb_dedup.find_duplicate_source_lines(tmp)
              assert "arxiv.md" in results, "同 section 重复应被检测"
              _, _, removed = results["arxiv.md"]
              assert removed == 1, f"应检测到 1 条重复, 实际 {removed}"

  - id: INV-DEDUP-002
    name: kb-dedup-pre-filters-dangling-index-entries
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      kb_dedup.find_duplicate_notes 必须先剔除 file 字段指向不存在文件
      的 "dangling" index entries，再做精确 / 模糊 dedup 分组。
      dangling 条目必须由独立的 find_dangling_index_entries 函数报告，
      不能混入 duplicate count 隐藏 index drift。
    design_decision: |
      V37.7 Mac Mini 血案: 用户跑 `kb_dedup.py --apply` 期望删除 2 条
      dup note, 实际只成功删除 1 条. 调查发现 index.json 里有 2 条
      entry 指向 notes/20260226_type_text_t.md 和 notes/20260226_type.md
      但物理文件早已不存在 (V37.6 修复 content-blocks repr bug 时手动清掉
      但 index 未同步). kb_dedup.find_duplicate_notes 把它们作为 entry
      读入 → 按 summary 分组 → 传给 apply_note_dedup → os.remove() 静默
      no-op → 数字对不上.

      修复:
      1. 新增 find_dangling_index_entries(index) 独立报告 dangling refs.
      2. find_duplicate_notes 入口先 os.path.exists() pre-filter,
         dangling 不进入 exact/fuzzy 分组.
      3. main() 在 --apply 模式下清理 dangling (纯 index 操作, 无文件 IO),
         在 dry-run 模式下发出 WARN 报告数量.
      4. format_report / write_json 可选展示 dangling count.
    lesson: |
      2026-04-11: MR-4 第四次演出的 index drift 版本.
      "apply 动作和 find 动作之间缺少一致性保证" = silent failure.
      dangling != duplicate, 两个 failure class 不能在 dedup 计数里混用.
    checks:
      - name: "kb_dedup 定义 find_dangling_index_entries"
        check_type: file_contains
        file: kb_dedup.py
        pattern: "def find_dangling_index_entries"
      - name: "find_duplicate_notes 有 V37.7 pre-filter 注释标记"
        check_type: file_contains
        file: kb_dedup.py
        pattern: "V37.7"
      - name: "runtime: dangling entries 不出现在 exact_dupes"
        check_type: python_assert
        code: |
          # 构造 2 条 index entry 指向同一 summary, 其中 1 条物理不存在.
          # 期望: dangling 被 pre-filter 剔除 → exact_dupes 为空（只剩 1 条实存）.
          import sys, os, tempfile, json, importlib
          sys.path.insert(0, os.getcwd())
          if "kb_dedup" in sys.modules:
              importlib.reload(sys.modules["kb_dedup"])
          import kb_dedup
          with tempfile.TemporaryDirectory() as tmp:
              kb_dedup.KB_BASE = tmp
              kb_dedup.NOTES_DIR = os.path.join(tmp, "notes")
              kb_dedup.SOURCES_DIR = os.path.join(tmp, "sources")
              kb_dedup.INDEX_FILE = os.path.join(tmp, "index.json")
              os.makedirs(kb_dedup.NOTES_DIR)
              # Real file
              with open(os.path.join(kb_dedup.NOTES_DIR, "real.md"), "w") as f:
                  f.write("# Real note\nbody")
              # Index has real + dangling, both claim same summary
              idx = {"entries": [
                  {"file": "notes/real.md", "summary": "Same summary"},
                  {"file": "notes/missing.md", "summary": "Same summary"},
              ]}
              dangling = kb_dedup.find_dangling_index_entries(idx)
              assert len(dangling) == 1, f"应检测 1 条 dangling, 实际 {len(dangling)}"
              assert dangling[0]["file"] == "notes/missing.md"
              exact, fuzzy = kb_dedup.find_duplicate_notes(idx)
              # dangling 被 pre-filter → real 和 missing 不再同组
              # real 单独一条 + missing 被剔除 → 没有 exact dup
              for kept, removed in exact:
                  files = {kept.get("file")} | {r.get("file") for r in removed}
                  assert "notes/missing.md" not in files, \
                      f"dangling 漏进 exact dup group: {files}"
      - name: "runtime: main --apply 清理 dangling 且不报错"
        check_type: python_assert
        code: |
          # 走完 main 的 --apply 路径, 验证 dangling 被从 index 删除.
          import sys, os, tempfile, json, importlib, io, contextlib
          sys.path.insert(0, os.getcwd())
          if "kb_dedup" in sys.modules:
              importlib.reload(sys.modules["kb_dedup"])
          import kb_dedup
          with tempfile.TemporaryDirectory() as tmp:
              kb_dedup.KB_BASE = tmp
              kb_dedup.NOTES_DIR = os.path.join(tmp, "notes")
              kb_dedup.SOURCES_DIR = os.path.join(tmp, "sources")
              kb_dedup.INDEX_FILE = os.path.join(tmp, "index.json")
              kb_dedup.REPORT_JSON = os.path.join(tmp, "report.json")
              os.makedirs(kb_dedup.NOTES_DIR)
              os.makedirs(kb_dedup.SOURCES_DIR)
              with open(os.path.join(kb_dedup.NOTES_DIR, "real.md"), "w") as f:
                  f.write("# Real\nbody")
              with open(kb_dedup.INDEX_FILE, "w") as f:
                  json.dump({"entries": [
                      {"file": "notes/real.md", "summary": "a"},
                      {"file": "notes/dangling.md", "summary": "b"},
                  ]}, f)
              old_argv = sys.argv
              sys.argv = ["kb_dedup.py", "--apply", "--no-push"]
              try:
                  with contextlib.redirect_stdout(io.StringIO()):
                      kb_dedup.main()
              finally:
                  sys.argv = old_argv
              with open(kb_dedup.INDEX_FILE) as f:
                  idx = json.load(f)
              files = [e["file"] for e in idx["entries"]]
              assert "notes/dangling.md" not in files, \
                  f"dangling 未被清理: {files}"
              assert "notes/real.md" in files, \
                  f"real entry 被误删: {files}"

  # --- 2026-04-14 新增：finance_news X/Twitter 僵尸账号血案（V37.8.4）---

  - id: INV-X-001
    name: syndication-account-must-have-fresh-tweets
    meta_rule: MR-10
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      任何使用 Twitter Syndication API 抓取账号的 job（finance_news + ai_leaders_x）
      必须具备僵尸账号静默失败检测，且区分「冻结(活账号)」vs「真死」(V37.9.103)：
        (1) 解析层：四档检测（V37.8.5 三层 → V37.9.103「冻结≠死亡」）
            - stub: no_data=0 + total=0 = embed-disabled 空壳, Syndication 永久无用 → 可移除
            - frozen: stale(≥90% 超窗口) + newest_tweet < 730 天 = 快照冻结/低频, 活账号 → **勿移除**
            - dead: stale + newest_tweet ≥ 730 天 = 真死/改名 → 可移除
            - alive: count>0 或不满足 stale
        (2) 诊断层：诊断输出行带 ⚠️ 可移除[tier] / 🧊 冻结[frozen] 前缀区分
        (3) 持久化层：可移除(stub+dead) 写 cache/zombies_${DAY}.txt；
            frozen 写 cache/degraded_${DAY}.txt（活账号勿移除, 仅可观测）
        (4) 告警层：后处理 3 天连续命中 → SYSTEM_ALERT 建议移除（仅 stub+dead）；
            frozen 只汇总 log 不告警（用户已接受 X 退化, 避免原则 #32 告警疲劳）
        (5) 移除层：V37.8.4 已确认的年久真死账号不得再出现在账号列表中
        (6) 可测性层（V37.8.5）：检测逻辑必须从 finance_news_zombie / ai_leaders_rotation
            模块导入，shell 脚本不得内嵌 inline fallback（防模块缺失静默降级）
        (7) 防错杀层（V37.9.103 核心）：is_zombie_suspect 绝不含 frozen——Syndication 拿不到
            有老推文的活账号 ≠ 账号死亡（XHNews/CGTN 错杀血案）；DEAD_AGE_DAYS=730 跨两 job 一致
    design_decision: |
      2026-04-14 血案（V37.8.4）：V37.8.3 修复把 3 个 X handle 改为 caixin/yicaichina/straits_times，
      HTTP 200 + 可解析 HTML + 有推文数据三层都绿，但最新推文停更 2227/3364/420 天。
      继续审计发现 Reuters 253d, WorldBank stub, BrookingsInst 585d, ChannelNewsAsia 2955d
      — 22 账号 7 僵尸 (~32% 污染)。
      2026-04-14 二次血案（V37.8.5）：V37.8.4 僵尸检测收工 E2E 即发现 2 个边缘盲区：
      CNS1952 98/99 超窗口 + 1 过短被严格 old==total 放过；SingTaoDaily 0-tweet stub 被 total>0 门槛绕过。
      "修复"本身埋坑，同日再度暴露 MR-10 违规 — 改检测器时没有想清楚"什么样的 handle 是活的"。
      修复：检测逻辑独立成 finance_news_zombie.py 纯函数模块（24 单测）+ 三层检测 +
      tier 可区分诊断 + count 守卫避免低频活跃误报。
      verification_layer=[declaration, runtime] 原因：
