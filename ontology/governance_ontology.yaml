  # --- 2026-04-15 新增：Dream 自引用幻觉血案（V37.8.6）---

  - id: INV-DREAM-003
    name: dream-log-cannot-pollute-cache-nor-fabricate-platform-crises
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      kb_dream.sh 必须阻断"log() 输出污染 cache → Reduce 读 cache → LLM 把内部运行时
      痕迹当外部信号编造平台危机"的幻觉链路：
        (1) log() 函数必须写到 stderr（>&2），不得写 stdout，否则
            signals=$(llm_call ...) 命令替换会把 log 输出捕获进 signals → 写入 cache。
        (2) llm_call heredoc 必须对 prompt 和 system_msg 做 surrogate 清洗
            （U+D800-U+DFFF → U+FFFD），防止 json.dump 触发 UnicodeEncodeError
            导致 body_file 截断 → adapter 返回 400 Bad JSON → 错误日志最终污染 cache。
        (3) 文件 open 必须显式指定 encoding='utf-8' 和 errors='replace' 作为第二防线。
        (4) REDUCE/CHUNK1/2/3 system prompt 必须含反污染守卫，明示禁止：
            - 把 HTTP 错误码/Python 异常/错误页 HTML/U+FFFD 片段 当作外部信号
            - 基于这些字样推断 Hugging Face / GitHub / npm 等平台状态
            - 在行动建议中针对'平台错误'（因为它们不是外部事件）给建议
    design_decision: |
      2026-04-15 03:00 血案：Dream run 出现 4 次 "Bad JSON 400" 错误（adapter.py:386），
      但 Dream 仍产出完整 "Hugging Face 平台危机" 分析，Action 建议监控 Hugging Face。
      用户察觉 Signal(Papers with Code)↔Action(Hugging Face) 主题断裂后上报。

      三层根因：
        (a) 触发器: scraped 内容含 surrogate UTF-8 → llm_call heredoc 的
            json.dump(body, f, ensure_ascii=False) 触发 UnicodeEncodeError →
            body_file 截断 → adapter.py:383 json.loads 炸 400 "Bad JSON"。
        (b) 放大器: kb_dream.sh log() 用 `echo` 写 stdout，而 signals=$(llm_call ...)
            是命令替换 → log 行被捕获进 signals → line 563/其他 cache 写入路径
            把"LLM raw response: <HTML>...Error code: 400 Bad JSON..."写进 cache file。
        (c) 掩护者: Reduce cache-only fast path 读 cache 把错误日志注入 LLM 上下文 →
            Qwen3 基于这些字样自动编造 "Hugging Face 平台 400 Bad JSON 危机" 叙事
            来合理化看到的运行时痕迹 = 原则 #23 链式幻觉 + MR-4 silent failure 复合。

      修复是结构性的：stderr 隔离 + sanitize + errors='replace' + 反污染 prompt
      四层防御，任一层都能单独阻断幻觉链（defense-in-depth）。
      meta_rule=MR-4 因为这是 silent failure 的第 7 次演出：
      4 次 LLM 失败 + 整体输出"看起来正常"+ 无任何 degraded 标记。
    blood_lessons:
      - "2026-04-15 V37.8.6: Dream log→stdout 污染 cache → LLM 编造 Hugging Face 危机；MR-4 第 7 次演出 + 原则 #23 链式幻觉实证"
    checks:
      - name: "kb_dream.sh log() 必须写 stderr（阻断 stdout 污染 cache 通道）"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'log\(\) \{ echo.*>&2; \}'
      - name: "kb_dream.sh log() 附近有 V37.8.6 血案注释"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'V37.8.6.*stderr'
      - name: "kb_dream.sh heredoc 含 _sanitize 函数（surrogate 清洗）"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'def _sanitize\(s\):'
      - name: "kb_dream.sh sanitize 覆盖 U+D800-U+DFFF 完整代理范围"
        check_type: file_contains
        file: kb_dream.sh
        pattern: '0xD800 <= ord\(c\) <= 0xDFFF'
      - name: "kb_dream.sh sanitize 用 U+FFFD (\\ufffd) 替换（不是 ?）"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "'\\\\ufffd' if 0xD800"
      - name: "kb_dream.sh sanitize 应用于 prompt"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'prompt = _sanitize\(prompt\)'
      - name: "kb_dream.sh sanitize 应用于 system_msg"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'system_msg = _sanitize\(system_msg\)'
      - name: "kb_dream.sh body_file open 用 errors='replace' 第二防线"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "errors='replace'"
      - name: "kb_dream.sh body_file open 显式 encoding='utf-8'"
        check_type: file_contains
        file: kb_dream.sh
        pattern: "encoding='utf-8'"
      - name: "kb_dream.sh REDUCE_SYSTEM 含 V37.8.6 反污染守卫"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'V37.8.6 反污染守卫'
      - name: "kb_dream.sh REDUCE_SYSTEM 禁止引用 Bad JSON 作为外部信号"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'Bad JSON/Error code'
      - name: "kb_dream.sh REDUCE_SYSTEM 点名 Hugging Face 作为禁止编造对象示例"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'Hugging Face.*GitHub.*npm'
      # V37.9.68 升级: CHUNK1/2/3 三段 chunked 设计已替换为 DEEP + WIDE+RADAR 两段
      # V37.8.6 反污染语义保留, 位置从 CHUNK1/2/3 搬到 DEEP_SYSTEM 和 WIDE_RADAR_SYSTEM
      - name: "kb_dream.sh DEEP_SYSTEM 含反污染条款 (V37.9.68 替代 CHUNK1)"
        check_type: file_contains
        file: kb_dream.sh
        pattern: 'DEEP_SYSTEM="[^"]*V37.8.6 反污染'
      - name: "kb_dream.sh WIDE_RADAR_SYSTEM 含反污染条款 (V37.9.68 替代 CHUNK2/3 / V37.9.74 兼容 escaped quotes)"
        check_type: python_assert
        assertion: |
          # V37.9.74 修: WIDE_RADAR_SYSTEM 内含 \"## 🌐 ...\" 等 escaped ASCII 双引号字面量
          # 让旧 regex [^"]*V37.8.6 反污染 提前终止 (regex 在第一个未转义 " 处停).
          # 改用 python 字符串搜索: 找 WIDE_RADAR_SYSTEM=" 到下一个未转义 " 之间是否含反污染条款.
          with open("kb_dream.sh") as _f:
              _src = _f.read()
          _start = _src.find('WIDE_RADAR_SYSTEM="')
          assert _start >= 0, "WIDE_RADAR_SYSTEM 变量赋值必须存在"
          _i = _start + len('WIDE_RADAR_SYSTEM="')
          # 找下一个未被反斜杠转义的 "
          while _i < len(_src):
              if _src[_i] == '"' and (_i == 0 or _src[_i - 1] != '\\'):
                  break
              _i += 1
          _block = _src[_start:_i]
          assert "V37.8.6 反污染" in _block, (
              "INV-DREAM-003: WIDE_RADAR_SYSTEM 赋值块内必须含 'V37.8.6 反污染' 条款 "
              "(防 LLM 把 HTTP 错误码 / Python 异常当外部信号)"
          )
      - name: "V37.8.6 runtime: sanitize 等价实现正确去除孤立代理"
        check_type: python_assert
        code: |
          # 执行与 kb_dream.sh heredoc 等价的 sanitize 逻辑
          def _sanitize(s):
              if not s:
                  return s
              return ''.join('\ufffd' if 0xD800 <= ord(c) <= 0xDFFF else c for c in s)
          # 孤立高位代理
          assert _sanitize("hello\ud800world") == "hello\ufffdworld", "high surrogate not replaced"
          # 孤立低位代理
          assert _sanitize("\udfffprefix") == "\ufffdprefix", "low surrogate not replaced"
          # 正常字符串不变
          assert _sanitize("Papers with Code 2026-04") == "Papers with Code 2026-04"
          # 代理范围外边界不误伤
          assert _sanitize("\ud7ff") == "\ud7ff", "U+D7FF 不应被替换"
          assert _sanitize("\ue000") == "\ue000", "U+E000 不应被替换"
          # sanitize 后可通过 json + utf-8 编码（原 bug 就炸在此）
          import json
          out = json.dumps({"x": _sanitize("bad\ud800char")}, ensure_ascii=False).encode("utf-8")
          assert b'\xef\xbf\xbd' in out, "U+FFFD UTF-8 bytes not in output"

  # --- 2026-04-15 新增：ontology_sources 推送格式错位血案（V37.8.7）---

  - id: INV-ONTOLOGY-001
    name: ontology-sources-parser-must-be-key-based-not-positional
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      jobs/ontology_sources/run_ontology_sources.sh 解析 LLM 输出时必须用
      separator-切块 + key-based prefix 解析，禁止严格位置 (lines[i],
      lines[i+1], lines[i+2]) + i+=3 步进。原模式在 LLM 漏一行"要点"
      或多一行空白时会**级联错位** —— 后续所有条目的 cn_title/highlight/stars
      全部错位（如 *---* 当 cn_title、价值行被当 cn_title）。
        (1) 解析器必须是独立模块 jobs/ontology_sources/ontology_parser.py
            （纯函数 parse_llm_blocks(llm_content) -> list[(str,str,str)]
            可单测，避开 V37.5 heredoc-only 不可测血案）
        (2) shell 脚本必须 `export ONTOLOGY_JOBS_DIR=$JOB_DIR` + heredoc
            内 `from ontology_parser import parse_llm_blocks`
        (3) 可执行代码层不得含 lines[i+1]/lines[i+2]/i += 3（注释里说明
            历史的字串允许保留）
        (4) auto_deploy.sh FILE_MAP 必须包含 ontology_parser.py 部署
    design_decision: |
      2026-04-15 用户 WhatsApp 收到 ontology_sources 推送出现严重错位：
      第 2 篇 cn_title 是 *---*，中文标题串到 highlight 槽，第 3 篇 cn_title
      变成 *价值：⭐⭐⭐⭐*。根因：LLM 第 2 篇漏了"要点"行，原解析器的
      i+=3 步进让所有后续条目的 (cn_title, highlight, stars) 全部右移一格。
      MR-4 silent-failure 第 8 次演出（用户察觉违和才发现）。
      meta_rule=MR-4 因为输出"看起来正常"（结构完整 6 字段都在）但
      实际语义错乱。
    blood_lessons:
      - "2026-04-15 V37.8.7: ontology_sources 位置解析 i+=3 级联污染所有后续条目；MR-4 第 8 次演出"
    checks:
      - name: "ontology_parser.py 模块存在"
        check_type: file_contains
        file: jobs/ontology_sources/ontology_parser.py
        pattern: 'def parse_llm_blocks\(llm_content'
      - name: "ontology_parser.py 用 separator 切块"
        check_type: file_contains
        file: jobs/ontology_sources/ontology_parser.py
        pattern: '_SEPARATOR_RE\.split'
      - name: "ontology_parser.py 块内 key-based 识别字段"
        check_type: file_contains
        file: jobs/ontology_sources/ontology_parser.py
        pattern: "line\\.startswith\\('中文标题'\\)"
      - name: "shell 脚本 export ONTOLOGY_JOBS_DIR"
        check_type: file_contains
        file: jobs/ontology_sources/run_ontology_sources.sh
        pattern: 'export ONTOLOGY_JOBS_DIR='
      - name: "shell heredoc import parse_llm_blocks 或 parse_6field_output (V37.9.62 升级)"
        check_type: file_contains
        file: jobs/ontology_sources/run_ontology_sources.sh
        # V37.9.62: 接受 V37.8.7 parse_llm_blocks (3 字段) 或 V37.9.62 parse_6field_output (6 字段)
        # 两者都从 ontology_parser 模块 import, separator 切块设计完整保留
        pattern: 'from ontology_parser import parse_(llm_blocks|6field_output)'
      - name: "auto_deploy FILE_MAP 含 ontology_parser.py"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: 'jobs/ontology_sources/ontology_parser\.py'
      - name: "V37.8.7 runtime: 缺要点不级联污染后续块"
        check_type: python_assert
        code: |
          import sys, os
          sys.path.insert(0, "jobs/ontology_sources")
          from ontology_parser import parse_llm_blocks
          # 模拟用户 2026-04-15 看到的污染场景：第 2 篇缺要点
          content = (
              "中文标题：A\n要点：B\n价值：⭐⭐⭐\n"
              "---\n"
              "中文标题：D\n价值：⭐⭐⭐⭐\n"
              "---\n"
              "中文标题：E\n要点：F\n价值：⭐⭐⭐⭐⭐"
          )
          got = parse_llm_blocks(content)
          assert len(got) == 3, f"expected 3 blocks, got {len(got)}"
          assert got[0] == ("A", "要点：B", "价值：⭐⭐⭐"), f"block 0 wrong: {got[0]}"
          assert got[1] == ("D", "", "价值：⭐⭐⭐⭐"), f"block 1 cascaded: {got[1]}"
          assert got[2] == ("E", "要点：F", "价值：⭐⭐⭐⭐⭐"), f"block 2 cascaded: {got[2]}"
          # 关键反例：cn_title 不能是 ---、不能是价值行
          for i, (ct, _, _) in enumerate(got):
              assert "---" not in ct, f"block {i} cn_title 含分隔符残留: {ct}"
              assert "价值" not in ct, f"block {i} cn_title 串到价值行: {ct}"

  - id: INV-DEPLOY-003
    name: status-json-is-exempt-from-drift-sync-at-both-preflight-and-auto-deploy
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      status.json 是 Claude Code（仓库快照）和 Mac Mini cron（每小时 runtime
      刷新）**双向写入**的 state 文件，不是静态部署产物。
      两侧都**必须豁免** drift 检测中对 status.json 的 md5 比对，否则：
        - runtime 数据被仓库快照每小时覆盖清空
        - "修复 1 个文件不一致"告警每小时推送一次，成为噪声
      但 status.json 仍须在**new-commit 同步路径**保留（Claude Code 的 intent
      变更如 priorities / unfinished / recent_changes 单向下传到 runtime）。
      这是"one-way intent flow + exempt from two-way drift detection"的契约。
    design_decision: |
      2026-04-15 V37.8.11: 用户反馈 [SYSTEM_ALERT] 每小时推送"漂移检测: 修复 1 个
      部署文件不一致"，问题存在长期 — V37.8.1 preflight_check.sh 加了 status.json
      分叉豁免，但 auto_deploy.sh 的等价 drift 循环**没有同步加**。
      V37.4.3 [SYSTEM_ALERT] 前缀让这些噪声告警从 Discord 静默区变得用户可见，
      于是"预期噪声"升级为"需要消除的噪声"。
      修复：auto_deploy.sh drift 循环加同款 `if SRC == status.json then continue`
      豁免；new-commit 路径保留同步（intent 下传）。
      2026-06-08 V37.9.123 日落法 #27 概念 B: V37.8.11 的"两侧各自硬编码 status.json
      字面量"本身是一物二形（加新内容漂移豁免要改两处）。收敛到
      path_consistency_scanner.CONTENT_DRIFT_EXEMPT 单一真理源, bash 经
      `--print-exempt content-drift` 查询。不同 FAIL 方向是设计: auto_deploy = FAIL-SAFE
      (查询失败退回 status.json 防覆盖血案) / preflight = FAIL-OPEN (查询失败 md5 比对可见
      fail 无害)。契约 (status.json 两侧豁免 + 保留 FILE_MAP new-commit 路径) 不变。
    blood_lessons:
      - "2026-04-15 V37.8.11: auto_deploy hourly drift 每小时告警 + 每小时覆盖 runtime status.json；V37.8.1 preflight 已修复同类问题但 auto_deploy 漏改"
      - "2026-06-08 V37.9.123: V37.8.11 两侧硬编码 status.json 字面量是一物二形 → 收敛到 CONTENT_DRIFT_EXEMPT 单一真理源 + auto_deploy FAIL-SAFE 安全网保留 V37.8.11 防线"
    checks:
      # V37.9.123 日落法 #27 概念 B: status.json 内容漂移豁免从两侧脚本各自硬编码字面量
      # (if [[ "$SRC" == "status.json" ]]) 收敛到 path_consistency_scanner.CONTENT_DRIFT_EXEMPT
      # 单一真理源, bash 经 `--print-exempt content-drift` 查询. 不变式契约不变 (status.json 两侧
      # 豁免 + 保留 FILE_MAP new-commit 路径 + 防 V37.8.11 覆盖), 实现从字面量升级为单一源查询.
      - name: "V37.9.123: CONTENT_DRIFT_EXEMPT 单一真理源 (path_consistency_scanner)"
        check_type: file_contains
        file: path_consistency_scanner.py
        pattern: 'CONTENT_DRIFT_EXEMPT'
      - name: "V37.9.123: preflight check 6 查询 CONTENT_DRIFT_EXEMPT 单一源 (不硬编码字面量)"
        check_type: file_contains
        file: preflight_check.sh
        pattern: '--print-exempt content-drift'
      - name: "V37.9.123: auto_deploy drift 循环查询 CONTENT_DRIFT_EXEMPT 单一源"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: '--print-exempt content-drift'
      - name: "V37.9.123: auto_deploy FAIL-SAFE 安全网 (查询失败退回 status.json 防 V37.8.11 覆盖)"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: 'CONTENT_DRIFT_EXEMPT="status\.json"'
      - name: "auto_deploy.sh FILE_MAP 仍包含 status.json (new-commit 路径 intent 下传)"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: '"status\.json\|\$HOME/\.kb/status\.json"'
      # V37.9.2 → V37.9.123 runtime: MR-6 深度补齐, 验证经单一真理源有效豁免 (非字面量)
      - name: "V37.9.123 runtime: 两侧脚本经 CONTENT_DRIFT_EXEMPT 单一源有效豁免 status.json"
        check_type: python_assert
        code: |
          # V37.9.123: status.json 内容漂移豁免从硬编码字面量收敛到 CONTENT_DRIFT_EXEMPT 单一源.
          # Runtime 验证: (a) 单一源含 status.json (b) 两侧脚本查询单一源 + 成员检查消费
          # (c) auto_deploy FAIL-SAFE 安全网防 V37.8.11 覆盖血案. for-loop 非 comprehension (V37.3 exec 作用域).
          import re
          violations = []
          with open("path_consistency_scanner.py", "r", encoding="utf-8") as f:
              pcs = f.read()
          m = re.search(r'CONTENT_DRIFT_EXEMPT:\s*dict\[str, str\]\s*=\s*\{(.*?)\n\}', pcs, re.DOTALL)
          if not m or '"status.json"' not in m.group(1):
              violations.append("CONTENT_DRIFT_EXEMPT 单一真理源缺 status.json")
          for script in ["preflight_check.sh", "auto_deploy.sh"]:
              with open(script, "r", encoding="utf-8") as f:
                  s = f.read()
              if "--print-exempt content-drift" not in s:
                  violations.append(script + ": 未查询 CONTENT_DRIFT_EXEMPT 单一真理源")
              if 'grep -qxF "$SRC"' not in s:
                  violations.append(script + ": 未用成员检查消费豁免集")
          with open("auto_deploy.sh", "r", encoding="utf-8") as f:
              ad = f.read()
          if 'CONTENT_DRIFT_EXEMPT="status.json"' not in ad:
              violations.append("auto_deploy.sh 缺 FAIL-SAFE 安全网 (查询失败退回 status.json 防 V37.8.11)")
          assert not violations, ("V37.9.123 内容漂移收敛契约缺失: " + str(violations))

  - id: INV-OBSERVABILITY-001
    name: llm-error-chain-is-transparent-across-proxy-and-client
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      LLM 调用链（client → proxy:5002 → adapter:5001 → upstream LLM）中任何
      一跳返回 HTTP 错误时，真实错误原因必须透传到最下游的 client，不得在中间
      层被稀释为"HTTP 502: Bad Gateway"状态短语。
        (1) proxy_filters.py 必须定义 compose_backend_error_str(exc) 纯函数，
            对 HTTPError 读取 response body 并拼进 error 字符串（失败 fail-open）
        (2) tool_proxy.py 的 except Exception 分支必须 import 并调用
            compose_backend_error_str，不得直接 str(e)
        (3) kb_review_collect.py 必须定义 _compose_http_reason(http_error)
            纯函数（相同语义 client 侧版本）
        (4) call_llm 的 urllib.error.HTTPError 分支必须调 _compose_http_reason，
            不得直接 return f"HTTP {e.code}: {e.reason}"
        (5) 两侧 helper 都必须有 MAX_UPSTREAM_BODY_CHARS 常量控制上限
            （避免告警消息超出 WhatsApp 4000 字符限制）
        (6) test_tool_proxy.py + test_kb_review.py 各自提供回归测试锁定
    design_decision: |
      2026-04-14/15 连续 2 天 kb_evening 22:00 告警"HTTP 502: Bad Gateway"，
      用户无法从告警判断根因。Mac Mini 日志显示真实原因是 primary Qwen3
      circuit breaker OPEN + fallback gemini HTTP 429 quota exhausted。但
      adapter→proxy→client 三跳中每一跳都把上游错误 body 丢弃：
        - adapter: _send_json(502, {"error": "ALL 1 FALLBACKS FAILED: gemini 429"})
        - proxy:   urllib.error.HTTPError → str(e) → "HTTP Error 502: Bad Gateway"
                   body 从未被 e.read() 提取，wfile.write(json.dumps({"error": str(e)}))
        - client:  rc.call_llm HTTPError.reason → "Bad Gateway"，body 再次丢弃
      结果：用户告警"HTTP 502: Bad Gateway"，真实原因经过 3 次稀释完全不可见。
      MR-4 silent-failure 第 9 次演出：错误没被吞，只是内容被稀释到无意义。

      修复契约：proxy 层和 client 层都必须读 HTTPError.read() body。两层修复
      缺一不可——只改 client 只能看到 proxy 的 "HTTP Error 502"，看不到
      adapter 的 "gemini 429"。
    blood_lessons:
      - "2026-04-14/15 V37.8.10: kb_evening 22:00 连续 2 天告警'HTTP 502: Bad Gateway'，真实原因 primary 断路器 OPEN + gemini 429 quota 耗尽被三层稀释；MR-4 第 9 次演出（错误被稀释而非吞）"
    checks:
      - name: "proxy_filters.py 定义 compose_backend_error_str"
        check_type: file_contains
        file: proxy_filters.py
        pattern: 'def compose_backend_error_str\(exc\)'
      - name: "proxy_filters.py 定义 MAX_UPSTREAM_BODY_CHARS 常量"
        check_type: file_contains
        file: proxy_filters.py
        pattern: 'MAX_UPSTREAM_BODY_CHARS\s*='
      - name: "proxy_filters helper 读 exc.read() body"
        check_type: file_contains
        file: proxy_filters.py
        pattern: 'body_bytes\s*=\s*exc\.read\(\)'
      - name: "proxy_filters helper 有 fail-open 契约 (try/except)"
        check_type: file_contains
        file: proxy_filters.py
        pattern: 'return base'
      - name: "tool_proxy.py import compose_backend_error_str"
        check_type: file_contains
        file: tool_proxy.py
        pattern: 'compose_backend_error_str'
      - name: "tool_proxy.py 不重新定义 helper（MR-8: 必须 import）"
        check_type: file_not_contains
        file: tool_proxy.py
        pattern: 'def compose_backend_error_str'
      - name: "tool_proxy.py except 分支调 compose_backend_error_str"
        check_type: file_contains
        file: tool_proxy.py
        pattern: 'error_str\s*=\s*compose_backend_error_str\(e\)'
      - name: "kb_review_collect.py 定义 _compose_http_reason"
        check_type: file_contains
        file: kb_review_collect.py
        pattern: 'def _compose_http_reason\(http_error\)'
      - name: "kb_review_collect.py 定义 MAX_UPSTREAM_BODY_CHARS 常量"
        check_type: file_contains
        file: kb_review_collect.py
        pattern: 'MAX_UPSTREAM_BODY_CHARS\s*='
      - name: "kb_review call_llm HTTPError 分支调 _compose_http_reason"
        check_type: file_contains
        file: kb_review_collect.py
        pattern: 'return False, "", _compose_http_reason\(e\)'
      - name: "V37.8.10 runtime: proxy helper 真实读 HTTPError body + extract error 字段"
        check_type: python_assert
        code: |
          import sys, os, io, json
          import urllib.error
          sys.path.insert(0, ".")
          from proxy_filters import compose_backend_error_str
          # 模拟 2026-04-15 22:00 实际产生的 adapter 错误 body
          body = json.dumps({"error": "ALL 1 FALLBACKS FAILED: gemini HTTP 429"}).encode()
          fp = io.BytesIO(body)
          e = urllib.error.HTTPError("http://adapter:5001", 502, "Bad Gateway", {}, fp)
          result = compose_backend_error_str(e)
          assert "upstream:" in result, f"upstream body not extracted: {result}"
          assert "gemini" in result, f"gemini not in result: {result}"
          assert "429" in result, f"429 not in result: {result}"
      - name: "V37.8.10 runtime: kb_review helper 真实读 HTTPError body + fail-open on exception"
        check_type: python_assert
        code: |
          import sys, os, io, json
          import urllib.error
          sys.path.insert(0, ".")
          import kb_review_collect as m
          body = json.dumps({"error": "ALL 1 FALLBACKS FAILED: gemini HTTP 429"}).encode()
          fp = io.BytesIO(body)
          e = urllib.error.HTTPError("http://proxy:5002", 502, "Bad Gateway", {}, fp)
          reason = m._compose_http_reason(e)
          assert "HTTP 502" in reason
          assert "upstream:" in reason
          assert "gemini" in reason
          assert "429" in reason
          # Fail-open: e.read 抛异常也不炸
          body2 = b"whatever"
          fp2 = io.BytesIO(body2)
          e2 = urllib.error.HTTPError("http://proxy", 502, "Bad Gateway", {}, fp2)
          e2.read = lambda: (_ for _ in ()).throw(RuntimeError("boom"))
          reason2 = m._compose_http_reason(e2)
          assert "HTTP 502" in reason2, "fail-open contract violated"
      # V37.8.18 Phase 2 Route B C13 盲区修复: last_run_*.json 一致性
      - name: "V37.8.18 kb_inject.sh 必须写 last_run_inject.json"
        check_type: file_contains
        file: kb_inject.sh
        pattern: "last_run_inject\\.json"
      - name: "V37.8.18 kb_evening.sh 必须写 last_run_evening.json"
        check_type: file_contains
        file: kb_evening.sh
        pattern: "last_run_evening\\.json"
      - name: "V37.8.18 kb_review.sh 必须写 last_run_review.json"
        check_type: file_contains
        file: kb_review.sh
        pattern: "last_run_review\\.json"
      - name: "V37.8.18 kb_harvest_chat.py 必须写 last_run_harvest_chat.json"
        check_type: file_contains
        file: kb_harvest_chat.py
        pattern: "last_run_harvest_chat\\.json"
      - name: "V37.8.18 runtime: 所有已登记 LLM job 的 last_run 路径与 job_watchdog 监控列表一致"
        check_type: python_assert
        code: |
          # C13 盲区防御: job_watchdog 的监控列表必须与脚本实际写入路径一致
          # 若脚本被改 last_run 路径但 watchdog 未同步 → 监控失效 (silent)
          import re, os
          with open("job_watchdog.sh", "r", encoding="utf-8") as f:
              watchdog = f.read()
          # 从 watchdog 提取 "last_run_XXX.json" 期望值
          expected = set(re.findall(r'last_run_(\w+)\.json', watchdog))
          # 每个 expected 对应的脚本必须真的写它
          # 映射：job id → script path
          job_scripts = {
              "inject":        "kb_inject.sh",
              "evening":       "kb_evening.sh",
              "review":        "kb_review.sh",
              "harvest_chat":  "kb_harvest_chat.py",
              "discussions":   "jobs/openclaw_official/run_discussions.sh",
              "governance_audit": "governance_audit_cron.sh",
          }
          violations = []
          for jid in expected:
              if jid not in job_scripts:
                  continue  # 未登记映射的 job 跳过（avoid false positive）
              spath = job_scripts[jid]
              if not os.path.exists(spath):
                  continue
              with open(spath, "r", encoding="utf-8", errors="ignore") as f:
                  script_src = f.read()
              if f"last_run_{jid}.json" not in script_src:
                  violations.append(f"{spath} 脚本未写 last_run_{jid}.json "
                                    f"但 watchdog 期望它")
          assert not violations, f"last_run 路径漂移: {violations}"

  - id: INV-WA-001
    name: wa-keepalive-escalates-to-discord-on-consecutive-warn
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      wa_keepalive 连续 N 次 WARN（Gateway 不可达）必须自动升级到 Discord #alerts 告警。
      告警链不得依赖失效主体自身——Gateway 宕时 WhatsApp 也不通，必须走 Discord。
    design_decision: |
      V37.8.13 2026-04-16 血案：Gateway 宕 9 小时，wa_keepalive 每 30 分钟写 WARN 到本地日志
      却不推送任何告警。Discord 正常但用户没收到 Gateway 相关告警。MR-4 silent-failure 第 11 次演出。
    blood_lessons:
      - "V37.8.13: 告警链依赖失效主体 (WhatsApp 告警走 WhatsApp 通道 → Gateway 宕 → 告警也死)"
    checks:
      - name: "wa_keepalive.sh 有 WARN 计数器文件定义"
        check_type: file_contains
        file: wa_keepalive.sh
        pattern: "WARN_COUNT_FILE"
      - name: "wa_keepalive.sh 有升级阈值定义 (ESCALATE_FIRST)"
        check_type: file_contains
        file: wa_keepalive.sh
        pattern: "ESCALATE_FIRST"
      - name: "wa_keepalive.sh 升级路径使用 Discord"
        check_type: file_contains
        file: wa_keepalive.sh
        pattern: "DISCORD_CH_ALERTS"
      - name: "wa_keepalive.sh 包含 V37.8.13 血案注释"
        check_type: file_contains
        file: wa_keepalive.sh
        pattern: "V37.8.13"
      - name: "wa_keepalive.sh 告警消息包含恢复命令"
        check_type: file_contains
        file: wa_keepalive.sh
        pattern: "launchctl bootstrap"
      - name: "wa_keepalive.sh source env vars for Discord channel IDs"
        check_type: file_contains
        file: wa_keepalive.sh
        pattern: "source.*(bash_profile|env_shared)"
      - name: "V37.8.13 runtime: 计数器递增 + OK 重置 + Discord 告警路径存在"
        check_type: python_assert
        code: |
          src = open("wa_keepalive.sh").read()
          # 计数器递增
          assert "PREV_COUNT" in src and "+ 1" in src, "缺少计数器递增"
          # OK 重置
          import re
          lines = src.splitlines()
          found_reset = False
          for i, line in enumerate(lines):
              if "Gateway reachable" in line:
                  window = "\n".join(lines[i:i+5])
                  if '"0"' in window and "WARN_COUNT" in window:
                      found_reset = True
          assert found_reset, "成功路径缺少 WARN 计数器重置"
          # 告警不走 WhatsApp（告警链独立于失效主体）
          escalation = src[src.find("ESCALAT"):]
          assert "--channel whatsapp" not in escalation, "告警路径不应走 WhatsApp"

  - id: INV-QUIET-001
    name: quiet-alert-sends-discord-during-silence-period
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      auto_deploy.sh 的 quiet_alert() 在凌晨静默期（00-07 HKT）仅跳过 WhatsApp，
      Discord #alerts 必须始终推送。CRITICAL 告警不应被静默期吞没。
    design_decision: |
      V37.8.13 2026-04-16 血案：auto_deploy preflight 连续三次（00:20/00:48/00:52）
      检测到 Gateway :18789 不可达，但全被 [QUIET] 静默期跳过 WhatsApp + Discord 双通道
      推送。9 小时无人知道 Gateway 宕机。修复：静默期仅跳过 WhatsApp（用户在睡觉），
      Discord 始终推送（用户醒来能看到告警记录）。
    blood_lessons:
      - "V37.8.13: 凌晨静默期不分级地吞掉所有告警（CRITICAL 和 WARNING 一视同仁）"
      - "V37.8.13: 3 次 preflight FAIL 全被 [QUIET] 吞没 → 9h 完全静默"
    checks:
      - name: "quiet_alert 静默期路径包含 discord send"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: "静默期跳过WhatsApp.*Discord仍推"
      - name: "quiet_alert 包含 V37.8.13 血案注释"
        check_type: file_contains
        file: auto_deploy.sh
        pattern: "V37.8.13"
      - name: "V37.8.13 runtime: 静默期路径有 discord 无 whatsapp"
        check_type: python_assert
        code: |
          import re
          src = open("auto_deploy.sh").read()
          match = re.search(r"quiet_alert\(\)\s*\{(.*?)\n\}", src, re.DOTALL)
          assert match, "quiet_alert 函数未找到"
          body = match.group(1)
          quiet_block = body.split("return 0")[0] if "return 0" in body else ""
          assert "discord" in quiet_block, "静默期路径缺 discord"
          assert "whatsapp" not in quiet_block, "静默期路径不应含 whatsapp"
      - name: "V37.8.13 runtime: [SYSTEM_ALERT] 前缀在 is_quiet_hours 判断之前"
        check_type: python_assert
        code: |
          import re
          src = open("auto_deploy.sh").read()
          match = re.search(r"quiet_alert\(\)\s*\{(.*?)\n\}", src, re.DOTALL)
          body = match.group(1)
          alert_pos = body.find("SYSTEM_ALERT")
          quiet_pos = body.find("is_quiet_hours")
          assert quiet_pos > alert_pos, "[SYSTEM_ALERT] 标记应在 quiet 判断之前"

  # --- V37.9.13 新增：restart.sh 单一 manager 契约（MR-9 state-writes-go-through-helper 扩展）---

  - id: INV-RESTART-001
    name: restart-sh-single-manager-no-double-ownership
    meta_rule: MR-9
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      restart.sh 的 adapter/proxy 主路径必须通过 launchctl kickstart -k 启动。
      nohup 路径只能作为 plist 缺失场景的 fallback（dev 环境 / 未装 plist）。
      V37.9.12.1 发现的双管理冲突（manual nohup + launchd KeepAlive 两路抢端口）
      必须被源码级防御阻止：任何 nohup python3 adapter.py / tool_proxy.py 必须
      出现在 _ad_rc=2 / _px_rc=2 fallback 分支内。
    design_decision: |
      V37.9.12.1 Mac Mini 验证发现: restart.sh 的 `nohup python3 adapter.py`
      启动 manual 进程，同时 com.openclaw.adapter.plist 有 KeepAlive=true
      由 launchd 并行管理。两路进程同时尝试 bind :5001，launchd 侧持续
      crash-loop（launchctl list 显示 high ExitCode）。同款问题在 proxy 侧
      也存在。V37.9.13 修复: 统一单一 manager 原则 —
        1. 所有服务（gateway/adapter/proxy）都走 launchd
        2. restart.sh 改用 `launchctl kickstart -k` 触发 launchd 内部重启
        3. plist 缺失时回退到 nohup 保留向后兼容
        4. V37.8.13 健康验证模式从 Gateway 扩展到 adapter/proxy
    blood_lessons:
      - "V37.9.12.1: restart.sh nohup + launchd KeepAlive 双路抢端口，launchd crash-loop"
      - "V37.9.12.1: 双管理 = 两个 owner 不协作 = 必然有一方失败"
    checks:
      - name: "restart.sh 定义 restart_via_launchd helper"
        check_type: file_contains
        file: restart.sh
        pattern: "restart_via_launchd()"
      - name: "restart.sh 使用 launchctl kickstart -k"
        check_type: file_contains
        file: restart.sh
        pattern: "launchctl kickstart -k"
      - name: "restart.sh 通过 helper 启动 adapter"
        check_type: file_contains
        file: restart.sh
        pattern: 'restart_via_launchd "com.openclaw.adapter" 5001'
      - name: "restart.sh 通过 helper 启动 tool proxy"
        check_type: file_contains
        file: restart.sh
        pattern: 'restart_via_launchd "com.openclaw.proxy" 5002'
      - name: "restart.sh 头部注释记录 V37.9.13 血案背景"
        check_type: file_contains
        file: restart.sh
        pattern: "V37.9.13"
      - name: "V37.9.13 runtime: adapter nohup 必须在 fallback 分支内"
        check_type: python_assert
        code: |
          import re
          src = open("restart.sh").read()
          # 所有 nohup adapter.py 出现位置前 300 字符内必须有 plist/rc 保护
          for m in re.finditer(r'nohup\s+python3\s+["\$][^"\n]*/adapter\.py', src):
              ctx = src[max(0, m.start() - 300): m.start()]
              assert ("plist not found" in ctx) or ("_ad_rc" in ctx), \
                  f"nohup adapter at offset {m.start()} 不在 fallback 分支内（V37.9.12.1 双管理血案防线）"
      - name: "V37.9.13 runtime: tool_proxy nohup 必须在 fallback 分支内"
        check_type: python_assert
        code: |
          import re
          src = open("restart.sh").read()
          for m in re.finditer(r'nohup\s+python3\s+["\$][^"\n]*/tool_proxy\.py', src):
              ctx = src[max(0, m.start() - 300): m.start()]
              assert ("plist not found" in ctx) or ("_px_rc" in ctx), \
                  f"nohup tool_proxy at offset {m.start()} 不在 fallback 分支内"
      - name: "V37.9.13 runtime: set -e 安全的返回码捕获模式"
        check_type: python_assert
        code: |
          import re
          src = open("restart.sh").read()
          assert re.search(r'restart_via_launchd\s+"com\.openclaw\.adapter".*\|\|\s+_ad_rc=\$\?', src), \
              "adapter 调用必须用 || _ad_rc=$? 捕获返回码（set -e 安全）"
          assert re.search(r'restart_via_launchd\s+"com\.openclaw\.proxy".*\|\|\s+_px_rc=\$\?', src), \
              "proxy 调用必须用 || _px_rc=$? 捕获返回码"
      # V37.9.54 扩展: marker-based plist reload (修复 V37.9.13/V37.9.53 kickstart -k 不重读 plist 问题)
      - name: "V37.9.54: PLIST_LOAD_MARKER_DIR 常量定义"
        check_type: file_contains
        file: restart.sh
        pattern: 'PLIST_LOAD_MARKER_DIR='
      - name: "V37.9.54: helper 内含 plist mtime vs marker mtime 比较逻辑"
        check_type: file_contains
        file: restart.sh
        pattern: 'plist_mtime'
      - name: "V37.9.54: 加载成功后 touch marker 记录"
        check_type: file_contains
        file: restart.sh
        pattern: 'touch\s+"\$marker"'
      - name: "V37.9.54: 强制 bootout+bootstrap 路径标识"
        check_type: file_contains
        file: restart.sh
        pattern: 'need_full_reload'
      - name: "V37.9.54 runtime: marker 路径写正确, 需 plist 在 marker 之后才触发 bootout/bootstrap"
        check_type: python_assert
        code: |
          import re
          src = open("restart.sh").read()
          # 关键不变式: marker mtime ≥ plist mtime 时走 kickstart -k, 否则走 bootout+bootstrap
          assert 'marker_mtime' in src and 'plist_mtime' in src, "V37.9.54 marker 比较逻辑必须存在"
          # 关键不变式: touch marker 必须在 health verification 成功 (HTTP 200) 后
          # 防止 daemon 启动失败但 marker 被误更新, 下次重启走 kickstart 跳过 plist reload
          m_touch = re.search(r'touch\s+"\$marker"', src)
          assert m_touch, "touch marker 必须存在"
          # touch 之前 200 字符内必须有 'HTTP $_code' 或 'healthy' 字样
          ctx_before = src[max(0, m_touch.start() - 400): m_touch.start()]
          assert ("healthy" in ctx_before) or ('200' in ctx_before), \
              "V37.9.54 touch marker 必须在健康验证 HTTP 200 之后, 防失败误更新"

  # --- V37.9.54 新增: plist EnvironmentVariables 必须含所有声明的 provider api_key_env ---
  # 触发: V37.9.53 doubao 接入 + 加 plist 后实测发现 adapter daemon 仍只 fallback ['gemini'],
  # 因 launchctl kickstart -k 不重读 plist (修复路径见 INV-RESTART-001 V37.9.54 marker
  # checks). 但更上游问题是: provider 声明 api_key_env 但 plist 缺该 env 项 → daemon
  # 拿不到 → ProviderRegistry.available() 误判 → fallback chain 跳过 → silent failure.
  # 本 INV 把 provider 声明态(api_key_env)与运行时态(plist EnvironmentVariables)同步
  # 升级为治理可监控.
  - id: INV-PLIST-ENV-001
    name: plist-env-must-contain-all-provider-api-keys
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      所有 provider (built-in in providers.py + plugin in providers.d/) 通过
      `api_key_env` 字段声明 daemon 启动时需要的 env var. adapter 通过 launchd
      启动, 仅能拿到 ~/Library/LaunchAgents/com.openclaw.adapter.plist 的
      EnvironmentVariables dict 中声明的 env. 若 provider 声明了 api_key_env
      但 plist 没有对应 env, adapter 启动时 ProviderRegistry.available() 会
      因 os.environ.get 为空把该 provider 误判为不可用, fallback chain 跳过
      → silent failure (V37.9.53 doubao 实测案例).
    design_decision: |
      V37.9.53 doubao 接入后实测踩坑: 用户 zsh export ARK_API_KEY 后跑 restart.sh,
      adapter daemon 仍 fallback_chain=['gemini']. 根因: launchctl 启动的 daemon
      不继承 zsh session 的 export env, 必须通过 plist EnvironmentVariables 持久
      化. V37.9.53 hotfix 是 PlistBuddy 手动加 ARK_API_KEY + ARK_ENDPOINT_ID.
      V37.9.54 升级: 让 governance 主动监控 plist 内容 vs provider 声明的同步.
    blood_lessons:
      - "V37.9.53: doubao 接入 plist 缺 ARK_API_KEY, fallback chain 静默跳过"
      - "V37.9.12.1: proxy plist 缺 ONTOLOGY_MODE=on env, shadow 模式静默生效"
      - "通用模式: launchd daemon 不继承 shell session env, plist 必须显式声明"
    checks:
      - name: "providers.py 必须定义 api_key_env 字段"
        check_type: file_contains
        file: providers.py
        pattern: 'api_key_env'
      - name: "doubao plugin 声明 ARK_API_KEY"
        check_type: file_contains
        file: providers.d/doubao_provider.py
        pattern: 'api_key_env = "ARK_API_KEY"'
      - name: "INV-PLIST-ENV-001 V37.9.54 marker 存在"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: "V37.9.54 新增"
      - name: "V37.9.54 runtime: declared api_key_env 在 providers 源码集合中可解析"
        check_type: python_assert
        code: |
          import re, os
          declared = set()
          # providers.py 内 built-in
          src = open("providers.py").read()
          for m in re.finditer(r'api_key_env\s*=\s*"(\w+)"', src):
              declared.add(m.group(1))
          # providers.d/*.py plugins
          plugin_dir = "providers.d"
          if os.path.isdir(plugin_dir):
              for fn in os.listdir(plugin_dir):
                  if fn.startswith("_") or not fn.endswith(".py"):
                      continue
                  src = open(os.path.join(plugin_dir, fn)).read()
                  for m in re.finditer(r'api_key_env\s*=\s*"(\w+)"', src):
                      declared.add(m.group(1))
          # 已知应有的 env (V37.9.54 baseline)
          required = {"REMOTE_API_KEY", "OPENAI_API_KEY", "GEMINI_API_KEY",
                      "ANTHROPIC_API_KEY", "MOONSHOT_API_KEY", "MINIMAX_API_KEY",
                      "GLM_API_KEY", "ARK_API_KEY"}
          assert required.issubset(declared), \
              f"V37.9.54 baseline: declared {declared} 必须 ⊇ {required}, missing: {required - declared}"
      - name: "V37.9.54 runtime: --full mode adapter plist EnvironmentVariables 与 declared api_key_env 比对"
        check_type: python_assert
        code: |
          import plistlib, re, os
          from pathlib import Path
          plist_path = Path.home() / "Library/LaunchAgents/com.openclaw.adapter.plist"
          # dev 环境无 plist → 静默通过 (V37.9.54 runtime check 只在 Mac Mini --full 真验证 plist)
          # 不抛 AssertionError = pass; 这是合法 skip 因为没有 plist 就没有 silent failure 风险
          if plist_path.exists():
              with open(plist_path, "rb") as f:
                  plist_data = plistlib.load(f)
              plist_envs = set(plist_data.get("EnvironmentVariables", {}).keys())
              # 收集所有 provider 声明的 api_key_env
              declared = set()
              for src_path in ["providers.py"]:
                  src = open(src_path).read()
                  for m in re.finditer(r'api_key_env\s*=\s*"(\w+)"', src):
                      declared.add(m.group(1))
              plugin_dir = "providers.d"
              if os.path.isdir(plugin_dir):
                  for fn in os.listdir(plugin_dir):
                      if fn.startswith("_") or not fn.endswith(".py"):
                          continue
                      src = open(os.path.join(plugin_dir, fn)).read()
                      for m in re.finditer(r'api_key_env\s*=\s*"(\w+)"', src):
                          declared.add(m.group(1))
              # V37.9.54 baseline: 至少 V37.9.53 已加的 3 个核心 env 必须在 plist
              critical = {"REMOTE_API_KEY", "GEMINI_API_KEY", "ARK_API_KEY"} & declared
              critical_missing = critical - plist_envs
              assert not critical_missing, \
                  f"V37.9.54 critical missing in plist: {critical_missing} (V37.9.53 doubao 类 silent failure 风险)"

  # --- V37.9.96 新增：proxy plist ARK env 守卫 (INV-PLIST-ENV-001 sibling, MR-4) ---
  # 触发: V37.9.91 Doubao expert_escalate 真生产闭环. tool_proxy.py 的 expert_escalate
  # 自定义工具分支 (V37.9.91 wiring) lazy-import expert_escalation.py, 后者经 Volcengine
  # Ark 调 Doubao Seed 2.0 Pro 用 ARK_API_KEY (DOUBAO_API_KEY_ENV) + ARK_ENDPOINT_ID
  # (DOUBAO_ENDPOINT_ID_ENV). proxy daemon (com.openclaw.proxy.plist) 跑 tool_proxy.py,
  # 必须从 plist EnvironmentVariables 拿到这两个 env. V37.9.91 实测: proxy plist 当时
  # 无 ARK env, 手动从 adapter plist 复制 + bootout/bootstrap 才生效. 但 V37.9.54
  # INV-PLIST-ENV-001 只守 adapter plist, 不守 proxy plist → 若 Mac Mini 重装 /
  # auto_deploy 覆盖 plist, proxy ARK env 静默丢失 → expert_escalate 返回
  # "ARK_API_KEY not set" silent failure. 注意 ARK_ENDPOINT_ID 不是任何 provider 的
  # api_key_env (它是 endpoint ID 不是 key), 所以 INV-PLIST-ENV-001 的 api_key_env
  # 集合检查覆盖不到它 → 这是本 INV 填补的真缺口.
  - id: INV-PROXY-PLIST-ENV-001
    name: proxy-plist-env-must-contain-ark-expert-escalate-keys
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      tool_proxy.py 的 expert_escalate 自定义工具 (V37.9.91 wiring) lazy-import
      expert_escalation.py 经 Volcengine Ark 调 Doubao Seed 2.0 Pro 作 PA 复杂判断
      的 expert backend. proxy daemon 通过 launchd (com.openclaw.proxy.plist) 启动,
      仅能拿到 plist EnvironmentVariables 声明的 env. expert_escalation.py 读
      ARK_API_KEY (DOUBAO_API_KEY_ENV) + ARK_ENDPOINT_ID (DOUBAO_ENDPOINT_ID_ENV).
      若 proxy plist 缺这两个 env, expert_escalate 返回 "ARK_API_KEY not set"
      → PA 复杂判断时无可用 expert backend → silent failure (用户感知不到 PA 没真调 Doubao).
    design_decision: |
      V37.9.91 Doubao 真生产闭环时实测: proxy plist 当时无 ARK env (V37.9.54
      INV-PLIST-ENV-001 只守 adapter plist), 手动从 adapter plist 复制 ARK_API_KEY +
      ARK_ENDPOINT_ID 到 com.openclaw.proxy.plist + launchctl bootout/bootstrap 才生效.
      Doubao 自己在 V37.9.91 escalate 响应中识别此风险: "proxy plist drift: periodic
      auto-deploy runs may overwrite the manually injected ARK_API_KEY entry".
      V37.9.96 把 proxy plist 的 ARK env 持有从"手动加 + 靠记忆"升级为 governance
      可监控 (镜像 V37.9.54 INV-PLIST-ENV-001 守 adapter plist 模式). 注意
      ARK_ENDPOINT_ID 不是任何 provider 的 api_key_env, INV-PLIST-ENV-001 的
      api_key_env 集合检查覆盖不到它 → 本 INV 填补真缺口.
    blood_lessons:
      - "V37.9.91: proxy plist 缺 ARK env, expert_escalate 第一次真调前需手动注入"
      - "V37.9.54: adapter plist 同款 silent failure (provider 声明 api_key_env 但 plist 缺)"
      - "通用模式: launchd daemon 不继承 shell session env, plist 必须显式声明"
    checks:
      - name: "tool_proxy.py 必须有 expert_escalate 自定义工具分支 (V37.9.91 wiring)"
        check_type: file_contains
        file: tool_proxy.py
        pattern: 'name == "expert_escalate"'
      - name: "expert_escalation.py 把 ARK_API_KEY 绑定到 DOUBAO_API_KEY_ENV"
        check_type: file_contains
        file: expert_escalation.py
        pattern: 'DOUBAO_API_KEY_ENV = "ARK_API_KEY"'
      - name: "expert_escalation.py 把 ARK_ENDPOINT_ID 绑定到 DOUBAO_ENDPOINT_ID_ENV"
        check_type: file_contains
        file: expert_escalation.py
        pattern: 'DOUBAO_ENDPOINT_ID_ENV = "ARK_ENDPOINT_ID"'
      - name: "expert_escalation.py 保留 fail-loud 指引 (ARK_API_KEY 缺失提示配 plist)"
        check_type: file_contains
        file: expert_escalation.py
        pattern: "configure in plist EnvironmentVariables"
      - name: "INV-PROXY-PLIST-ENV-001 V37.9.96 marker 存在"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: "V37.9.96 新增"
      - name: "V37.9.96 declaration: expert_escalate 依赖链可解析 (proxy → expert_escalation → ARK env)"
        check_type: python_assert
        code: |
          tp = open("tool_proxy.py").read()
          assert 'name == "expert_escalate"' in tp, \
              "tool_proxy.py 必须有 expert_escalate 分支 (V37.9.91 wiring)"
          assert "expert_escalation" in tp, \
              "expert_escalate 分支必须 lazy-import expert_escalation"
          ee = open("expert_escalation.py").read()
          assert 'DOUBAO_API_KEY_ENV = "ARK_API_KEY"' in ee, \
              "expert_escalation 必须把 ARK_API_KEY 绑定到 DOUBAO_API_KEY_ENV"
          assert 'DOUBAO_ENDPOINT_ID_ENV = "ARK_ENDPOINT_ID"' in ee, \
              "expert_escalation 必须把 ARK_ENDPOINT_ID 绑定到 DOUBAO_ENDPOINT_ID_ENV"
      - name: "V37.9.96 runtime: --full mode proxy plist EnvironmentVariables 必含 ARK_API_KEY + ARK_ENDPOINT_ID"
        check_type: python_assert
        code: |
          import plistlib
          from pathlib import Path
          plist_path = Path.home() / "Library/LaunchAgents/com.openclaw.proxy.plist"
          # dev 环境无 proxy plist → 静默通过 (V37.9.54 INV-PLIST-ENV-001 同款 dev-safe).
          # 不抛 AssertionError = pass; 没 plist 就没 silent failure 风险.
          if plist_path.exists():
              with open(plist_path, "rb") as f:
                  plist_data = plistlib.load(f)
              proxy_envs = set(plist_data.get("EnvironmentVariables", {}).keys())
              required = {"ARK_API_KEY", "ARK_ENDPOINT_ID"}
              missing = required - proxy_envs
              assert not missing, \
                  f"V37.9.96 proxy plist 缺 {missing} → expert_escalate silent failure 风险 (V37.9.91 实测案例)"

  # --- V37.9.129 新增：fallback 链排除地理封锁/不可达 provider（gemini 香港 geo-block 血案）---

  - id: INV-FALLBACK-EXCLUDE-001
    name: geo-blocked-provider-excluded-from-fallback-chain
    meta_rule: MR-4
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      地理封锁/不可达的 provider 必须从 adapter fallback 链排除（config-driven，
      版本控制化），而非靠删 Mac Mini plist 的 key（INV-PLIST-ENV-001 + preflight
      要求 GEMINI_API_KEY 必须在 plist，删 key 会破坏治理）。退役方式 = 保留 key +
      config.yaml fallback.remote_gpu.exclude_providers 显式排除 +
      adapter._FALLBACK_EXCLUDE 在 _build_fallback_chain 两条路径（explicit + auto）
      过滤。否则 provider 因"有 key"被判 available 进链，每次调用返回 400/超时，
      fallback 链该环长期死掉 = silent 退化（平时主 provider 够用没人发现）。
    design_decision: |
      V37.9.129 (2026-06-10 03:00 Dream DEEP 失败) 根因诊断: 三后端全挂 —
      Qwen3 521 (transient) + doubao read timeout (60s fallback 超时被 5000-token
      DEEP 撞穿) + gemini HTTP 400。直连 gemini 看 body 揭示
      "User location is not supported for the API use" (FAILED_PRECONDITION) =
      Google Gemini API 香港永久 geo-block。gemini 从 doubao 加入前就是死链，
      只在 primary+doubao 同时失败时才暴露 = fallback 链没有真正的第二张网。
      修复: config exclude_providers: [gemini] + fallback_timeout_ms 60000→300000
      (给 doubao 大请求足够时间，不降 DEEP max_tokens)。
    blood_lessons:
      - "V37.9.129: gemini 香港 geo-block 400 'User location not supported', fallback 链第 3 环长期死链, 三后端全挂才浮现"
      - "available (有 key) != working (地理可达): require_available 只查 key 存在不查可达性"
      - "退役死链走 config 版本控制 (exclude_providers), 不删 plist key (INV-PLIST-ENV-001 要求)"
    checks:
      - name: "config.yaml fallback 排除 gemini (geo-block 退役)"
        check_type: file_contains
        file: config.yaml
        pattern: 'exclude_providers: \[gemini\]'
      - name: "config.yaml fallback_timeout_ms 加大到 300000 (doubao 大请求不超时)"
        check_type: file_contains
        file: config.yaml
        pattern: 'fallback_timeout_ms: 300000'
      - name: "adapter.py 定义 _FALLBACK_EXCLUDE 读 config exclude_providers"
        check_type: file_contains
        file: adapter.py
        pattern: '_FALLBACK_EXCLUDE = set'
      - name: "adapter.py auto-discover 路径过滤 _FALLBACK_EXCLUDE"
        check_type: file_contains
        file: adapter.py
        pattern: 'cp\.name not in _FALLBACK_EXCLUDE'
      - name: "adapter.py explicit FALLBACK_PROVIDER 路径过滤 _FALLBACK_EXCLUDE"
        check_type: file_contains
        file: adapter.py
        pattern: 'explicit_fb not in _FALLBACK_EXCLUDE'
      - name: "INV-FALLBACK-EXCLUDE-001 V37.9.129 marker 存在"
        check_type: file_contains
        file: ontology/governance_ontology.yaml
        pattern: 'V37\.9\.129'
      - name: "V37.9.129 runtime: test_adapter fallback-exclude 测试通过 (mock 路径 env-independent)"
        check_type: python_assert
        code: |
          import subprocess, sys, os
          tests = [
              "test_adapter.TestHotReloadFunctional.test_v37_9_129_auto_chain_excludes_geo_blocked",
              "test_adapter.TestHotReloadFunctional.test_v37_9_129_no_exclude_keeps_provider",
              "test_adapter.TestHotReloadFunctional.test_v37_9_129_explicit_fallback_also_excluded",
          ]
          proc = subprocess.run(
              [sys.executable, "-m", "unittest"] + tests,
              capture_output=True, text=True, timeout=60, cwd=os.getcwd(),
          )
          assert proc.returncode == 0, (
              f"V37.9.129 fallback-exclude 测试失败:\n{proc.stderr[-600:]}"
          )

  # --- V37.8.16 新增：HEARTBEAT.md 保留文件写入拦截（MR-15 落地）---

  - id: INV-HB-001
    name: heartbeat-md-reserved-file-not-llm-writable
    meta_rule: MR-15
    verification_layer: [declaration, runtime]
    severity: critical
    declaration: |
      HEARTBEAT.md 是 OpenClaw runtime 保留文件 — LLM 不得通过 write/edit 工具写入
      任何非注释内容。Proxy 层必须定义 RESERVED_FILE_BASENAMES 包含 "HEARTBEAT.md"
      并在 fix_tool_args 中调用 detect_reserved_file_write 拦截违规写入，将
      args.content 改写为仅含 # 注释的安全占位（保证 OpenClaw
      isHeartbeatContentEffectivelyEmpty() 返回 true）。SOUL.md 必须含规则 11
      "禁止写 HEARTBEAT.md"作为 LLM 层最终防线。
    design_decision: |
      V37.8.16 2026-04-19 血案：PA (Wei) 把 HN 告警总结写进 workspace/HEARTBEAT.md，
      13 小时后用户发消息时触发 OpenClaw heartbeat 机制，所有 WhatsApp 消息回 HEARTBEAT_OK
      被 Gateway 剥离。MR-4 silent-failure 第 12 次演出。这条不变式锁定四层联合防御：
      LLM 层（SOUL.md 规则 11）+ Proxy 层（detect_reserved_file_write）+ 数据层
      （RESERVED_FILE_SAFE_CONTENT 常量只含注释）+ 集成层（fix_tool_args 调用）。
    blood_lessons:
      - "V37.8.16: PA 不知道 HEARTBEAT.md 是 OpenClaw runtime 控制文件，当 TODO 写了三行 → 13h 静默"
      - "V37.8.16: 默认 HEARTBEAT prompt 的 'If nothing needs attention, reply HEARTBEAT_OK' 指令让 LLM 覆盖用户消息"
      - "V37.8.16: Gateway stripTokenAtEdges 剥离 12 字符 HEARTBEAT_OK → outbound 空 → 用户看不到任何回复"
    checks:
      - name: "proxy_filters.py 定义 RESERVED_FILE_BASENAMES 常量"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "RESERVED_FILE_BASENAMES"
      - name: "proxy_filters.py RESERVED_FILE_BASENAMES 含 HEARTBEAT.md"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "\"HEARTBEAT.md\""
      # V37.9.11 扩展：依据 MRD-RESERVED-FILES-001 对 OpenClaw dist 的扫描结果
      # 补齐 BOOTSTRAP.md + SKILL.md 登记
      - name: "V37.9.11: RESERVED_FILE_BASENAMES 含 BOOTSTRAP.md"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "\"BOOTSTRAP.md\""
      - name: "V37.9.11: RESERVED_FILE_BASENAMES 含 SKILL.md"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "\"SKILL.md\""
      - name: "proxy_filters.py 定义 detect_reserved_file_write 纯函数"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "def detect_reserved_file_write"
      - name: "proxy_filters.py 定义 RESERVED_FILE_SAFE_CONTENT 安全占位"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "RESERVED_FILE_SAFE_CONTENT"
      - name: "proxy_filters.fix_tool_args 调用 detect_reserved_file_write"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "detect_reserved_file_write\\(name, args\\)"
      - name: "proxy_filters.py 包含 V37.8.16 MR-15 注释锚点"
        check_type: file_contains
        file: proxy_filters.py
        pattern: "V37.8.16 MR-15"
      - name: "SOUL.md 含规则 11 '禁止写 OpenClaw 保留文件'"
        check_type: file_contains
        file: SOUL.md
        pattern: "禁止写 OpenClaw 保留文件"
      - name: "SOUL.md 规则 11 含 2026-04-19 血案锚点"
        check_type: file_contains
        file: SOUL.md
        pattern: "2026-04-19 血案规则"
      - name: "SOUL.md 规则 11 含 MR-15 标识"
        check_type: file_contains
        file: SOUL.md
        pattern: "MR-15"
      - name: "V37.8.16 runtime: detect_reserved_file_write 对 HEARTBEAT.md 返回 (True, ...)"
        check_type: python_assert
        code: |
          import sys, os
          sys.path.insert(0, os.getcwd())
          from proxy_filters import detect_reserved_file_write
          # 正向：workspace/HEARTBEAT.md 写入必须被检出
          blocked, reason = detect_reserved_file_write(
              "write", {"path": "/Users/bisdom/.openclaw/workspace/HEARTBEAT.md", "content": "x"})
          assert blocked, "workspace/HEARTBEAT.md 写入应被拦截"
          assert "HEARTBEAT.md" in reason, f"reason 应含 HEARTBEAT.md: {reason}"
          # 负向：正常文件不应误拦
          blocked2, _ = detect_reserved_file_write(
              "write", {"path": "/tmp/note.md", "content": "x"})
          assert not blocked2, "正常文件不应被拦截"
          # 非 write/edit 不应触发
          blocked3, _ = detect_reserved_file_write(
              "read", {"path": "~/HEARTBEAT.md"})
          assert not blocked3, "read 工具不应触发拦截"
      - name: "V37.9.11 runtime: BOOTSTRAP.md + SKILL.md 也被 detect 拦截"
        check_type: python_assert
        code: |
          import sys, os
          sys.path.insert(0, os.getcwd())
          from proxy_filters import detect_reserved_file_write
          # V37.9.11 新增两个保留文件：同一机制必须覆盖 3 个 basename
          # 避开 V37.3 exec scope trap: for-loop 遍历而非 generator expression
          for basename in ("BOOTSTRAP.md", "SKILL.md"):
              for path_prefix in (
                  "/Users/bisdom/.openclaw/workspace/",
                  "~/",
                  "/tmp/test/",
              ):
                  path = path_prefix + basename
                  blocked, reason = detect_reserved_file_write(
                      "write", {"path": path, "content": "malicious"})
                  assert blocked, f"{path} 写入应被拦截但放过"
                  assert basename in reason, (
                      f"reason 应含 {basename}: {reason}"
                  )
                  # edit 工具同样拦
                  blocked2, _ = detect_reserved_file_write(
                      "edit", {"path": path, "new_text": "x"})
                  assert blocked2, f"edit {path} 应被拦截"
      - name: "V37.8.16 runtime: fix_tool_args 对 HEARTBEAT.md 写入改写 content 为注释占位"
        check_type: python_assert
        code: |
          import sys, os, json
          sys.path.insert(0, os.getcwd())
          from proxy_filters import fix_tool_args, RESERVED_FILE_SAFE_CONTENT
          rj = {"choices": [{"message": {"tool_calls": [{
              "function": {
                  "name": "write",
                  "arguments": json.dumps({
                      "path": "/Users/bisdom/.openclaw/workspace/HEARTBEAT.md",
                      "content": "- 任务完成\n- 下一步监控"
                  })
              }
          }]}}]}
          modified = fix_tool_args(rj)
          assert modified, "fix_tool_args 应改写"
          args = json.loads(rj["choices"][0]["message"]["tool_calls"][0]["function"]["arguments"])
          assert args["content"] == RESERVED_FILE_SAFE_CONTENT, \
              f"content 应被替换为 SAFE_CONTENT，实际: {args['content'][:80]}"
          assert "任务完成" not in args["content"], "PA 原写入内容应被清除"
      - name: "V37.8.16 runtime: RESERVED_FILE_SAFE_CONTENT 只含 # 注释行（isHeartbeatContentEffectivelyEmpty=true）"
        check_type: python_assert
        code: |
          import sys, os
          sys.path.insert(0, os.getcwd())
          from proxy_filters import RESERVED_FILE_SAFE_CONTENT
          for line in RESERVED_FILE_SAFE_CONTENT.split("\n"):
              s = line.strip()
              if not s:
                  continue
              assert s.startswith("#"), \
                  f"SAFE_CONTENT 含非注释行 {line!r} — 会让 HEARTBEAT.md 变成 actionable"

  # --- V37.9 新增：Security + Governance 双轨统一（MR-16 落地）---

  - id: INV-SEC-001
    name: security-score-meets-threshold
    meta_rule: MR-16
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      security_score.py 的总评分必须 ≥ SECURITY_THRESHOLD (默认 90). 当前
      93/100 作为 baseline. 把 security_score 结果纳入 governance audit 的
      observability 范围，避免两套审计分叉——任一维度退化会同时在
      governance 报告中可见.
    design_decision: |
      V37.9 Route C: security_score.py 原本是独立工具，与 governance_ontology
      分离。长期风险：某维度退化但只在 security_score 报，governance 不知情；
      或相反。MR-16 的 Step 1 先让 governance 守卫"总分不掉"，确保两套系统
      对安全状态的观察一致。未来 Step 2 按维度细化为 7 个 INV-SEC-*。
    lesson: |
      暂无具体血案——本 INV 是预防性。但 V37.3 (governance_silent_error) 和
      V37.8.13 (whatsapp_silent_death) 揭示的"观察者盲区"元模式适用于此：
      两套独立观察系统如果不共享数据源，就会产生盲区交集。
    checks:
      - name: "security_score.py 存在 compute_score 函数"
        check_type: file_contains
        file: security_score.py
        pattern: "def compute_score"
      # V37.9.8 路线 C Step 4: security_score 从 CLI subprocess 调用升级为
      # library 直调（governance_checker 成为 security_score 的一等调用方）。
      # 旧: subprocess.run(["python3", "security_score.py"]) + 正则 parse 中文
      #     stdout "安全评分：\s*(\d+)/100" — 脆弱 + ~200ms fork 开销 + 解析失败
      #     静默 pass 放过塌陷盲区。
      # 新: from security_score import compute_score 直调 + 从 YAML
      #     security_config.total_threshold 读阈值（不再硬编码 90）→ 与 check 3
      #     (7 维度阈值) + check 4 (dimension 名对齐) 三者统一走 library + YAML
      #     真理源。ontology 的 security_config 成为 "security_score 和 governance
      #     共同读" 的唯一数据源（MR-16 双轨统一终态）。
      - name: "V37.9.8 runtime: security_score 总分 ≥ ontology total_threshold（library 直调）"
        check_type: python_assert
        code: |
          import sys, os
          sys.path.insert(0, os.getcwd())
          try:
              import yaml as _yaml
              from security_score import compute_score
          except ImportError:
              pass  # 环境缺失 → skip（保持 V37.9.3 Step 3 降级策略）
          else:
              yaml_path = os.path.join(
                  os.getcwd(), "ontology", "governance_ontology.yaml"
              )
              with open(yaml_path, "r", encoding="utf-8") as _f:
                  _onto = _yaml.safe_load(_f)
              _sec_cfg = _onto.get("security_config") or {}
              total_threshold = _sec_cfg.get("total_threshold")
              assert total_threshold is not None, (
                  "security_config.total_threshold 缺失 — ontology 真理源不完整"
              )
              data = compute_score()
              total = data.get("total", 0)
              assert total >= total_threshold, (
                  f"security_score {total}/{data.get('max')} "
                  f"< ontology total_threshold {total_threshold}"
              )
      - name: "security_score.py 是 executable（可被 audit 调用）"
        check_type: python_assert
        code: |
          import os
          assert os.path.exists("security_score.py"), "security_score.py missing"
      # V37.9.1 MR-16 Step 2: per-dimension 阈值守卫
      # V37.9.3 路线 C Step 3: 阈值从 YAML 顶层 security_config.dimensions 读取
      # （不再 hardcode 在 python_assert code 里）→ ontology 成为唯一真理源
      - name: "V37.9.3 runtime: 7 安全维度满足 ontology 声明的最低阈值"
        check_type: python_assert
        code: |
          # Step 3 终态: 阈值来自 YAML security_config.dimensions（唯一真理源），
          # 不再在 python_assert 里硬编码。security_score.py 侧也读同一 YAML 自检，
          # 两侧统一到 ontology 防止分叉。
          import sys, os
          sys.path.insert(0, os.getcwd())
          # 1. 从 ontology YAML 读阈值
          try:
              import yaml as _yaml
          except ImportError:
              pass  # PyYAML 缺失 → skip
          else:
              yaml_path = os.path.join(
                  os.getcwd(), "ontology", "governance_ontology.yaml"
              )
              with open(yaml_path, "r", encoding="utf-8") as _f:
                  _onto = _yaml.safe_load(_f)
              _sec_cfg = _onto.get("security_config") or {}
              min_thresholds = _sec_cfg.get("dimensions") or {}
              assert isinstance(min_thresholds, dict) and min_thresholds, (
                  "security_config.dimensions 缺失或为空 — ontology 真理源不完整"
              )
              # 2. 跑 compute_score 拿当前 dimensions
              try:
                  from security_score import compute_score
              except ImportError:
                  pass  # 环境缺失 → skip
              else:
                  data = compute_score()
                  violations = []
                  # V37.3 教训: 避免 generator expression 跨 exec scope
                  for dim in data.get("dimensions", []):
                      name = dim.get("name")
                      score = dim.get("score", 0)
                      min_score = min_thresholds.get(name)
                      if min_score is None:
                          continue
                      if score < min_score:
                          violations.append(
                              f"{name} {score}/{dim.get('max')} < 阈值 {min_score}"
                          )
                  assert not violations, (
                      f"安全维度塌陷 {len(violations)} 个: {violations}"
                  )
      # V37.9.3 Step 3 新增: ontology dimension 名称必须与 security_score.py 实际
      # 维度一致，防止 YAML 改名但 security_score 不同步的静默漂移
      - name: "V37.9.3 runtime: ontology 维度名 vs security_score.py 实际输出对齐"
        check_type: python_assert
        code: |
          import sys, os
          sys.path.insert(0, os.getcwd())
          try:
              import yaml as _yaml
              from security_score import compute_score
          except ImportError:
              pass  # 缺失 → skip
          else:
              yaml_path = os.path.join(
                  os.getcwd(), "ontology", "governance_ontology.yaml"
              )
              with open(yaml_path, "r", encoding="utf-8") as _f:
                  _onto = _yaml.safe_load(_f)
              _sec_cfg = _onto.get("security_config") or {}
              ontology_dims = set((_sec_cfg.get("dimensions") or {}).keys())
              data = compute_score()
              actual_dims = set()
              for dim in data.get("dimensions", []):
                  name = dim.get("name")
                  if name:
                      actual_dims.add(name)
              missing_in_actual = ontology_dims - actual_dims
              assert not missing_in_actual, (
                  f"ontology 声明了 {missing_in_actual} 但 security_score.py 未输出 "
                  f"— 改名/漂移（ontology actual={sorted(actual_dims)})"
              )

