  - id: INV-JOB-GOVAUDIT-001
    name: governance-audit-cron-notifies-on-failure
    meta_rule: MR-7
    verification_layer: [declaration, runtime]
    severity: high
    declaration: |
      governance_audit_cron.sh 每日运行 governance_checker --full。
      失败必须通过 notify.sh 推送告警（治理系统自身的可观测性）。
    # V37.9.3 MR-6 补齐 — 原双 file_contains 证字符串存在。runtime 补强: (a) shell
    # 语法合法 (b) 失败分支与 notify 调用形成因果链（notify 必须在 OVERALL=fail
    # 分支内，而非任意位置的死代码）(c) --topic alerts 必须出现（保障走告警频道）。
    # MR-7 治理自观察要求：治理系统自己也不得有静默失败路径。
    checks:
      - name: "governance_audit_cron.sh 调用 governance_checker.py --full"
        check_type: file_contains
        file: governance_audit_cron.sh
        pattern: 'governance_checker.*--full'
      - name: "governance_audit_cron.sh 失败时 notify 告警"
        check_type: file_contains
        file: governance_audit_cron.sh
        pattern: 'notify'
      - name: "V37.9.3 runtime: failure→notify 因果链完整 + --topic alerts 路由"
        check_type: python_assert
        code: |
          # Runtime: (a) bash -n 语法 (b) notify 调用必须发生在 fail 判定之后的
          # 因果链中 (非 unreachable 死代码) (c) --topic alerts 告警频道路由。
          import subprocess, os
          assert os.path.exists("governance_audit_cron.sh"), (
              "governance_audit_cron.sh 不存在"
          )
          proc = subprocess.run(
              ["bash", "-n", "governance_audit_cron.sh"],
              capture_output=True, text=True, timeout=10,
          )
          assert proc.returncode == 0, (
              f"governance_audit_cron.sh 语法错误:\n{proc.stderr[:500]}"
          )
          with open("governance_audit_cron.sh", "r", encoding="utf-8") as f:
              source = f.read()
          # 剥离注释
          non_comment_lines = []
          for line in source.split("\n"):
              stripped = line.strip()
              if stripped.startswith("#"):
                  continue
              non_comment_lines.append(line)
          non_comment = "\n".join(non_comment_lines)
          # 必须出现 OVERALL=fail（判定）+ notify 调用（非注释）
          assert "OVERALL=\"fail\"" in non_comment or "OVERALL='fail'" in non_comment or 'OVERALL=fail' in non_comment, (
              "governance_audit_cron.sh 缺失 OVERALL=fail 判定分支（MR-7 治理自观察要求）"
          )
          # 因果链: notify 必须在 OVERALL=fail 之后出现（非注释行）
          fail_idx = -1
          notify_idx = -1
          for i, line in enumerate(non_comment_lines):
              if fail_idx < 0 and ("OVERALL=\"fail\"" in line or "OVERALL='fail'" in line or "OVERALL=fail" in line):
                  fail_idx = i
              if notify_idx < 0 and "notify " in line and line.strip().startswith("notify"):
                  notify_idx = i
          assert fail_idx >= 0, "未找到 OVERALL=fail 行"
          assert notify_idx >= 0, "未找到 notify 调用行"
          # 两者存在，但 notify 可以在 if/then 分支内，用行号弱因果: notify
          # 同一条件块内或之后出现
          # 更强保证: notify 调用附近必有 --topic alerts 参数
          assert "--topic alerts" in non_comment, (
              "governance_audit_cron.sh 缺失 --topic alerts 路由（告警必须走 alerts 频道）"
          )

